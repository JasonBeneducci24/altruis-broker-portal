  }

  // Heuristic: codes ending in "_status" or labels ending in "Status"
  // (e.g. sprinklered_status, ex_wind_status, surveillance_status, GLonlyStatus)
  const code = (field.code || '').toLowerCase();
  const label = (field.label || '').toLowerCase();
  if (code.endsWith('_status') || label.endsWith(' status') || code.endsWith('status') && !code.includes('.')) {
    // But ONLY if the value is a clear yes/no type marker, to avoid hitting
    // text status fields like "renewal_status_description"
    const v = (value === null || value === undefined) ? '' : String(value).toLowerCase();
    if (v === '' || v === '0' || v === '1' || v === 'true' || v === 'false' ||
        v === 'yes' || v === 'no') return true;
  }

  return false;
}

// Normalize any of the many "truthy" shapes Joshu sends to a JS bool
function isTruthyBool(v) {
  if (v === true) return true;
  if (v === false) return false;
  if (v === null || v === undefined) return false;
  const s = String(v).toLowerCase().trim();
  return s === '1' || s === 'true' || s === 'yes' || s === 'y';
}

// A locked (read-only) value — no frame, just the formatted value in place.
// Empty values show a subtle em-dash rather than "Not provided" which was
// both loud and confusing when applied to populated rows missing one field.
function lockedValueEl(text) {
  const display = (text === null || text === undefined || text === '' || text === '—') ? '—' : text;
  const isEmpty = display === '—';
  return el('div', { className: `locked-value ${isEmpty ? 'empty' : ''}` }, display);
}

// Format a value by its inferred meaning, not just its Joshu type.
// This is what turns "3619920" into "$3,619,920" and "60332" into "60,332 sq ft".
function formatByType(field, value) {
  if (value === null || value === undefined || value === '') return '—';

  // Handle structured values (Monetary objects, Location objects, arrays)
  if (Array.isArray(value)) {
    return value.filter(v => v !== null && v !== undefined && v !== '').join(', ');
  }
  if (typeof value === 'object') {
    if (value.amount != null) return formatMoney(value.amount);
    return formatDatapointValue(value);  // falls through to legacy formatter
  }

  const str = String(value).trim();
  if (!str) return '—';

  const code = (field.code || '').toLowerCase();
  const label = (field.label || '').toLowerCase();
  const fmt = (field.format || '').toLowerCase();

  // Date: ISO format "2026-05-15" → "May 15, 2026"
  // Only when the field type is explicitly date OR the value matches an
  // ISO date pattern. This avoids accidentally reformatting things like
  // version strings.
  if (field.type === 'date' || /^\d{4}-\d{2}-\d{2}$/.test(str)) {
    return formatFriendlyDate(str);
  }
  if (field.type === 'datetime' || /^\d{4}-\d{2}-\d{2}T\d{2}:/.test(str)) {
    return formatFriendlyDate(str.split('T')[0]);
  }

  // Percentage: codes/labels mentioning percent, windhail%, or format=Percentage
  if (fmt === 'percentage' || code.includes('percentage') || code.includes('_percent') ||
      code === 'windhailpercentage' || label.endsWith('%') || label.includes('percentage')) {
    return formatNumber(str) + '%';
  }

  // Year: code/label = year_built, or value is a plausible 4-digit year with no decimal
  if (code.includes('year') || /^year/.test(label) || /^\d{4}$/.test(str)) {
    return str;
  }

  // Square footage: code/label mentions sq ft
  if (code.includes('square_footage') || code.includes('sq_ft') || code.includes('sqft') ||
      label.includes('square foot') || label.includes('sq ft')) {
    return formatNumber(str) + ' sq ft';
  }

  // Stories: singular/plural
  if (code === 'stories' || code.endsWith('.stories') || label === 'stories') {
    const n = parseFloat(str);
    if (!isNaN(n)) {
      const whole = Math.round(n);
      return whole === 1 ? '1 story' : `${whole} stories`;
    }
  }

  // Building count / location count / count fields: plain number with commas
  if (code.includes('_count') || code.endsWith('.count') || label.endsWith('count')) {
    return formatNumber(str);
  }

  // Monetary: type=monetary, Joshu Text that starts with "$", or codes that imply money
  // Explicit: aop_deductible, building_value, annual_sales, bpp_limit, limits, premiums, etc.
  if (field.type === 'monetary' || str.startsWith('$') || /^\$[\d,]/.test(str)) {
    // Already formatted or has $ sign — normalize
    return formatMoney(str.replace(/^\$/, ''));
  }
  if (code.includes('value') || code.includes('premium') || code.includes('limit') ||
      code.includes('sales') || code.includes('deductible') ||
      code.includes('sublimit') || code.includes('pay') ||
      code.endsWith('.pollutantcleanuplim') || code.endsWith('.papersandrecords') ||
      code.endsWith('.waterbackuplimit') || code.endsWith('.wind_hail_minimum_dollar') ||
      code.endsWith('.wind_hail_dollar_figure')) {
    // Only apply $ if numeric — skip strings like "365 Days" that look like limits
    const stripped = str.replace(/[,$]/g, '');
    if (/^-?\d+(\.\d+)?$/.test(stripped)) {
      return formatMoney(stripped);
    }
  }

  // Plain number with decimal that looks like a count/numeric stat: format with commas
  if (/^-?\d+(\.\d+)?$/.test(str.replace(/,/g, ''))) {
    const cleaned = str.replace(/,/g, '');
    const num = parseFloat(cleaned);
    if (!isNaN(num)) return formatNumber(cleaned);
  }

  // Default: trust the raw value (already a string)
  return str;
}

function formatMoney(raw) {
  if (raw === null || raw === undefined || raw === '') return '—';
  const cleaned = String(raw).replace(/[$,]/g, '').trim();
  const num = parseFloat(cleaned);
  if (isNaN(num)) return String(raw);
  // Drop cents if whole dollars — $3,619,920 reads cleaner than $3,619,920.00
  const hasCents = Math.round(num * 100) % 100 !== 0;
  return '$' + num.toLocaleString('en-US', {
    minimumFractionDigits: hasCents ? 2 : 0,
    maximumFractionDigits: hasCents ? 2 : 0,
  });
}

function formatNumber(raw) {
  if (raw === null || raw === undefined || raw === '') return '—';
  const cleaned = String(raw).replace(/,/g, '').trim();
  const num = parseFloat(cleaned);
  if (isNaN(num)) return String(raw);
  const hasDecimal = Math.round(num * 100) % 100 !== 0;
  return num.toLocaleString('en-US', {
    minimumFractionDigits: hasDecimal ? 2 : 0,
    maximumFractionDigits: hasDecimal ? 2 : 0,
  });
}

// Format an ISO date "2026-05-15" as "May 15, 2026".
// Doesn't use the Date constructor's local-tz parsing — it splits the
// string explicitly so 2026-05-15 always reads as May 15 regardless of
// the user's timezone.
function formatFriendlyDate(raw) {
  if (raw === null || raw === undefined || raw === '') return '—';
  const m = String(raw).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return String(raw);
  const [, y, mo, d] = m;
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const monthName = months[parseInt(mo, 10) - 1];
  if (!monthName) return String(raw);
  // Strip leading zero from day for natural reading
  const day = parseInt(d, 10);
  return `${monthName} ${day}, ${y}`;
}

// ─────────────────────────────────────────────────────────────
// Slider — used for Number/Monetary fields with 3+ numeric options
// ─────────────────────────────────────────────────────────────
function renderSlider(field, currentValue, onChange) {
  const options = field.options;
  // Find the current index, defaulting to -1 (no selection)
  let activeIdx = options.findIndex(o => String(o.value) === String(currentValue));
  if (activeIdx < 0) activeIdx = Math.floor(options.length / 2); // default to middle

  const activeOption = options[activeIdx];
  const wrap = el('div', { className: 'slider-wrap' });

  // Top row: label + current value display
  const headRow = el('div', { className: 'slider-head' },
    el('div', { className: 'slider-value' }, activeOption?.label || activeOption?.value || '—'),
    el('div', { className: 'slider-hint' }, 'Slide to adjust'));
  wrap.appendChild(headRow);

  // Slider track
  const track = el('div', { className: 'slider-track' });
  const fill = el('div', { className: 'slider-fill' });
  const handle = el('div', { className: 'slider-handle' });
  track.appendChild(fill);
  track.appendChild(handle);

  // Position helpers
  const pctFor = (idx) => options.length <= 1 ? 0 : (idx / (options.length - 1)) * 100;
  const updatePosition = (idx) => {
    const pct = pctFor(idx);
    fill.style.width = `${pct}%`;
    handle.style.left = `${pct}%`;
    headRow.querySelector('.slider-value').textContent =
      options[idx]?.label || options[idx]?.value || '—';
  };
  updatePosition(activeIdx);

  // Drag behavior
  let dragging = false;
  const rectCache = () => track.getBoundingClientRect();
  const idxFromX = (clientX) => {
    const r = rectCache();
    const rel = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    return Math.round(rel * (options.length - 1));
  };
  const startDrag = (e) => {
    dragging = true;
    e.preventDefault();
    handleMove(e);
  };
  const handleMove = (e) => {
    if (!dragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const idx = idxFromX(clientX);
    if (idx !== activeIdx) {
      activeIdx = idx;
      updatePosition(idx);
    }
  };
  const endDrag = () => {
    if (!dragging) return;
    dragging = false;
    onChange(options[activeIdx]?.value ?? null);
  };

  track.addEventListener('mousedown', startDrag);
  track.addEventListener('touchstart', startDrag, { passive: false });
  window.addEventListener('mousemove', handleMove);
  window.addEventListener('touchmove', handleMove, { passive: true });
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);

  // Keyboard support on the handle
  handle.setAttribute('tabindex', '0');
  handle.setAttribute('role', 'slider');
  handle.setAttribute('aria-label', field.label || field.code);
  handle.setAttribute('aria-valuemin', '0');
  handle.setAttribute('aria-valuemax', String(options.length - 1));
  handle.addEventListener('keydown', (e) => {
    let newIdx = activeIdx;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') newIdx = Math.max(0, activeIdx - 1);
    else if (e.key === 'ArrowRight' || e.key === 'ArrowUp') newIdx = Math.min(options.length - 1, activeIdx + 1);
    else if (e.key === 'Home') newIdx = 0;
    else if (e.key === 'End') newIdx = options.length - 1;
    else return;
    e.preventDefault();
    if (newIdx !== activeIdx) {
      activeIdx = newIdx;
      updatePosition(activeIdx);
      onChange(options[activeIdx]?.value ?? null);
    }
  });

  // Click on track sets value
  wrap.appendChild(track);

  // Tick labels beneath the track
  const ticks = el('div', { className: 'slider-ticks' });
  options.forEach((o, i) => {
    const tick = el('div', {
      className: `slider-tick ${i === activeIdx ? 'active' : ''}`,
      onClick: () => {
        activeIdx = i;
        updatePosition(i);
        onChange(o.value ?? null);
      },
    }, o.label || o.value);
    ticks.appendChild(tick);
  });
  wrap.appendChild(ticks);

  return wrap;
}

// Autosave: debounce-save dirty fields every 1.5s
let _autoSaveTimer = null;
function scheduleAutoSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveDirtyData, 1500);
}

async function saveDirtyData() {
  const s = state.selectedSubmission;
  if (!s) return;
  const dirty = state.submissionDirty;
  if (!Object.keys(dirty).length) return;

  state.submissionSaving = 'saving';
  render();
  try {
    await api(`/api/submissions/${s.id}/data`, { method: 'PUT', body: dirty, silent: false });
    // Merge the saved values into the form state so the UI stays in sync
    if (state.submissionForm) {
      for (const f of state.submissionForm.fields) {
        if (f.code in dirty) f.value = dirty[f.code];
      }
    }
    state.submissionDirty = {};
    state.submissionSaving = 'saved';
    // Once a save lands, clear the "show what's required" highlight.
    // It will come back if the broker tries to submit again with gaps,
    // but in the meantime the editing experience is uncluttered.
    state.showRequiredHighlight = false;
    render();
    setTimeout(() => {
      if (state.submissionSaving === 'saved') {
        state.submissionSaving = 'idle';
        render();
      }
    }, 2000);
  } catch (e) {
    state.submissionSaving = 'idle';
    render();
  }
}

async function reopenForEdit(id) {
  if (!confirm('Reopen this submission for editing? The underwriter will see that you reopened it and can re-review after you resubmit.')) return;
  try {
    await api(`/api/submissions/${id}/reopen`, { method: 'POST' });
    toast('Submission reopened', 'ok');
    loadSubmission(id);
  } catch (e) { /* toast shown */ }
}

async function cancelEdit(id) {
  // If there are pending edits, ask
  if (Object.keys(state.submissionDirty).length > 0) {
    if (!confirm('Discard your unsaved changes?')) return;
  }
  state.submissionDirty = {};
  state.submissionFormState = 'view';
  loadSubmission(id);
}

async function submitForQuote(id) {
  // Flush any pending edits first
  if (Object.keys(state.submissionDirty).length > 0) {
    await saveDirtyData();
  }

  // Pre-flight check: count required-but-empty fields across all sections
  // BEFORE we ask Joshu. This catches obvious omissions on the client
  // side rather than waiting for a server-side validation_error to come
  // back. Joshu will still do its own validation on submit; this is a
  // friendlier check that guides the broker before they hit the API.
  const incomplete = countIncompleteRequiredFields();
  if (incomplete.count > 0) {
    // Flip on visual highlighting of required-but-empty fields. This
    // CSS class is added to the form pane and stays on until the next
    // successful save / submit. It uses the :placeholder-shown trick
    // and :invalid pseudo-class to highlight fields that the
    // browser knows are required-and-empty without us tracking them
    // individually in JS.
    state.showRequiredHighlight = true;
    const sectionList = incomplete.bySection
      .map(s => `  \u2022 ${s.label}: ${s.count} field${s.count === 1 ? '' : 's'}`)
      .join('\n');
    toast(
      `${incomplete.count} required field${incomplete.count === 1 ? '' : 's'} still need${incomplete.count === 1 ? 's' : ''} a value:\n${sectionList}`,
      'err'
    );
    // Jump them to the first incomplete section so they don't hunt for it
    if (incomplete.firstSectionCode && state.activeSection !== incomplete.firstSectionCode) {
      state.activeSection = incomplete.firstSectionCode;
    }
    render();
    return;
  }

  if (!confirm('Submit this to underwriting for a quote?')) return;
  try {
    await api(`/api/submissions/${id}/submit`, { method: 'POST' });
    toast('Submitted for quote \u2014 underwriting will review', 'ok');
    loadSubmission(id);
  } catch (e) { /* toast shown */ }
}

// Walk the submission's section/field tree and count how many fields
// are marked required AND visible AND have no value (and no pending
// dirty edit). Returns counts per-section so the toast can guide the
// broker to where the gaps are.
//
// Fields are "empty" if their value is null, undefined, '', or an
// empty array/object. Booleans default to "no" (false), which counts
// as a value — Joshu treats unset boolean as the schema default.
//
// Hidden conditional fields (visible: false) are excluded — broker
// shouldn't be required to fill in fields they can't see.
function countIncompleteRequiredFields() {
  const result = { count: 0, bySection: [], firstSectionCode: null };
  const submission = state.submission;
  if (!submission || !Array.isArray(submission.sections)) return result;

  for (const section of submission.sections) {
    if (!Array.isArray(section.fields)) continue;
    let sectionCount = 0;
    for (const field of section.fields) {
      if (!field.required) continue;
      if (field.visible === false) continue;
      // Boolean fields are never "empty" in a meaningful sense.
      // They're either checked or unchecked, both valid values.
      if (isBooleanField(field, field.value)) continue;
      // Get the effective value (dirty edit takes precedence over
      // server value).
      const dirty = state.submissionDirty[field.code];
      const effective = dirty !== undefined ? dirty : field.value;
      if (effective === null || effective === undefined || effective === '') {
        sectionCount++;
      } else if (Array.isArray(effective) && effective.length === 0) {
        sectionCount++;
      } else if (typeof effective === 'object' &&
                 Object.keys(effective).length === 0) {
        sectionCount++;
      }
    }
    if (sectionCount > 0) {
      result.bySection.push({
        code: section.code,
        label: section.label || section.code,
        count: sectionCount,
      });
      result.count += sectionCount;
      if (!result.firstSectionCode) {
        result.firstSectionCode = section.code;
      }
    }
  }
  return result;
}

// ─── Quote variation card ─────────────────────────────────────────
// Renders an inline panel below the quote detail allowing the broker
// to spawn a new quote variation. Closed by default; expands on click
// of the "Create variation" button. Form is driven entirely by
// VARIATION_SCHEMA (see top of submissions section).
//
// Submit currently calls POST /api/quotes/{id}/variations which is
// behind a backend kill switch — the frontend handles the "not yet
// enabled" response gracefully and shows the broker a clear message
// rather than a generic error.
function quoteVariationCard(q) {
  const vf = state.variationForm;
  const isThisQuote = vf.open && vf.parentQuoteId === q.id;

  if (!isThisQuote) {
    return el('div', { className: 'card', style: { marginTop: '20px' } },
      el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
        el('div', {},
          el('div', { className: 'eyebrow' }, 'Variations'),
          el('h3', { style: { marginTop: '4px' } }, 'Adjust terms without re-underwriting'),
          el('p', { style: { color: 'var(--ink-mute)', fontSize: '0.88rem', marginTop: '4px' } },
            'Change deductible, GL limits, SDLL/CGLL, or optional coverages to spawn a new quote version. The original quote stays valid.')),
        el('button', { className: 'btn btn-primary',
          onClick: () => {
            state.variationForm = {
              open: true,
              parentQuoteId: q.id,
              values: variationDefaultsFromQuote(q),
              submitting: false,
              error: null,
            };
            render();
          } },
          'Create variation')));
  }

  // Form is open for this quote — render the schema-driven inputs.
  const onChange = (key, value) => {
    state.variationForm.values[key] = value;
    state.variationForm.error = null;
    render();
  };

  return el('div', { className: 'card', style: { marginTop: '20px' } },
    el('div', { className: 'eyebrow' }, 'New variation'),
    el('h3', { style: { marginTop: '4px' } },
      `Variation of Quote #${q.id}`),
    el('p', { style: { color: 'var(--ink-mute)', fontSize: '0.88rem', marginTop: '4px', marginBottom: '20px' } },
      'Defaults match the parent quote. Changed fields are highlighted. Submitting creates a new sibling quote — the parent stays bindable.'),

    el('div', { className: 'variation-grid' },
      ...VARIATION_SCHEMA.map(field => variationField(field, vf.values, q.data || {}, onChange))),

    vf.error
      ? el('div', { className: 'login-err', style: { marginTop: '16px' } }, vf.error)
      : null,

    el('div', { style: { display: 'flex', gap: '10px', marginTop: '20px', justifyContent: 'flex-end' } },
      el('button', { className: 'btn btn-secondary',
        disabled: vf.submitting,
        onClick: () => {
          state.variationForm = {
            open: false, parentQuoteId: null, values: {}, submitting: false, error: null,
          };
          render();
        } }, 'Cancel'),
      el('button', { className: 'btn btn-primary',
        disabled: vf.submitting,
        onClick: () => submitVariation(q) },

// Renders a single variation form field per its schema entry.
// `parentData` is the data object from the parent quote — used to
// detect when a value has been changed from parent and apply a
// highlight to the field row.
function variationField(field, values, parentData, onChange) {
  const current = values[field.key];
  const parent = parentData[field.key];
  const changed = !valuesEqual(current, parent);

  const rowClass = `variation-row ${changed ? 'variation-row-changed' : ''}`;

  let control;
  if (field.type === 'select') {
    control = el('select', {
      value: String(current ?? ''),
      onChange: (e) => {
        // Coerce back to the option's original type. Options can hold
        // numbers (deductibles, limits) or strings (GL limits format).
        const optionValue = field.options.find(o => String(o.value) === e.target.value)?.value;
        onChange(field.key, optionValue);
      },
    },
      ...field.options.map(o =>
        el('option', { value: String(o.value), selected: String(o.value) === String(current) ? '' : null },
          o.label)));
  } else if (field.type === 'multi') {
    const selected = Array.isArray(current) ? current : [];
    control = el('div', { className: 'variation-multi' },
      ...field.options.map(o => {
        const checked = selected.includes(o.value);
        return el('label', { className: 'variation-checkbox' },
          el('input', {
            type: 'checkbox',
            checked: checked ? '' : null,
            onChange: (e) => {
              const next = e.target.checked
                ? [...selected, o.value]
                : selected.filter(v => v !== o.value);
              onChange(field.key, next);
            },
          }),
          el('span', {}, o.label));
      }));
  } else {
    control = el('div', {}, `(unsupported field type: ${field.type})`);
  }

  return el('div', { className: rowClass },
    el('div', { className: 'variation-row-label' },
      el('div', { className: 'variation-row-name' }, field.label),
      changed ? el('span', { className: 'variation-row-badge' }, 'Changed') : null,
      field.help ? el('div', { className: 'variation-row-help' }, field.help) : null),
    el('div', { className: 'variation-row-control' }, control));
}

function valuesEqual(a, b) {
  if (a === b) return true;
  if (Array.isArray(a) && Array.isArray(b)) {
    if (a.length !== b.length) return false;
    const sa = [...a].sort(), sb = [...b].sort();
    return sa.every((v, i) => v === sb[i]);
  }
  return String(a) === String(b);
}

async function submitVariation(parentQuote) {
  state.variationForm.submitting = true;
  state.variationForm.error = null;
  render();
  try {
    const result = await api(`/api/quotes/${parentQuote.id}/variations`, {
      method: 'POST',
      body: JSON.stringify({ overrides: state.variationForm.values }),
    });
    // Success — the new quote ID comes back. Navigate to it.
    state.variationForm = {
      open: false, parentQuoteId: null, values: {}, submitting: false, error: null,
    };
    if (result && result.id) {
      state.subView = result.id;
      loadQuote(result.id);
    } else {
      // Fallback: refresh the submission so the new quote shows up in
      // the quote list.
      state.view = 'submissions';
      state.subView = parentQuote.submission_id;
      loadSubmission(parentQuote.submission_id);
    }
  } catch (e) {
    // The kill switch returns a structured error from the backend.
    // Surface a friendly message rather than a stack trace.
    const msg = (e && e.message) || 'Variation creation failed.';
    state.variationForm.submitting = false;
    state.variationForm.error = msg.includes('not_ready')
      ? 'Variation creation is not yet enabled in this environment. Wiring is in place — awaiting auth resolution before going live.'
      : `Could not create variation: ${msg}`;
    render();
  }
}

function newSubmissionView() {
  // Three-step flow:
  //   step 1: pick_product — cards, one per product
  //   step 2: confirm — set effective date, confirm product
  //   step 3: upload — drag-and-drop documents, process via external API,
  //                    receive structured JSON to pre-populate the submission.
  //                    Skippable — brokers without source documents can
  //                    proceed to a blank application.
  // After step 3 (whether documents were processed or skipped), we POST to
  // /api/submissions/start, then patch the submission's data with anything
  // we extracted, then route to the submission detail page where the
  // broker fills in the rest. Extracted-field keys are stashed in
  // state.extractedFields so the submission detail page can render them
  // with a visual highlight (broker-verifiable auto-fill).
  //
  // External processing API is not yet wired. The processDocuments() stub
  // simulates a 1.5s round-trip and returns an empty extracted-data object,
  // which means "no fields pre-filled" — identical to today's behavior
  // until the real API is connected. Swap the stub body when ready.
  const form = {
    step: 'pick_product',
    products: null,
    productsError: null,
    selectedProduct: null,
    effective_date: new Date(Date.now() + 7 * 86400000).toISOString().split('T')[0],
    creating: false,
    // Step 3 (upload) state
    files: [],                    // [{ id, file: File, name, size, status }]
    processing: false,            // true while external API is "thinking"
    extractedData: null,          // null = not yet processed; {} = processed with no extractions; {key: value, ...} = processed with extractions
    extractError: null,
  };
  const container = el('div', {});

  // Kick off product fetch on view mount. Only fetch once — subsequent
  // re-renders use the cached `form.products`.
  api('/api/products')
    .then(res => {
      form.products = res.items || [];
      // If only one product is configured, auto-advance to step 2.
      if (form.products.length === 1) {
        form.selectedProduct = form.products[0];
        form.step = 'confirm';
      }
      rerender();
    })
    .catch(e => {
      form.productsError = e?.message || 'Failed to load products.';
      form.products = [];
      rerender();
    });

  const rerender = () => {
    container.innerHTML = '';
    const stepTitle = {
      pick_product: 'Choose a product',
      confirm: 'Confirm submission',
      upload: 'Upload supporting documents',
    }[form.step] || 'New submission';
    container.appendChild(
      el('div', { className: 'page-header' },
        el('div', {},
          el('div', { className: 'eyebrow' }, 'New submission'),
          el('h1', {}, stepTitle)),
        el('button', { className: 'btn btn-secondary',
          onClick: () => { state.view = 'dashboard'; render(); loadView(); } }, '\u2190 Back')));

    if (form.step === 'pick_product') {
      container.appendChild(renderProductPicker(form, rerender));
    } else if (form.step === 'confirm') {
      container.appendChild(renderConfirmStep(form, rerender));
    } else if (form.step === 'upload') {
      container.appendChild(renderUploadStep(form, rerender));
    }
  };

  rerender();
  return container;
}

// ─── Upload / extraction step ──────────────────────────────────────
// Drag-and-drop zone with a fallback file picker, a list of staged
// files, and two terminal actions:
//   1. "Process documents" — sends staged files to processDocuments()
//      (currently a stub that resolves with empty extraction). On
//      success, advances to submission creation. Disabled if no files.
//   2. "Skip and start blank" — bypasses extraction entirely and
//      proceeds to submission creation with no extracted data.
//
// Either action ultimately calls createSubmissionAndContinue() which
// posts to /api/submissions/start, optionally PUTs the extracted data
// onto the new submission, then routes to the submission detail page.
//
// Once the external extraction API is hooked up, only processDocuments
// changes — everything else (UI, state machine, persistence) stays the
// same. That isolation is the whole point of the stub.
function renderUploadStep(form, rerender) {
  const onFilesAdded = (newFiles) => {
    for (const f of newFiles) {
      // Skip duplicates by (name, size) — pragmatic dedup, not bulletproof
      if (form.files.some(existing => existing.name === f.name && existing.size === f.size)) continue;
      form.files.push({
        id: Math.random().toString(36).slice(2, 10),
        file: f,
        name: f.name,
        size: f.size,
        status: 'staged',  // 'staged' | 'processing' | 'done' | 'error'
      });
    }
    rerender();
  };

  const removeFile = (id) => {
    form.files = form.files.filter(f => f.id !== id);
    rerender();
  };

  return el('div', {},
    // Selected product + effective date summary at top — broker can confirm
    // they're still on the right track before committing to file processing.
    el('div', { className: 'card', style: { marginBottom: '20px' } },
      el('div', { className: 'confirm-product-row' },
        el('div', { className: 'confirm-product-label' }, 'PRODUCT'),
        el('div', { className: 'confirm-product-value' }, form.selectedProduct.display_name),
        el('button', { className: 'btn-link',
          onClick: () => { form.step = 'confirm'; rerender(); } }, 'Change')),
      el('div', { className: 'confirm-product-row', style: { marginTop: '8px' } },
        el('div', { className: 'confirm-product-label' }, 'EFFECTIVE'),
        el('div', { className: 'confirm-product-value' }, fmtDate(form.effective_date)))),

    el('div', { className: 'card' },
      el('p', { className: 'subtle' },
        'Upload loss runs, ACORDs, statements of value, or prior policies. We\u2019ll extract what we can and pre-fill the application — fields we auto-populate will be highlighted so you can verify them.'),

      uploadDropZone(form, onFilesAdded, rerender),

      form.files.length > 0
        ? el('div', { className: 'upload-file-list' },
            ...form.files.map(f => uploadFileRow(f, removeFile, form.processing)))
        : null,

      form.extractError
        ? el('div', { className: 'login-err', style: { marginTop: '16px' } }, form.extractError)
        : null,

      // Action row: Skip on the left, Process on the right.
      el('div', { className: 'upload-actions' },
        el('button', { className: 'btn-link',
          disabled: form.processing || form.creating,
          onClick: () => createSubmissionAndContinue(form, rerender, /* extracted */ {}) },
          'Skip and start blank'),
        el('button', { className: 'btn btn-primary',
          disabled: form.files.length === 0 || form.processing || form.creating,
          onClick: async () => {
            form.processing = true; form.extractError = null; rerender();
            try {
              const extracted = await processDocuments(form.files);
              form.extractedData = extracted;
              form.processing = false;
              rerender();
              // Then immediately create the submission with extracted data
              await createSubmissionAndContinue(form, rerender, extracted);
            } catch (e) {
              form.processing = false;
              form.extractError = e.message || 'Document processing failed.';
              rerender();
            }
          } },
          form.processing ? 'Processing\u2026'
            : form.creating ? 'Creating submission\u2026'
            : `Process ${form.files.length || ''} document${form.files.length === 1 ? '' : 's'}`.trim()))));
}

function uploadDropZone(form, onFilesAdded, rerender) {
  const dz = el('div', { className: 'upload-dropzone' });

  // Visual + text — split out for the dragover state hover.
  const inner = el('div', { className: 'upload-dropzone-inner' },
    el('div', { className: 'upload-dropzone-icon' },
      // Inline cloud-arrow-up SVG, sized via CSS
      ((() => {
        const ns = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(ns, 'svg');
        svg.setAttribute('viewBox', '0 0 24 24');
        svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'currentColor');
        svg.setAttribute('stroke-width', '1.5');
        svg.setAttribute('stroke-linecap', 'round');
        svg.setAttribute('stroke-linejoin', 'round');
        const p1 = document.createElementNS(ns, 'path');
        p1.setAttribute('d', 'M7 18a4 4 0 01-.4-7.978 6 6 0 0111.6-1.778 4.5 4.5 0 011.8 8.756');
        const p2 = document.createElementNS(ns, 'path');
        p2.setAttribute('d', 'M12 12v9m0-9l-3 3m3-3l3 3');
        svg.appendChild(p1); svg.appendChild(p2);
        return svg;
      })())),
    el('div', { className: 'upload-dropzone-headline' }, 'Drag and drop documents here'),
    el('div', { className: 'upload-dropzone-sub' }, 'or click to browse \u2014 PDFs, images, Word docs'));

  dz.appendChild(inner);

  // Hidden file input — clicking the dropzone triggers it
  const input = el('input', {
    type: 'file', multiple: '',
    accept: '.pdf,.png,.jpg,.jpeg,.tif,.tiff,.docx,.doc,.xlsx,.xls,.csv',
    style: { display: 'none' },
    onChange: (e) => {
      onFilesAdded(Array.from(e.target.files));
      e.target.value = '';   // reset so re-uploading the same file fires onChange again
    },
  });
  dz.appendChild(input);

  dz.addEventListener('click', (e) => {
    if (form.processing || form.creating) return;
    input.click();
  });

  dz.addEventListener('dragover', (e) => {
    e.preventDefault();
    if (form.processing || form.creating) return;
    dz.classList.add('upload-dropzone-active');
  });
  dz.addEventListener('dragleave', () => {
    dz.classList.remove('upload-dropzone-active');
  });
  dz.addEventListener('drop', (e) => {
    e.preventDefault();
    dz.classList.remove('upload-dropzone-active');
    if (form.processing || form.creating) return;
    const files = Array.from(e.dataTransfer.files || []);
    if (files.length > 0) onFilesAdded(files);
  });

  return dz;
}

function uploadFileRow(f, removeFile, locked) {
  const sizeKb = (f.size / 1024).toFixed(0);

  return el('div', { className: 'upload-file-row' },
    el('div', { className: 'upload-file-icon' }, '\u25A0'),
    el('div', { className: 'upload-file-meta' },
      el('div', { className: 'upload-file-name' }, f.name),
      el('div', { className: 'upload-file-size' }, sizeStr)),

// External processing API stub. Replace the body when the real endpoint
// is wired. The caller awaits this and expects { [datapoint_key]: value }
// or {} for no extractions.
//
// When wired for real, this should:
//   1. Build a multipart/form-data request from form.files
//   2. POST to a backend route (e.g. /api/submissions/extract) which
//      proxies to the external vendor
//   3. Return the structured extraction object from the vendor's response
async function processDocuments(files) {
  // Stub — pretend to process. 1.5s feels like real work without being
  // annoyingly slow during dev.
  await new Promise(r => setTimeout(r, 1500));
  // Returns empty object — no fields auto-filled. Once a real API is
  // attached, this returns { 'litem.property.building_ded': 5000, ... }.
  return {};
}

// Common terminal action for both "Process" and "Skip" paths. Creates
// the submission via /api/submissions/start, optionally patches in
// extracted data, stashes the extracted-field key set on global state
// for the submission detail page to render highlights, and routes.
async function createSubmissionAndContinue(form, rerender, extracted) {
  form.creating = true; rerender();
  try {
    const res = await api('/api/submissions/start', {
      method: 'POST',
      body: {
        effective_date: form.effective_date,
        product_version_id: form.selectedProduct.product_version_id,
      },
    });
    // If extraction returned any fields, patch them onto the submission.
    // PUT /submissions/{id}/data is the existing data-update endpoint.
    const extractedKeys = Object.keys(extracted || {});
    if (extractedKeys.length > 0) {
      try {
        await api(`/api/submissions/${res.submission_id}/data`, {
          method: 'PUT',
          body: { data: extracted },
        });
      } catch (e) {
        // Non-fatal: the submission exists, we just couldn't pre-fill it.
        // Broker will see the form blank instead of pre-populated.
        toast('Submission created, but auto-fill failed. You can fill the form manually.', 'warn');
      }
    }
    // Stash the auto-filled keys for the detail page to highlight,
    // tagged with this submission's id so the highlights don't leak
    // onto unrelated submissions the broker views afterward.
    state.extractedFields = new Set(extractedKeys);
    state.extractedFieldsForSubmissionId = res.submission_id;
    toast('Submission created', 'ok');
    state.view = 'submissions'; state.subView = res.submission_id;
    loadSubmission(res.submission_id);
  } catch (e) {
    form.creating = false;
    rerender();
  }
}

function productIcon(product) {
  // Pick a small SVG glyph based on the product name. Each product gets
  // a distinct icon so the picker reads at a glance:
  //   • Storage / Self Storage → warehouse outline
  //   • General Liability      → shield outline
  //   • Excess Liability        → stacked shield outline
  //   • ISO Self Storage        → warehouse with stamp
  //   • fallback                → plain document
  const name = (product.display_name || product.name || '').toLowerCase();
  const stroke = 'currentColor';
  const sw = 1.5;
  const path = (d, fill = 'none') => `<path d="${d}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" fill="${fill}"/>`;

  let inner = '';
  if (name.includes('iso')) {
    // Warehouse + small "ISO" badge
    inner = path('M3 10v9h18v-9') + path('M3 10l9-6 9 6') + path('M9 19v-5h6v5');
  } else if (name.includes('storage')) {
    // Warehouse outline
    inner = path('M3 10v9h18v-9') + path('M3 10l9-6 9 6') + path('M9 19v-5h6v5');
  } else if (name.includes('excess')) {
    // Two stacked shields
    inner = path('M12 4l6 2v5c0 4-3 7-6 8-3-1-6-4-6-8V6l6-2z') + path('M12 9l3 1v3c0 2-1.5 3.5-3 4-1.5-0.5-3-2-3-4v-3l3-1z');
  } else if (name.includes('liability') || name.includes('gl')) {
    // Single shield
    inner = path('M12 3l8 3v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-3z');
  } else {
    // Plain document
    inner = path('M6 3h9l4 4v14H6z') + path('M15 3v4h4');
  }
  const wrap = document.createElement('div');
  wrap.innerHTML = `<svg viewBox="0 0 24 24" width="28" height="28" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
  return wrap.firstChild;
}

// ═════════════════════════════════════════════════════════════════
// BOOT
// ═════════════════════════════════════════════════════════════════
async function boot() {
  try {
    const [cfg, me] = await Promise.all([
      api('/api/config', { silent: true }),
      api('/api/auth/me', { silent: true }).catch(() => ({ authenticated: false })),
    ]);
    state.env = cfg.environment;
    if (me.authenticated) state.user = me.user;
  } catch (e) { console.error('Boot failed', e); }
  render();
  if (state.user) loadView();
}

boot();
</script>
