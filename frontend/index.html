        // Global action footer appears only on the last section in edit mode
        isEditing && (sections.indexOf(activeSection) === sections.length - 1 || sections.length === 1)
          ? el('div', { className: 'form-pane-actions' },
            el('button', { className: 'btn btn-secondary',
              onClick: () => cancelEdit(s.id) }, 'Cancel'),
            el('button', { className: 'btn btn-primary',
              onClick: () => submitForQuote(s.id) },
              s.status === 'Incomplete' ? 'Submit for quote' : 'Save & resubmit'))
          : null),

      // RIGHT rail — asset jump-list (only for multi-asset sections)
      isMultiAsset
        ? el('div', { className: 'form-rail form-rail-right' },
            el('div', { className: 'asset-rail-head' },
              el('div', { className: 'eyebrow' }, inferAssetNoun(activeSection, displayedGroups.length)),
              el('div', { className: 'asset-rail-count' }, `${displayedGroups.length} total`)),
            ...displayedGroups.map(g => assetRailItem(activeSection, g)))
        : null));
}

function sectionNavItem(section, isActive) {
  const pct = section.visible_count > 0
    ? Math.round((section.completed / section.visible_count) * 100)
    : 0;
  const isComplete = section.visible_count > 0 && section.completed === section.visible_count;
  const isEmptyShell = !!section.is_empty_asset_shell;
  const hasErrors = section.has_errors;

  // Empty asset shells (e.g. Structures with no data yet) don't have a
  // sensible fields-complete ratio. Show a simple "empty" indicator so the
  // rail doesn't imply progress that isn't there.
  const countLabel = isEmptyShell
    ? 'Empty'
    : `${section.completed}/${section.visible_count} · ${pct}%`;

  return el('button', {
    className: `section-nav-item ${isActive ? 'active' : ''} ${isComplete ? 'complete' : ''} ${hasErrors ? 'has-errors' : ''} ${isEmptyShell ? 'is-empty' : ''}`,
    onClick: () => {
      state.activeSection = section.code;
      render();
    },
  },
    el('div', { className: 'section-nav-indicator' },
      hasErrors ? '!' : isComplete ? '✓' : isEmptyShell ? '○' : (section.order + 1)),
    el('div', { className: 'section-nav-body' },
      el('div', { className: 'section-nav-label' }, section.label),
      el('div', { className: 'section-nav-count' }, countLabel)));
}

function sectionPrevButton(sections, active) {
  const idx = sections.indexOf(active);
  if (idx <= 0) return el('div', {}); // spacer
  const prev = sections[idx - 1];
  return el('button', {
    className: 'btn btn-secondary',
    onClick: () => { state.activeSection = prev.code; render(); }
  }, `← ${prev.label}`);
}

function sectionNextButton(sections, active) {
  const idx = sections.indexOf(active);
  if (idx < 0 || idx >= sections.length - 1) return el('div', {}); // spacer
  const next = sections[idx + 1];
  return el('button', {
    className: 'btn btn-primary no-arrow',
    onClick: () => { state.activeSection = next.code; render(); }
  }, `${next.label} →`);
}

// ─────────────────────────────────────────────────────────────
// Asset grouping — for is_asset sections with multiple items
// (e.g. Structures: 4 buildings, each with its own set of fields)
// ─────────────────────────────────────────────────────────────
function groupFieldsByAsset(fields) {
  // Returns [{idx, fields, completed, total}] sorted by idx
  const byIdx = new Map();
  for (const f of fields) {
    const idx = f.asset_idx ?? 0;
    if (!byIdx.has(idx)) byIdx.set(idx, []);
    byIdx.get(idx).push(f);
  }
  const groups = Array.from(byIdx.entries())
    .sort(([a], [b]) => a - b)
    .map(([idx, fields]) => ({
      idx,
      fields,
      completed: fields.filter(f => f.exists || (f.value != null && f.value !== '')).length,
      total: fields.length,
    }));
  return groups;
}

// Pick a short noun for the asset type based on the section name
function inferAssetNoun(section, count) {
  const label = (section?.label || '').toLowerCase();
  const pairs = [
    ['structure', 'Structure', 'Structures'],
    ['location', 'Location', 'Locations'],
    ['building', 'Building', 'Buildings'],
    ['vehicle', 'Vehicle', 'Vehicles'],
    ['property', 'Property', 'Properties'],
    ['driver', 'Driver', 'Drivers'],
    ['employee', 'Employee', 'Employees'],
    ['peril', 'Peril', 'Perils'],
    ['equipment', 'Equipment', 'Equipment'],
  ];
  for (const [key, sing, plur] of pairs) {
    if (label.includes(key)) return count === 1 ? sing : plur;
  }
  return count === 1 ? 'Asset' : 'Assets';
}

// Pick the best title field for an asset card's summary row.
// Priority: location_address > address > name > first field with "address" or "location" in code.
function pickAssetTitle(group) {
  const cands = ['location_address', 'address', 'name', 'title', 'description'];
  for (const suffix of cands) {
    const f = group.fields.find(ff => (ff.code || '').toLowerCase().endsWith('.' + suffix));
    if (f && f.value != null && f.value !== '') {
      return formatDatapointValue(f.value);
    }
  }
  // Fallback: any field with "address" or "name" in the code
  const fallback = group.fields.find(f => {
    const c = (f.code || '').toLowerCase();
    return (c.includes('address') || c.includes('name')) && f.value != null && f.value !== '';
  });
  if (fallback) return formatDatapointValue(fallback.value);
  return null;
}

// Pick up to 3 summary stats — Monetary/Number fields with values, preferred codes first
function pickAssetSummaryStats(group) {
  const preferred = ['building_value', 'total_value', 'value', 'tiv', 'building_count',
                     'square_footage', 'stories', 'annual_sales', 'bpp_limit', 'limit'];
  const byScore = [];
  for (const f of group.fields) {
    if (f.type !== 'monetary' && f.type !== 'number') continue;
    if (f.value == null || f.value === '') continue;
    const codeLow = (f.code || '').toLowerCase();
    const shortCode = codeLow.split('.').pop();
    const score = preferred.indexOf(shortCode);
    byScore.push({ f, score: score === -1 ? 99 : score });
  }
  byScore.sort((a, b) => a.score - b.score);
  return byScore.slice(0, 3).map(x => x.f);
}

function expandAllAssets(sectionCode, groups) {
  state.expandedAssets[sectionCode] = new Set(groups.map(g => g.idx));
}
function collapseAllAssets(sectionCode) {
  state.expandedAssets[sectionCode] = new Set();
}
function toggleAsset(sectionCode, idx) {
  if (!state.expandedAssets[sectionCode]) state.expandedAssets[sectionCode] = new Set();
  const s = state.expandedAssets[sectionCode];
  if (s.has(idx)) s.delete(idx); else s.add(idx);
}
function isAssetExpanded(sectionCode, idx) {
  return state.expandedAssets[sectionCode]?.has(idx) || false;
}

// Render a single collapsible asset card
function renderAssetCard(section, group, isEditing) {
  const isOpen = isAssetExpanded(section.code, group.idx);
  const title = pickAssetTitle(group) || `${inferAssetNoun(section, 1)} ${group.idx + 1}`;
  const summaryStats = pickAssetSummaryStats(group);
  const pct = group.total > 0 ? Math.round((group.completed / group.total) * 100) : 0;

  // Collapsed summary row
  const summary = el('button', {
    className: `asset-card-summary ${isOpen ? 'open' : ''}`,
    id: `asset-${section.code}-${group.idx}`,
    onClick: () => { toggleAsset(section.code, group.idx); render(); },
  },
    el('div', { className: 'asset-card-num' }, String(group.idx + 1)),
    el('div', { className: 'asset-card-title' }, title),
    el('div', { className: 'asset-card-stats' },
      ...summaryStats.map(f => el('div', { className: 'asset-card-stat' },
        el('div', { className: 'asset-card-stat-label' }, f.label),
        el('div', { className: 'asset-card-stat-value' }, formatDatapointValue(f.value))))),
    el('div', { className: 'asset-card-meta' },
      el('span', { className: `asset-card-chip ${pct === 100 ? 'done' : ''}` },
        `${group.completed}/${group.total}`)),
    el('div', { className: 'asset-card-chevron' }, isOpen ? '⌃' : '⌄'));

  // Expanded body (only if open)
  // Split fields into two groups for visual variety:
  //   - mainFields: rendered in the 2-column grid (Address, Values, Construction, etc.)
  //   - boolFields: rendered as a compact chip strip below the grid (Status flags)
  // This avoids the monotony of 30 identical rows of "LABEL / value".
  const body = isOpen ? (() => {
    const visible = group.fields.filter(f => f.visible !== false);
    const { main, bools } = isEditing
      ? { main: visible, bools: [] }  // in edit mode keep all in grid (toggles need space)
      : partitionAssetFields(visible);
    return el('div', { className: 'asset-card-body' },
      el('div', { className: 'form-grid' },
        ...main.map(f => renderFormField(f, isEditing))),
      bools.length > 0
        ? el('div', { className: 'asset-bool-strip' },
            ...bools.map(f => renderBoolChip(f)))
        : null);
  })() : null;

  return el('div', { className: `asset-card ${isOpen ? 'open' : ''}` }, summary, body);
}

// Decide which fields go in the main grid vs. the compact bool strip.
// Rule: if a field is boolean-like AND has a value (either truthy or
// explicitly falsy), it goes in the strip. Empty booleans go in the
// main grid so the broker can see that slot needs attention.
function partitionAssetFields(fields) {
  const main = [];
  const bools = [];
  for (const f of fields) {
    const v = unwrapForInput(f.value);
    const hasVal = v !== null && v !== undefined && v !== '';
    if (hasVal && isBooleanField(f, v)) {
      bools.push(f);
    } else {
      main.push(f);
    }
  }
  return { main, bools };
}

// Render one boolean field as a compact chip in the strip.
// Style: "✓ Sprinklered" (green) or "— GL Only" (muted strikethrough).
// The label is the human-readable field name minus any trailing "Status".
function renderBoolChip(field) {
  const v = unwrapForInput(field.value);
  const yes = isTruthyBool(v);
  const rawLabel = field.label || field.code || '';
  // Trim " Status" suffix — redundant in a chip context
  const label = rawLabel.replace(/\s*status\s*$/i, '').trim() || rawLabel;
  return el('div', {
    className: `bool-chip ${yes ? 'yes' : 'no'}`,
    title: rawLabel,
  },
    el('span', { className: 'bool-chip-icon' }, yes ? '✓' : '—'),
    el('span', { className: 'bool-chip-label' }, label));
}

// Right sidebar: compact asset number list, click to scroll + expand
function assetRailItem(section, group) {
  const isDone = group.total > 0 && group.completed === group.total;
  const isOpen = isAssetExpanded(section.code, group.idx);

  return el('button', {
    className: `asset-rail-num-item ${isOpen ? 'active' : ''} ${isDone ? 'done' : ''}`,
    title: `${inferAssetNoun(section, 1)} ${group.idx + 1}`,
    onClick: () => {
      if (!isAssetExpanded(section.code, group.idx)) {
        toggleAsset(section.code, group.idx);
      }
      render();
      setTimeout(() => {
        const el = document.getElementById(`asset-${section.code}-${group.idx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 60);
    },
  }, String(group.idx + 1));
}

function renderFormField(field, isEditing) {
  const displayLabel = field.label || field.code;
  const currentValue = state.submissionDirty[field.code] !== undefined
    ? state.submissionDirty[field.code]
    : field.value;

  // Full-width for addresses and long text; status-flag booleans get a
  // compact half-width treatment (they're pulled out into a chip row in
  // renderBooleanRow but still render here if a card has only one or two).
  const isFullWidth = ['location'].includes(field.type) ||
                      (field.code && (field.code.endsWith('.address') || field.code.endsWith('.location')));

  const labelEl = el('label', {},
    displayLabel,
    field.required ? el('span', { className: 'req' }, '*') : null);

  // Same structure in both modes — render the input, lock it if not editing
  const input = renderFieldInput(field, currentValue, !isEditing);
  return el('div', { className: `form-field ${isFullWidth ? 'full' : ''} ${isEditing ? 'is-editing' : 'is-locked'}` },
    labelEl, input,
    field.validation_error && isEditing ? el('div', { className: 'err-msg' }, field.validation_error) : null);
}

function renderFieldInput(field, value, locked = false) {
  const onChange = locked ? (() => {}) : ((newVal) => {
    state.submissionDirty[field.code] = newVal;
    scheduleAutoSave();
  });

  // If the value is still wrapped (shouldn't happen after backend unwrap
  // but just in case), strip the wrapper for the input
  const cleanValue = unwrapForInput(value);
  const hasValue = cleanValue !== null && cleanValue !== undefined && cleanValue !== '';

  // ── Reliable boolean detection ────────────────────────────
  // Joshu is inconsistent: sometimes `sprinklered_status` comes through as
  // type='boolean' with a JS bool value; sometimes as type='text' with
  // options=[{value:'0',display:'No'},{value:'1',display:'Yes'}]; sometimes
  // as type='number' the same way. We treat all of these as booleans in
  // the UI so they render as chips/toggles, not text boxes.
  const looksLikeBool = isBooleanField(field, cleanValue);

  // ── Empty-value fast path (locked only) ────────────────────
  // In locked mode, ANY field with no value renders as a minimal em-dash.
  // No input boxes, no cream rectangles, no framed empty states.
  // This keeps empty fields from competing visually with populated ones.
  if (locked && !hasValue) {
    return lockedValueEl('');
  }

  // ── Boolean chip/toggle (locked → chip; editing → toggle) ──
  if (looksLikeBool) {
    const checked = isTruthyBool(cleanValue);
    if (locked) {
      return el('div', {
        className: `locked-bool ${checked ? 'yes' : 'no'}`,
      }, checked ? '✓ Yes' : '— No');
    }
    return el('label', { className: 'toggle' },
      el('input', { type: 'checkbox', checked,
        onChange: (e) => onChange(e.target.checked ? '1' : '0') }),
      el('span', { className: 'toggle-switch' }),
      el('span', { className: 'toggle-label' }, checked ? 'Yes' : 'No'));
  }

  // ── Slider: Number/Monetary with 3+ numeric options
  if (field.options && field.options.length >= 3 &&
      (field.type === 'number' || field.type === 'monetary')) {
    const allNumeric = field.options.every(o => !isNaN(parseFloat(o.value)));
    if (allNumeric) {
      if (locked) {
        const matching = field.options.find(o => String(o.value) === String(cleanValue));
        const displayText = matching?.label || matching?.value || formatByType(field, cleanValue);
        return lockedValueEl(displayText);
      }
      return renderSlider(field, cleanValue, onChange);
    }
  }

  // ── Dropdown: fields with options
  if (field.options && field.options.length > 0) {
    if (locked) {
      const matching = field.options.find(o => String(o.value) === String(cleanValue));
      const displayText = matching?.label || matching?.value || String(cleanValue);
      return lockedValueEl(displayText);
    }
    return el('select', {
      onChange: (e) => onChange(e.target.value || null),
    }, el('option', { value: '' }, '— Select —'),
      ...field.options.map(o => el('option', {
        value: o.value,
        selected: String(cleanValue) === String(o.value),
      }, o.label || o.value)));
  }

  if (field.type === 'date') {
    if (locked) return lockedValueEl(formatByType(field, cleanValue));
    return el('input', { type: 'date', value: cleanValue || '',
      onInput: (e) => onChange(e.target.value || null) });
  }

  if (field.type === 'number' || field.type === 'monetary') {
    const numVal = typeof cleanValue === 'object' && cleanValue?.amount != null
      ? cleanValue.amount : (cleanValue ?? '');
    if (locked) return lockedValueEl(formatByType(field, numVal));
    return el('input', { type: 'number', value: numVal,
      placeholder: field.type === 'monetary' ? '0.00' : '',
      onInput: (e) => onChange(e.target.value || null) });
  }

  if (field.type === 'location') {
    const strVal = typeof cleanValue === 'object'
      ? formatDatapointValue(cleanValue)
      : (cleanValue || '');
    const displayVal = strVal === '—' ? '' : strVal;
    if (locked) return lockedValueEl(displayVal);
    return el('input', { type: 'text', value: displayVal,
      placeholder: 'Address, City, State ZIP',
      onInput: (e) => onChange(e.target.value || null) });
  }

  // Default: text (Array values pass through formatByType)
  if (locked) return lockedValueEl(formatByType(field, cleanValue));
  const inputType = field.format === 'EmailAddress' ? 'email'
    : field.format === 'PhoneNumber' ? 'tel'
    : field.format === 'WebsiteAddress' ? 'url'
    : 'text';
  return el('input', { type: inputType, value: cleanValue || '',
    onInput: (e) => onChange(e.target.value || null) });
}

// Detect "this is a yes/no field" from field metadata + observed value.
// Returns true if ANY of these hold:
//   - schema says type === 'boolean'
//   - the actual value is a JS boolean
//   - options look like a 2-option yes/no pattern (values are 0/1 or false/true)
//   - the code or label ends with "_status" or "Status" (heuristic fallback)
function isBooleanField(field, value) {
  if (field.type === 'boolean') return true;
  if (typeof value === 'boolean') return true;

  const opts = field.options;
  if (Array.isArray(opts) && opts.length === 2) {
    const vals = opts.map(o => String(o.value || '').toLowerCase()).sort();
    const yesNoPairs = [
      ['0', '1'],
      ['false', 'true'],
      ['n', 'y'],
      ['no', 'yes'],
    ];
    for (const pair of yesNoPairs) {
      if (vals[0] === pair[0] && vals[1] === pair[1]) return true;
    }
  }

  // Heuristic: codes ending in "_status" or labels ending in "Status"
  // (e.g. sprinklered_status, ex_wind_status, surveillance_status, GLonlyStatus)
  const code = (field.code || '').toLowerCase();
  const label = (field.label || '').toLowerCase();
  if (code.endsWith('_status') || label.endsWith(' status') || code.endsWith('status') && !code.includes('.')) {
    // But ONLY if the value is a clear yes/no type marker, to avoid hitting
    // text status fields like "renewal_status_description"
    const v = (value === null || value === undefined) ? '' : String(value).toLowerCase();
    if (v === '' || v === '0' || v === '1' || v === 'true' || v === 'false' ||
        v === 'yes' || v === 'no') return true;
  }

  return false;
}

// Normalize any of the many "truthy" shapes Joshu sends to a JS bool
function isTruthyBool(v) {
  if (v === true) return true;
  if (v === false) return false;
  if (v === null || v === undefined) return false;
  const s = String(v).toLowerCase().trim();
  return s === '1' || s === 'true' || s === 'yes' || s === 'y';
}

// A locked (read-only) value — no frame, just the formatted value in place.
// Empty values show a subtle em-dash rather than "Not provided" which was
// both loud and confusing when applied to populated rows missing one field.
function lockedValueEl(text) {
  const display = (text === null || text === undefined || text === '' || text === '—') ? '—' : text;
  const isEmpty = display === '—';
  return el('div', { className: `locked-value ${isEmpty ? 'empty' : ''}` }, display);
}

// Format a value by its inferred meaning, not just its Joshu type.
// This is what turns "3619920" into "$3,619,920" and "60332" into "60,332 sq ft".
function formatByType(field, value) {
  if (value === null || value === undefined || value === '') return '—';

  // Handle structured values (Monetary objects, Location objects, arrays)
  if (Array.isArray(value)) {
    return value.filter(v => v !== null && v !== undefined && v !== '').join(', ');
  }
  if (typeof value === 'object') {
    if (value.amount != null) return formatMoney(value.amount);
    return formatDatapointValue(value);  // falls through to legacy formatter
  }

  const str = String(value).trim();
  if (!str) return '—';

  const code = (field.code || '').toLowerCase();
  const label = (field.label || '').toLowerCase();
  const fmt = (field.format || '').toLowerCase();

  // Percentage: codes/labels mentioning percent, windhail%, or format=Percentage
  if (fmt === 'percentage' || code.includes('percentage') || code.includes('_percent') ||
      code === 'windhailpercentage' || label.endsWith('%') || label.includes('percentage')) {
    return formatNumber(str) + '%';
  }

  // Year: code/label = year_built, or value is a plausible 4-digit year with no decimal
  if (code.includes('year') || /^year/.test(label) || /^\d{4}$/.test(str)) {
    return str;
  }

  // Square footage: code/label mentions sq ft
  if (code.includes('square_footage') || code.includes('sq_ft') || code.includes('sqft') ||
      label.includes('square foot') || label.includes('sq ft')) {
    return formatNumber(str) + ' sq ft';
  }

  // Stories: singular/plural
  if (code === 'stories' || code.endsWith('.stories') || label === 'stories') {
    const n = parseFloat(str);
    if (!isNaN(n)) {
      const whole = Math.round(n);
      return whole === 1 ? '1 story' : `${whole} stories`;
    }
  }

  // Building count / location count / count fields: plain number with commas
  if (code.includes('_count') || code.endsWith('.count') || label.endsWith('count')) {
    return formatNumber(str);
  }

  // Monetary: type=monetary, Joshu Text that starts with "$", or codes that imply money
  // Explicit: aop_deductible, building_value, annual_sales, bpp_limit, limits, premiums, etc.
  if (field.type === 'monetary' || str.startsWith('$') || /^\$[\d,]/.test(str)) {
    // Already formatted or has $ sign — normalize
    return formatMoney(str.replace(/^\$/, ''));
  }
  if (code.includes('value') || code.includes('premium') || code.includes('limit') ||
      code.includes('sales') || code.includes('deductible') ||
      code.includes('sublimit') || code.includes('pay') ||
      code.endsWith('.pollutantcleanuplim') || code.endsWith('.papersandrecords') ||
      code.endsWith('.waterbackuplimit') || code.endsWith('.wind_hail_minimum_dollar') ||
      code.endsWith('.wind_hail_dollar_figure')) {
    // Only apply $ if numeric — skip strings like "365 Days" that look like limits
    const stripped = str.replace(/[,$]/g, '');
    if (/^-?\d+(\.\d+)?$/.test(stripped)) {
      return formatMoney(stripped);
    }
  }

  // Plain number with decimal that looks like a count/numeric stat: format with commas
  if (/^-?\d+(\.\d+)?$/.test(str.replace(/,/g, ''))) {
    const cleaned = str.replace(/,/g, '');
    const num = parseFloat(cleaned);
    if (!isNaN(num)) return formatNumber(cleaned);
  }

  // Default: trust the raw value (already a string)
  return str;
}

function formatMoney(raw) {
  if (raw === null || raw === undefined || raw === '') return '—';
  const cleaned = String(raw).replace(/[$,]/g, '').trim();
  const num = parseFloat(cleaned);
  if (isNaN(num)) return String(raw);
  // Drop cents if whole dollars — $3,619,920 reads cleaner than $3,619,920.00
  const hasCents = Math.round(num * 100) % 100 !== 0;
  return '$' + num.toLocaleString('en-US', {
    minimumFractionDigits: hasCents ? 2 : 0,
    maximumFractionDigits: hasCents ? 2 : 0,
  });
}

function formatNumber(raw) {
  if (raw === null || raw === undefined || raw === '') return '—';
  const cleaned = String(raw).replace(/,/g, '').trim();
  const num = parseFloat(cleaned);
  if (isNaN(num)) return String(raw);
  const hasDecimal = Math.round(num * 100) % 100 !== 0;
  return num.toLocaleString('en-US', {
    minimumFractionDigits: hasDecimal ? 2 : 0,
    maximumFractionDigits: hasDecimal ? 2 : 0,
  });
}

// ─────────────────────────────────────────────────────────────
// Slider — used for Number/Monetary fields with 3+ numeric options
// ─────────────────────────────────────────────────────────────
function renderSlider(field, currentValue, onChange) {
  const options = field.options;
  // Find the current index, defaulting to -1 (no selection)
  let activeIdx = options.findIndex(o => String(o.value) === String(currentValue));
  if (activeIdx < 0) activeIdx = Math.floor(options.length / 2); // default to middle

  const activeOption = options[activeIdx];
  const wrap = el('div', { className: 'slider-wrap' });

  // Top row: label + current value display
  const headRow = el('div', { className: 'slider-head' },
    el('div', { className: 'slider-value' }, activeOption?.label || activeOption?.value || '—'),
    el('div', { className: 'slider-hint' }, 'Slide to adjust'));
  wrap.appendChild(headRow);

  // Slider track
  const track = el('div', { className: 'slider-track' });
  const fill = el('div', { className: 'slider-fill' });
  const handle = el('div', { className: 'slider-handle' });
  track.appendChild(fill);
  track.appendChild(handle);

  // Position helpers
  const pctFor = (idx) => options.length <= 1 ? 0 : (idx / (options.length - 1)) * 100;
  const updatePosition = (idx) => {
    const pct = pctFor(idx);
    fill.style.width = `${pct}%`;
    handle.style.left = `${pct}%`;
    headRow.querySelector('.slider-value').textContent =
      options[idx]?.label || options[idx]?.value || '—';
  };
  updatePosition(activeIdx);

  // Drag behavior
  let dragging = false;
  const rectCache = () => track.getBoundingClientRect();
  const idxFromX = (clientX) => {
    const r = rectCache();
    const rel = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    return Math.round(rel * (options.length - 1));
  };
  const startDrag = (e) => {
    dragging = true;
    e.preventDefault();
    handleMove(e);
  };
  const handleMove = (e) => {
    if (!dragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const idx = idxFromX(clientX);
    if (idx !== activeIdx) {
      activeIdx = idx;
      updatePosition(idx);
    }
  };
  const endDrag = () => {
    if (!dragging) return;
    dragging = false;
    onChange(options[activeIdx]?.value ?? null);
  };

  track.addEventListener('mousedown', startDrag);
  track.addEventListener('touchstart', startDrag, { passive: false });
  window.addEventListener('mousemove', handleMove);
  window.addEventListener('touchmove', handleMove, { passive: true });
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);

  // Keyboard support on the handle
  handle.setAttribute('tabindex', '0');
  handle.setAttribute('role', 'slider');
  handle.setAttribute('aria-label', field.label || field.code);
  handle.setAttribute('aria-valuemin', '0');
  handle.setAttribute('aria-valuemax', String(options.length - 1));
  handle.addEventListener('keydown', (e) => {
    let newIdx = activeIdx;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') newIdx = Math.max(0, activeIdx - 1);
    else if (e.key === 'ArrowRight' || e.key === 'ArrowUp') newIdx = Math.min(options.length - 1, activeIdx + 1);
    else if (e.key === 'Home') newIdx = 0;
    else if (e.key === 'End') newIdx = options.length - 1;
    else return;
    e.preventDefault();
    if (newIdx !== activeIdx) {
      activeIdx = newIdx;
      updatePosition(activeIdx);
      onChange(options[activeIdx]?.value ?? null);
    }
  });

  // Click on track sets value
  wrap.appendChild(track);

  // Tick labels beneath the track
  const ticks = el('div', { className: 'slider-ticks' });
  options.forEach((o, i) => {
    const tick = el('div', {
      className: `slider-tick ${i === activeIdx ? 'active' : ''}`,
      onClick: () => {
        activeIdx = i;
        updatePosition(i);
        onChange(o.value ?? null);
      },
    }, o.label || o.value);
    ticks.appendChild(tick);
  });
  wrap.appendChild(ticks);

  return wrap;
}

// Autosave: debounce-save dirty fields every 1.5s
let _autoSaveTimer = null;
function scheduleAutoSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveDirtyData, 1500);
}

async function saveDirtyData() {
  const s = state.selectedSubmission;
  if (!s) return;
  const dirty = state.submissionDirty;
  if (!Object.keys(dirty).length) return;

  state.submissionSaving = 'saving';
  render();
  try {
    await api(`/api/submissions/${s.id}/data`, { method: 'PUT', body: dirty, silent: false });
    // Merge the saved values into the form state so the UI stays in sync
    if (state.submissionForm) {
      for (const f of state.submissionForm.fields) {
        if (f.code in dirty) f.value = dirty[f.code];
      }
    }
    state.submissionDirty = {};
    state.submissionSaving = 'saved';
    render();
    setTimeout(() => {
      if (state.submissionSaving === 'saved') {
        state.submissionSaving = 'idle';
        render();
      }
    }, 2000);
  } catch (e) {
    state.submissionSaving = 'idle';
    render();
  }
}

async function reopenForEdit(id) {
  if (!confirm('Reopen this submission for editing? The underwriter will see that you reopened it and can re-review after you resubmit.')) return;
  try {
    await api(`/api/submissions/${id}/reopen`, { method: 'POST' });
    toast('Submission reopened', 'ok');
    loadSubmission(id);
  } catch (e) { /* toast shown */ }
}

async function cancelEdit(id) {
  // If there are pending edits, ask
  if (Object.keys(state.submissionDirty).length > 0) {
    if (!confirm('Discard your unsaved changes?')) return;
  }
  state.submissionDirty = {};
  state.submissionFormState = 'view';
  loadSubmission(id);
}

async function submitForQuote(id) {
  // Flush any pending edits first
  if (Object.keys(state.submissionDirty).length > 0) {
    await saveDirtyData();
  }
  if (!confirm('Submit this to underwriting for a quote?')) return;
  try {
    await api(`/api/submissions/${id}/submit`, { method: 'POST' });
    toast('Submitted for quote — underwriting will review', 'ok');
    loadSubmission(id);
  } catch (e) { /* toast shown */ }
}

function submissionOverviewBar(s) {
  // Compact horizontal strip that sits ABOVE the form.
  // Dropped: product version, test flag, and the "Overview" header/eyebrow.
  // Kept: Status, Flow, Effective, Created, Submitted, Policy (if present).
  const items = [
    { label: 'Status', value: statusBadge(s.status) },
    { label: 'Flow',   value: s.flow || '—' },
    { label: 'Effective',  value: fmtDate(s.effective_at) },
    { label: 'Created',    value: fmtDateTime(s.created_at) },
    { label: 'Submitted',  value: fmtDateTime(s.submitted_at) },
  ];
  if (s.policy_id) {
    items.push({ label: 'Policy', value: el('span', { className: 'mono' }, s.policy_id) });
  }
  return el('div', { className: 'overview-bar' },
    ...items.map(i => el('div', { className: 'overview-item' },
      el('div', { className: 'overview-item-label' }, i.label),
      el('div', { className: 'overview-item-value' }, i.value))));
}

    el('div', { className: 'eyebrow' }, 'Quotes'),
    el('h3', {}, `${s.quotes.length} quote version${s.quotes.length > 1 ? 's' : ''}`),
    el('div', { style: { marginTop: '16px' } },
      ...s.quotes.map(q => el('div', {
        style: {
          padding: '12px 0', borderBottom: '1px solid var(--line-2)',
          cursor: 'pointer',
        },
        onClick: () => {
          state.view = 'quotes'; state.subView = q.id; loadQuote(q.id);
        }
      },
        el('div', {
          style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' }

          el('div', { style: { fontFamily: 'JetBrains Mono, monospace', fontSize: '0.82rem' } },

async function loadQuote(id) {
  state.selectedQuote = null; render();
  try {
    const q = await api(`/api/quotes/${id}`);
    const docs = await api(`/api/documents?quote_id=${q.id}`).catch(() => ({ items: [] }));
    state.selectedQuote = { ...q, documents: docs.items || [] };
    render();
  } catch (e) { /* toast shown */ }
}

function quoteDetailView() {

  if (!q) return el('div', { className: 'loading' }, 'Loading');
  const data = q.data || {};

  return el('div', {},
    el('div', { className: 'page-header' },
      el('div', {},
        el('div', { className: 'eyebrow' }, `Quote · Submission #${q.submission_id}`),
        el('h1', {}, 'Quote #' + q.id)),
      el('button', { className: 'btn btn-secondary',
        onClick: () => { state.subView = null; render(); loadView(); } }, '← Back')),

    el('div', { className: 'detail-grid' },
      el('div', {},
        el('div', { className: 'card' },
          el('div', { className: 'eyebrow' }, 'Pricing'),
          el('h2', {}, 'Premium summary'),
          Object.keys(data).length === 0
            ? el('div', { className: 'empty', style: { marginTop: '16px' } },
              'Premium data not yet available')
            : el('table', { style: { marginTop: '16px' } },
              el('tbody', {},
                premRow('Property', data.property_premium),
                premRow('General liability', data.gl_premium),
                premRow('Equipment breakdown', data.eb_premium),
                premRow('Cyber', data.cyber_premium),
                premRow('EPLI', data.epli_premium),
                premRow('TRIA', data.tria_premium),
                el('tr', { style: { borderTop: '2px solid var(--ink)' } },
                  el('td', { style: { fontWeight: 600 } }, 'Total premium'),
                  el('td', { className: 'num', style: { fontWeight: 600 } },
                    money(data.total_premium))),
                premRow('Surplus lines taxes', data.total_taxes),
                premRow('Fees', data.total_fees),
                el('tr', { style: { background: 'var(--blue-tint)' } },
                  el('td', { style: { fontWeight: 700 } }, 'Total invoice'),
                  el('td', { className: 'num', style: { fontWeight: 700, color: 'var(--blue)' } },
                    money(data.total_invoice))))))),
      el('div', {},
        el('div', { className: 'card' },
          el('div', { className: 'eyebrow' }, 'Details'),
          el('h3', {}, 'Quote metadata'),
          el('dl', { className: 'kv-list', style: { marginTop: '16px' } },
            el('dt', {}, 'Quote ID'), el('dd', { className: 'mono' }, q.id),
            el('dt', {}, 'Status'), el('dd', {}, statusBadge(q.status)),
            el('dt', {}, 'Submission'), el('dd', { className: 'mono' }, q.submission_id),
            el('dt', {}, 'Expires'), el('dd', {}, fmtDate(q.quote_expires_at)),
            el('dt', {}, 'Created'), el('dd', {}, fmtDateTime(q.created_at)))))));
}

function premRow(label, val) {
  if (val == null || val === 0) return null;
  return el('tr', {},
    el('td', {}, label),
    el('td', { className: 'num' }, money(val)));
}

// ═════════════════════════════════════════════════════════════════
// POLICIES
// ═════════════════════════════════════════════════════════════════
function policiesListView() {
  return el('div', {},
    el('div', { className: 'page-header' },
      el('div', {},
        el('div', { className: 'eyebrow' }, 'Book'),
        el('h1', {}, 'Policies'))),
    el('div', { className: 'card' },
      state.policies.loading
        ? el('div', { className: 'loading' }, 'Loading policies')
        : state.policies.items.length === 0
          ? el('div', { className: 'empty' },
            el('h3', {}, 'No policies yet'),
            el('p', {}, 'Bound quotes become policies here.'))
          : el('table', {},
            el('thead', {}, el('tr', {},
              el('th', {}, 'Insured'),
              el('th', {}, 'Policy'),
              el('th', {}, 'Effective'),
              el('th', {}, 'Renews'),
              el('th', {}, 'Status'),
              el('th', {}, 'Updated'))),
            el('tbody', {}, ...state.policies.items.map(p => el('tr', {
              className: 'clickable',
              onClick: () => { state.subView = p.id; loadPolicy(p.id); }
            },
              el('td', {},
                el('div', { style: { fontWeight: 500 } }, p.insured_name || '—')),
              el('td', { className: 'mono' },
                p.id ? (p.id.length > 12 ? p.id.slice(0, 8) + '…' : p.id) : '—'),
              el('td', {}, fmtDate(p.effective_date)),
              el('td', {}, fmtDate(p.renews_at)),
              el('td', {}, statusBadge(p.status)),
              el('td', { style: { fontSize: '0.85rem', color: 'var(--ink-mute)' } },
                fmtDateTime(p.last_modified))))))));
}

async function loadPolicy(id) {
  state.selectedPolicy = null; render();
  try {
    state.selectedPolicy = await api(`/api/policies/${id}`);
    render();
  } catch (e) { /* toast shown */ }
}

function policyDetailView() {
  const p = state.selectedPolicy;
  if (!p) return el('div', { className: 'loading' }, 'Loading');

  return el('div', {},
    el('div', { className: 'page-header' },
      el('div', {},
        el('div', { className: 'eyebrow' }, `Policy · ${p.id ? p.id.slice(0, 8) + '…' : ''}`),
        el('h1', {}, p.insured_name || 'Policy')),
      el('button', { className: 'btn btn-secondary',
        onClick: () => { state.subView = null; render(); loadView(); } }, '← Back')),

    el('div', { className: 'detail-grid' },
      el('div', {},
        el('div', { className: 'card' },
          el('div', { className: 'eyebrow' }, 'Overview'),
          el('h2', {}, 'Policy summary'),
          el('dl', { className: 'kv-list', style: { marginTop: '16px' } },
            el('dt', {}, 'Named insured'), el('dd', {}, p.insured_name || '—'),
            el('dt', {}, 'Product'), el('dd', {}, p.product_name || '—'),
            el('dt', {}, 'Effective date'), el('dd', {}, fmtDate(p.effective_date)),
            el('dt', {}, 'Renews'), el('dd', {}, fmtDate(p.renews_at)),
            el('dt', {}, 'Status'), el('dd', {}, statusBadge(p.status))))),
      el('div', {},
        el('div', { className: 'card' },
          el('div', { className: 'eyebrow' }, 'Details'),
          el('h3', {}, 'Metadata'),
          el('dl', { className: 'kv-list', style: { marginTop: '16px' } },
            el('dt', {}, 'Policy UUID'), el('dd', { className: 'mono' }, p.id),
            el('dt', {}, 'Created'), el('dd', {}, fmtDateTime(p.created_at)),
            el('dt', {}, 'Product version'), el('dd', {}, p.product_version_id || '—'))))));
}

// ═════════════════════════════════════════════════════════════════
// DOCUMENTS

function documentsView() {
  return el('div', {},
    el('div', { className: 'page-header' },
      el('div', {},
        el('div', { className: 'eyebrow' }, 'Library'),
        el('h1', {}, 'Documents'))),
    el('div', { className: 'card' },

          : el('table', {},

              el('th', {}, 'Name'),
              el('th', {}, 'Type'),
              el('th', {}, 'Quote'),
              el('th', {}, 'Status'),
              el('th', {}, 'Created'),
              el('th', {}, ''))),
            el('tbody', {}, ...state.documents.items.map(d => el('tr', {},
              el('td', { style: { fontWeight: 500 } }, d.name || 'Untitled'),

// ═════════════════════════════════════════════════════════════════
// NEW SUBMISSION
// ═════════════════════════════════════════════════════════════════
function newSubmissionView() {
  const form = {
    effective_date: new Date(Date.now() + 7 * 86400000).toISOString().split('T')[0],
    creating: false,
  };
  const container = el('div', {});
  const rerender = () => {
    container.innerHTML = '';
    container.appendChild(
      el('div', { className: 'page-header' },
        el('div', {},
          el('div', { className: 'eyebrow' }, 'New submission'),
          el('h1', {}, 'Start a new risk')),
        el('button', { className: 'btn btn-secondary',
          onClick: () => { state.view = 'dashboard'; render(); loadView(); } }, '← Back')));

    container.appendChild(
      el('div', { className: 'card' },
        el('p', { className: 'subtle' },
          'Create a new submission. Insured and coverage details are filled in on the next screen using the product’s current schema.'),
        el('div', { className: 'form-grid', style: { marginTop: '24px' } },
          el('div', { className: 'form-field' },
            el('label', {}, 'Requested effective date'),
            el('input', { type: 'date', value: form.effective_date,
              onInput: (e) => { form.effective_date = e.target.value; } })),
          el('div', { className: 'form-field' },
            el('label', {}, 'Product'),
            el('div', { className: 'readonly-value' },
              'Altruis Commercial Package Policy (auto-selected)'))),
        el('div', { style: { marginTop: '28px', display: 'flex', justifyContent: 'flex-end', gap: '12px' } },
          el('button', { className: 'btn btn-secondary',
            onClick: () => { state.view = 'dashboard'; render(); loadView(); } }, 'Cancel'),
          el('button', { className: 'btn btn-primary', disabled: form.creating,
            onClick: async () => {
              form.creating = true; rerender();
              try {
                const res = await api('/api/submissions/start', {
                  method: 'POST',
                  body: { effective_date: form.effective_date }
                });
                toast('Submission created', 'ok');
                state.view = 'submissions'; state.subView = res.submission_id;
                loadSubmission(res.submission_id);
              } catch (e) { form.creating = false; rerender(); }
            }
          }, form.creating ? 'Creating' : 'Create submission'))));
  };
  rerender();
  return container;
}

// ═════════════════════════════════════════════════════════════════
// BOOT
// ═════════════════════════════════════════════════════════════════
async function boot() {
  try {
    const [cfg, me] = await Promise.all([
      api('/api/config', { silent: true }),
      api('/api/auth/me', { silent: true }).catch(() => ({ authenticated: false })),
    ]);
    state.env = cfg.environment;
    if (me.authenticated) state.user = me.user;
  } catch (e) { console.error('Boot failed', e); }
  render();
  if (state.user) loadView();
}

boot();
</script>
