    font-variant-numeric: tabular-nums;
  }
  .asset-hero-edit .asset-hero-bigvalue-amount {
    font-size: 1.4rem;
  }
  .asset-hero-bigvalue-label {
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--mute);
    margin-top: 6px;
  }
  .asset-hero-identity {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px;
    padding-top: 4px;
  }
  .asset-hero-identity-strip {
    font-size: 0.95rem;
    color: var(--ink-mute);
    line-height: 1.4;
    font-variant-numeric: tabular-nums;
  }

  /* Two-column body */
  .asset-body-grid {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 36px;
    padding-bottom: 4px;
  }
  .asset-body-col {
    display: flex; flex-direction: column;
    gap: 18px;
  }
  .asset-body-block { }
  .asset-body-block-label {
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--mute);
    margin-bottom: 8px;
  }
  .asset-body-block-value {
    font-size: 0.92rem;
    color: var(--ink);
    line-height: 1.55;
    letter-spacing: -0.005em;
  }
  .asset-body-block-chips {
    display: flex; flex-wrap: wrap; gap: 7px;
  }

  /* Coverage list — quote-document style with dotted leader */
  .asset-body-coverage-list {
    display: flex; flex-direction: column;
    gap: 8px;
  }
  .asset-body-coverage-row {
    display: flex; align-items: baseline;
    gap: 8px;
    font-size: 0.92rem;
  }
  .asset-body-coverage-label {
    color: var(--ink);
    flex-shrink: 0;
    max-width: 70%;
  }
  .asset-body-coverage-leader {
    flex: 1;
    border-bottom: 1px dotted var(--line);
    margin-bottom: 4px;
    min-width: 16px;
  }
  .asset-body-coverage-value {
    color: var(--navy, var(--ink));
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    text-align: right;
  }

  /* Mobile: stack the body columns */
  @media (max-width: 720px) {
    .asset-hero-v2 {
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .asset-body-grid {
      grid-template-columns: 1fr;
      gap: 22px;
    }
  }

  /* Category rows: inline dense facts grouped by theme */
  .asset-cat-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line-2);
    align-items: baseline;
  }
  .asset-cat-row:last-of-type {
    border-bottom: none;
  }
  .asset-cat-label {
    font-size: 0.7rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--mute);
    font-weight: 600;
  }
  .asset-cat-values {
    font-size: 0.92rem; color: var(--ink);
    line-height: 1.55;
  }
  .asset-cat-value {
    color: var(--navy);
  }
  .asset-cat-sep {
    color: var(--line);
    margin: 0 8px;
    font-weight: 400;
  }

  /* List-style category — coverage schedule format
     Each row: label left, amount right, dotted leader between */
  .asset-cat-list {
    display: flex; flex-direction: column;
    gap: 6px;
  }
  .asset-cat-list-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: baseline;
    font-size: 0.92rem;
    line-height: 1.4;
  }
  .asset-cat-list-row + .asset-cat-list-row {
    border-top: 1px dotted var(--line-2);
    padding-top: 6px;
  }
  .asset-cat-list-label {
    color: var(--ink);
    font-weight: 400;
  }
  .asset-cat-list-value {
    color: var(--navy);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* "More details" disclosure at the bottom */
  .asset-more {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--line-2);
  }
  .asset-more-toggle {
    background: none; border: none; padding: 0;
    font-size: 0.82rem; color: var(--blue);
    font-weight: 500; cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.005em;
  }
  .asset-more-toggle:hover { color: var(--navy); text-decoration: underline; }
  .asset-more-grid {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--line-2);
  }

  /* Responsive — stack hero stats on narrow */
  @media (max-width: 900px) {
    .asset-hero-stats { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .asset-cat-row { grid-template-columns: 1fr; gap: 4px; }
    .asset-hero-top { flex-direction: column; align-items: flex-start; }
  }

  /* Flat-section read body — same patterns as asset card body but no
     containing card frame. Sits directly on the form pane background. */
  .flat-section-body {
    display: flex; flex-direction: column;
  }
  .flat-section-body .asset-hero {
    border-bottom: 1px solid var(--line-2);
    padding-top: 8px;
    margin-bottom: 24px;
  }

  /* Required-but-empty callout — small, muted, sits at the bottom */
  .asset-missing {
    margin-top: 22px;
    padding: 14px 16px;
    background: rgba(217, 165, 90, 0.06);
    border: 1px solid rgba(217, 165, 90, 0.18);
    border-radius: var(--radius-sm);
  }
  .asset-missing-label {
    font-size: 0.78rem; letter-spacing: 0.04em;
    text-transform: uppercase; font-weight: 600;
    color: var(--warn, #B07736);
    margin-bottom: 8px;
  }
  .asset-missing-list {
    display: flex; flex-wrap: wrap; gap: 6px 10px;
  }
  .asset-missing-item {
    font-size: 0.85rem; color: var(--ink);
    padding: 3px 8px;
    background: var(--white);
    border: 1px solid var(--line-2);
    border-radius: 4px;
  }

  /* ──────────────────────────────────────────────────────────────
   * Insured identity hero — used for the merged Application section
   * Big named insured + entity type + clean address block
   * ────────────────────────────────────────────────────────────── */
  .insured-identity {
    padding: 12px 0 22px;
    margin-bottom: 26px;
    border-bottom: 1px solid var(--line-2);
  }
  .insured-name {
    font-size: 1.45rem; font-weight: 600;
    color: var(--navy); letter-spacing: -0.012em;
    line-height: 1.18;
  }
  .insured-entity {
    font-size: 0.85rem; color: var(--mute);
    margin-top: 2px; font-weight: 400;
    letter-spacing: -0.005em;
  }
  .insured-address {
    margin-top: 14px;
    color: var(--ink);
    font-size: 0.95rem;
    line-height: 1.5;
  }
  .insured-address-line {
    /* address lines stack without extra spacing — one block */
  }

  /* Locked form-field label — smaller, uppercase eyebrow
     In edit mode, label reverts to normal. */
  .form-field.is-locked { gap: 2px; }
  .form-field.is-locked > label {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-mute, var(--mute));
    font-weight: 600;
    margin-bottom: 2px;
  }
  .form-field.is-locked .req { display: none; }

  /* Legacy readonly-value class — kept as thin compat alias
     (any older render path still hitting this will get the same flat style) */
  .readonly-value {
    padding: 0; background: transparent; border: none;
    font-size: 0.98rem; color: var(--ink); font-weight: 500;
    min-height: 28px; display: flex; align-items: center;
  }
  .readonly-value.empty { color: var(--mute); font-weight: 400; }

  /* ─── Product picker (New Submission, step 1) ─────────────────────
     Card-based selector — one card per published product. Clicking a
     card advances to step 2 (confirm). Editorial layout: distinct icon
     glyph on the left, product name + version on the right, subtle
     arrow affordance on the far right. Each card is a button so it's
     keyboard-accessible. */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    max-width: 880px;
  }
  .product-card {
    display: flex; align-items: center; gap: 18px;
    padding: 22px 24px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    cursor: pointer;
    text-align: left;
    transition: all 160ms var(--ease);
    color: var(--ink);
    box-shadow: var(--shadow-xs);
  }
  .product-card:hover {
    border-color: var(--blue);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  .product-card.selected {
    border-color: var(--blue);
    box-shadow: 0 0 0 1px var(--blue);
  }
  .product-card-icon {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: var(--blue-tint);
    color: var(--blue);
    border-radius: var(--radius-sm);
    flex-shrink: 0;
  }
  .product-card-body {
    flex: 1; min-width: 0;
  }
  .product-card-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--navy, var(--ink));
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .product-card-version {
    font-size: 0.72rem;
    color: var(--ink-mute);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .product-card-arrow {
    font-size: 1.2rem;
    color: var(--ink-mute);
    flex-shrink: 0;
    transition: color 160ms var(--ease);
  }
  .product-card:hover .product-card-arrow {
    color: var(--blue);
  }

  /* Confirm step — selected product summary row at top of card */
  .confirm-product-row {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 16px;
    background: var(--blue-tint);
    border-radius: var(--radius-sm);
  }
  .confirm-product-label {
    font-size: 0.66rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--blue);
    flex-shrink: 0;
  }
  .confirm-product-value {
    flex: 1;
    font-size: 0.98rem; font-weight: 500;
    color: var(--navy, var(--ink));
    letter-spacing: -0.005em;
  }
  .btn-link {
    background: transparent; border: none;
    color: var(--blue); font-weight: 500; font-size: 0.85rem;
    cursor: pointer; padding: 0;
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-color: rgba(47, 95, 184, 0.3);
    transition: text-decoration-color 120ms;
  }
  .btn-link:hover {
    text-decoration-color: var(--blue);
  }
  .btn-link:disabled {
    color: var(--ink-mute);
    cursor: not-allowed;
    text-decoration-color: transparent;
  }

  /* ─────────── Upload step — dropzone + file list ─────────── */
  .upload-dropzone {
    margin-top: 20px;
    border: 1.5px dashed var(--line-soft);
    border-radius: var(--radius-md);
    background: var(--paper-warm);
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 120ms, background 120ms;
  }
  .upload-dropzone:hover {
    border-color: var(--blue);
    background: var(--blue-50);
  }
  .upload-dropzone-active {
    border-color: var(--blue);
    background: var(--blue-50);
    border-style: solid;
  }
  .upload-dropzone-inner {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .upload-dropzone-inner > * { pointer-events: none; }
  .upload-dropzone-icon {
    width: 40px; height: 40px;
    color: var(--blue);
  }
  .upload-dropzone-icon svg { width: 100%; height: 100%; display: block; }
  .upload-dropzone-headline {
    font-size: 1rem; font-weight: 500; color: var(--ink);
  }
  .upload-dropzone-sub {
    font-size: 0.85rem; color: var(--ink-mute);
  }
  .upload-file-list {
    margin-top: 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .upload-file-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
  }
  .upload-file-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: var(--blue-50); color: var(--blue);
    border-radius: var(--radius-sm);
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .upload-file-meta { flex: 1; min-width: 0; }
  .upload-file-name {
    font-size: 0.92rem; font-weight: 500; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .upload-file-size {
    font-size: 0.78rem; color: var(--ink-mute);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .upload-file-status { font-size: 0.85rem; color: var(--ink-mute); }
  .upload-file-remove { font-size: 0.85rem; }
  .upload-actions {
    margin-top: 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }

  /* Auto-filled field highlight — submission detail shows a subtle
     blue accent on fields that were pre-filled by document extraction,
     so the broker knows what to verify. The highlight clears once
     the broker focuses/edits the field (they've reviewed it). */
  .field-extracted {
    position: relative;
  }
  .field-extracted::before {
    content: 'Auto-filled';
    position: absolute; top: -6px; right: 8px;
    background: var(--blue); color: #fff;
    font-size: 0.62rem; font-weight: 500;
    letter-spacing: 0.04em; text-transform: uppercase;
    padding: 1px 6px;
    border-radius: var(--radius-pill);
    pointer-events: none;
  }
  .field-extracted input,
  .field-extracted select,
  .field-extracted textarea {
    border-color: var(--blue) !important;
    background: var(--blue-50) !important;
  }

  /* Mobile: single-column product grid */
  @media (max-width: 720px) {
    .product-grid { grid-template-columns: 1fr; }
  }

  /* ─────────── Detail layout ─────────── */
  .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }

  /* ─────────── Variation form ─────────── */
  .variation-grid { display: flex; flex-direction: column; gap: 12px; }
  .variation-row {
    display: grid; grid-template-columns: minmax(200px, 1fr) 2fr;
    gap: 24px; padding: 14px 16px;
    border: 1px solid var(--line); border-radius: var(--radius-md);
    background: var(--white);
    transition: border-color 120ms, background 120ms;
  }
  .variation-row-changed {
    border-color: var(--blue); background: var(--blue-50);
  }
  .variation-row-label { display: flex; flex-direction: column; gap: 4px; }
  .variation-row-name { font-weight: 500; font-size: 0.95rem; color: var(--ink); }
  .variation-row-help { font-size: 0.78rem; color: var(--ink-mute); line-height: 1.4; }
  .variation-row-badge {
    display: inline-block; align-self: flex-start;
    font-size: 0.68rem; font-weight: 500; letter-spacing: 0.04em;
    padding: 2px 8px; border-radius: var(--radius-pill);
    background: var(--blue); color: #fff;
  }
  .variation-row-control { display: flex; align-items: flex-start; }
  .variation-row-control select {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--line); border-radius: var(--radius-md);
    background: var(--white); font-size: 0.92rem; color: var(--ink);
  }
  .variation-row-control select:focus {
    outline: none; border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(103, 151, 238, 0.15);
  }
  .variation-multi {
    display: flex; flex-direction: column; gap: 8px; width: 100%;
  }
  .variation-checkbox {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0; cursor: pointer;
    font-size: 0.92rem; color: var(--ink);
  }
  .variation-checkbox input { margin: 0; }

  .kv-list dt {
    font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-mute); margin-top: 16px; font-weight: 600;
  }
  .kv-list dt:first-child { margin-top: 0; }
  .kv-list dd { font-size: 0.95rem; color: var(--ink); margin-top: 4px; font-weight: 500; }
  .kv-list dd.mono { font-family: inherit; font-size: 0.88rem; word-break: break-all; font-weight: 400; font-variant-numeric: tabular-nums; }

  /* Status banner at top of detail */
  .status-banner {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px; border-radius: var(--radius-md);
    margin-bottom: 24px; font-size: 0.92rem;
  }
  .status-banner-icon {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 1rem;
  }
  .status-banner-icon svg {
    width: 18px; height: 18px;
    display: block;
  }
  .status-banner.locked {
    background: var(--info-soft); color: var(--info);
    border-left: 3px solid var(--info);
  }
  .status-banner.locked .status-banner-icon { background: var(--info); color: #fff; }
  .status-banner.editable {
    background: var(--warn-soft); color: var(--warn);
    border-left: 3px solid var(--warn);
  }
  .status-banner.editable .status-banner-icon { background: var(--warn); color: #fff; }
  .status-banner.declined {
    background: var(--err-soft); color: var(--err);
    border-left: 3px solid var(--err);
  }
  .status-banner.declined .status-banner-icon { background: var(--err); color: #fff; }

  /* Two-line date+time render in the overview bar */
  .overview-datetime { line-height: 1.25; }
  .overview-datetime-date {
    font-size: 0.95rem; font-weight: 500;
    color: var(--navy);
  }
  .overview-datetime-time {
    font-size: 0.78rem; color: var(--mute);
    margin-top: 2px; font-weight: 400;
  }

  /* Horizontal overview bar — sits above the form instead of a right sidebar */
  .overview-bar {
    display: flex; flex-wrap: wrap; gap: 0;
    background: var(--white); border: 1px solid var(--line);
    border-radius: var(--radius-md);
    padding: 4px 0;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .overview-item {
    flex: 1 1 0;
    min-width: 140px;
    padding: 14px 22px;
    border-right: 1px solid var(--line-2);
  }
  .overview-item:last-child { border-right: none; }
  .overview-item-label {
    font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--mute); font-weight: 500; margin-bottom: 6px;
  }
  .overview-item-value {
    font-size: 0.95rem; color: var(--navy);
    font-weight: 500; letter-spacing: -0.01em;
  }
  .overview-item-value .mono {
    font-size: 0.78rem; font-weight: 400; color: var(--graphite);
  }
  @media (max-width: 900px) {
    .overview-bar { flex-direction: column; }
    .overview-item { border-right: none; border-bottom: 1px solid var(--line-2); }
    .overview-item:last-child { border-bottom: none; }
  }
  .status-banner.bound {
    background: var(--ok-soft); color: var(--ok);
    border-left: 3px solid var(--ok);
  }
  .status-banner.bound .status-banner-icon { background: var(--ok); color: #fff; }
  .status-banner-title { font-weight: 600; margin-bottom: 2px; }
  .status-banner-desc { color: inherit; opacity: 0.85; font-size: 0.85rem; }

  /* Empty state */
  .empty {
    padding: 72px 20px; text-align: center; color: var(--ink-mute);
    border: 1px dashed var(--line); border-radius: var(--radius-md);
    background: var(--paper);
  }
  .empty h3 { color: var(--ink); margin-bottom: 8px; font-size: 1.05rem; }
  .empty p { font-size: 0.9rem; }

  /* Empty-asset-shell — rendered when a multi-asset section (like Structures)
     has zero populated assets. Cleaner than 188 blank schema rows. */
  .empty-asset-shell {
    margin-top: 24px;
    padding: 56px 24px;
    text-align: center;
    border: 1px dashed var(--line-2);
    border-radius: var(--radius-md);
    background: var(--cream);
    color: var(--slate);
  }
  .empty-asset-icon {
    width: 48px; height: 48px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--white); border: 1px solid var(--line);
    color: var(--blue); font-size: 1.4rem; font-weight: 300;
    margin-bottom: 14px;
  }
  .empty-asset-title {
    font-size: 1rem; color: var(--navy); font-weight: 500;
    letter-spacing: -0.01em; margin-bottom: 6px;
  }
  .empty-asset-desc {
    font-size: 0.85rem; color: var(--mute);
    max-width: 420px; margin: 0 auto; line-height: 1.5;
  }

  /* Rail item for empty asset shells — count text rendered in italic mute */
  .section-nav-item.is-empty .section-nav-count {
    color: var(--mute);
    font-style: italic;
  }

  /* Toast */
  #toast-host {
    position: fixed; top: 16px; right: 16px; z-index: 1000;
    display: flex; flex-direction: column; gap: 10px; max-width: 420px;
  }
  .toast {
    padding: 14px 18px; border-radius: var(--radius-md); font-size: 0.88rem;
    background: var(--navy); color: #fff; box-shadow: var(--shadow-lg);
    animation: slidein 200ms ease;
    border-left: 3px solid var(--blue);
    display: flex; gap: 12px; align-items: flex-start;
    /* Preserve newlines in the message — used by the submit-blocked
       toast that lists multiple incomplete sections. */
    white-space: pre-wrap;
    line-height: 1.5;
  }
  .toast.ok { border-left-color: var(--ok); }
  .toast.err { border-left-color: var(--err); }
  .toast::before {
    content: 'i'; font-weight: 700; font-size: 0.75rem;
    width: 18px; height: 18px; border-radius: 50%; background: var(--blue); color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .toast.ok::before { content: '✓'; background: var(--ok); }
  .toast.err::before { content: '!'; background: var(--err); }
  @keyframes slidein { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(15,37,66,0.5); z-index: 100;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 80px; backdrop-filter: blur(3px);
  }
  .modal {
    background: var(--white); padding: 36px; border-radius: var(--radius-lg);
    max-width: 560px; width: 90%; max-height: 85vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal h2 { font-size: 1.35rem; margin-bottom: 10px; }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 60px 20px; color: var(--ink-mute); font-size: 0.9rem; width: 100%;
  }
  .loading::before {
    content: ''; width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid var(--line); border-top-color: var(--blue);
    animation: spin 700ms linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  hr { border: none; border-top: 1px solid var(--line-soft); margin: 24px 0; }

  .saving-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.78rem; color: var(--ink-mute);
    padding: 4px 10px; background: var(--paper-warm);
    border-radius: var(--radius-pill);
  }
  .saving-chip.saved { color: var(--ok); background: var(--ok-soft); }
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-host"></div>

<script type="module">

// ═════════════════════════════════════════════════════════════════
// CORE UTILITIES
// ═════════════════════════════════════════════════════════════════
const $ = (s) => document.querySelector(s);
const el = (tag, props = {}, ...children) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props || {})) {
    if (v == null || v === false) continue;
    if (k === 'className') n.className = v;
    else if (k === 'style') Object.assign(n.style, v);
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') n.innerHTML = v;
    else if (k === 'checked') { if (v) n.setAttribute('checked', ''); }
    else if (v === true) n.setAttribute(k, '');
    else n.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    n.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return n;
};

function brandMark(color = 'white', size = 32) {
  // Small mountain-glyph mark — for sidebar and compact headers
  const file = color === 'navy' ? 'altruis-mark-navy.svg' : 'altruis-mark-white.svg';
  const img = document.createElement('img');
  img.src = `/assets/${file}`;
  img.alt = 'Altruis';
  img.style.width = `${size}px`;
  img.style.height = `${size}px`;
  img.style.display = 'block';
  return img;
}

// Environment indicator badge for the sidebar.
//
// Three distinct styles so a broker can verify at a glance which Joshu
// container the portal is talking to:
//   • test       → lime green "TEST" pill (reassuring — what we want)
//   • mock       → gray "MOCK" pill (no Joshu calls happening at all)
//   • production → red "PRODUCTION" pill (loud — should never see this
//     in normal broker use; if it shows, something is wrong with the
//     deployment configuration)
//
// The value comes from /api/config which the backend derives from the
// JOSHU_ENVIRONMENT env var at startup. The container is locked in on
// the backend at process boot — this badge is the visible proof of
// what container outbound API calls are routed to.
function renderEnvBadge() {
  const env = state.env;
  if (!env) {
    // Config not yet loaded — show a neutral placeholder rather than
    // implying something one way or the other.
    return el('span', { className: 'env-badge env-badge-unknown', title: 'Environment not yet loaded' }, '\u2026');
  }
  const config = {
    test:       { label: 'TEST',       cls: 'env-badge-test',       title: 'Connected to Joshu TEST container' },
    mock:       { label: 'MOCK',       cls: 'env-badge-mock',       title: 'Mock data — no Joshu calls' },
    production: { label: 'PRODUCTION', cls: 'env-badge-production', title: 'WARNING: Connected to Joshu PRODUCTION container' },
  }[env] || { label: env.toUpperCase(), cls: 'env-badge-unknown', title: `Unknown environment: ${env}` };
  return el('span', {
    className: `env-badge ${config.cls}`,
    title: config.title,
  }, config.label);
}

function brandWordmark(color = 'white', height = 42) {
  // Full "altruis group" wordmark — for login hero
  const file = color === 'navy' ? 'altruis-logo-navy.svg'
    : color === 'blue' ? 'altruis-logo-blue.svg'
    : 'altruis-logo-white.svg';
  const img = document.createElement('img');
  img.src = `/assets/${file}`;
  img.alt = 'Altruis Group';

const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '—';
// Relative-time formatter: "2 min ago", "1 hr ago", "3 days ago", "5 weeks ago".
// Falls back to the absolute date for anything older than 8 weeks. Used in the
// page-header metadata line so the broker sees recency at a glance.
const fmtRelativeTime = (d) => {
  if (!d) return '—';
  const ms = Date.now() - new Date(d).getTime();
  if (ms < 0) return fmtDate(d);
  const s = Math.floor(ms / 1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60) return `${m} min ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h} hr${h === 1 ? '' : 's'} ago`;
  const days = Math.floor(h / 24);
  if (days < 14) return `${days} day${days === 1 ? '' : 's'} ago`;
  const weeks = Math.floor(days / 7);
  if (weeks < 8) return `${weeks} week${weeks === 1 ? '' : 's'} ago`;
  return fmtDate(d);
};
const fmtDateTime = (d) => d ? new Date(d).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';

// Cleaner two-line date+time render for the overview bar — the date sits
// above the time. Returns a virtual element rather than a string so the
// caller can inject it directly into a cell.
function fmtSubmittedDateTime(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return '—';
  const datePart = dt.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  const timePart = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  return el('div', { className: 'overview-datetime' },
    el('div', { className: 'overview-datetime-date' }, datePart),
    el('div', { className: 'overview-datetime-time' }, timePart));
}

// Map Joshu's flow value to a friendlier label. Joshu emits short codes
// like "New", "Renewal", etc. — we render with the word "Policy" appended
// where it reads more clearly.
function friendlyFlow(raw) {
  if (!raw) return '—';
  const s = String(raw).trim();
  const map = {
    'New':           'New Policy',
    'Renewal':       'Renewal Policy',
    'Endorsement':   'Endorsement',
    'Cancellation':  'Cancellation',
    'Reinstatement': 'Reinstatement',
  };
  // Case-insensitive lookup, but preserve original capitalization on miss
  for (const [key, val] of Object.entries(map)) {
    if (s.toLowerCase() === key.toLowerCase()) return val;
  }
  return s;
}

// Minimal padlock icon — single-stroke outline, no gradient or shading.

function userInitials(user) {
  if (!user) return '?';
  const name = user.name || user.email || '';
  const parts = name.split(/[\s@.]+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return '?';
}

function toast(msg, kind = '') {
  const t = el('div', { className: `toast ${kind}` }, el('div', {}, msg));
  $('#toast-host').appendChild(t);
  // Long messages need more reading time. Multi-line incomplete-fields
  // toasts can list 3-4 sections — at 4.2s that's barely scannable.
  // Scale dismissal: ~50ms per character, 4s minimum, 12s maximum.
  const ms = Math.max(4200, Math.min(12000, msg.length * 50));
  setTimeout(() => {
    t.style.opacity = '0'; t.style.transition = 'opacity 200ms';
    setTimeout(() => t.remove(), 200);
  }, ms);
}

async function api(path, opts = {}) {
  const { method = 'GET', body, silent = false } = opts;

  // Seed-mode interception. Any path that the seed layer handles is
  // routed there instead of hitting the real backend. Auth and config
  // pass through unchanged. To wire real Joshu calls back in: remove
  // this block.
  if (seedHandlesPath(path)) {
    try {
      const result = await seedApi(path, opts);
      if (result !== null) return result;
      // null = seed didn't handle this specific path/method; fall
      // through to real fetch as a safety net.
    } catch (e) {
      if (e.message === 'seed:ephemeral') {
        // Special signal: caller should treat this as a no-op success.
        // Re-throw so the caller can branch on it.
        throw e;
      }
      if (!silent) toast(e.message || 'Seed API error', 'err');
      throw e;
    }
  }

  const init = { method, credentials: 'include', headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) init.body = JSON.stringify(body);
  const res = await fetch(path, init);
  if (res.status === 401) {
    state.user = null;
    render();
    throw new Error('Not authenticated');
  }
  if (!res.ok) {
    const errBody = await res.json().catch(() => ({ detail: res.statusText }));
    const msg = errBody.detail || errBody.message || res.statusText;
    if (!silent) toast(msg, 'err');
    throw new Error(msg);
  }
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : res.blob();
}

function statusBadge(s) {
  if (!s) return el('span', { className: 'badge badge-incomplete' }, '—');
  // Submitted and Pending both mean "broker sent it, awaiting underwriter
  // decision" from the broker's perspective. Joshu distinguishes them
  // technically (Pending = system processing the post-submit; Submitted
  // = sitting in UW queue) but the broker doesn't care — both are the
  // same wait state. Unify them into a single label and class so list
  // filters, lifecycle bars, dashboard counts all read consistently.
  if (s === 'Submitted' || s === 'Pending') {
    return el('span', { className: 'badge badge-pendingdecision' }, 'Pending Decision');
  }
  return el('span', { className: `badge badge-${s.toLowerCase()}` }, s);
}

// Format a datapoint value for display (handles Joshu's Location and Monetary objects)
function formatDatapointValue(v) {
  if (v == null || v === '') return '—';
  if (typeof v === 'boolean') return v ? 'Yes' : 'No';
  if (typeof v === 'number') return v.toLocaleString();
  if (typeof v === 'string') return v;
  if (Array.isArray(v)) return v.map(formatDatapointValue).join(', ');
  if (typeof v === 'object') {
    // Defensive unwrap — if a Plain/V1/V0 wrapper leaks through the backend
    // unwrap chain, handle it client-side.
    for (const wrapper of ['Plain', 'V1', 'V0']) {
      if (v[wrapper] && typeof v[wrapper] === 'object') {
        const inner = v[wrapper];
        for (const typeKey of ['Text', 'Number', 'Date', 'DateTime', 'Boolean']) {
          if (typeKey in inner) return formatDatapointValue(inner[typeKey]);
        }
        if ('Null' in inner) return '—';
        if ('Monetary' in inner) return formatDatapointValue(inner.Monetary);
        if ('Location' in inner) return formatDatapointValue(inner.Location);
        if ('Array' in inner) return formatDatapointValue(inner.Array);
      }
    }
    // Monetary: { currency, amount }
    if (v.currency && v.amount != null) {
      const n = parseFloat(v.amount);
      if (!isNaN(n)) return n.toLocaleString('en-US', { style: 'currency', currency: v.currency });
      return `${v.amount} ${v.currency}`;
    }
    if (v.formatted_address) return v.formatted_address;
    if (v.name && typeof v.name === 'string') return v.name;
    if (v.NamedParsedAddress) return formatDatapointValue(v.NamedParsedAddress);
    if (v.ParsedGoogleAddress) return formatDatapointValue(v.ParsedGoogleAddress);
    return JSON.stringify(v);
  }
  return String(v);
}

// Unwrap for editable inputs — returns a plain value suitable for an HTML input
function unwrapForInput(v) {
  if (v == null) return '';
  if (typeof v === 'boolean' || typeof v === 'number' || typeof v === 'string') return v;
  // Arrays: already unwrapped list of simple values (like ["Self Storage"]).
  // Pass through so formatByType can join them for display.
  if (Array.isArray(v)) return v;
  if (typeof v === 'object') {
    for (const wrapper of ['Plain', 'V1', 'V0']) {
      if (v[wrapper] && typeof v[wrapper] === 'object') {
        const inner = v[wrapper];
        for (const typeKey of ['Text', 'Number', 'Date', 'DateTime', 'Boolean']) {
          if (typeKey in inner) return inner[typeKey];
        }
        if ('Null' in inner) return '';
        if ('Monetary' in inner) return unwrapForInput(inner.Monetary);
        if ('Location' in inner) return unwrapForInput(inner.Location);
        if ('Array' in inner) return Array.isArray(inner.Array) ? inner.Array : [];
      }
    }
    // Location — Joshu returns these as {NamedParsedAddress: {name}} or
    // {ParsedGoogleAddress: {formatted_address, ...}}. Unwrap to a plain string.
    if (v.NamedParsedAddress) return unwrapForInput(v.NamedParsedAddress);
    if (v.ParsedGoogleAddress) return unwrapForInput(v.ParsedGoogleAddress);
    if (v.formatted_address) return v.formatted_address;
    if (typeof v.name === 'string') return v.name;
    // Monetary — return amount as a string for number input
    if (v.currency && v.amount != null) return v.amount;
  }
  return '';
}

// Evaluate a Joshu-style condition expression against the current data
// values. Supports the patterns actually used in the schema:
//   * "code=value"                   → equality (numbers stringify, booleans become 0/1)
//   * "code=\"value\""               → quoted literal equality
//   * "expr1 AND expr2"              → boolean and
//   * "expr1 OR expr2"               → boolean or
//   * "code IN (a,b,c)"              → membership (custom shorthand for the LRO clauses)
// Codes can appear with or without the "app." prefix; we normalize.
//
// Returns true if the field should be visible.
function evalCondition(condition, data) {
  if (!condition) return true;
  // Trim whitespace, strip outer parens iteratively
  let expr = condition.trim();
  while (expr.startsWith('(') && expr.endsWith(')')) {
    expr = expr.slice(1, -1).trim();
  }
  // Split on top-level AND/OR (no nested parens at this point — schema is flat)
  const lower = expr.toLowerCase();
  const andIdx = topLevelOp(expr, ' AND ');
  if (andIdx >= 0) {
    return evalCondition(expr.slice(0, andIdx), data) && evalCondition(expr.slice(andIdx + 5), data);
  }
  const orIdx = topLevelOp(expr, ' OR ');
  if (orIdx >= 0) {
    return evalCondition(expr.slice(0, orIdx), data) || evalCondition(expr.slice(orIdx + 4), data);
  }
  // Atomic comparison: code OP value
  // Match "code IN (a,b,c)"
  const inMatch = expr.match(/^([\w.]+)\s+IN\s+\((.*)\)$/);
  if (inMatch) {
    const code = inMatch[1];
    const list = inMatch[2].split(',').map(s => s.trim());
    const v = readDataValue(code, data);
    return list.includes(String(v));
  }
  // Match "code=value" or "code=\"value\"" — also tolerates "code[]=value"
  const eqMatch = expr.match(/^([\w.]+)(?:\[\])?\s*=\s*(.*)$/);
  if (eqMatch) {
    const code = eqMatch[1];
    let target = eqMatch[2].trim();
    if (target.startsWith('"') && target.endsWith('"')) target = target.slice(1, -1);
    const v = readDataValue(code, data);
    if (target === '1' && (v === true || v === 1 || v === '1')) return true;
    if (target === '0' && (v === false || v === 0 || v === '0' || v === null || v === undefined)) return true;
    return String(v) === target;
  }
  // Unknown form → fail open (show the field)
  return true;
}

function topLevelOp(expr, op) {
  // Find an AND/OR operator at paren-depth 0
  let depth = 0;
  for (let i = 0; i + op.length <= expr.length; i++) {
    const c = expr[i];
    if (c === '(') depth++;
    else if (c === ')') depth--;
    if (depth === 0 && expr.slice(i, i + op.length) === op) return i;
  }
  return -1;
}

function readDataValue(code, data) {
  // Try code as-is, then with "app." prefix, then without
  if (code in data) return data[code];
  if (('app.' + code) in data) return data['app.' + code];
  if (code.startsWith('app.') && code.slice(4) in data) return data[code.slice(4)];
  return null;
}

// Form schema generator. Builds the flat normalized schema the UI
// expects, sourced from APP_SCHEMA above plus the structures asset.
//
// Output mirrors what /api/submissions/{id}/form returns from Joshu
// after normalization. Field shape:
//   { code, label, section, section_label, section_order,
//     type, required, visible, exists, value, options?,
//     decimal_places?, asset_idx, item? }
//
// Sections shape:
//   { code, label, order, visible_count, completed,
//     has_errors, condition_met, is_asset?, is_underwriter? }
function seedFormSchemaForSubmission(submission) {
  const data = submission.data || {};
  const has = (k) => data[k] !== undefined && data[k] !== null && data[k] !== '';
  const v = (k) => data[k] !== undefined ? data[k] : null;

  const fields = [];
  const sectionsOut = [];

  for (const sec of APP_SCHEMA.sections) {
    const condMet = evalCondition(sec.condition, data);

    if (sec.is_asset) {
      // Structures section — handled separately below; emit a section
      // header only (fields are per-asset and added in a second pass).
      sectionsOut.push({
        code: sec.code, label: sec.label, order: sec.order,
        visible_count: 0, field_count: 0, completed: 0,
        has_errors: false, condition_met: condMet,
        is_asset: true, asset_collection: sec.asset_collection,
      });
      continue;
    }

    const sectionFields = APP_SCHEMA[sec.code] || [];
    let visibleCount = 0;
    let completed = 0;

    for (const def of sectionFields) {
      // Skip underwriter-source fields — broker should never see them.
      if (UNDERWRITER_SOURCE_FIELDS.has(def.code)) continue;
      const fieldVisible = condMet && evalCondition(def.condition, data);
      const opts = def.options === 'US_STATES' ? US_STATE_OPTIONS : def.options;
      fields.push({
        code: def.code,
        label: def.label,
        section: sec.code,
        section_label: sec.label,
        section_order: sec.order,
        asset_idx: 0,
        type: def.type,
        required: def.required || false,
        visible: fieldVisible,
        exists: true,
        value: v(def.code),
        options: opts || null,
        decimal_places: def.decimal_places,
        widget: def.widget,
        help_text: def.help_text,
        format: def.format,
        validation_error: null,
      });
      if (fieldVisible) {
        visibleCount++;
        if (has(def.code)) completed++;
      }
    }

    sectionsOut.push({
      code: sec.code, label: sec.label, order: sec.order,
      visible_count: visibleCount, field_count: visibleCount, completed,
      has_errors: false, condition_met: condMet,
      is_underwriter: !!sec.is_underwriter,
    });
  }

  // ── Structures asset section ───────────────────────────────────
  // Each structure is a separate group rendered as an asset card.
  // Field codes get a per-asset suffix in the canonical Joshu form
  // ("app.structures[0].app.location_number"), but for storage we
  // use a flat path `structures[i].<code>` as a JS key.
  const structures = data['structures'] || [];
  const structuresSection = sectionsOut.find(s => s.code === 'structures');
  if (structuresSection) {
    structuresSection.asset_count = structures.length;
    let totalSV = 0, totalSC = 0;
    structures.forEach((entry, idx) => {
      for (const def of STRUCTURE_SCHEMA.fields) {
        // Same filter as the application sections — UW-source fields
        // are filled in by the carrier, not the broker.
        if (UNDERWRITER_SOURCE_FIELDS.has(def.code)) continue;
        const flatCode = `structures[${idx}].${def.code}`;
        const condMet = evalCondition(def.condition, { ...data, ...entry });
        const opts = def.options === 'US_STATES' ? US_STATE_OPTIONS : def.options;
        fields.push({
          code: flatCode,
          original_code: def.code,
          label: def.label,
          section: 'structures',
          section_label: 'Locations & Structures',
          section_order: structuresSection.order,
          asset_idx: idx,
          type: def.type,
          required: def.required || false,
          visible: condMet,
          exists: true,
          value: entry[def.code] !== undefined ? entry[def.code] : null,
          options: opts || null,
          decimal_places: def.decimal_places,
          widget: def.widget,
          help_text: def.help_text,
          format: def.format,
          validation_error: null,
        });
        if (condMet) {
          totalSV++;
          if (entry[def.code] !== undefined && entry[def.code] !== null && entry[def.code] !== '') totalSC++;
        }
      }
    });
    structuresSection.visible_count = totalSV;
    structuresSection.field_count = totalSV;
    structuresSection.completed = totalSC;
    structuresSection.is_empty_asset_shell = structures.length === 0;
  }

  const totalVisible = sectionsOut.reduce((acc, s) => acc + s.visible_count, 0);
  const totalCompleted = sectionsOut.reduce((acc, s) => acc + s.completed, 0);

  return {
    fields,
    sections: sectionsOut,
    counters: {
      total: totalVisible,
      completed: totalCompleted,
      validation_issues: 0,
      non_retryable_validation_issues: 0,
    },
    has_errors: false,
  };
}

// Derive peril addresses from the unique addresses across all
// structures. This is what populates app.PerilsScoringAddresses
// (read-only in the UI; the rater needs it for catastrophe scoring).
function derivePerilAddresses(data) {
  const structs = data['structures'] || [];
  const seen = new Set();
  const out = [];
  for (const s of structs) {
    const addr = s['app.location_address'];
    if (!addr) continue;
    const key = typeof addr === 'string' ? addr : JSON.stringify(addr);
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(addr);
  }
  return out;
}

let _seedDb = null;
function seedDb() {
  if (_seedDb) return _seedDb;
  try {
    const stored = localStorage.getItem(SEED_STORAGE_KEY);
    if (stored) {
      _seedDb = JSON.parse(stored);
      return _seedDb;
    }
  } catch (e) { /* fall through to fresh */ }
  _seedDb = JSON.parse(JSON.stringify(SEED_BASE));
  saveSeedDb();
  return _seedDb;
}
function saveSeedDb() {
  try {
    localStorage.setItem(SEED_STORAGE_KEY, JSON.stringify(_seedDb));
  } catch (e) { console.warn('seedDb persist failed', e); }
}
function resetSeedDb() {
  _seedDb = JSON.parse(JSON.stringify(SEED_BASE));
  saveSeedDb();
}
window.resetSeedDb = resetSeedDb;  // expose for console reset

// API interception. Routes any path matching the seed-handled prefixes
// to seedApi(). Auth and config still hit the real backend.
async function seedApi(path, opts = {}) {
  const { method = 'GET', body } = opts;
  const db = seedDb();
  // Tiny artificial latency so loading states render visibly. 80ms is
  // enough to see a flash of the spinner without feeling sluggish.
  await new Promise(r => setTimeout(r, 80));

  const url = new URL(path, window.location.origin);
  const p = url.pathname;
  const q = url.searchParams;

  // Submissions
  if (p === '/api/submissions' && method === 'GET') {
    const items = db.submissions.slice().sort((a, b) =>
      new Date(b.modified_at || b.created_at) - new Date(a.modified_at || a.created_at));
    return { items, total: items.length, page: 1, per_page: items.length };
  }
  let m = p.match(/^\/api\/submissions\/(\d+)$/);
  if (m && method === 'GET') {
    const sub = db.submissions.find(s => String(s.id) === m[1]);
    if (!sub) throw new Error('Submission not found');
    return sub;
  }
  m = p.match(/^\/api\/submissions\/(\d+)\/form$/);
  if (m && method === 'GET') {
    const sub = db.submissions.find(s => String(s.id) === m[1]);
    if (!sub) throw new Error('Submission not found');
    return seedFormSchemaForSubmission(sub);
  }
  m = p.match(/^\/api\/submissions\/(\d+)\/data$/);
  if (m && method === 'PUT') {
    const sub = db.submissions.find(s => String(s.id) === m[1]);
    if (!sub) throw new Error('Submission not found');
    // Body is a flat {code: value} dict. Top-level keys merge into
    // sub.data directly. Structure-scoped keys (structures[N].app.X)
    // unflatten back into the structures array, mutating in place.
    sub.data = sub.data || {};
    sub.data.structures = sub.data.structures || [];
    for (const [code, val] of Object.entries(body || {})) {
      const sm = code.match(/^structures\[(\d+)\]\.(.+)$/);
      if (sm) {
        const idx = parseInt(sm[1], 10);
        const fieldCode = sm[2];
        if (!sub.data.structures[idx]) sub.data.structures[idx] = {};
        sub.data.structures[idx][fieldCode] = val;
      } else {
        sub.data[code] = val;
      }
    }
    sub.modified_at = new Date().toISOString();
    if (body && body['insured.name']) sub.insured_name = body['insured.name'];
    saveSeedDb();
    return { data: sub.data };
  }
  m = p.match(/^\/api\/submissions\/(\d+)\/submit$/);
  if (m && method === 'POST') {
    const sub = db.submissions.find(s => String(s.id) === m[1]);
    if (!sub) throw new Error('Submission not found');
    sub.status = 'Submitted';
    sub.submitted_at = new Date().toISOString();
    sub.modified_at = sub.submitted_at;
    saveSeedDb();
    return sub;
  }
  m = p.match(/^\/api\/submissions\/(\d+)\/reopen$/);
  if (m && method === 'POST') {
    const sub = db.submissions.find(s => String(s.id) === m[1]);
    if (!sub) throw new Error('Submission not found');
    sub.status = 'Incomplete';
    sub.modified_at = new Date().toISOString();
    saveSeedDb();
    return sub;
  }
  if (p === '/api/submissions/start' && method === 'POST') {
    // Ephemeral: do NOT persist a new submission. Return a faux response
    // shape but the new-submission flow knows to treat this as a demo.
    // Caller (createSubmissionAndContinue) intercepts via a separate path.
    throw new Error('seed:ephemeral');
  }

  // Quotes
  if (p === '/api/quotes' && method === 'GET') {
    let items = db.quotes.slice();
    const subId = q.get('submission_id');
    if (subId) items = items.filter(qt => String(qt.submission_id) === String(subId));
    items.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    return { items, total: items.length, page: 1, per_page: items.length };
  }
  m = p.match(/^\/api\/quotes\/(\d+)$/);
  if (m && method === 'GET') {
    const qt = db.quotes.find(x => String(x.id) === m[1]);
    if (!qt) throw new Error('Quote not found');
    return qt;
  }
  m = p.match(/^\/api\/quotes\/(\d+)\/variations$/);
  if (m && method === 'POST') {
    const parent = db.quotes.find(x => String(x.id) === m[1]);
    if (!parent) throw new Error('Parent quote not found');
    const overrides = (body && body.overrides) || {};
    const newId = Math.max(0, ...db.quotes.map(qq => qq.id)) + 1;
    const newData = { ...(parent.data || {}), ...overrides };
    // Recompute total_premium roughly: just bump base by 5% per change to
    // give a different-looking number. Real pricing comes from rater.
    const tweakFactor = 1 + (Object.keys(overrides).length * 0.03);
    newData.total_premium = Math.round((parent.data.total_premium || 0) * tweakFactor);
    newData.total_invoice = Math.round((parent.data.total_invoice || 0) * tweakFactor);
    const variation = {
      ...parent, id: newId,
      created_at: new Date().toISOString(), modified_at: new Date().toISOString(),
      status: 'QuotePublished',
      data: newData,
      _parent_quote_id: parent.id,
    };
    db.quotes.push(variation);
    saveSeedDb();
    return variation;
  }
  m = p.match(/^\/api\/quotes\/(\d+)\/close$/);
  if (m && method === 'POST') {
    const qt = db.quotes.find(x => String(x.id) === m[1]);
    if (!qt) throw new Error('Quote not found');
    qt.status = 'QuoteClosed';
    qt.modified_at = new Date().toISOString();
    saveSeedDb();
    return qt;
  }
  m = p.match(/^\/api\/quotes\/(\d+)\/bind$/);
  if (m && method === 'POST') {
    const qt = db.quotes.find(x => String(x.id) === m[1]);
    if (!qt) throw new Error('Quote not found');
    qt.status = 'BinderPending';
    qt.modified_at = new Date().toISOString();
    // Also flip the parent submission to Bound and create a policy.
    const sub = db.submissions.find(s => s.id === qt.submission_id);
    if (sub) {
      sub.bound_at = new Date().toISOString();
      sub.modified_at = sub.bound_at;
      const newPolicyId = `pol-${3000 + db.policies.length}`;
      sub.policy_id = newPolicyId;
      db.policies.push({
        id: newPolicyId, user_id: 1,
        insured_name: sub.insured_name || sub.data?.['insured.name'] || 'Unknown insured',
        status: 'Active', product_version_id: sub.product_version_id,
        product_name: 'Self Storage \u2014 Commercial Package',
        effective_date: sub.effective_at || new Date().toISOString(),
        renews_at: new Date(Date.now() + 365 * 86400000).toISOString(),
        last_modified: new Date().toISOString(),
        created_at: sub.created_at,
      });
    }
    saveSeedDb();
    return qt;
  }

  // Policies
  if (p === '/api/policies' && method === 'GET') {
    const items = db.policies.slice().sort((a, b) =>
      new Date(b.last_modified || b.created_at) - new Date(a.last_modified || a.created_at));
    return { items, total: items.length, page: 1, per_page: items.length };
  }
  m = p.match(/^\/api\/policies\/([^\/]+)$/);
  if (m && method === 'GET') {
    const pol = db.policies.find(x => x.id === m[1]);
    if (!pol) throw new Error('Policy not found');
    return pol;
  }

  // Documents (always empty in seed mode)
  if (p === '/api/documents' && method === 'GET') {
    return { items: [], total: 0, page: 1, per_page: 25 };
  }

  // Products
  if (p === '/api/products' && method === 'GET') {
    return { items: db.products };
  }

  // Anything not handled — let it through to real backend (login, config, etc.)
  return null;
}

// Predicate: does this path go through the seed layer at all?
function seedHandlesPath(path) {
  const p = path.split('?')[0];
  return p === '/api/submissions' ||
    p.startsWith('/api/submissions/') ||
    p === '/api/quotes' ||
    p.startsWith('/api/quotes/') ||
    p === '/api/policies' ||
    p.startsWith('/api/policies/') ||
    p === '/api/documents' ||
    p === '/api/products';
}

// ─── Login canvas backdrop ───────────────────────────────────────────
// Animated node-network on the navy left panel, in the spirit of the
// website hero. Quiet field of muted points drifting on slow vectors,
// connecting via thin lines when within range, with a small set of
// accent nodes pulsing in brand blue as visual punctuation. Sized to
// the parent panel (not the viewport) so it cooperates with the 1.1fr
// grid column. DPR-aware. Respects prefers-reduced-motion.
function mountLoginCanvas(host) {
  const canvas = document.createElement('canvas');
  canvas.className = 'login-canvas';
  canvas.setAttribute('aria-hidden', 'true');
  host.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Tunables — kept here so they're easy to nudge.
  const NODE_DENSITY = 0.00018;     // doubled vs old version because nodes
                                     // outside the chevron are clipped away,
                                     // so we need more of them to keep the
                                     // visible chevron area populated.
  const ACCENT_RATIO = 0.12;
  const LINK_DIST = 150;
  const LINK_DIST_SQ = LINK_DIST * LINK_DIST;
  const SPEED = 0.12;
  const PULSE_PERIOD = 4200;

  // Colors. Chevron polygons render in brand blue (#6797EE) and deeper
  // blue (#2F5FB8). White at low alpha reads on both — same logic as
  // when the whole panel was brand-blue. Default nodes stay muted
  // blue-gray; on the cream paper around the chevron these would also
  // read fine but they're clipped away by the chevron mask anyway.
  const LINE_RGB = '255, 255, 255';
  const NODE_RGB = '184, 196, 217';
  const ACCENT_RGB = '255, 255, 255';

  // Chevron polygon coordinates in viewBox space (matches loginLeft()).
  // Used both to build the canvas clip path and to bias node spawning.
  const CHEVRON_VBOX = { w: 1100, h: 911 };
  const CHEVRON_POLYS = [
    [[1100,911],[559.2,0],[559.2,213.4],[908.6,802.1]],
    [[0,911],[191.4,802.1],[540.8,213.5],[540.8,0]],
    [[271.7,756.3],[540.8,603.2],[540.8,319.6]],
    [[828.3,756.3],[559.2,319.6],[559.2,603.2]],
  ];

  let nodes = [];
  let width = 0, height = 0, dpr = 1;
  let chevronScale = 0;             // scale factor: viewBox-units → canvas-px
  let chevronWidth = 0;             // width of chevron in canvas px (for spawn)
  let rafId = null;
  let startTs = performance.now();

  function rebuildNodes() {
    // Spawn within the chevron's pixel bbox rather than the whole canvas.
    // Anything outside gets clipped, so spawning there is wasted work.
    // Density is computed against the chevron area to keep visible
    // populations consistent regardless of viewport width.
    const chevronArea = chevronWidth * height;
    const target = Math.max(20, Math.round(chevronArea * NODE_DENSITY));
    nodes = [];
    for (let i = 0; i < target; i++) {
      const angle = Math.random() * Math.PI * 2;
      nodes.push({
        x: Math.random() * chevronWidth,
        y: Math.random() * height,
        vx: Math.cos(angle) * SPEED * (0.5 + Math.random()),
        vy: Math.sin(angle) * SPEED * (0.5 + Math.random()),
        accent: Math.random() < ACCENT_RATIO,
        phase: Math.random() * PULSE_PERIOD,
      });
    }
  }

  function resize() {
    const rect = host.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = rect.width;
    height = rect.height;
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // Chevron is height-100% with preserved aspect, anchored top-left.
    // So scale = canvas height / viewBox height; chevron pixel width
    // follows from viewBox aspect.
    chevronScale = height / CHEVRON_VBOX.h;
    chevronWidth = CHEVRON_VBOX.w * chevronScale;
    rebuildNodes();
  }

  // Build a Path2D matching the chevron polygons in current canvas pixel
  // space. Rebuilt each frame because it's cheap and avoids stale state
  // after resize. Used as a clip region so the network only renders
  // inside the chevron silhouette.
  function buildChevronClip() {
    const path = new Path2D();
    for (const poly of CHEVRON_POLYS) {
      for (let i = 0; i < poly.length; i++) {
        const [vx, vy] = poly[i];
        const px = vx * chevronScale;
        const py = vy * chevronScale;
        if (i === 0) path.moveTo(px, py);
        else path.lineTo(px, py);
      }
      path.closePath();
    }
    return path;
  }

  function draw(ts) {
    const elapsed = ts - startTs;
    ctx.clearRect(0, 0, width, height);

    // Step 1: advance positions, wrap at edges of the chevron bbox.
    // Wrapping at the chevron bbox (not the full canvas) keeps node
    // population concentrated where the clip will let it render.
    for (const n of nodes) {
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < -10) n.x = chevronWidth + 10;
      else if (n.x > chevronWidth + 10) n.x = -10;
      if (n.y < -10) n.y = height + 10;
      else if (n.y > height + 10) n.y = -10;
    }

    // Step 2: clip to chevron silhouette, then draw network. save/restore
    // so the clip doesn't persist into the next frame.
    ctx.save();
    ctx.clip(buildChevronClip());

    // Lines first so node dots sit on top.
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const distSq = dx * dx + dy * dy;
        if (distSq > LINK_DIST_SQ) continue;
        const dist = Math.sqrt(distSq);
        const alpha = (1 - dist / LINK_DIST) * 0.22;
        ctx.strokeStyle = `rgba(${LINE_RGB}, ${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    for (const n of nodes) {
      if (n.accent) {
        const t = ((elapsed + n.phase) % PULSE_PERIOD) / PULSE_PERIOD;
        const pulse = 0.45 + 0.55 * (0.5 - 0.5 * Math.cos(t * Math.PI * 2));
        ctx.fillStyle = `rgba(${ACCENT_RGB}, ${0.55 * pulse + 0.25})`;
        ctx.beginPath();
        ctx.arc(n.x, n.y, 1.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = `rgba(${ACCENT_RGB}, ${0.18 * pulse})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(n.x, n.y, 5 + pulse * 3, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        ctx.fillStyle = `rgba(${NODE_RGB}, 0.5)`;
        ctx.beginPath();
        ctx.arc(n.x, n.y, 1.3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
    rafId = requestAnimationFrame(draw);
  }

  function start() {
    resize();
    if (reduceMotion) {
      // Single static frame, no loop
      draw(performance.now());
      cancelAnimationFrame(rafId);
      rafId = null;
      return;
    }
    rafId = requestAnimationFrame(draw);
  }

  // ResizeObserver tracks the panel itself (not just the viewport),
  // which matters because the login-left column responds to the grid
  // breakpoint at 900px and any sidebar width changes.
  const ro = new ResizeObserver(() => {
    resize();
    if (reduceMotion) draw(performance.now());
  });
  ro.observe(host);

  // Pause when the tab is hidden — saves a meaningful chunk of CPU
  // for a page that often sits open in a background tab.
  const visHandler = () => {
    if (document.hidden) {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
    } else if (!reduceMotion && rafId === null) {
      rafId = requestAnimationFrame(draw);
    }
  };
  document.addEventListener('visibilitychange', visHandler);

  start();

  // Return a cleanup handle in case we ever route away from login
  // without a full page reload (currently we don't — login uses
  // location.reload — but better to be tidy than leak a RAF loop).
  return () => {
    if (rafId) cancelAnimationFrame(rafId);
    ro.disconnect();
    document.removeEventListener('visibilitychange', visHandler);
    canvas.remove();
  };
}

function loginLeft() {
  // Full Altruis chevron icon, rendered as inline SVG so its proper
  // aspect ratio (1.21:1, slightly wider than tall) is preserved by
  // the viewBox regardless of viewport dimensions. Four polygons:
  //   - Two outer strokes in brand blue (the chevron's wings)
  //   - Two inner triangles in deeper brand blue (the duo-tone depth
  //     pieces inside each wing)
  // Coordinates lifted directly from the icon SVG, with the bounding
  // box translated to origin (was x∈[200,1300] y∈[294.5,1205.5]).
  // SVG anchored top-left of the shell, height 100% of viewport, width
  // auto — preserves the icon's geometry crisp at any aspect ratio.
  // <svg> requires the XML namespace, hence createElementNS.
  //
  // Network animation canvas mounts onto the shell as a sibling, sized
  // to the full shell. The canvas's draw loop clips to the chevron
  // polygons each frame so the network only renders inside the icon
  // silhouette — see mountLoginCanvas.
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('class', 'login-chevron');
  svg.setAttribute('viewBox', '0 0 1100 911');
  svg.setAttribute('preserveAspectRatio', 'xMinYMid meet');
  svg.setAttribute('aria-hidden', 'true');

  const polys = [
    { points: '1100,911 559.2,0 559.2,213.4 908.6,802.1',  fill: '#6797EE' },
    { points: '0,911 191.4,802.1 540.8,213.5 540.8,0',     fill: '#6797EE' },
    { points: '271.7,756.3 540.8,603.2 540.8,319.6',       fill: '#2F5FB8' },
    { points: '828.3,756.3 559.2,319.6 559.2,603.2',       fill: '#2F5FB8' },
  ];
  for (const p of polys) {
    const poly = document.createElementNS(NS, 'polygon');
    poly.setAttribute('points', p.points);
    poly.setAttribute('fill', p.fill);
    svg.appendChild(poly);
  }

  // Defer canvas mount so the SVG (and its parent shell) are in the
  // DOM with a measurable bounding rect before the canvas tries to
  // size itself. parentElement at this point is the login-shell.
  queueMicrotask(() => {
    const shell = svg.parentElement;
    if (shell) mountLoginCanvas(shell);
  });

  return svg;
}

function loginRight() {
  const form = { email: '', password: '', loading: false, error: null };
  const card = el('div', { className: 'login-card' });

  const rerender = () => {
    card.innerHTML = '';
    card.appendChild(el('h2', {}, 'Sign in to your portal'));
    card.appendChild(el('p', { className: 'lead' }, 'Access your agency’s submissions, quotes, and policies.'));

    const fEl = el('form', {
      onSubmit: async (e) => {
        e.preventDefault();
        form.loading = true; form.error = null; rerender();
        try {
          const res = await api('/api/auth/login', {
            method: 'POST',
            body: { email: form.email, password: form.password },
            silent: true,
          });
          state.user = res.user;
          state.env = res.environment;
          render();
          setTimeout(loadView, 0);
        } catch (e) {
          form.loading = false;
          form.error = e.message;
          rerender();
        }
      }
    },
      el('div', { className: 'field' },
        el('label', {}, 'Email'),
        el('input', { type: 'email', required: true, autofocus: true,
          placeholder: 'you@agency.com',
          value: form.email, onInput: (e) => { form.email = e.target.value; } })),
      el('div', { className: 'field' },
        el('label', {}, 'Password'),
        el('input', { type: 'password', required: true, placeholder: '••••••••',
          value: form.password, onInput: (e) => { form.password = e.target.value; } })),
      form.error ? el('div', { className: 'login-err' }, form.error) : null,
      el('button', { type: 'submit', disabled: form.loading },
        form.loading ? 'Signing in' : 'Sign in'));
    card.appendChild(fEl);

    if (state.env === 'mock') {
      card.appendChild(el('div', { className: 'login-hint' },
        el('strong', { style: { color: 'var(--ink)' } }, 'Demo accounts'),
        el('div', { style: { marginTop: '8px' } },
          'Try ', el('code', {}, 'jane.broker@acmesurplus.com'),
          '. Any password works in mock mode.')));
    }

    setTimeout(() => {
      const first = card.querySelector('input');
      if (first && !form.loading) first.focus();
    }, 0);
  };

  rerender();
  return el('div', { className: 'login-right' }, card);
}

function viewRouter() {
  switch (state.view) {
    case 'dashboard': return dashboardView();
    case 'submissions': return state.subView ? submissionDetailView() : submissionsListView();
    case 'quotes': return state.subView ? quoteDetailView() : quotesListView();
    case 'policies': return state.subView ? policyDetailView() : policiesListView();
    case 'documents': return documentsView();
    case 'new-submission': return newSubmissionView();
    default: return dashboardView();
  }
}

async function loadView() {
  try {
    if (state.view === 'submissions' && !state.subView) {
      state.submissions.loading = true; render();
      const res = await api('/api/submissions?per_page=50');
      state.submissions = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'quotes' && !state.subView) {
      state.quotes.loading = true; render();
      const res = await api('/api/quotes?per_page=50');
      state.quotes = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'policies' && !state.subView) {
      state.policies.loading = true; render();
      const res = await api('/api/policies?per_page=50');
      state.policies = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'documents') {
      state.documents.loading = true; render();
      const res = await api('/api/documents?per_page=50');
      state.documents = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'dashboard') {
      const [subs, quotes, pols, docs] = await Promise.all([
        api('/api/submissions?per_page=50').catch(() => ({ items: [], total_items: 0 })),
        api('/api/quotes?per_page=50').catch(() => ({ items: [], total_items: 0 })),
        api('/api/policies?per_page=50').catch(() => ({ items: [], total_items: 0 })),
        api('/api/documents?per_page=50').catch(() => ({ items: [], total_items: 0 })),
      ]);
      state.submissions = { loading: false, items: subs.items || [], total: subs.total_items || 0 };
      state.quotes = { loading: false, items: quotes.items || [], total: quotes.total_items || 0 };
      state.policies = { loading: false, items: pols.items || [], total: pols.total_items || 0 };
      state.documents = { loading: false, items: docs.items || [], total: docs.total_items || 0 };
      render();
    }
  } catch (e) { /* toast shown */ }
}

// DASHBOARD
// ═════════════════════════════════════════════════════════════════
function dashboardView() {
  const subs = state.submissions.items || [];
  const quotes = state.quotes.items || [];
  const policies = state.policies.items || [];

  // ── Pipeline counts (always over the full set, not filtered) ───────
  const total = subs.length;
  const drafts = subs.filter(s => s.status === 'Incomplete').length;
  const inUw = subs.filter(s => s.status === 'Submitted' || s.status === 'Pending').length;
  const declined = subs.filter(s => s.status === 'Declined').length;

  // ── Greeting (compact: no subgreeting; the page itself shows what
  //    the pipeline looks like) ───────────────────────────────────────
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const firstName = (state.user.name || state.user.email || 'Broker').split(' ')[0]
    .replace(/\d+$/, '');  // strip trailing digits ("Jasonbeneducci2" → "Jasonbeneducci")

  return el('div', { className: 'dashboard' },
    // Compact header — greeting on left, search on right. The "New
    // submission" button has moved to the persistent sidebar CTA, so
    // it doesn't need to appear here too.
    el('div', { className: 'dashboard-header' },
      el('div', { className: 'dashboard-header-left' },
        el('h1', { className: 'dashboard-greeting' }, `${greeting}, ${firstName}.`)),
      el('div', { className: 'dashboard-header-actions' },
        renderHeaderSearch(subs))),

    // Thin pipeline strip — total + segmented bar + scope toggle.
    // Replaces the heavier pipeline-panel which dominated the page.
    renderPipelineStrip(total, { drafts, inUw, declined }),

    // Unified activity list — replaces both the "Needs your attention"
    // panel and the separate "Recent activity" list. The broker
    // toggles between cohorts via filter chips.
    renderActivitySection(subs, quotes, policies)
  );
}

// ─── Pipeline strip ──────────────────────────────────────────────────
function renderPipelineStrip(total, { drafts, inUw, declined }) {
  if (total === 0) {
    // Special case — empty book. Don't render the strip; the
    // activity section will show a useful empty state instead.
    return null;
  }
  const draftPct = (drafts / total) * 100;
  const uwPct = (inUw / total) * 100;
  const declinedPct = (declined / total) * 100;
  const otherPct = Math.max(0, 100 - draftPct - uwPct - declinedPct);

  return el('div', { className: 'pipeline-strip' },
    el('div', { className: 'pipeline-strip-total' },
      el('span', { className: 'pipeline-strip-total-num' }, String(total)),
      el('span', { className: 'pipeline-strip-total-label' },
        total === 1 ? 'submission' : 'submissions')),
    el('div', { className: 'pipeline-strip-bar', title: 'Pipeline composition' },
      drafts ? el('span', { className: 'pipeline-strip-bar-draft', style: { flex: String(draftPct) } }) : null,
      inUw ? el('span', { className: 'pipeline-strip-bar-uw', style: { flex: String(uwPct) } }) : null,
      declined ? el('span', { className: 'pipeline-strip-bar-declined', style: { flex: String(declinedPct) } }) : null,
      otherPct > 0 ? el('span', { style: { flex: String(otherPct), background: 'var(--line-2, var(--line))' } }) : null),
    el('div', { className: 'pipeline-strip-legend' },
      drafts ? el('span', { className: 'pipeline-strip-legend-item' },
        el('span', { className: 'pipeline-strip-legend-dot draft' }),
        `${drafts} draft${drafts === 1 ? '' : 's'}`) : null,
      inUw ? el('span', { className: 'pipeline-strip-legend-item' },
        el('span', { className: 'pipeline-strip-legend-dot uw' }),
        `${inUw} awaiting quote`) : null,
      declined ? el('span', { className: 'pipeline-strip-legend-item' },
        el('span', { className: 'pipeline-strip-legend-dot declined' }),
        `${declined} declined`) : null),
    el('div', { className: 'pipeline-strip-scope' }, renderScopeToggle())
  );
}

// ─── Activity section (chip filters + unified list) ──────────────────
function renderActivitySection(subs, quotes, policies) {
  // The lane logic from computeAttentionLanes still drives "what needs
  // attention" — but instead of rendering as a separate panel, we use
  // the lane categorization to filter the unified activity list.
  const lanes = computeAttentionLanes(subs, quotes, policies);

  // Identify the IDs of submissions whose quotes are ready for review.
  const readyQuoteSubIds = new Set(
    (quotes || [])
      .filter(q =>
        q.status === 'QuotePublished' ||
        q.status === 'BinderPublished' ||
        q.status === 'QuoteIndication'
      )
      .map(q => q.submission_id)
  );

  // Cohorts:
  //   attention = drafts + submissions with ready quotes (the union of
  //               "you owe us something" and "we've returned a quote")
  //   awaiting  = submissions sitting with the underwriter
  //   recent    = recently bound (last 60 days) — the "good news" tab
  //   declined  = recently declined
  //   all       = everything, sorted by recency
  const subsAttention = subs.filter(s =>
    s.status === 'Incomplete' || readyQuoteSubIds.has(s.id) || readyQuoteSubIds.has(s.unique_id)
  );
  const subsAwaiting = subs.filter(s =>
    (s.status === 'Submitted' || s.status === 'Pending')
    && !readyQuoteSubIds.has(s.id) && !readyQuoteSubIds.has(s.unique_id)
  );
  const sixtyDaysAgo = Date.now() - 60 * 24 * 60 * 60 * 1000;
  const subsRecent = subs.filter(s =>
    s.bound_at && new Date(s.bound_at).getTime() >= sixtyDaysAgo
  );
  const subsDeclined = subs.filter(s => s.status === 'Declined');

  const cohorts = {
    attention: subsAttention,
    awaiting:  subsAwaiting,
    recent:    subsRecent,
    declined:  subsDeclined,
    all:       subs,
  };

  // Default tab — if "attention" is empty but other things exist,
  // fall through to "all" so the broker isn't staring at an empty list.
  let tab = state.dashboard.activityTab;
  if (tab === 'attention' && cohorts.attention.length === 0 && subs.length > 0) {
    tab = 'all';
  }

  const items = [...cohorts[tab]]
    .sort((a, b) => new Date(b.modified_at || b.created_at || 0) - new Date(a.modified_at || a.created_at || 0))
    .slice(0, 12);

  const chips = [
    { value: 'attention', label: 'Needs action',     count: cohorts.attention.length },
    { value: 'awaiting',  label: 'Awaiting quote',   count: cohorts.awaiting.length },
    { value: 'recent',    label: 'Recently bound',   count: cohorts.recent.length },
    { value: 'declined',  label: 'Declined',         count: cohorts.declined.length },
    { value: 'all',       label: 'All',              count: cohorts.all.length },
  ];

  return el('div', { className: 'activity-section' },
    el('div', { className: 'activity-section-head' },
      el('div', { className: 'activity-chips' },
        ...chips.map(c => el('button', {
          className: 'activity-chip' + (c.value === tab ? ' active' : ''),
          onClick: () => { state.dashboard.activityTab = c.value; render(); },
        },
          c.label,
          el('span', { className: 'activity-chip-count' }, String(c.count))
        ))),
      el('div', { className: 'activity-section-aux' },
        el('button', {
          className: 'btn btn-ghost btn-sm',
          onClick: () => { state.view = 'submissions'; render(); loadView(); },
        }, 'View all \u2192'))),

    items.length === 0
      ? el('div', { className: 'activity-empty' },
          el('div', { className: 'activity-empty-title' },
            tab === 'attention' ? 'You\u2019re all caught up.' : 'Nothing to show in this view.'),
          el('div', { className: 'activity-empty-body' },
            tab === 'attention'
              ? 'No drafts in progress and no quotes waiting on your review.'
              : 'Try a different filter, or start a new submission.'))
      : el('div', { className: 'activity-list' },
          ...items.map(s => recentSubmissionRow(s))));
}

// ─── Header search bar ───────────────────────────────────────────────

  return el('div', { className: 'header-search' },
    el('div', { className: 'header-search-input-wrap' },
      el('span', { className: 'header-search-icon' }, searchIconSvg()),
      el('input', {
        type: 'search',
        className: 'header-search-input',

      ? el('div', { className: 'header-search-results' },

function searchIconSvg() {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 24 24');
  svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor');
  svg.setAttribute('stroke-width', '1.7');
  svg.setAttribute('stroke-linecap', 'round');
  const c = document.createElementNS(ns, 'circle');
  c.setAttribute('cx', '11'); c.setAttribute('cy', '11'); c.setAttribute('r', '7');
  const l = document.createElementNS(ns, 'line');
  l.setAttribute('x1', '20'); l.setAttribute('y1', '20');
