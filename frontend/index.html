// Match a field to a line.fieldCodes / line.statusCode / line.detailCodes
// entry, accounting for the namespace prefix Joshu uses (e.g. `app.cyber_status`
// matches `cyber_status`). Case-insensitive.
function fieldMatchesCode(field, candidateCode) {
  if (!field || !field.code || !candidateCode) return false;
  const tail = field.code.split('.').pop().toLowerCase();
  return tail === candidateCode.toLowerCase();
}

// Find a field in a fields array by its tail code.
function findFieldByTail(fields, tailCode) {
  return fields.find(f => fieldMatchesCode(f, tailCode));
}

// Get the current "live" boolean value of a status field, considering
// any pending dirty edit. Returns true/false.
function liveBoolValue(field) {
  if (!field) return false;
  const dirty = state.submissionDirty[field.code];
  const raw = dirty !== undefined ? dirty : unwrapForInput(field.value);
  if (typeof raw === 'boolean') return raw;
  if (raw === 1 || raw === '1' || raw === 'true' || raw === 'Yes') return true;
  return false;
}

function renderCoverageLinesBody(section, fields, isEditing) {
  // Bucket every field into a line (or "uncategorized"). Track which
  // fields haven't been claimed by any line so we can surface them at
  // the bottom in case Joshu adds new fields we didn't anticipate.
  const claimed = new Set();
  const linesWithFields = COVERAGE_LINES.map(line => {
    const lineFields = [];
    const codesToCheck = [
      ...(line.fieldCodes || []),
      ...(line.statusCode ? [line.statusCode] : []),
      ...(line.detailCodes || []),
    ];
    for (const code of codesToCheck) {
      const f = findFieldByTail(fields, code);
      if (f && !claimed.has(f.code)) {
        lineFields.push(f);
        claimed.add(f.code);
      }
    }
    // Coverage extensions — separate bucket so the read/edit renderer
    // can present them as a labeled subsection within the line card.
    const extensionFields = [];
    for (const code of (line.extensionCodes || [])) {
      const f = findFieldByTail(fields, code);
      if (f && !claimed.has(f.code)) {
        extensionFields.push(f);
        claimed.add(f.code);
      }
    }
    return { ...line, fields: lineFields, extensionFields };
  });

  // Anything left over (visible but unclaimed) — render as a fallback
  // section so we don't silently lose fields.
  const orphans = fields.filter(f =>
    f.visible !== false &&
    !claimed.has(f.code)
  );

  // Render
  return el('div', { className: 'coverage-lines-body' },
    // Standard coverages section
    el('div', { className: 'coverage-section coverage-section-standard' },
      el('div', { className: 'coverage-section-head' },
        el('div', { className: 'coverage-section-title' }, 'Standard Coverages'),
        el('div', { className: 'coverage-section-subtitle' },
          'Always part of your policy')),
      ...linesWithFields
        .filter(l => l.standard)
        .map(l => renderCoverageLineCard(l, isEditing))),

    // Optional add-ons section
    el('div', { className: 'coverage-section coverage-section-optional' },
      el('div', { className: 'coverage-section-head' },
        el('div', { className: 'coverage-section-title' }, 'Optional Add-ons'),
        el('div', { className: 'coverage-section-subtitle' },
          isEditing
            ? 'Choose which additional coverages to include'
            : 'Additional coverages on this submission')),
      ...linesWithFields
        .filter(l => !l.standard)
        .map(l => renderCoverageLineCard(l, isEditing))),

    // Orphan fields (defensive — shows up if Joshu adds fields we don't map)
    orphans.length > 0
      ? el('div', { className: 'coverage-section coverage-section-other' },
          el('div', { className: 'coverage-section-head' },
            el('div', { className: 'coverage-section-title' }, 'Other Coverage Fields'),
            el('div', { className: 'coverage-section-subtitle' },
              'These fields aren\u2019t yet grouped into a coverage line.')),
          el('div', { className: 'form-grid coverage-orphan-grid' },
            ...orphans.map(f => renderFormField(f, isEditing))))
      : null);
}

function renderCoverageLineCard(line, isEditing) {
  if (line.standard) {
    return renderStandardCoverageCard(line, isEditing);
  }
  return renderAddOnCoverageCard(line, isEditing);
}

// Standard coverage card — always expanded, shows all sublimits.
// Property and General Liability use this.
function renderStandardCoverageCard(line, isEditing) {
  const extensionFields = line.extensionFields || [];
  const hasFields = line.fields.length > 0;
  const hasExtensions = extensionFields.length > 0;

  if (!hasFields && !hasExtensions) {
    // No fields mapped from Joshu — render an informational placeholder
    return el('div', { className: 'coverage-card coverage-card-standard' },
      el('div', { className: 'coverage-card-head' },
        el('div', { className: 'coverage-card-title' }, line.label),
        el('div', { className: 'coverage-card-pill coverage-card-pill-standard' }, 'Standard')),
      el('div', { className: 'coverage-card-empty' },
        line.description || 'No fields configured.'));
  }

  // Build the body — main sublimits, then (optional) "Coverage extensions"
  // subsection for opt-in increases above standard limits. Both sections
  // share the same render style; the subsection just gets a labeled
  // eyebrow above it to read as a related cluster.
  const bodyChildren = [];
  if (hasFields) {
    bodyChildren.push(
      isEditing
        ? el('div', { className: 'form-grid coverage-card-fields' },
            ...line.fields.map(f => renderFormField(f, true)))
        : renderCoverageReadList(line.fields)
    );
  }
  if (hasExtensions) {
    bodyChildren.push(
      el('div', { className: 'coverage-extensions' },
        el('div', { className: 'coverage-extensions-head' },
          el('div', { className: 'coverage-extensions-eyebrow' }, 'Coverage Extensions'),
          el('div', { className: 'coverage-extensions-subtitle' },
            'Optional increases above standard limits')),
        isEditing
          ? el('div', { className: 'form-grid coverage-card-fields' },
              ...extensionFields.map(f => renderFormField(f, true)))
          : renderCoverageReadList(extensionFields))
    );
  }

  return el('div', { className: 'coverage-card coverage-card-standard' },
    el('div', { className: 'coverage-card-head' },
      el('div', { className: 'coverage-card-title-block' },
        el('div', { className: 'coverage-card-title' }, line.label),
        line.description
          ? el('div', { className: 'coverage-card-subtitle' }, line.description)
          : null),
      el('div', { className: 'coverage-card-pill coverage-card-pill-standard' }, 'Standard')),
    ...bodyChildren);
}

// Add-on coverage card — collapses when status=false, expands when true.
// Includes the status toggle and any detail fields.
function renderAddOnCoverageCard(line, isEditing) {
  // Find the status field (e.g. cyber_status)
  const statusField = line.statusCode
    ? line.fields.find(f => fieldMatchesCode(f, line.statusCode))
    : null;
  const isIncluded = statusField ? liveBoolValue(statusField) : false;

  // Detail fields (anything in the line that isn't the status field)
  const detailFields = line.fields.filter(f => f !== statusField);

  // ── READ MODE ────────────────────────────────────────
  if (!isEditing) {
    return el('div', {
      className: `coverage-card coverage-card-addon ${isIncluded ? 'is-included' : 'is-excluded'}`
    },
      el('div', { className: 'coverage-card-head' },
        el('div', { className: 'coverage-card-title-block' },
          el('div', { className: 'coverage-card-title-row' },
            el('span', { className: `coverage-card-bullet ${isIncluded ? 'is-included' : 'is-excluded'}` }),
            el('div', { className: 'coverage-card-title' }, line.label)),
          line.description
            ? el('div', { className: 'coverage-card-subtitle' }, line.description)
            : null),
        el('div', {
          className: `coverage-card-pill ${isIncluded ? 'coverage-card-pill-included' : 'coverage-card-pill-excluded'}`
        }, isIncluded ? 'Included' : 'Not added')),
      isIncluded && detailFields.length > 0
        ? renderCoverageReadList(detailFields)
        : null);
  }

  // ── EDIT MODE ────────────────────────────────────────
  return el('div', {
    className: `coverage-card coverage-card-addon ${isIncluded ? 'is-included' : 'is-excluded'}`
  },
    el('div', { className: 'coverage-card-head' },
      el('div', { className: 'coverage-card-title-block' },
        el('div', { className: 'coverage-card-title-row' },
          el('span', { className: `coverage-card-bullet ${isIncluded ? 'is-included' : 'is-excluded'}` }),
          el('div', { className: 'coverage-card-title' }, line.label)),
        line.description
          ? el('div', { className: 'coverage-card-subtitle' }, line.description)
          : null),
      // Add / Remove button
      statusField
        ? el('button', {
            className: isIncluded ? 'btn-coverage-remove' : 'btn-coverage-add',
            onClick: () => toggleCoverageLine(line, !isIncluded),
          }, isIncluded ? 'Remove' : '+ Add')
        : null),
    // Detail fields appear only when included
    isIncluded && detailFields.length > 0
      ? el('div', { className: 'form-grid coverage-card-fields' },
          ...detailFields.map(f => renderFormField(f, true)))
      : null);
}

// Toggle a coverage line on/off. Sets the status field's dirty value
// and (when adding) populates default values for the detail fields.
function toggleCoverageLine(line, turnOn) {
  if (!line.statusCode) return;
  // Find the status field's full code (e.g. "app.cyber_status")
  const allFields = state.submissionForm?.fields || [];
  const statusField = allFields.find(f => fieldMatchesCode(f, line.statusCode));
  if (!statusField) return;

  state.submissionDirty[statusField.code] = turnOn;

  if (turnOn && line.defaultOnAdd) {
    // Populate any default sub-field values, BUT only if they're not
    // already set (avoid clobbering an existing value).
    for (const [tail, defaultVal] of Object.entries(line.defaultOnAdd)) {
      const detailField = allFields.find(f => fieldMatchesCode(f, tail));
      if (!detailField) continue;
      const currentlySet = unwrapForInput(detailField.value);
      const dirtySet = state.submissionDirty[detailField.code];
      // Only set the default if neither the current value nor a dirty
      // value is already populated. This prevents overwriting prior data
      // when the broker toggles off then on again.
      if (!currentlySet && dirtySet === undefined) {
        state.submissionDirty[detailField.code] = defaultVal;
      }
    }
  } else if (!turnOn) {
    // When removing a coverage, ALSO clear its detail fields so they
    // don't show up on the resulting quote with stale values. Setting
    // them to '' / null tells Joshu to clear the data point.
    for (const tail of (line.detailCodes || [])) {
      const detailField = allFields.find(f => fieldMatchesCode(f, tail));
      if (!detailField) continue;
      state.submissionDirty[detailField.code] = null;
    }
  }

  scheduleAutoSave();
  render();
}

// Read-mode list — quote-document style with dotted leader between
// each label and its value. Mirrors the look of the LIMITS page in
// the Altruis quote PDF.
// Field-level display overrides for the Limits and Coverages section.
// Lets us tweak the label or value formatting without touching how the
// underlying data is stored or sent to Joshu. Each entry is keyed by
// the lowercased final segment of the field code (e.g. "cgll_limit"
// matches "app.CGLL_limit"). Both label and formatter are optional.
//
// Why this exists: Joshu stores label text auto-generated from code
// (e.g. "Cgll Limit"), and value strings in compact slash format
// ("$1,000,000 / $2,000,000 / $2,000,000"). The quote document uses
// readable labels and prose-form values. This map bridges the two.
const COVERAGE_FIELD_OVERRIDES = {
  'cgll_limit': {
    label: 'CGLL Limit',
    formatter: formatPerOccurrenceFixedMillionAggregate,
  },
  'sdll_limit': {
    label: 'SDLL Limit',
    formatter: formatPerOccurrenceFixedMillionAggregate,
  },
  'gl_limits': {
    label: 'GL Limits',
    formatter: formatGLLimits,
  },
  // Joshu auto-labels these from the field code, producing
  // "Increased Gatesandfences" / "Increased Treesandshrubs" — fix
  // the spacing and append "Limit" so the labels read naturally.
  'increased_signs': {
    label: 'Increased Signs Limit',
  },
  'increased_gatesandfences': {
    label: 'Increased Gates and Fences Limit',
  },
  'increased_treesandshrubs': {
    label: 'Increased Trees and Shrubs Limit',
  },
};

// SDLL / CGLL — broker chooses an occurrence limit; aggregate is
// always $1,000,000 in Altruis's product. So a stored value of
// "$100,000" displays as "$100,000 per occurrence / $1,000,000 aggregate".
function formatPerOccurrenceFixedMillionAggregate(rawValue) {
  if (rawValue === null || rawValue === undefined || rawValue === '') return '\u2014';
  const occ = String(rawValue).trim();
  return `${occ} per occurrence / $1,000,000 aggregate`;
}

// GL Limits — Joshu stores three slash-separated numbers:
//   "$1,000,000 / $2,000,000 / $2,000,000"
// representing Each Occurrence / Annual Aggregate / Products & Completed.
// We display only the first two as prose, dropping the third (which is
// derived from the package the broker picks, not chosen separately).
function formatGLLimits(rawValue) {
  if (rawValue === null || rawValue === undefined || rawValue === '') return '\u2014';
  const parts = String(rawValue).split('/').map(s => s.trim()).filter(Boolean);
  if (parts.length >= 2) {
    return `${parts[0]} per occurrence / ${parts[1]} aggregate`;
  }
  // If the value isn't in the expected slash format, fall back to raw.
  return String(rawValue);
}

// Get the override entry for a field, if any.
function coverageFieldOverride(field) {
  if (!field || !field.code) return null;
  const tail = field.code.split('.').pop().toLowerCase();
  return COVERAGE_FIELD_OVERRIDES[tail] || null;
}

function renderCoverageReadList(fields) {
  const populated = fields.filter(f => hasValue(f));
  if (populated.length === 0) {
    return el('div', { className: 'coverage-card-empty-detail' },
      'No values configured for this coverage.');
  }
  return el('div', { className: 'coverage-readlist' },
    ...populated.map(f => {
      const override = coverageFieldOverride(f);
      const label = override?.label || f.label;
      const rawValue = unwrapForInput(f.value);
      const value = override?.formatter
        ? override.formatter(rawValue)
        : formatByType(f, rawValue);
      return el('div', { className: 'coverage-readlist-row' },
        el('div', { className: 'coverage-readlist-label' }, label),
        el('div', { className: 'coverage-readlist-leader' }),
        el('div', { className: 'coverage-readlist-value' }, value));
    }));
}

// Same as partitionAssetFields, but pre-filtered to populated fields only.
// Returns { bools: [populated booleans], main: [populated non-booleans] }.
function partitionPopulatedFromBools(populated) {
  const main = [];
  const bools = [];
  for (const f of populated) {
    const v = unwrapForInput(f.value);
    if (isBooleanField(f, v)) bools.push(f);
    else main.push(f);
  }
  return { bools, main };
}

// Pick up to N "hero" stats from a field list — prefer monetary values,
// then numeric counts/percentages, then any meaningful number.
function pickHeroStats(fields, max = 4) {
  const scored = fields
    .map(f => ({ f, score: heroScore(f) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score);
  return scored.slice(0, max).map(x => x.f);
}
function heroScore(field) {
  const v = unwrapForInput(field.value);
  if (v === '' || v === null || v === undefined) return 0;
  const code = (field.code || '').toLowerCase();
  const label = (field.label || '').toLowerCase();

  // Highest priority: explicit dollar limits and premiums (the "headline" numbers)
  if (field.type === 'monetary') return 100;
  if (/^\$/.test(String(v))) return 100;  // string starts with $
  if (/limit|premium|sublimit|deductible/i.test(code)) return 95;

  // Counts / percentages
  if (/_count$|count$/i.test(code)) return 70;
  if (/percentage|_percent/i.test(code)) return 60;

  // Plain numerics — only if they're "interesting" (not version numbers, dates, IDs)
  if (typeof v === 'number' || /^-?\d+(\.\d+)?$/.test(String(v).replace(/,/g, ''))) {
    if (/year/i.test(code)) return 30;  // year is mildly interesting
    return 40;
  }
  return 0;  // text fields don't go in hero
}

// Categorize a list of flat (non-asset, non-bool) fields by inferring
// their domain from code patterns. Falls back to "Details" for anything
// that doesn't match. Returns an ordered list of categories with their fields.
function categorizeFlatFields(fields) {
  const cats = {
    identity:    { label: 'Identity',    fields: [], style: 'inline' },
    coverage:    { label: 'Coverage',    fields: [], style: 'list' },
    deductibles: { label: 'Deductibles', fields: [], style: 'list' },
    addons:      { label: 'Add-ons',     fields: [], style: 'list' },
    dates:       { label: 'Dates',       fields: [], style: 'inline' },
    other:       { label: 'Other',       fields: [], style: 'inline' },
  };
  for (const f of fields) {
    const code = (f.code || '').toLowerCase();
    const label = (f.label || '').toLowerCase();

    // Identity-ish: insured name, business structure, NAICS, SIC, FEIN, address
    if (/insured|named_insured|naics|sic|fein|business|address|name$|email|phone|website/i.test(code)) {
      cats.identity.fields.push(f);
    }
    // Coverage limits / sublimits / aggregate / per-occurrence
    else if (/limit|sublimit|aggregate|premium|sales|loss/i.test(code) && f.type !== 'date') {
      cats.coverage.fields.push(f);
    }
    // Deductibles
    else if (/deductible|retention/i.test(code)) {
      cats.deductibles.fields.push(f);
    }
    // Add-ons / coverage extensions
    else if (/cyber|epli|tria|equipment|backup|pollution|backup|stop_loss/i.test(code)) {
      cats.addons.fields.push(f);
    }
    // Dates
    else if (f.type === 'date' || /date|effective|expir/i.test(code)) {
      cats.dates.fields.push(f);
    }
    else {
      cats.other.fields.push(f);
    }
  }
  // Return categories in display order, only those with fields
  return [
    cats.identity,
    cats.dates,
    cats.coverage,
    cats.deductibles,
    cats.addons,
    cats.other,
  ].filter(c => c.fields.length > 0);
}

// Decide which fields go in the main grid vs. the compact bool strip.
// Rule: if a field is boolean-like AND has a value (either truthy or
// explicitly falsy), it goes in the strip. Empty booleans go in the
// main grid so the broker can see that slot needs attention.
function partitionAssetFields(fields) {
  const main = [];
  const bools = [];
  for (const f of fields) {
    const v = unwrapForInput(f.value);
    const hasVal = v !== null && v !== undefined && v !== '';
    if (hasVal && isBooleanField(f, v)) {
      bools.push(f);
    } else {
      main.push(f);
    }
  }
  return { main, bools };
}

// Render one boolean field as a compact chip in the strip.
// Style: "✓ Sprinklered" (green) or "— GL Only" (muted strikethrough).
// The label is the human-readable field name minus any trailing "Status".
function renderBoolChip(field) {
  const v = unwrapForInput(field.value);
  const yes = isTruthyBool(v);
  const rawLabel = field.label || field.code || '';
  // Trim " Status" suffix — redundant in a chip context
  const label = rawLabel.replace(/\s*status\s*$/i, '').trim() || rawLabel;
  return el('div', {
    className: `bool-chip ${yes ? 'yes' : 'no'}`,
    title: rawLabel,
  },
    el('span', { className: 'bool-chip-icon' }, yes ? '✓' : '—'),
    el('span', { className: 'bool-chip-label' }, label));
}

// Right sidebar: compact asset number list, click to scroll + expand.
// `displayLabelOverride` lets the caller provide a hierarchical label
// like "1.2" for a building inside a multi-building location group.
function assetRailItem(section, group, displayLabelOverride) {
  const isDone = group.total > 0 && group.completed === group.total;
  const isOpen = isAssetExpanded(section.code, group.idx);
  const displayLabel = displayLabelOverride != null
    ? displayLabelOverride
    : String(pickAssetDisplayNumber(group));

  return el('button', {
    className: `asset-rail-num-item ${isOpen ? 'active' : ''} ${isDone ? 'done' : ''}`,
    title: `${inferAssetNoun(section, 1)} ${displayLabel}`,
    onClick: () => {
      if (!isAssetExpanded(section.code, group.idx)) {
        toggleAsset(section.code, group.idx);
      }
      render();
      setTimeout(() => {
        const el = document.getElementById(`asset-${section.code}-${group.idx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 60);
    },
  }, displayLabel);
}

function renderFormField(field, isEditing) {
  const displayLabel = field.label || field.code;
  const currentValue = state.submissionDirty[field.code] !== undefined
    ? state.submissionDirty[field.code]
    : field.value;

  // Full-width for addresses and long text; status-flag booleans get a
  // Full-width fields take both columns of the form-grid. Triggers:
  //   • Address/location field types — these are always wide
  //   • field.fullwidth = true on the schema definition (explicit override)
  //   • widget = 'card_picker' or 'card_grid' — these widgets need the
  //     full row to lay out their option cards without cramping
  const isFullWidth = ['location'].includes(field.type) ||
                      field.fullwidth === true ||
                      field.widget === 'card_picker' ||
                      field.widget === 'card_grid' ||
                      (field.code && (field.code.endsWith('.address') || field.code.endsWith('.location')));

  const labelEl = el('label', {},
    displayLabel,
    field.required ? el('span', { className: 'req' }, '*') : null);

  // Same structure in both modes — render the input, lock it if not editing
  const input = renderFieldInput(field, currentValue, !isEditing);
  // The has-error class is applied when the field has a server-side
  // validation_error (returned by Joshu's submission-status). This
  // gives the input itself a red border so the broker can spot the
  // problem from the section level without reading every error message.
  const hasError = !!(field.validation_error && isEditing);
  // The field-extracted class is applied when this field was pre-filled
  // by document extraction. Adds a visual highlight + small "Auto-filled"
  // pill so the broker knows to verify it. Cleared once the broker
  // edits the field (touching submissionDirty drops the highlight) — the
  // edit means "I've reviewed this."
  const isExtracted = state.extractedFields
    && state.extractedFields.has(field.code)
    && state.submissionDirty[field.code] === undefined;
  return el('div', { className:
    `form-field ${isFullWidth ? 'full' : ''} ${isEditing ? 'is-editing' : 'is-locked'} ${hasError ? 'has-error' : ''} ${isExtracted ? 'field-extracted' : ''}`
  },
    labelEl, input,
    hasError ? el('div', { className: 'err-msg' }, field.validation_error) : null);
}

function renderFieldInput(field, value, locked = false) {
  const onChange = locked ? (() => {}) : ((newVal) => {
    state.submissionDirty[field.code] = newVal;
    scheduleAutoSave();
  });

  // If the value is still wrapped (shouldn't happen after backend unwrap
  // but just in case), strip the wrapper for the input
  const cleanValue = unwrapForInput(value);
  const hasValue = cleanValue !== null && cleanValue !== undefined && cleanValue !== '';

  // ── Reliable boolean detection ────────────────────────────
  // Joshu is inconsistent: sometimes `sprinklered_status` comes through as
  // type='boolean' with a JS bool value; sometimes as type='text' with
  // options=[{value:'0',display:'No'},{value:'1',display:'Yes'}]; sometimes
  // as type='number' the same way. We treat all of these as booleans in
  // the UI so they render as chips/toggles, not text boxes.
  const looksLikeBool = isBooleanField(field, cleanValue);

  // ── Empty-value fast path (locked only) ────────────────────
  // In locked mode, ANY field with no value renders as a minimal em-dash.
  // No input boxes, no cream rectangles, no framed empty states.
  // This keeps empty fields from competing visually with populated ones.
  if (locked && !hasValue) {
    return lockedValueEl('');
  }

  // ── Boolean chip/toggle (locked → chip; editing → toggle) ──
  if (looksLikeBool) {
    const checked = isTruthyBool(cleanValue);
    if (locked) {
      return el('div', {
        className: `locked-bool ${checked ? 'yes' : 'no'}`,
      }, checked ? '✓ Yes' : '— No');
    }
    return el('label', { className: 'toggle' },
      el('input', { type: 'checkbox', checked,
        onChange: (e) => onChange(e.target.checked ? '1' : '0') }),
      el('span', { className: 'toggle-switch' }),
      el('span', { className: 'toggle-label' }, checked ? 'Yes' : 'No'));
  }

  // ── Multiselect: array-typed field with options (broker picks 1+)
  // Used by Joshu Array<Text> datapoints like app.building_occupancy.
  // Value is stored as an array of strings. Renders as a horizontal
  // row of toggle-able pill chips — same visual language as the
  // segmented-control pills, but multi-select instead of single-select.
  // A check glyph appears on selected pills to disambiguate from the
  // single-select segmented controls elsewhere on the page.
  if (field.type === 'multiselect' && field.options) {
    const arrayVal = Array.isArray(cleanValue) ? cleanValue : (cleanValue ? [cleanValue] : []);
    if (locked) {
      if (arrayVal.length === 0) return lockedValueEl('');
      return lockedValueEl(arrayVal.join(', '));
    }
    return el('div', { className: 'multiselect-pills' },
      ...field.options.map(opt => {
        const checked = arrayVal.includes(opt.value);
        return el('button', {
          type: 'button',
          className: `multiselect-pill ${checked ? 'active' : ''}`,
          onClick: () => {
            const next = checked
              ? arrayVal.filter(v => v !== opt.value)
              : [...arrayVal, opt.value];
            onChange(next);
          },
        },
          checked ? el('span', { className: 'multiselect-pill-check' }, '\u2713') : null,
          el('span', {}, opt.display || opt.value));
      }));
  }

  // ── Explicit widget overrides ──────────────────────────────
  // Schema can specify `widget` to force a particular UI: 'segmented'
  // (chip row), 'card_picker' (side-by-side cards), 'slider_text' (slider
  // for monotonic text-valued options like "$5,000" / "$10,000"), or
  // 'card_grid' (n-column grid of cards). These render in EDIT mode only;
  // locked mode falls through to the standard locked-value display.
  if (field.options && field.options.length > 0 && !locked) {
    if (field.widget === 'segmented') {
      return el('div', { className: 'segmented' },
        ...field.options.map(opt => el('button', {
          type: 'button',
          className: `segmented-option ${String(cleanValue) === String(opt.value) ? 'active' : ''}`,
          onClick: () => onChange(opt.value),
        }, opt.display || opt.value)));
    }
    if (field.widget === 'card_picker') {
      return el('div', { className: 'card-picker' },
        ...field.options.map(opt => el('button', {
          type: 'button',
          className: `card-picker-option ${String(cleanValue) === String(opt.value) ? 'active' : ''}`,
          onClick: () => onChange(opt.value),
        },
          el('div', { className: 'card-picker-check' }, '\u2713'),
          el('div', { className: 'card-picker-value' }, opt.display || opt.value),
          opt.subtitle ? el('div', { className: 'card-picker-subtitle' }, opt.subtitle) : null)));
    }
    if (field.widget === 'card_grid') {
      return el('div', { className: 'card-grid' },
        ...field.options.map(opt => el('button', {
          type: 'button',
          className: `card-grid-option ${String(cleanValue) === String(opt.value) ? 'active' : ''}`,
          onClick: () => onChange(opt.value),
        },
          opt.icon ? el('div', { className: 'card-grid-icon' }, opt.icon) : null,
          el('div', { className: 'card-grid-label' }, opt.display || opt.value))));
    }
    if (field.widget === 'slider_text') {
      // Slider for text-valued options (e.g. "$5,000", "120 Days").
      // Reuses renderSlider but on a synthesized field where `type` is
      // marked numeric so the slider machinery treats indexes the right way.
      return renderSlider(field, cleanValue, onChange);
    }
  }

  // ── Slider: Number/Monetary with 3+ numeric options
  if (field.options && field.options.length >= 3 &&
      (field.type === 'number' || field.type === 'monetary')) {
    const allNumeric = field.options.every(o => !isNaN(parseFloat(o.value)));
    if (allNumeric) {
      if (locked) {
        const matching = field.options.find(o => String(o.value) === String(cleanValue));
        const displayText = matching?.label || matching?.value || formatByType(field, cleanValue);
        return lockedValueEl(displayText);
      }
      return renderSlider(field, cleanValue, onChange);
    }
  }

  // ── Dropdown: fields with options
  if (field.options && field.options.length > 0) {
    if (locked) {
      const matching = field.options.find(o => String(o.value) === String(cleanValue));
      const displayText = matching?.label || matching?.value || String(cleanValue);
      return lockedValueEl(displayText);
    }
    return el('select', {
      onChange: (e) => onChange(e.target.value || null),
    }, el('option', { value: '' }, '— Select —'),
      ...field.options.map(o => el('option', {
        value: o.value,
        selected: String(cleanValue) === String(o.value),
      }, o.label || o.value)));
  }

  if (field.type === 'date') {
    if (locked) return lockedValueEl(formatByType(field, cleanValue));
    // Sane bounds for broker-entered dates: nothing in the past further
    // than 1 year (covers retroactive endorsements), nothing more than
    // 2 years out (no insurance product covers later than that). Joshu
    // does its own server-side validation; this is a UX guardrail to
    // catch obvious typos like 1947 or 2287 before save.
    const today = new Date();
    const minDate = new Date(today); minDate.setFullYear(today.getFullYear() - 1);
    const maxDate = new Date(today); maxDate.setFullYear(today.getFullYear() + 2);
    return el('input', {
      type: 'date', value: cleanValue || '',
      min: minDate.toISOString().split('T')[0],
      max: maxDate.toISOString().split('T')[0],
      required: field.required || undefined,
      onInput: (e) => onChange(e.target.value || null),
    });
  }

  if (field.type === 'number' || field.type === 'monetary') {
    const numVal = typeof cleanValue === 'object' && cleanValue?.amount != null
      ? cleanValue.amount : (cleanValue ?? '');
    if (locked) return lockedValueEl(formatByType(field, numVal));
    // Use Joshu's `decimal_places` to set the input step. 0 → integers
    // only, no decimals; 2 → cents on monetary; etc.
    const decimals = field.decimal_places ?? (field.type === 'monetary' ? 2 : 0);
    const step = decimals === 0 ? '1' : (1 / Math.pow(10, decimals)).toString();
    // Most monetary fields in insurance are non-negative (premiums,
    // limits, sublimits, building values). Negative numbers are
    // technically valid input for general numbers (acreage adjustments,
    // etc. are rare but possible), but for monetary it's almost always
    // a typo. We default monetary to min=0 unless the field has options
    // (in which case the options govern, not the range).
    const attrs = {
      type: 'number',
      value: numVal,
      step: step,
      placeholder: field.type === 'monetary' ? '0.00' : '',
      required: field.required || undefined,
      onInput: (e) => onChange(e.target.value || null),
    };
    if (field.type === 'monetary' && !field.options) {
      attrs.min = '0';
    }
    return el('input', attrs);
  }

  if (field.type === 'location') {
    const strVal = typeof cleanValue === 'object'
      ? formatDatapointValue(cleanValue)
      : (cleanValue || '');
    const displayVal = strVal === '\u2014' ? '' : strVal;
    if (locked) return lockedValueEl(displayVal);
    return el('input', {
      type: 'text', value: displayVal,
      placeholder: 'Address, City, State ZIP',
      required: field.required || undefined,
      maxLength: 200,
      onInput: (e) => onChange(e.target.value || null),
    });
  }

  // Default: text (Array values pass through formatByType)
  if (locked) return lockedValueEl(formatByType(field, cleanValue));
  const inputType = field.format === 'EmailAddress' ? 'email'
    : field.format === 'PhoneNumber' ? 'tel'
    : field.format === 'WebsiteAddress' ? 'url'
    : 'text';
  // Reasonable length caps so a paste-bomb can't put 10,000 chars into
  // an insured-name field. Specific formats get tighter caps.
  const maxLen = inputType === 'email' ? 254       // RFC 5321 limit
    : inputType === 'tel' ? 32                     // International + extension
    : inputType === 'url' ? 2048
    : 500;                                          // Generic text safety net
  // Pattern for phone numbers: digits, spaces, dashes, parens, plus, dots.
  // Lets US "(555) 123-4567" and intl "+1 555 123 4567" both through.
  const pattern = inputType === 'tel' ? '[0-9 +\\-()\\.]+' : undefined;
  return el('input', {
    type: inputType,
    value: cleanValue || '',
    required: field.required || undefined,
    maxLength: maxLen,
    pattern: pattern,
    onInput: (e) => onChange(e.target.value || null),
  });
}

// Detect "this is a yes/no field" from field metadata + observed value.
// Returns true if ANY of these hold:
//   - schema says type === 'boolean'
//   - the actual value is a JS boolean
//   - options look like a 2-option yes/no pattern (values are 0/1 or false/true)
//   - the code or label ends with "_status" or "Status" (heuristic fallback)
function isBooleanField(field, value) {
  if (field.type === 'boolean') return true;
  if (typeof value === 'boolean') return true;

  const opts = field.options;
  if (Array.isArray(opts) && opts.length === 2) {
    const vals = opts.map(o => String(o.value || '').toLowerCase()).sort();
    const yesNoPairs = [
      ['0', '1'],
      ['false', 'true'],
      ['n', 'y'],
      ['no', 'yes'],
    ];
    for (const pair of yesNoPairs) {
      if (vals[0] === pair[0] && vals[1] === pair[1]) return true;
    }
  }

  // Heuristic: codes ending in "_status" or labels ending in "Status"
  // (e.g. sprinklered_status, ex_wind_status, surveillance_status, GLonlyStatus)
  const code = (field.code || '').toLowerCase();
  const label = (field.label || '').toLowerCase();
  if (code.endsWith('_status') || label.endsWith(' status') || code.endsWith('status') && !code.includes('.')) {
    // But ONLY if the value is a clear yes/no type marker, to avoid hitting
    // text status fields like "renewal_status_description"
    const v = (value === null || value === undefined) ? '' : String(value).toLowerCase();
    if (v === '' || v === '0' || v === '1' || v === 'true' || v === 'false' ||
        v === 'yes' || v === 'no') return true;
  }

  return false;
}

// Normalize any of the many "truthy" shapes Joshu sends to a JS bool
function isTruthyBool(v) {
  if (v === true) return true;
  if (v === false) return false;
  if (v === null || v === undefined) return false;
  const s = String(v).toLowerCase().trim();
  return s === '1' || s === 'true' || s === 'yes' || s === 'y';
}

// A locked (read-only) value — no frame, just the formatted value in place.
// Empty values show a subtle em-dash rather than "Not provided" which was
// both loud and confusing when applied to populated rows missing one field.
function lockedValueEl(text) {
  const display = (text === null || text === undefined || text === '' || text === '—') ? '—' : text;
  const isEmpty = display === '—';
  return el('div', { className: `locked-value ${isEmpty ? 'empty' : ''}` }, display);
}

// Format a value by its inferred meaning, not just its Joshu type.
// This is what turns "3619920" into "$3,619,920" and "60332" into "60,332 sq ft".
function formatByType(field, value) {
  if (value === null || value === undefined || value === '') return '—';

  // Handle structured values (Monetary objects, Location objects, arrays)
  if (Array.isArray(value)) {
    return value.filter(v => v !== null && v !== undefined && v !== '').join(', ');
  }
  if (typeof value === 'object') {
    if (value.amount != null) return formatMoney(value.amount);
    return formatDatapointValue(value);  // falls through to legacy formatter
  }

  const str = String(value).trim();
  if (!str) return '—';

  const code = (field.code || '').toLowerCase();
  const label = (field.label || '').toLowerCase();
  const fmt = (field.format || '').toLowerCase();

  // Date: ISO format "2026-05-15" → "May 15, 2026"
  // Only when the field type is explicitly date OR the value matches an
  // ISO date pattern. This avoids accidentally reformatting things like
  // version strings.
  if (field.type === 'date' || /^\d{4}-\d{2}-\d{2}$/.test(str)) {
    return formatFriendlyDate(str);
  }
  if (field.type === 'datetime' || /^\d{4}-\d{2}-\d{2}T\d{2}:/.test(str)) {
    return formatFriendlyDate(str.split('T')[0]);
  }

  // Percentage: codes/labels mentioning percent, windhail%, or format=Percentage
  if (fmt === 'percentage' || code.includes('percentage') || code.includes('_percent') ||
      code === 'windhailpercentage' || label.endsWith('%') || label.includes('percentage')) {
    return formatNumber(str) + '%';
  }

  // Year: code/label = year_built, or value is a plausible 4-digit year with no decimal
  if (code.includes('year') || /^year/.test(label) || /^\d{4}$/.test(str)) {
    return str;
  }

  // Square footage: code/label mentions sq ft
  if (code.includes('square_footage') || code.includes('sq_ft') || code.includes('sqft') ||
      label.includes('square foot') || label.includes('sq ft')) {
    return formatNumber(str) + ' sq ft';
  }

  // Stories: singular/plural
  if (code === 'stories' || code.endsWith('.stories') || label === 'stories') {
    const n = parseFloat(str);
    if (!isNaN(n)) {
      const whole = Math.round(n);
      return whole === 1 ? '1 story' : `${whole} stories`;
    }
  }

  // Building count / location count / count fields: plain number with commas
  if (code.includes('_count') || code.endsWith('.count') || label.endsWith('count')) {
    return formatNumber(str);
  }

  // Monetary: type=monetary, Joshu Text that starts with "$", or codes that imply money
  // Explicit: aop_deductible, building_value, annual_sales, bpp_limit, limits, premiums, etc.
  if (field.type === 'monetary' || str.startsWith('$') || /^\$[\d,]/.test(str)) {
    // Already formatted or has $ sign — normalize
    return formatMoney(str.replace(/^\$/, ''));
  }
  if (code.includes('value') || code.includes('premium') || code.includes('limit') ||
      code.includes('sales') || code.includes('deductible') ||
      code.includes('sublimit') || code.includes('pay') ||
      code.endsWith('.pollutantcleanuplim') || code.endsWith('.papersandrecords') ||
      code.endsWith('.waterbackuplimit') || code.endsWith('.wind_hail_minimum_dollar') ||
      code.endsWith('.wind_hail_dollar_figure')) {
    // Only apply $ if numeric — skip strings like "365 Days" that look like limits
    const stripped = str.replace(/[,$]/g, '');
    if (/^-?\d+(\.\d+)?$/.test(stripped)) {
      return formatMoney(stripped);
    }
  }

  // Plain number with decimal that looks like a count/numeric stat: format with commas
  if (/^-?\d+(\.\d+)?$/.test(str.replace(/,/g, ''))) {
    const cleaned = str.replace(/,/g, '');
    const num = parseFloat(cleaned);
    if (!isNaN(num)) return formatNumber(cleaned);
  }

  // Default: trust the raw value (already a string)
  return str;
}

function formatMoney(raw) {
  if (raw === null || raw === undefined || raw === '') return '—';
  const cleaned = String(raw).replace(/[$,]/g, '').trim();
  const num = parseFloat(cleaned);
  if (isNaN(num)) return String(raw);
  // Drop cents if whole dollars — $3,619,920 reads cleaner than $3,619,920.00
  const hasCents = Math.round(num * 100) % 100 !== 0;
  return '$' + num.toLocaleString('en-US', {
    minimumFractionDigits: hasCents ? 2 : 0,
    maximumFractionDigits: hasCents ? 2 : 0,
  });
}

function formatNumber(raw) {
  if (raw === null || raw === undefined || raw === '') return '—';
  const cleaned = String(raw).replace(/,/g, '').trim();
  const num = parseFloat(cleaned);
  if (isNaN(num)) return String(raw);
  const hasDecimal = Math.round(num * 100) % 100 !== 0;
  return num.toLocaleString('en-US', {
    minimumFractionDigits: hasDecimal ? 2 : 0,
    maximumFractionDigits: hasDecimal ? 2 : 0,
  });
}

// Format an ISO date "2026-05-15" as "May 15, 2026".
// Doesn't use the Date constructor's local-tz parsing — it splits the
// string explicitly so 2026-05-15 always reads as May 15 regardless of
// the user's timezone.
function formatFriendlyDate(raw) {
  if (raw === null || raw === undefined || raw === '') return '—';
  const m = String(raw).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return String(raw);
  const [, y, mo, d] = m;
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const monthName = months[parseInt(mo, 10) - 1];
  if (!monthName) return String(raw);
  // Strip leading zero from day for natural reading
  const day = parseInt(d, 10);
  return `${monthName} ${day}, ${y}`;
}

// ─────────────────────────────────────────────────────────────
// Slider — used for Number/Monetary fields with 3+ numeric options
// ─────────────────────────────────────────────────────────────
function renderSlider(field, currentValue, onChange) {
  const options = field.options;
  // Find the current index, defaulting to -1 (no selection)
  let activeIdx = options.findIndex(o => String(o.value) === String(currentValue));
  if (activeIdx < 0) activeIdx = Math.floor(options.length / 2); // default to middle

  const activeOption = options[activeIdx];
  const wrap = el('div', { className: 'slider-wrap' });

  // Top row: label + current value display
  const headRow = el('div', { className: 'slider-head' },
    el('div', { className: 'slider-value' }, activeOption?.label || activeOption?.value || '—'),
    el('div', { className: 'slider-hint' }, 'Slide to adjust'));
  wrap.appendChild(headRow);

  // Slider track
  const track = el('div', { className: 'slider-track' });
  const fill = el('div', { className: 'slider-fill' });

  // Slider handle: Altruis chevron mark pointing UP at the track. We
  // build inline SVG with createElementNS (the el() helper doesn't
  // handle the XML namespace). Uses the full 4-polygon brand mark —
  // outer blades in lighter blue (#6797EE), inner pair in deeper blue
  // (#2F5FB8) — for a fully-filled, recognizable Altruis chevron.
  const NS = 'http://www.w3.org/2000/svg';
  const handle = el('div', { className: 'slider-handle' });
  const handleSvg = document.createElementNS(NS, 'svg');
  handleSvg.setAttribute('viewBox', '0 0 1100 911');
  handleSvg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  handleSvg.setAttribute('aria-hidden', 'true');
  const handleShapes = [
    { points: '1100,911 559.2,0 559.2,213.4 908.6,802.1', fill: '#6797EE' },
    { points: '0,911 191.4,802.1 540.8,213.5 540.8,0',    fill: '#6797EE' },
    { points: '271.7,756.3 540.8,603.2 540.8,319.6',      fill: '#2F5FB8' },
    { points: '828.3,756.3 559.2,319.6 559.2,603.2',      fill: '#2F5FB8' },
  ];
  for (const s of handleShapes) {
    const poly = document.createElementNS(NS, 'polygon');
    poly.setAttribute('points', s.points);
    poly.setAttribute('fill', s.fill);
    handleSvg.appendChild(poly);
  }
  handle.appendChild(handleSvg);

  track.appendChild(fill);
  track.appendChild(handle);

  // Position helpers
  const pctFor = (idx) => options.length <= 1 ? 0 : (idx / (options.length - 1)) * 100;
  const updatePosition = (idx) => {
    const pct = pctFor(idx);
    fill.style.width = `${pct}%`;
    handle.style.left = `${pct}%`;
    headRow.querySelector('.slider-value').textContent =
      options[idx]?.label || options[idx]?.value || '—';
  };
  updatePosition(activeIdx);

  // Drag behavior
  let dragging = false;
  const rectCache = () => track.getBoundingClientRect();
  const idxFromX = (clientX) => {
    const r = rectCache();
    const rel = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    return Math.round(rel * (options.length - 1));
  };
  const startDrag = (e) => {
    dragging = true;
    e.preventDefault();
    handleMove(e);
  };
  const handleMove = (e) => {
    if (!dragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const idx = idxFromX(clientX);
    if (idx !== activeIdx) {
      activeIdx = idx;
      updatePosition(idx);
    }
  };
  const endDrag = () => {
    if (!dragging) return;
    dragging = false;
    onChange(options[activeIdx]?.value ?? null);
  };

  track.addEventListener('mousedown', startDrag);
  track.addEventListener('touchstart', startDrag, { passive: false });
  window.addEventListener('mousemove', handleMove);
  window.addEventListener('touchmove', handleMove, { passive: true });
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);

  // Keyboard support on the handle
  handle.setAttribute('tabindex', '0');
  handle.setAttribute('role', 'slider');
  handle.setAttribute('aria-label', field.label || field.code);
  handle.setAttribute('aria-valuemin', '0');
  handle.setAttribute('aria-valuemax', String(options.length - 1));
  handle.addEventListener('keydown', (e) => {
    let newIdx = activeIdx;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') newIdx = Math.max(0, activeIdx - 1);
    else if (e.key === 'ArrowRight' || e.key === 'ArrowUp') newIdx = Math.min(options.length - 1, activeIdx + 1);
    else if (e.key === 'Home') newIdx = 0;
    else if (e.key === 'End') newIdx = options.length - 1;
    else return;
    e.preventDefault();
    if (newIdx !== activeIdx) {
      activeIdx = newIdx;
      updatePosition(activeIdx);
      onChange(options[activeIdx]?.value ?? null);
    }
  });

  // Click on track sets value
  wrap.appendChild(track);

  // Tick labels beneath the track. Each label is positioned absolutely
  // at its actual percentage on the track so it lines up with the
  // corresponding slider stop. We also abbreviate large currency values
  // ($1,000,000 → $1M, $300,000 → $300K) so labels stay short and
  // don't overlap each other on dense scales.
  const ticks = el('div', { className: 'slider-ticks' });
  options.forEach((o, i) => {
    const pct = pctFor(i);
    const tick = el('div', {
      className: `slider-tick ${i === activeIdx ? 'active' : ''}`,
      style: {
        left: `${pct}%`,
        // First tick anchors at left, last at right, others centered
        transform: i === 0 ? 'translateX(0)' :
                   i === options.length - 1 ? 'translateX(-100%)' :
                   'translateX(-50%)',
      },
      onClick: () => {
        activeIdx = i;
        updatePosition(i);
        onChange(o.value ?? null);
      },
    }, abbreviateSliderLabel(o.label || o.value));
    ticks.appendChild(tick);
  });
  wrap.appendChild(ticks);

  return wrap;
}

// Compress slider-tick labels for legibility under a narrow track.
//   "$1,000,000" → "$1M"
//   "$300,000"   → "$300K"
//   "$5,000"     → "$5K"
//   "120 Days"   → "120D"   (only when the label is "N Days" pattern)
//   anything else returned unchanged
function abbreviateSliderLabel(label) {
  if (label == null) return '';
  const s = String(label).trim();
  // Currency: $1,234,567 or $1234567
  const moneyMatch = s.match(/^\$([0-9,]+)(?:\.\d+)?$/);
  if (moneyMatch) {
    const n = parseInt(moneyMatch[1].replace(/,/g, ''), 10);
    if (!isNaN(n)) {
      if (n >= 1_000_000) {
        const v = n / 1_000_000;
        return `$${v % 1 === 0 ? v.toFixed(0) : v.toFixed(1)}M`;
      }
      if (n >= 1_000) {
        const v = n / 1_000;
        return `$${v % 1 === 0 ? v.toFixed(0) : v.toFixed(1)}K`;
      }
      return `$${n}`;
    }
  }
  // "120 Days" → "120D"
  const daysMatch = s.match(/^(\d+)\s*Days?$/i);
  if (daysMatch) return `${daysMatch[1]}D`;
  return s;
}

// Autosave: debounce-save dirty fields every 1.5s
let _autoSaveTimer = null;
function scheduleAutoSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveDirtyData, 1500);
}

async function saveDirtyData() {
  const s = state.selectedSubmission;
  if (!s) return;
  const dirty = state.submissionDirty;
  if (!Object.keys(dirty).length) return;

  // Helper: apply a flat dirty dict to a target data object,
  // unflattening structure-scoped keys (`structures[N].app.X`)
  // back into the structures array. Returns the target unchanged.
  // Mutates target in place.
  const applyDirty = (target, dirtyDict) => {
    target.structures = target.structures || [];
    for (const [code, val] of Object.entries(dirtyDict)) {
      const m = code.match(/^structures\[(\d+)\]\.(.+)$/);
      if (m) {
        const idx = parseInt(m[1], 10);
        const fieldCode = m[2];
        if (!target.structures[idx]) target.structures[idx] = {};
        target.structures[idx][fieldCode] = val;
      } else {
        target[code] = val;
      }
    }
    return target;
  };

  // Demo submission: save in-memory only, never persists. Updates the
  // form schema's field values so the UI stays in sync with what the
  // broker typed, then shows the same "saved" indicator as a real save.
  if (s.id === 'demo') {
    state.submissionSaving = 'saving';
    render();
    if (state.demoSubmission) {
      state.demoSubmission.data = state.demoSubmission.data || {};
      applyDirty(state.demoSubmission.data, dirty);
      state.demoSubmission.modified_at = new Date().toISOString();
    }
    if (state.submissionForm) {
      for (const f of state.submissionForm.fields) {
        if (f.code in dirty) f.value = dirty[f.code];
      }
    }
    state.submissionDirty = {};
    state.submissionSaving = 'saved';
    state.showRequiredHighlight = false;
    render();
    setTimeout(() => {
      if (state.submissionSaving === 'saved') {
        state.submissionSaving = 'idle';
        render();
      }
    }, 2000);
    return;
  }

  state.submissionSaving = 'saving';
  render();
  try {
    await api(`/api/submissions/${s.id}/data`, { method: 'PUT', body: dirty, silent: false });
    // Merge the saved values into the form state so the UI stays in sync
    if (state.submissionForm) {
      for (const f of state.submissionForm.fields) {
        if (f.code in dirty) f.value = dirty[f.code];
      }
    }
    state.submissionDirty = {};
    state.submissionSaving = 'saved';
    // Once a save lands, clear the "show what's required" highlight.
    // It will come back if the broker tries to submit again with gaps,
    // but in the meantime the editing experience is uncluttered.
    state.showRequiredHighlight = false;
    render();
    setTimeout(() => {
      if (state.submissionSaving === 'saved') {
        state.submissionSaving = 'idle';
        render();
      }
    }, 2000);
  } catch (e) {
    state.submissionSaving = 'idle';
    render();
  }
}

async function submitForQuote(id) {
  // Flush any pending edits first
  if (Object.keys(state.submissionDirty).length > 0) {
    await saveDirtyData();
  }

  // Pre-flight check: count required-but-empty fields across all sections
  // BEFORE we ask Joshu. This catches obvious omissions on the client
  // side rather than waiting for a server-side validation_error to come
  // back. Joshu will still do its own validation on submit; this is a
  // friendlier check that guides the broker before they hit the API.
  const incomplete = countIncompleteRequiredFields();
  if (incomplete.count > 0) {
    // Flip on visual highlighting of required-but-empty fields. This
    // CSS class is added to the form pane and stays on until the next
    // successful save / submit. It uses the :placeholder-shown trick
    // and :invalid pseudo-class to highlight fields that the
    // browser knows are required-and-empty without us tracking them
    // individually in JS.
    state.showRequiredHighlight = true;
    const sectionList = incomplete.bySection
      .map(s => `  \u2022 ${s.label}: ${s.count} field${s.count === 1 ? '' : 's'}`)
      .join('\n');
    toast(
      `${incomplete.count} required field${incomplete.count === 1 ? '' : 's'} still need${incomplete.count === 1 ? 's' : ''} a value:\n${sectionList}`,
      'err'
    );
    // Jump them to the first incomplete section so they don't hunt for it
    if (incomplete.firstSectionCode && state.activeSection !== incomplete.firstSectionCode) {
      state.activeSection = incomplete.firstSectionCode;
    }
    render();
    return;
  }

  if (id === 'demo') {
    if (!confirm('Submit this for a quote?\n\nNote: this is a demo submission \u2014 it will not be sent anywhere or saved.')) return;
    toast('Demo submission complete \u2014 in production, this would route to the underwriter for quoting.', 'ok');
    state.demoSubmission = null;
    state.extractedFields = new Set();
    state.extractedFieldsForSubmissionId = null;
    state.subView = null;
    state.view = 'dashboard';
    render();
    loadView();
    return;
  }

  if (!confirm('Submit this to underwriting for a quote?')) return;
  try {
    await api(`/api/submissions/${id}/submit`, { method: 'POST' });
    toast('Submitted for quote \u2014 underwriting will review', 'ok');
    loadSubmission(id);
  } catch (e) { /* toast shown */ }
}

// Walk the submission's section/field tree and count how many fields
// are marked required AND visible AND have no value (and no pending
// dirty edit). Returns counts per-section so the toast can guide the
// broker to where the gaps are.
//
// Fields are "empty" if their value is null, undefined, '', or an
// empty array/object. Booleans default to "no" (false), which counts
// as a value — Joshu treats unset boolean as the schema default.
//
// Hidden conditional fields (visible: false) are excluded — broker
// shouldn't be required to fill in fields they can't see.
function countIncompleteRequiredFields() {
  const result = { count: 0, bySection: [], firstSectionCode: null };
  const submission = state.submission;
  if (!submission || !Array.isArray(submission.sections)) return result;

  for (const section of submission.sections) {
    if (!Array.isArray(section.fields)) continue;
    let sectionCount = 0;
    for (const field of section.fields) {
      if (!field.required) continue;
      if (field.visible === false) continue;
      // Boolean fields are never "empty" in a meaningful sense.
      // They're either checked or unchecked, both valid values.
      if (isBooleanField(field, field.value)) continue;
      // Get the effective value (dirty edit takes precedence over
      // server value).
      const dirty = state.submissionDirty[field.code];
      const effective = dirty !== undefined ? dirty : field.value;
      if (effective === null || effective === undefined || effective === '') {
        sectionCount++;
      } else if (Array.isArray(effective) && effective.length === 0) {
        sectionCount++;
      } else if (typeof effective === 'object' &&
                 Object.keys(effective).length === 0) {
        sectionCount++;
      }
    }
    if (sectionCount > 0) {
      result.bySection.push({
        code: section.code,
        label: section.label || section.code,
        count: sectionCount,
      });
      result.count += sectionCount;
      if (!result.firstSectionCode) {
        result.firstSectionCode = section.code;
      }
    }
  }
  return result;
}

// Renders a single variation form field per its schema entry.
// `parentData` is the data object from the parent quote — used to
// detect when a value has been changed from parent and apply a
// highlight to the field row.
function variationField(field, values, parentData, onChange) {
  const current = values[field.key];
  const parent = parentData[field.key];
  const changed = !valuesEqual(current, parent);

  const rowClass = `variation-row ${changed ? 'variation-row-changed' : ''}`;

  let control;
  if (field.type === 'select') {
    control = el('select', {
      value: String(current ?? ''),
      onChange: (e) => {
        // Coerce back to the option's original type. Options can hold
        // numbers (deductibles, limits) or strings (GL limits format).
        const optionValue = field.options.find(o => String(o.value) === e.target.value)?.value;
        onChange(field.key, optionValue);
      },
    },
      ...field.options.map(o =>
        el('option', { value: String(o.value), selected: String(o.value) === String(current) ? '' : null },
          o.label)));
  } else if (field.type === 'multi') {
    const selected = Array.isArray(current) ? current : [];
    control = el('div', { className: 'variation-multi' },
      ...field.options.map(o => {
        const checked = selected.includes(o.value);
        return el('label', { className: 'variation-checkbox' },
          el('input', {
            type: 'checkbox',
            checked: checked ? '' : null,
            onChange: (e) => {
              const next = e.target.checked
                ? [...selected, o.value]
                : selected.filter(v => v !== o.value);
              onChange(field.key, next);
            },
          }),
          el('span', {}, o.label));
      }));
  } else {
    control = el('div', {}, `(unsupported field type: ${field.type})`);
  }

  return el('div', { className: rowClass },
    el('div', { className: 'variation-row-label' },
      el('div', { className: 'variation-row-name' }, field.label),
      changed ? el('span', { className: 'variation-row-badge' }, 'Changed') : null,
      field.help ? el('div', { className: 'variation-row-help' }, field.help) : null),
    el('div', { className: 'variation-row-control' }, control));
}

function valuesEqual(a, b) {
  if (a === b) return true;
  if (Array.isArray(a) && Array.isArray(b)) {
    if (a.length !== b.length) return false;
    const sa = [...a].sort(), sb = [...b].sort();
    return sa.every((v, i) => v === sb[i]);
  }
  return String(a) === String(b);
}

async function submitVariation(parentQuote) {
  state.variationForm.submitting = true;
  state.variationForm.error = null;
  render();
  try {
    const result = await api(`/api/quotes/${parentQuote.id}/variations`, {
      method: 'POST',
      body: JSON.stringify({ overrides: state.variationForm.values }),
    });
    // Success — the new quote ID comes back. Navigate to it.
    state.variationForm = {
      open: false, parentQuoteId: null, values: {}, submitting: false, error: null,
    };
    if (result && result.id) {
      state.subView = result.id;
      loadQuote(result.id);
    } else {
      // Fallback: refresh the submission so the new quote shows up in
      // the quote list.
      state.view = 'submissions';
      state.subView = parentQuote.submission_id;
      loadSubmission(parentQuote.submission_id);
    }
  } catch (e) {
    // The kill switch returns a structured error from the backend.
    // Surface a friendly message rather than a stack trace.
    const msg = (e && e.message) || 'Variation creation failed.';
    state.variationForm.submitting = false;
    state.variationForm.error = msg.includes('not_ready')
      ? 'Variation creation is not yet enabled in this environment. Wiring is in place — awaiting auth resolution before going live.'
      : `Could not create variation: ${msg}`;
    render();
  }
}
