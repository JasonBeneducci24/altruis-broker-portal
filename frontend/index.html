// Pill rendered next to the page title showing the submission's status.
// One of: Draft / Pending / Bound / Declined / Lost. Color matches the
// pipeline strip palette (yellow / yellow / green / red / gray).
function statusPill(s) {
  const status = s.status;
  let label = null;
  let cls = '';
  if (status === 'Incomplete') { label = 'Draft'; cls = 'status-pill-draft'; }
  else if (status === 'Submitted' || status === 'Pending') {
    if (s.bound_at) { label = 'Bound'; cls = 'status-pill-bound'; }
    else { label = 'Pending Decision'; cls = 'status-pill-pending'; }
  }
  else if (status === 'Declined') { label = 'Declined'; cls = 'status-pill-declined'; }
  else if (status === 'Closed' || status === 'Lost') { label = 'Lost'; cls = 'status-pill-lost'; }
  if (!label) return null;
  return el('span', { className: `status-pill ${cls}` }, label);
}

// Metadata line under the page title — quiet inline subhead with the
// submission's key context. Status-specific so it doesn't say
// contradictory things (e.g. "submitted Mar 12" on a draft that's been
// reopened). For Declined submissions, replaces the line with the
// carrier's decline reason inline.
function statusMetaLine(s) {
  if (s.status === 'Declined' && s.decline_reason) {
    return el('div', { className: 'page-header-meta page-header-meta-declined' },
      s.decline_reason);
  }
  const parts = [];
  parts.push(s.flow ? `${s.flow} policy` : 'New policy');
  if (s.effective_at) parts.push(`effective ${fmtDate(s.effective_at)}`);
  if (s.bound_at) {
    parts.push(`bound ${fmtDate(s.bound_at)}`);
  } else if (s.status === 'Incomplete') {
    // Drafts: skip submitted_at (a reopened draft technically still
    // has a submitted_at value, but showing "submitted Mar 12" on a
    // page that says DRAFT is contradictory). Show last-edited time
    // instead — that's what the broker actually wants to know.
    if (s.modified_at) parts.push(`last edited ${fmtRelativeTime(s.modified_at)}`);
  } else if (s.submitted_at) {
    parts.push(`submitted ${fmtDate(s.submitted_at)}`);
  }
  return el('div', { className: 'page-header-meta' },
    parts.map((p, i) => i === 0 ? p : ` · ${p}`).join(''));
}

function submissionMainCard(s) {
  const form = state.submissionForm;
  const isEditing = state.submissionFormState === 'edit';

  if (!form || !form.fields || form.fields.length === 0) {
    return el('div', { className: 'card' },
      el('div', { className: 'eyebrow' }, 'Data'),
      el('h2', {}, 'Submission data'),
      el('div', { className: 'empty', style: { marginTop: '20px' } },
        el('h3', {}, 'No form schema available'),
        el('p', {}, 'This submission doesn’t have a dynamic schema from the product version, or the schema endpoint returned empty.')));
  }

  // Use the sections array from the normalizer — it's already in display order
  // and has completion counts. Filter out sections with no visible fields.
  const sections = (form.sections || []).filter(sec =>
    sec.visible_count > 0 || (sec.field_count > 0 && sec.condition_met !== false));

  // Pick active section (fall back to first if current isn't valid)
  const activeSection = sections.find(s => s.code === state.activeSection) || sections[0];
  if (!activeSection) {
    return el('div', { className: 'card' },
      el('div', { className: 'empty' }, 'No sections found'));
  }

  const activeFields = form.fields.filter(f =>
    f.section === activeSection.code && f.visible !== false);

  // Determine if this is an asset section with 2+ populated assets.
  //
  // Joshu's schema reports `is_asset: true` for sections like `structures`
  // and reports one datapoint per asset_idx the product schema can support —
  // which may be MANY indices even when the actual data only has zero or
  // one entry. If we relied solely on the count of asset_idx groups, a
  // brand-new submission would render as "7 empty Asset cards" which is
  // confusing and wrong.
  //
  // Two distinct flags govern the layout:
  //   • hasAssetCards — render as asset cards (any count >= 1). This
  //     ensures a single-structure submission gets the same card layout
  //     as a multi-structure one — no flat-row fallback that loses the
  //     hero, chips, and grouping logic.
  //   • isMultiAsset — show "multi-asset chrome" like the right-rail
  //     jump column and Expand/Collapse-all controls (count >= 2). For
  //     a one-structure submission those would be UI noise.
  const isAssetSection = activeSection.is_asset;
  const assetGroups = isAssetSection ? groupFieldsByAsset(activeFields) : null;
  const populatedGroups = assetGroups
    ? assetGroups.filter(g => g.fields.some(f => f.value != null && f.value !== ''))
    : null;
  const hasAssetCards = !!(populatedGroups && populatedGroups.length >= 1);
  const isMultiAsset = !!(populatedGroups && populatedGroups.length >= 2);
  // When we treat as having asset cards, render only the populated groups.
  // (Empty asset slots are hidden until there's a proper "Add" workflow.)
  const displayedGroups = hasAssetCards ? populatedGroups : null;

  // Overall completion for the progress bar
  const totals = sections.reduce(
    (acc, sec) => ({ completed: acc.completed + sec.completed, total: acc.total + sec.visible_count }),
    { completed: 0, total: 0 });
  const pct = totals.total > 0 ? Math.round((totals.completed / totals.total) * 100) : 0;

  return el('div', { className: 'form-wrap' },
    // Progress bar across the top — only shown while editing. Locked
    // submissions don't need it: completion is binary (the broker has
    // submitted), and the form's field-count percentage can be
    // misleading because some fields are populated by underwriting
    // after submission. The status banner above already conveys the
    // submission's lifecycle state.
    isEditing
      ? el('div', { className: 'form-progress' },
          el('div', { className: 'form-progress-labels' },
            el('div', { className: 'form-progress-title' }, 'Submission progress'),
            el('div', { className: 'form-progress-count' },
              pct === 100
                ? el('span', { className: 'form-progress-pct done' }, 'Ready to submit')
                : el('span', { className: 'form-progress-pct' }, `${pct}%`))),
          el('div', { className: 'form-progress-bar' },
            el('div', { className: 'form-progress-fill', style: { width: `${pct}%` } })))
      : null,

    // Layout: 2-column normally, 3-column when active section has multiple assets
    el('div', { className: `form-layout ${isMultiAsset ? 'three-col' : ''}` },
      // LEFT rail — section navigation
      el('div', { className: 'form-rail' },
        ...sections.map(sec => sectionNavItem(sec, sec.code === activeSection.code))),

      // CENTER pane — fields for the active section
      el('div', { className: `form-pane ${state.showRequiredHighlight ? 'show-required' : ''}` },
        el('div', { className: 'form-pane-head' },
          el('div', { className: 'eyebrow' }, isEditing ? 'Edit' : 'Review'),
          el('h2', {}, activeSection.label),
          activeSection.section_error
            ? el('div', { className: 'form-pane-error' }, activeSection.section_error)
            : el('div', { className: 'form-pane-sub' },
                activeSection.is_empty_asset_shell
                  ? `0 ${inferAssetNoun(activeSection, 2).toLowerCase()}`
                  : hasAssetCards
                    ? (isEditing
                        ? `${displayedGroups.length} ${inferAssetNoun(activeSection, displayedGroups.length)} \u00b7 ${activeSection.completed} of ${activeSection.visible_count} fields complete`
                        : `${displayedGroups.length} ${inferAssetNoun(activeSection, displayedGroups.length)}`)
                    : (isEditing
                        ? `${activeSection.completed} of ${activeSection.visible_count} fields complete`
                        : '')),
          // Asset-section controls: Add button is always visible while
          // editing; Expand/Collapse only shows for 2+ assets.
          isEditing && activeSection.is_asset
            ? el('div', { className: 'asset-controls' },
                isMultiAsset
                  ? el('button', { className: 'btn-sm-ghost',
                      onClick: () => { expandAllAssets(activeSection.code, displayedGroups); render(); }
                    }, 'Expand all')
                  : null,
                isMultiAsset
                  ? el('button', { className: 'btn-sm-ghost',
                      onClick: () => { collapseAllAssets(activeSection.code); render(); }
                    }, 'Collapse all')
                  : null,
                el('button', { className: 'btn btn-primary btn-sm',
                  onClick: () => addStructure() },
                  `+ Add ${inferAssetNoun(activeSection, 1).toLowerCase()}`))
            : isMultiAsset
              ? el('div', { className: 'asset-controls' },
                  el('button', { className: 'btn-sm-ghost',
                    onClick: () => { expandAllAssets(activeSection.code, displayedGroups); render(); }
                  }, 'Expand all'),
                  el('button', { className: 'btn-sm-ghost',
                    onClick: () => { collapseAllAssets(activeSection.code); render(); }
                  }, 'Collapse all'))
              : null),

        // Body: asset cards, empty-state card, or flat form grid
        activeSection.is_empty_asset_shell
          ? el('div', { className: 'empty-asset-shell' },
              el('div', { className: 'empty-asset-icon' }, '+'),
              el('div', { className: 'empty-asset-title' },
                `No ${inferAssetNoun(activeSection, 2).toLowerCase()} added yet`),
              el('div', { className: 'empty-asset-desc' },
                `${inferAssetNoun(activeSection, 2)} will appear here once you add them to this submission.`),
              isEditing
                ? el('button', { className: 'btn btn-primary',
                    style: { marginTop: '20px' },
                    onClick: () => addStructure() },
                    `+ Add ${inferAssetNoun(activeSection, 1).toLowerCase()}`)
                : null)
          : activeFields.length === 0
            ? el('div', { className: 'empty', style: { marginTop: '20px' } },
              el('p', {}, 'No fields in this section are currently visible.'))
            : hasAssetCards
              ? el('div', { className: 'asset-list' },
                  ...renderLocationGroups(activeSection, displayedGroups, isEditing))
              : isEditing
                ? (activeSection.label === 'Limits and Coverages'
                    ? renderCoverageLinesBody(activeSection, activeFields, true)
                    : el('div', { className: 'form-grid' },
                        ...activeFields.map(f => renderFormField(f, isEditing))))
                : renderSectionReadBody(activeSection, activeFields),

        // Section navigation footer (prev/next)
        sections.length > 1
          ? el('div', { className: 'form-pane-nav' },
            sectionPrevButton(sections, activeSection),
            sectionNextButton(sections, activeSection))
          : null,

        // Global action footer appears only on the last section in edit mode
        isEditing && (sections.indexOf(activeSection) === sections.length - 1 || sections.length === 1)
          ? el('div', { className: 'form-pane-actions' },
            el('button', { className: 'btn btn-secondary',
              onClick: () => cancelEdit(s.id) }, 'Cancel'),
            el('button', { className: 'btn btn-primary',
              onClick: () => submitForQuote(s.id) },
              s.status === 'Incomplete' ? 'Submit for quote' : 'Save & resubmit'))
          : null),

      // RIGHT rail — asset jump-list (only for multi-asset sections).
      // Walks location groups so multi-building locations get
      // hierarchical numbering (1.1, 1.2) matching the cards.
      isMultiAsset
        ? el('div', { className: 'form-rail form-rail-right' },
            ...renderLocationRailItems(activeSection, displayedGroups))
        : null));
}

// Render right-rail jump items respecting the location grouping.
// For a single-building location, one rail item with the location
// number. For multi-building, one rail item per building using the
// hierarchical "1.1", "1.2" notation.
function renderLocationRailItems(section, assetGroups) {
  const locationGroups = groupAssetsByLocation(assetGroups);
  const items = [];
  for (const loc of locationGroups) {
    loc.assets.forEach((asset, i) => {
      const displayLabel = buildingDisplayIndex(loc, asset, i);
      items.push(assetRailItem(section, asset, displayLabel));
    });
  }
  return items;
}

function sectionNavItem(section, isActive) {
  const pct = section.visible_count > 0
    ? Math.round((section.completed / section.visible_count) * 100)
    : 0;
  const isComplete = section.visible_count > 0 && section.completed === section.visible_count;
  const isEmptyShell = !!section.is_empty_asset_shell;
  const hasErrors = section.has_errors;
  const isEditing = state.submissionFormState === 'edit';

  // Empty asset shells (e.g. Structures with no data yet) need a hint
  // that there's nothing inside. Locked submissions don't need a per-
  // section counter — they're past the editing phase.
  let countLabel = null;
  if (isEditing) {
    countLabel = isEmptyShell ? 'Empty' : `${section.completed}/${section.visible_count}`;
  } else if (isEmptyShell) {
    countLabel = 'Empty';
  }

  // Progress bar fill width and color follow the section status:
  //   • Complete → green (--ok)
  //   • Has errors → red (--err)
  //   • In progress → blue (--blue)
  //   • Empty asset shell → fully gray (--line)
  const barColor = hasErrors ? 'var(--err)'
                : isComplete ? 'var(--ok)'
                : isEmptyShell ? 'var(--line)'
                : 'var(--blue)';
  const barWidth = isEmptyShell ? '100%' : `${pct}%`;

  return el('button', {
    className: `section-nav-item ${isActive ? 'active' : ''} ${isComplete ? 'complete' : ''} ${hasErrors ? 'has-errors' : ''} ${isEmptyShell ? 'is-empty' : ''}`,
    onClick: () => {
      state.activeSection = section.code;
      render();
    },
  },
    el('div', { className: 'section-nav-row' },
      el('div', { className: 'section-nav-label' }, section.label),
      countLabel ? el('div', { className: 'section-nav-count' }, countLabel) : null),
    isEditing
      ? el('div', { className: 'section-nav-progress' },
          el('div', { className: 'section-nav-progress-fill',
            style: { width: barWidth, background: barColor } }))
      : null);
}

function sectionPrevButton(sections, active) {
  const idx = sections.indexOf(active);
  if (idx <= 0) return el('div', {}); // spacer
  const prev = sections[idx - 1];
  return el('button', {
    className: 'btn btn-secondary',
    onClick: () => { state.activeSection = prev.code; render(); }
  }, `← ${prev.label}`);
}

function sectionNextButton(sections, active) {
  const idx = sections.indexOf(active);
  if (idx < 0 || idx >= sections.length - 1) return el('div', {}); // spacer
  const next = sections[idx + 1];
  return el('button', {
    className: 'btn btn-primary no-arrow',
    onClick: () => { state.activeSection = next.code; render(); }
  }, `${next.label} →`);
}

// ─────────────────────────────────────────────────────────────
// Asset grouping — for is_asset sections with multiple items
// (e.g. Structures: 4 buildings, each with its own set of fields)
// ─────────────────────────────────────────────────────────────
function groupFieldsByAsset(fields) {
  // Returns [{idx, fields, completed, total}] sorted by idx
  const byIdx = new Map();
  for (const f of fields) {
    const idx = f.asset_idx ?? 0;
    if (!byIdx.has(idx)) byIdx.set(idx, []);
    byIdx.get(idx).push(f);
  }
  const groups = Array.from(byIdx.entries())
    .sort(([a], [b]) => a - b)
    .map(([idx, fields]) => ({
      idx,
      fields,
      completed: fields.filter(f => f.exists || (f.value != null && f.value !== '')).length,
      total: fields.length,
    }));
  return groups;
}

// ──────────────────────────────────────────────────────────────────
// Location grouping — bucket asset groups by location_number
//
// A "location" can have 1 or many buildings. Joshu stores each
// building as its own asset record (row), so 4 buildings at one
// physical site come back as 4 separate asset groups. Without
// grouping, the UI shows 4 sibling cards with the same address —
// confusing. Grouping makes the parent-child relationship visible.
//
// Strategy:
//   • Group by `location_number` field value (canonical key)
//   • Single-building locations render flat (no group wrapper) —
//     keeps the common case clean
//   • Multi-building locations get a wrapper card with a header
//     summarizing the location and nested building cards inside
//   • Buildings with no location_number go into an "Ungrouped"
//     bucket at the bottom (rare, but defensive)
// ──────────────────────────────────────────────────────────────────
function groupAssetsByLocation(assetGroups) {
  const byLoc = new Map();
  const ungrouped = [];

  for (const group of assetGroups) {
    const locField = group.fields.find(f => {
      const c = (f.code || '').toLowerCase();
      return c === 'location_number' || c.endsWith('.location_number');
    });
    const rawLocNum = locField ? unwrapForInput(locField.value) : null;
    const locNum = rawLocNum !== null && rawLocNum !== undefined && rawLocNum !== ''
      ? Number(rawLocNum)
      : null;

    if (locNum !== null && Number.isFinite(locNum)) {
      if (!byLoc.has(locNum)) byLoc.set(locNum, []);
      byLoc.get(locNum).push(group);
    } else {
      ungrouped.push(group);
    }
  }

  // Build location group objects, sorted by location_number
  const locationGroups = Array.from(byLoc.entries())
    .sort(([a], [b]) => a - b)
    .map(([locNum, assets]) => {
      // Pull the first non-empty address as the display address
      let address = null;
      for (const a of assets) {
        const addrField = a.fields.find(f => {
          const c = (f.code || '').toLowerCase();
          return c === 'location_address' || c.endsWith('.location_address');
        });
        if (addrField) {
          const v = unwrapForInput(addrField.value);
          if (v && typeof v === 'string' && v.trim()) {
            address = v;
            break;
          }
          if (v && typeof v === 'object') {
            // Joshu Location objects may be wrapped; try to extract a label
            const label = formatByType(addrField, v);
            if (label && label !== '\u2014') {
              address = label;
              break;
            }
          }
        }
      }

      // Sort buildings within the location by building_number, falling
      // back to asset_idx for stability when building_number is missing.
      const sorted = [...assets].sort((a, b) => {
        const aBldg = readBuildingNumber(a);
        const bBldg = readBuildingNumber(b);
        if (aBldg != null && bBldg != null) return aBldg - bBldg;
        if (aBldg != null) return -1;
        if (bBldg != null) return 1;
        return a.idx - b.idx;
      });

      // Derive blanketed status from the data the broker enters:
      //
      //   • >1 structure at this address → individual buildings, NOT blanketed
      //     (regardless of building_count — broker has split them out)
      //   • 1 structure with building_count > 1 → BLANKETED
      //     (one entry representing multiple buildings at one address)
      //   • 1 structure with building_count == 1 (or empty) → standard single
      //     building, not blanketed
      //
      // We deliberately don't read app.blanketed_status from the fields
      // anymore — that's an underwriter-source datapoint that brokers
      // never set. The status is purely derived from the structure shape.
      const readBuildingCount = (a) => {
        const f = a.fields.find(ff => {
          const c = (ff.code || '').toLowerCase();
          return c === 'building_count' || c.endsWith('.building_count');
        });
        if (!f) return null;
        const v = unwrapForInput(f.value);
        if (v == null || v === '') return null;
        const n = parseInt(v, 10);
        return isNaN(n) ? null : n;
      };
      let isBlanketed = false;
      if (sorted.length === 1) {
        const bc = readBuildingCount(sorted[0]);
        if (bc != null && bc > 1) isBlanketed = true;
      }

      return {
        locationNumber: locNum,
        address,
        assets: sorted,
        isMultiBuilding: sorted.length >= 2,
        isBlanketed,
      };
    });

  // Ungrouped goes at the bottom — emit as a synthetic group with
  // locationNumber=null so the renderer handles it gracefully.
  if (ungrouped.length > 0) {
    locationGroups.push({
      locationNumber: null,
      address: null,
      assets: ungrouped,
      isMultiBuilding: ungrouped.length >= 2,
      isBlanketed: false,
    });
  }

  return locationGroups;
}

// Pull the building_number value (as Number) from an asset group.
function readBuildingNumber(assetGroup) {
  const f = assetGroup.fields.find(ff => {
    const c = (ff.code || '').toLowerCase();
    return c === 'building_number' || c.endsWith('.building_number');
  });
  if (!f) return null;
  const v = unwrapForInput(f.value);
  if (v === null || v === undefined || v === '') return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

// Compute the display index for a building card. Hierarchical for
// every location (single-building or multi-building):
//   "1.1" — first building in location 1
//   "2.3" — third building in location 2
// Falls back to the array index + 1 if no location/building info.
function buildingDisplayIndex(locationGroup, assetGroup, indexInLocation) {
  const bldgNum = readBuildingNumber(assetGroup) ?? (indexInLocation + 1);
  if (locationGroup.locationNumber != null) {
    return `${locationGroup.locationNumber}.${bldgNum}`;
  }
  return String(bldgNum);
}

// Pick a short noun for the asset type based on the section name
function inferAssetNoun(section, count) {
  const label = (section?.label || '').toLowerCase();
  const pairs = [
    ['structure', 'Structure', 'Structures'],
    ['location', 'Location', 'Locations'],
    ['building', 'Building', 'Buildings'],
    ['vehicle', 'Vehicle', 'Vehicles'],
    ['property', 'Property', 'Properties'],
    ['driver', 'Driver', 'Drivers'],
    ['employee', 'Employee', 'Employees'],
    ['peril', 'Peril', 'Perils'],
    ['equipment', 'Equipment', 'Equipment'],
  ];
  for (const [key, sing, plur] of pairs) {
    if (label.includes(key)) return count === 1 ? sing : plur;
  }
  return count === 1 ? 'Asset' : 'Assets';
}

// Pick the best title field for an asset card's summary row.
// Priority: location_address > address > name > first field with "address" or "location" in code.
function pickAssetTitle(group) {
  const cands = ['location_address', 'address', 'name', 'title', 'description'];
  for (const suffix of cands) {
    const f = group.fields.find(ff => (ff.code || '').toLowerCase().endsWith('.' + suffix));
    if (f && f.value != null && f.value !== '') {
      return formatDatapointValue(f.value);
    }
  }
  // Fallback: any field with "address" or "name" in the code
  const fallback = group.fields.find(f => {
    const c = (f.code || '').toLowerCase();
    return (c.includes('address') || c.includes('name')) && f.value != null && f.value !== '';
  });
  if (fallback) return formatDatapointValue(fallback.value);
  return null;
}

// Pick up to 3 summary stats — Monetary/Number fields with values, preferred codes first
function pickAssetSummaryStats(group) {
  // Three pinned summary stats for the collapsed structure card:
  // Building TIV, Square Footage, Construction Type. Order matters —
  // these appear left-to-right as picked. Construction Type is a text
  // field (not monetary/numeric) so we can't lean on type-based filters
  // like the older heuristic did; we explicitly pull each by code-tail.
  const pinned = ['building_value', 'square_footage', 'construction_type'];
  const result = [];
  for (const key of pinned) {
    const f = group.fields.find(ff => {
      const codeLow = (ff.code || '').toLowerCase();
      const shortCode = codeLow.split('.').pop();
      return shortCode === key;
    });
    if (!f) continue;
    if (f.value == null || f.value === '') continue;
    // Skip literal-zero numeric values (treated as missing data —
    // a building with $0 TIV or 0 sq ft is incomplete, not legitimate)
    if (f.type === 'monetary' || f.type === 'number') {
      const v = unwrapForInput(f.value);
      const n = Number(v);
      if (Number.isFinite(n) && n === 0) continue;
    }
    result.push(f);
  }
  return result;
}

function expandAllAssets(sectionCode, groups) {
  state.expandedAssets[sectionCode] = new Set(groups.map(g => g.idx));
}
function collapseAllAssets(sectionCode) {
  state.expandedAssets[sectionCode] = new Set();
}
function toggleAsset(sectionCode, idx) {
  if (!state.expandedAssets[sectionCode]) state.expandedAssets[sectionCode] = new Set();
  const s = state.expandedAssets[sectionCode];
  if (s.has(idx)) s.delete(idx); else s.add(idx);
}
function isAssetExpanded(sectionCode, idx) {
  return state.expandedAssets[sectionCode]?.has(idx) || false;
}

// ──────────────────────────────────────────────────────────────
// Structure CRUD — add/remove structure entries from a submission
// ──────────────────────────────────────────────────────────────
// In seed mode, structures live as a JS array on submission.data
// (key 'structures'). Adding writes a new empty structure object,
// assigns the next location_number / building_number, persists,
// then refreshes the form schema so the UI shows the new entry.
//
// When real Joshu lands, swap the in-memory array mutation for a
// proper asset-create call. The UI surface stays the same.
function addStructure() {
  const sub = state.selectedSubmission;
  if (!sub) return;

  // Where the structures array lives depends on whether this is a
  // demo submission (lives on state.demoSubmission) or a seed-backed
  // submission (lives in seedDb's submissions array).
  let dataObj;
  let persist;
  if (sub.id === 'demo' && state.demoSubmission) {
    dataObj = state.demoSubmission.data = state.demoSubmission.data || {};
    persist = () => { /* demo doesn't persist */ };
  } else {
    const db = seedDb();
    const seedSub = db.submissions.find(s => String(s.id) === String(sub.id));
    if (!seedSub) return;
    dataObj = seedSub.data = seedSub.data || {};
    persist = () => saveSeedDb();
  }

  const structs = dataObj['structures'] = dataObj['structures'] || [];
  // Auto-assign location_number = max + 1, building_number = 1.
  // Broker can edit both. This keeps numbering monotonic and
  // predictable; if the broker has 3 buildings at one location they
  // can change building_number after the fact.
  const maxLoc = structs.reduce((m, s) => Math.max(m, s['app.location_number'] || 0), 0);
  const newStruct = {
    'app.location_number': maxLoc + 1,
    'app.building_number': 1,
    'app.building_occupancy': ['Self Storage'],
  };
  structs.push(newStruct);
  persist();

  // Reload the active submission so the form re-derives its schema
  // with the new structure included. We also reset the selectedSubmission
  // so the structure card-grouping picks up the new entry.
  if (sub.id === 'demo') {
    loadSubmission('demo');
  } else {
    loadSubmission(sub.id);
  }
  // Auto-expand the new entry so the broker sees the empty form
  // immediately and can start filling it.
  const newIdx = structs.length - 1;
  if (!state.expandedAssets['structures']) state.expandedAssets['structures'] = new Set();
  state.expandedAssets['structures'].add(newIdx);

  toast(`Added structure ${maxLoc + 1}`, 'ok');
}

function removeStructure(idx) {
  const sub = state.selectedSubmission;
  if (!sub) return;
  if (!confirm('Remove this structure? Any data entered for it will be lost.')) return;

  let dataObj;
  let persist;
  if (sub.id === 'demo' && state.demoSubmission) {
    dataObj = state.demoSubmission.data = state.demoSubmission.data || {};
    persist = () => {};
  } else {
    const db = seedDb();
    const seedSub = db.submissions.find(s => String(s.id) === String(sub.id));
    if (!seedSub) return;
    dataObj = seedSub.data = seedSub.data || {};
    persist = () => saveSeedDb();
  }

  const structs = dataObj['structures'] || [];
  if (idx < 0 || idx >= structs.length) return;
  structs.splice(idx, 1);
  persist();

  // Reload to refresh the schema. Clear expanded state for the now-
  // removed index — otherwise expanded set may have a stale idx that
  // points to a different entry.
  state.expandedAssets['structures'] = new Set();
  if (sub.id === 'demo') {
    loadSubmission('demo');
  } else {
    loadSubmission(sub.id);
  }
  toast('Structure removed', 'ok');
}

// Render a single collapsible asset card
// ──────────────────────────────────────────────────────────────
// Asset numbering and broker-lock helpers
// ──────────────────────────────────────────────────────────────

// Pick the display number for a structure card. The broker-set
// `location_number` field value is preferred (so the card matches what
// the broker entered in Joshu / sees in the list). If the field is
// missing or empty, fall back to the array index + 1.
//
// Why this matters: with 7 storage locations, Joshu may return the
// assets in any order, so asset_idx=0 might correspond to location_number=2
// in the broker's data. Using idx+1 produced a confusing off-by-one
// where a broker's "Location 1" would render as "Structure 2" (etc.).
function pickAssetDisplayNumber(group) {
  if (!group?.fields) return (group?.idx ?? 0) + 1;
  const locField = group.fields.find(f => {
    const c = (f.code || '').toLowerCase();
    return c === 'location_number' || c.endsWith('.location_number');
  });
  if (locField) {
    const v = unwrapForInput(locField.value);
    if (v !== null && v !== undefined && v !== '') {
      // Number values come through as strings sometimes; normalize.
      const n = Number(v);
      if (Number.isFinite(n) && n > 0) return n;
    }
  }
  return (group.idx ?? 0) + 1;
}

// Fields the broker should see as locked / read-only inside an asset
// edit context. Was originally used to gray out wind/hail UW fields
// that brokers shouldn't touch — but those are now stripped entirely
// by the UNDERWRITER_SOURCE_FIELDS filter at schema-generation time,
// so anything that survives to render IS broker-editable. We keep
// this hook in place so we can re-add field-level locking later if
// the data model requires it (e.g. a partial-edit reopen flow).
const BROKER_LOCKED_FIELD_TAILS = new Set();

function isBrokerLockedField(field) {
  if (!field?.code) return false;
  const tail = field.code.toLowerCase().split('.').pop();
  return BROKER_LOCKED_FIELD_TAILS.has(tail);
}

// Render the asset-list body, grouping multi-building locations into
// a wrapper card and rendering single-building locations flat.
//
// For single-building locations the wrapper would add visual overhead
// for nothing (the location and the building are the same thing), so
// we emit the asset card at the top level. For multi-building, we
// emit a `.location-group` wrapper containing a header + nested cards.
function renderLocationGroups(section, assetGroups, isEditing) {
  const locationGroups = groupAssetsByLocation(assetGroups);
  // Every location wraps in a group header — even single-building ones —
  // for visual consistency with hierarchical numbering. A "1.1" label
  // implies a parent group exists; rendering one with no header would
  // create a silent ambiguity ("1.1 of what?").
  return locationGroups.map(loc => renderLocationGroupWrapper(section, loc, isEditing));
}

// The wrapper card for a location. Contains:
//   • Header: "LOCATION 1 — 1 BUILDING" or "LOCATION 2 — 6 BUILDINGS"
//     eyebrow + address + blanket pill
//   • Nested asset cards using "1.1" / "2.3" hierarchical numbering
//
// Building cards inside the wrapper get a simplified title ("Building N")
// because the address is already present in the wrapper header.
function renderLocationGroupWrapper(section, locationGroup, isEditing) {
  const { locationNumber, address, assets, isBlanketed } = locationGroup;
  const buildingCount = assets.length;

  // Eyebrow text — three flavors:
  //   • Blanketed: count comes from app.building_count on the single
  //     structure (the broker entered "12" buildings under one entry).
  //     Calling this "1 building" would be misleading; it's one record
  //     covering many physical buildings.
  //   • Multi-building: count = number of asset cards (broker added
  //     individual structure rows, all sharing one address).
  //   • Single building: standard label.
  let eyebrow;
  if (isBlanketed) {
    // Blanketed locations always have exactly one structure entry by
    // definition (multiple structures at one address means individual
    // buildings, not blanketed). Read building_count from that entry.
    const bcField = assets[0]?.fields.find(f => {
      const tail = (f.original_code || f.code || '').toLowerCase();
      return tail.endsWith('building_count');
    });
    const blanketedBuildings = bcField && bcField.value != null && bcField.value !== ''
      ? parseInt(bcField.value, 10) : null;
    if (blanketedBuildings && blanketedBuildings > 1) {
      eyebrow = locationNumber != null
        ? `Location ${locationNumber} \u2014 Blanketed (${blanketedBuildings} buildings under blanket)`
        : `Blanketed (${blanketedBuildings} buildings under blanket)`;
    } else {
      eyebrow = locationNumber != null
        ? `Location ${locationNumber} \u2014 Blanketed`
        : `Blanketed location`;
    }
  } else {
    const buildingNoun = buildingCount === 1 ? 'building' : 'buildings';
    eyebrow = locationNumber != null
      ? `Location ${locationNumber} \u2014 ${buildingCount} ${buildingNoun}`
      : `${buildingCount} ${buildingNoun} (no location number)`;
  }

  return el('div', { className: 'location-group' },
    // Header
    el('div', { className: 'location-group-head' },
      el('div', { className: 'location-group-head-text' },
        el('div', { className: 'location-group-eyebrow' }, eyebrow.toUpperCase()),
        address
          ? el('div', { className: 'location-group-address' }, address)
          : null),
      isBlanketed
        ? el('div', { className: 'location-group-pill is-blanketed' }, 'Blanketed')
        : null),
    // Nested building cards. Title differs by case:
    //   • Blanketed: "Structure 1" — neutral name; the blanketed status
    //     lives at the location header (eyebrow text + yellow pill), so
    //     repeating it on the building card adds no information.
    //   • Single building: "Building 1" (or whatever building_number is)
    //   • Multi-building: "Building N" with N from building_number
    el('div', { className: 'location-group-buildings' },
      ...assets.map((asset, i) => {
        const displayLabel = buildingDisplayIndex(locationGroup, asset, i);
        const bldgNum = readBuildingNumber(asset) ?? (i + 1);
        const titleOverride = isBlanketed
          ? `Structure ${i + 1}`
          : `Building ${bldgNum}`;
        return renderAssetCard(section, asset, isEditing, displayLabel, titleOverride);
      })));
}

function renderAssetCard(section, group, isEditing, displayLabelOverride, titleOverride) {
  const isOpen = isAssetExpanded(section.code, group.idx);
  // Display number — prefer the location-group-derived hierarchical
  // label ("1.2") when provided. Otherwise fall back to the broker-set
  // location_number (so the card label matches what the broker sees in
  // Joshu). Final fallback is the array index + 1.
  const displayNum = displayLabelOverride != null
    ? displayLabelOverride
    : pickAssetDisplayNumber(group);
  // Title — caller can override (e.g. "Building 2" for a card inside a
  // multi-building group). Otherwise pick the asset's own title field
  // (typically the address) or fall back to the noun + number.
  const title = titleOverride != null
    ? titleOverride
    : (pickAssetTitle(group) || `${inferAssetNoun(section, 1)} ${displayNum}`);
  const summaryStats = pickAssetSummaryStats(group);
  const pct = group.total > 0 ? Math.round((group.completed / group.total) * 100) : 0;

  // Collapsed summary row.
  // The completion-count chip ("33/33") only renders while editing —
  // on locked submissions the chip is noise (everything's complete).
  const summary = el('button', {
    className: `asset-card-summary ${isOpen ? 'open' : ''}`,
    id: `asset-${section.code}-${group.idx}`,
    onClick: () => { toggleAsset(section.code, group.idx); render(); },
  },
    el('div', { className: 'asset-card-num' }, String(displayNum)),
    el('div', { className: 'asset-card-title' }, title),
    el('div', { className: 'asset-card-stats' },
      ...summaryStats.map(f => el('div', { className: 'asset-card-stat' },
        el('div', { className: 'asset-card-stat-label' }, f.label),
        el('div', { className: 'asset-card-stat-value' }, formatDatapointValue(f.value))))),
    isEditing
      ? el('div', { className: 'asset-card-meta' },
          el('span', { className: `asset-card-chip ${pct === 100 ? 'done' : ''}` },
            `${group.completed}/${group.total}`),
          // Remove button — span instead of button (we're already inside a
          // button element for the toggle), uses pointer events with
          // stopPropagation to avoid expanding/collapsing the card.
          section.code === 'structures'
            ? el('span', { className: 'asset-card-remove',
                onClick: (e) => {
                  e.preventDefault();
                  e.stopPropagation();
                  removeStructure(group.idx);
                },
                title: 'Remove this structure' }, '\u00d7')
            : null)
      : null,
    el('div', { className: 'asset-card-chevron' }, isOpen ? '\u2303' : '\u2304'));

  // Expanded body — property-listing style:
  //   Identity strip (building value + "1 story · Built 2025 · 4,350 sq ft")
  //   Two-column body: Coverage on left, descriptive attributes on right
  //   More details — disclosure for any unclaimed fields
  // Edit mode shares the identity strip so the broker always sees what
  // building they're editing, then drops to a flat form grid for the
  // editable fields. Underwriter-only risk classification fields
  // (ex_wind_status, wind/hail deductible) render as locked even in
  // edit mode.
  const body = isOpen ? (() => {
    const visible = group.fields.filter(f => f.visible !== false);
    if (isEditing) {
      return renderAssetEditBody(section, group, visible, isBrokerLockedField);
    }
    return renderAssetReadBody(section, group, visible);
  })() : null;

  return el('div', { className: `asset-card ${isOpen ? 'open' : ''}` }, summary, body);
}

// ──────────────────────────────────────────────────────────────
// Property-listing-style read body
// ──────────────────────────────────────────────────────────────

// Field code match helpers — normalize codes to lowercase-terminal-segment
// so we can match against short keys regardless of whether Joshu sends
// "app.building_value" or "structures.building_value" or "building_value".
function codeTail(field) {
  const c = (field.code || '').toLowerCase();
  return c.includes('.') ? c.split('.').pop() : c;
}
function hasValue(field) {
  const v = unwrapForInput(field.value);
  return v !== null && v !== undefined && v !== '';
}

// Find a field in a list whose code-tail matches any of the keys
function findByTail(fields, keys) {
  for (const key of keys) {
    const k = key.toLowerCase();
    const f = fields.find(ff => codeTail(ff) === k);
    if (f) return f;
  }
  return null;
}

// Render the expanded body using categorized, dense layout
function renderAssetReadBody(section, group, fields) {
  // Partition once — booleans out to strip, the rest stays for categorization
  const { bools } = partitionAssetFields(fields);
  const boolCodes = new Set(bools.map(f => f.code));
  const nonBool = fields.filter(f => !boolCodes.has(f.code));
  const claimed = new Set();

  // ── 1. Hero — building value as the single big number, plus an
  //         identity strip ("1 story · Built 2025 · 4,350 sq ft") ────
  // Treat literal 0 as "missing" for these specific fields — a building
  // with $0 value or 0 sq ft is missing data, not legitimate state.
  const isMeaningful = (f) => {
    if (!hasValue(f)) return false;
    const v = unwrapForInput(f.value);
    const n = Number(v);
    if (Number.isFinite(n) && n === 0) return false;
    return true;
  };
  const claimAndReturn = (f) => { if (f) claimed.add(f.code); return f; };
  const valueField = claimAndReturn(
    findByTail(nonBool, ['building_value', 'total_value', 'tiv'])
  );
  const sqftField  = claimAndReturn(findByTail(nonBool, ['square_footage']));
  const storiesF   = claimAndReturn(findByTail(nonBool, ['stories']));
  const yearF      = claimAndReturn(findByTail(nonBool, ['year_built']));

  const identityParts = [];
  if (storiesF && isMeaningful(storiesF)) {
    const v = Number(unwrapForInput(storiesF.value));
    identityParts.push(`${v} ${v === 1 ? 'story' : 'stories'}`);
  }
  if (yearF && isMeaningful(yearF)) {
    identityParts.push(`Built ${unwrapForInput(yearF.value)}`);
  }
  if (sqftField && isMeaningful(sqftField)) {
    const n = Number(unwrapForInput(sqftField.value));
    identityParts.push(`${n.toLocaleString()} sq ft`);
  }

  // ── 2. Address & subtitle plumbing (unchanged from before) ────────
  const addr = findByTail(nonBool, ['location_address', 'address']);
  const locNum = findByTail(nonBool, ['location_number']);
  const bldgNum = findByTail(nonBool, ['building_number']);
  const blanketedStatus = fields.find(f => codeTail(f) === 'blanketed_status');
  const buildingsCount = findByTail(nonBool, ['buildings', 'building_count']);
  if (addr) claimed.add(addr.code);
  if (locNum) claimed.add(locNum.code);
  if (bldgNum) claimed.add(bldgNum.code);
  if (buildingsCount) claimed.add(buildingsCount.code);
  if (blanketedStatus) claimed.add(blanketedStatus.code);

  // ── 3. Risk classification tag — Ex Wind OR W/H deductible (or none).
  // Suppress entirely when:
  //   • ex_wind_status is true → "Ex Wind" pill
  //   • windhailpercentage is 0% or missing → no pill at all (a 0%
  //     deductible isn't meaningful info; treat the same as missing)
  //   • Otherwise show "X% W/H · $YK min"
  const exWindField = fields.find(f => codeTail(f) === 'ex_wind_status');
  const isExWind = exWindField && isTruthyBool(unwrapForInput(exWindField.value));
  if (exWindField) claimed.add(exWindField.code);

  const whPctF = findByTail(nonBool, ['windhailpercentage']);
  const whMinF = findByTail(nonBool, ['wind_hail_dollar_figure']);
  if (whPctF) claimed.add(whPctF.code);
  if (whMinF) claimed.add(whMinF.code);

  // Determine if W/H values are meaningful (non-zero, non-empty)
  const whPctMeaningful = whPctF && isMeaningful(whPctF);
  const whMinMeaningful = whMinF && isMeaningful(whMinF);

  let riskTag = null;
  if (isExWind) {
    riskTag = el('div', { className: 'asset-hero-tag asset-hero-tag-exwind', title: 'Ex Wind \u2014 no wind/hail coverage' },
      el('span', { className: 'asset-hero-tag-part' }, 'Ex Wind'));
  } else if (whPctMeaningful) {
    // Build the W/H pill only when the percentage is a real value.
    const whParts = [`${formatByType(whPctF, unwrapForInput(whPctF.value))} W/H`];
    if (whMinMeaningful) {
      const minVal = formatByType(whMinF, unwrapForInput(whMinF.value));
      const compact = minVal.replace(/^\$(\d+),000$/, '$$$1K');
      whParts.push(`${compact} min`);
    }
    riskTag = el('div', { className: 'asset-hero-tag', title: 'Wind/Hail deductible' },
      ...whParts.map((p, i) => [
        el('span', { className: 'asset-hero-tag-part' }, p),
        i < whParts.length - 1 ? el('span', { className: 'asset-hero-tag-sep' }, '\u00b7') : null,
      ]).flat().filter(Boolean));
  }

  // ── 4. Hero block — single big number (building value) on the left,
  //          identity line + risk tag on the right.
  const heroLeft = valueField && isMeaningful(valueField)
    ? el('div', { className: 'asset-hero-bigvalue' },
        el('div', { className: 'asset-hero-bigvalue-amount' },
          formatByType(valueField, unwrapForInput(valueField.value))),
        el('div', { className: 'asset-hero-bigvalue-label' }, 'Building value'))
    : null;

  const heroRight = el('div', { className: 'asset-hero-identity' },
    identityParts.length
      ? el('div', { className: 'asset-hero-identity-strip' }, identityParts.join(' \u00b7 '))
      : null,
    riskTag);

  const hero = el('div', { className: 'asset-hero asset-hero-v2' },
    heroLeft,
    heroRight);

  // ── 5. Construction (chips inline) ────────────────────────────────
  const constructionParts = [];
  const collectConstruction = (tail, fmt) => {
    const f = findByTail(nonBool, [tail]);
    if (f && hasValue(f)) {
      const v = unwrapForInput(f.value);
      constructionParts.push(fmt ? fmt(v) : String(v));
      claimed.add(f.code);
    }
  };
  collectConstruction('construction_type');
  collectConstruction('roof_type', v => `${v} roof`);
  collectConstruction('roof_geometry');
  collectConstruction('valuation_method');
  collectConstruction('coinsurance_percentage', v => `${v}% coinsurance`);

  // ── 6. Coverage list (money fields, forced monetary formatting) ───
  // Joshu sends BPP/OL/Annual Sales as raw numbers in some submissions —
  // not flagged as monetary. Force the $ prefix and thousands separator
  // for these specific fields so they read as the dollar amounts they
  // actually represent.
  const formatAsMoney = (raw) => {
    if (raw === null || raw === undefined || raw === '') return '\u2014';
    const n = Number(raw);
    if (!Number.isFinite(n)) return String(raw);
    return `$${n.toLocaleString()}`;
  };
  const COVERAGE_ROWS = [
    { tail: 'bpp_limit',      label: 'Business Personal Property' },
    { tail: 'ol_2and3_limit', label: 'Ordinance & Law 2 & 3' },
    { tail: 'annual_sales',   label: 'BI & EE Limit' },
  ];
  const coverageRows = COVERAGE_ROWS.map(spec => {
    const f = findByTail(nonBool, [spec.tail]);
    if (!f || !hasValue(f)) return null;
    claimed.add(f.code);
    return { label: spec.label, value: formatAsMoney(unwrapForInput(f.value)) };
  }).filter(Boolean);

  // ── 7. Occupancy ──────────────────────────────────────────────────
  const occupancyParts = [];
  const occF = findByTail(nonBool, ['building_occupancy']);
  if (occF && hasValue(occF)) {
    const v = unwrapForInput(occF.value);
    occupancyParts.push(Array.isArray(v) ? v.join(', ') : String(v));
    claimed.add(occF.code);
  }
  const vacF = findByTail(nonBool, ['vacant_land_acreage']);
  if (vacF && hasValue(vacF)) {
    occupancyParts.push(`${formatByType(vacF, unwrapForInput(vacF.value))} acres vacant`);
    claimed.add(vacF.code);
  }

  // ── 8. Bool feature chips (affirmative only) ──────────────────────
  const HIDDEN_BOOL_CHIPS = new Set([
    'gl_only_status',
    'blanketed_status',
    'ex_wind_status',
  ]);
  const featureBools = bools.filter(f => {
    if (HIDDEN_BOOL_CHIPS.has(codeTail(f))) return false;
    return isTruthyBool(unwrapForInput(f.value));
  });

  // ── 9. Two-column body ─────────────────────────────────────────────
  // Left column: Coverage list (money / what's covered)
  // Right column: descriptive attributes (Construction, Occupancy, Features)
  const leftCol = coverageRows.length > 0
    ? el('div', { className: 'asset-body-col asset-body-col-left' },
        el('div', { className: 'asset-body-block' },
          el('div', { className: 'asset-body-block-label' }, 'Coverage'),
          el('div', { className: 'asset-body-coverage-list' },
            ...coverageRows.map(r =>
              el('div', { className: 'asset-body-coverage-row' },
                el('div', { className: 'asset-body-coverage-label' }, r.label),
                el('div', { className: 'asset-body-coverage-leader' }),
                el('div', { className: 'asset-body-coverage-value' }, r.value))))))
    : null;

  const rightColBlocks = [];
  if (constructionParts.length > 0) {
    rightColBlocks.push(el('div', { className: 'asset-body-block' },
      el('div', { className: 'asset-body-block-label' }, 'Construction'),
      el('div', { className: 'asset-body-block-value' }, constructionParts.join(' \u00b7 '))));
  }
  if (occupancyParts.length > 0) {
    rightColBlocks.push(el('div', { className: 'asset-body-block' },
      el('div', { className: 'asset-body-block-label' }, 'Occupancy'),
      el('div', { className: 'asset-body-block-value' }, occupancyParts.join(' \u00b7 '))));
  }
  if (featureBools.length > 0) {
    rightColBlocks.push(el('div', { className: 'asset-body-block' },
      el('div', { className: 'asset-body-block-label' }, 'Features'),
      el('div', { className: 'asset-body-block-chips' },
        ...featureBools.map(f => renderBoolChip(f)))));
  }
  const rightCol = rightColBlocks.length > 0
    ? el('div', { className: 'asset-body-col asset-body-col-right' }, ...rightColBlocks)
    : null;

  const body = (leftCol || rightCol)
    ? el('div', { className: 'asset-body-grid' }, leftCol, rightCol)
    : null;

  // ── 10. More details — anything not claimed above ─────────────────
  const moreFields = nonBool.filter(f => {
    if (claimed.has(f.code)) return false;
    return hasValue(f) || f.required;
  });
  const moreKey = `more:${section.code}:${group.idx}`;
  const moreOpen = !!state.expandedMore?.[moreKey];
  const more = moreFields.length > 0
    ? el('div', { className: 'asset-more' },
        el('button', {
          className: 'asset-more-toggle',
          onClick: () => {
            if (!state.expandedMore) state.expandedMore = {};
            state.expandedMore[moreKey] = !moreOpen;
            render();
          },
        }, moreOpen ? `Hide details (${moreFields.length})` : `Show more details (${moreFields.length})`),
        moreOpen
          ? el('div', { className: 'form-grid asset-more-grid' },
              ...moreFields.map(f => renderFormField(f, false)))
          : null)
    : null;

  return el('div', { className: 'asset-card-body' }, hero, body, more);
}

// Edit-mode body. Keeps the same identity strip at the top of the card
// so the broker always sees "Building N · 1 story · Built 2025 · 4,350 sq ft"
// while editing — preserves card identity. Below the strip, the standard
// form grid renders all editable fields (with underwriter-only fields
// rendered as locked).
function renderAssetEditBody(section, group, visible, lockedPredicate) {
  // Identity strip — pull stories/year/sqft to show as prose context.
  const isMeaningful = (f) => {
    if (!hasValue(f)) return false;
    const v = unwrapForInput(f.value);
    const n = Number(v);
    if (Number.isFinite(n) && n === 0) return false;
    return true;
  };
  const sqftField = findByTail(visible, ['square_footage']);
  const storiesF  = findByTail(visible, ['stories']);
  const yearF     = findByTail(visible, ['year_built']);
  const valueField = findByTail(visible, ['building_value', 'total_value', 'tiv']);

  const identityParts = [];
  if (storiesF && isMeaningful(storiesF)) {
    const v = Number(unwrapForInput(storiesF.value));
    identityParts.push(`${v} ${v === 1 ? 'story' : 'stories'}`);
  }
  if (yearF && isMeaningful(yearF)) {
    identityParts.push(`Built ${unwrapForInput(yearF.value)}`);
  }
  if (sqftField && isMeaningful(sqftField)) {
    const n = Number(unwrapForInput(sqftField.value));
    identityParts.push(`${n.toLocaleString()} sq ft`);
  }

  const heroLeft = valueField && isMeaningful(valueField)
    ? el('div', { className: 'asset-hero-bigvalue' },
        el('div', { className: 'asset-hero-bigvalue-amount' },
          formatByType(valueField, unwrapForInput(valueField.value))),
        el('div', { className: 'asset-hero-bigvalue-label' }, 'Building value'))
    : null;
  const heroRight = identityParts.length
    ? el('div', { className: 'asset-hero-identity' },
        el('div', { className: 'asset-hero-identity-strip' }, identityParts.join(' \u00b7 ')))
    : null;

  const hero = (heroLeft || heroRight)
    ? el('div', { className: 'asset-hero asset-hero-v2 asset-hero-edit' }, heroLeft, heroRight)
    : null;

  return el('div', { className: 'asset-card-body is-editing is-compact' },
    hero,
    ...renderStructureAccordionGroups(visible, lockedPredicate, group));
}

// ──────────────────────────────────────────────────────────────
// Accordion grouping for structure cards
// ──────────────────────────────────────────────────────────────
// The Joshu YAML defines 3 named subsections inside each structure
// (Building Basic Information / Additional Coverages / Security
// Features) via Heading markers. We mirror that grouping here:
// each group renders as a collapsible accordion section, so the
// broker can focus on one bucket at a time instead of staring at
// 33 fields stacked vertically.
//
// Groups are keyed by which structure-schema field marks the start
// of each group. We bucket the rendered fields by where they fall
// in the original schema sequence: any field with original_code
// before the first marker → Building Basic; before the second
// marker → Additional Coverages; from the second marker on →
// Security Features.
function renderStructureAccordionGroups(fields, lockedPredicate, group) {
  const groupDefs = [
    { id: 'basic',     label: 'Building Basic Information', startCode: null },
    { id: 'additional', label: 'Additional Coverages',     startCode: 'app.LRO_status' },
    { id: 'security',   label: 'Security Features',        startCode: 'app.surveillance_status' },
  ];

  // Build an index map of structure-schema field codes → ordinal.
  // `f.original_code` is the per-asset-stripped code (e.g. 'app.LRO_status')
  // matching the schema definition order.
  const schemaOrder = STRUCTURE_SCHEMA.fields.map(f => f.code);
  const ordinalOf = (code) => {
    const i = schemaOrder.indexOf(code);
    return i === -1 ? 999 : i;
  };
  const startOrd = groupDefs.map(g => g.startCode ? ordinalOf(g.startCode) : -1);
  const groupOrdOf = (origCode) => {
    const o = ordinalOf(origCode);
    let idx = 0;
    for (let i = 1; i < startOrd.length; i++) {
      if (o >= startOrd[i]) idx = i;
    }
    return idx;
  };

  // Bucket the fields
  const buckets = groupDefs.map(g => ({ ...g, fields: [] }));
  for (const f of fields) {
    const origCode = f.original_code || f.code;
    const idx = groupOrdOf(origCode);
    buckets[idx].fields.push(f);
  }

  // Persist accordion expand state per asset+group across renders.
  // Default: Building Basic open, others closed — broker starts from
  // the most important group and expands the rest as needed.
  if (!state.structureAccordions) state.structureAccordions = {};
  const stateKey = `${group.idx}`;
  if (!state.structureAccordions[stateKey]) {
    state.structureAccordions[stateKey] = new Set(['basic']);
  }
  const expanded = state.structureAccordions[stateKey];

  return buckets.map(bucket => {
    if (bucket.fields.length === 0) return null;
    const isOpen = expanded.has(bucket.id);
    const completed = bucket.fields.filter(f =>
      f.value != null && f.value !== '' && (Array.isArray(f.value) ? f.value.length > 0 : true)
    ).length;
    return el('div', { className: `structure-accordion ${isOpen ? 'open' : ''}` },
      el('button', {
        className: 'structure-accordion-head',
        type: 'button',
        onClick: () => {
          if (expanded.has(bucket.id)) expanded.delete(bucket.id);
          else expanded.add(bucket.id);
          render();
        },
      },
        el('div', { className: 'structure-accordion-title' }, bucket.label),
        el('div', { className: 'structure-accordion-meta' },
          el('span', { className: `structure-accordion-count ${completed === bucket.fields.length ? 'is-complete' : ''}` },
            `${completed}/${bucket.fields.length}`),
          el('span', { className: 'structure-accordion-chevron' }, isOpen ? '\u2303' : '\u2304'))),
      isOpen
        ? el('div', { className: 'structure-accordion-body' },
            ...renderAccordionBucketBody(bucket, lockedPredicate))
        : null);
  }).filter(Boolean);
}

// Render the body of a single accordion bucket. For the `basic` bucket
// we split out the 3 identity numbers (location#, building#, building
// count) into a tight 3-column row at the very top — these are the
// "which is this" fields and belong on a single visual line. Everything
// else in the bucket falls through to the standard 2-column grid.
function renderAccordionBucketBody(bucket, lockedPredicate) {
  if (bucket.id !== 'basic') {
    return [el('div', { className: 'form-grid form-grid-compact' },
      ...bucket.fields.map(f => {
        const locked = lockedPredicate(f);
        return renderFormField(f, !locked);
      }))];
  }

  // The basic-info bucket has a custom layout — fields are grouped into
  // named zones that match the broker's mental model rather than the
  // schema's flat field order. We pull each zone's fields out by code-tail
  // and render them in dedicated grid containers, then sweep up any
  // unclaimed fields into a final standard 2-col grid at the bottom.
  const tailMatch = (codes) => bucket.fields.find(f => {
    const tail = (f.original_code || f.code || '').toLowerCase().split('.').pop();
    return codes.includes(tail);
  });

  // ── Zone A: identity row (3-col)
  //    Location#, Building#, Number of Buildings
  const locField    = tailMatch(['location_number']);
  const bldgField   = tailMatch(['building_number']);
  const countField  = tailMatch(['building_count']);

  // ── Zone B: address (full width)
  const addressField = tailMatch(['location_address']);

  // ── Zone C: occupancy (full width pills)
  const occupancyField = tailMatch(['building_occupancy']);

  // ── Zone D: TIV + Sqft + derived Cost per SF (3-col, last is computed)
  const tivField  = tailMatch(['building_value']);
  const sqftField = tailMatch(['square_footage']);

  // ── Zone E: financial trio (3-col)
  //    Business Personal Property, Annual Sales, Ordinance and Law 2&3 Limit
  const bppField    = tailMatch(['bpp_limit']);
  const salesField  = tailMatch(['annual_sales']);
  const olField     = tailMatch(['ol_2and3_limit']);

  // ── Zone F: physical-attribute row (5-col)
  //    Year Built, Number of Stories, Open Sides?, Sprinklered?, Ex-Wind/Hail?
  const yearField     = tailMatch(['year_built']);
  const storiesField  = tailMatch(['stories']);
  const openSidesF    = tailMatch(['open_sided_status']);
  const sprinklerF    = tailMatch(['sprinklered_status']);
  const exWindF       = tailMatch(['ex_wind_status']);

  // ── Zone G: construction type (full width card grid)
  const constructionField = tailMatch(['construction_type']);

  // ── Zone H: valuation pair (2-col)
  //    Valuation Method + Coinsurance % — broker reads these together
  //    when assessing how the property is rated, so they belong on
  //    one visual row rather than separated in the catch-all.
  const valuationField = tailMatch(['valuation_method']);
  const coinsField     = tailMatch(['coinsurance_percentage']);

  // Set of every field handled explicitly above — anything NOT in this
  // set is unclaimed and gets dumped into the standard 2-col grid at
  // the bottom (catches GL Only, Roof Geometry, Roof Type, etc.).
  const claimed = new Set([
    locField, bldgField, countField, addressField, occupancyField,
    tivField, sqftField, bppField, salesField, olField,
    yearField, storiesField, openSidesF, sprinklerF, exWindF,
    constructionField, valuationField, coinsField,
  ].filter(Boolean).map(f => f.code));
  const remainingFields = bucket.fields.filter(f => !claimed.has(f.code));

  // Helper for rendering a field with the locked-predicate dance
  const rf = (f) => {
    if (!f) return null;
    const locked = lockedPredicate(f);
    return renderFormField(f, !locked);
  };

  const out = [];

  // Zone A: identity 3-col
  const identityFields = [locField, bldgField, countField].filter(Boolean);
  if (identityFields.length > 0) {
    out.push(el('div', { className: 'form-grid-trio' },
      ...identityFields.map(rf)));
  }

  // Zone B: address full
  if (addressField) {
    out.push(el('div', { className: 'form-grid form-grid-compact' }, rf(addressField)));
  }

  // Zone C: occupancy full
  if (occupancyField) {
    out.push(el('div', { className: 'form-grid form-grid-compact' }, rf(occupancyField)));
  }

  // Zone D: TIV + Sqft + derived Cost/SF (custom 3-col)
  if (tivField || sqftField) {
    out.push(renderTivSqftCostRow(tivField, sqftField, rf));
  }

  // Zone E: financial trio (3-col) — BPP, Annual Sales, OL 2&3 Limit
  const financialTrio = [bppField, salesField, olField].filter(Boolean);
  if (financialTrio.length > 0) {
    out.push(el('div', { className: 'form-grid-trio' },
      ...financialTrio.map(rf)));
  }

  // Zone F: physical-attribute row (5-col) — sits ABOVE Construction
  // Type. Reasoning: these short-answer fields about year/stories/safety
  // flags act as quick preamble before the broker picks the construction
  // class, which is the heaviest visual element in the section (a card
  // grid). Putting the row ABOVE construction keeps the heavy element
  // anchored at the bottom of the basic-info section.
  const physicalFields = [yearField, storiesField, openSidesF, sprinklerF, exWindF].filter(Boolean);
  if (physicalFields.length > 0) {
    out.push(el('div', { className: 'form-grid-quintet' },
      ...physicalFields.map(rf)));
  }

  // Zone G: construction type full
  if (constructionField) {
    out.push(el('div', { className: 'form-grid form-grid-compact' }, rf(constructionField)));
  }

  // Zone H: valuation method + coinsurance % (2-col, paired)
  const valuationPair = [valuationField, coinsField].filter(Boolean);
  if (valuationPair.length > 0) {
    out.push(el('div', { className: 'form-grid form-grid-compact' },
      ...valuationPair.map(rf)));
  }

  // Catch-all: any unclaimed fields drop into the standard 2-col grid
  if (remainingFields.length > 0) {
    out.push(el('div', { className: 'form-grid form-grid-compact' },
      ...remainingFields.map(rf)));
  }

  return out;
}

// Render the TIV + Square Footage + derived Cost-per-Square-Foot row.
// The cost-per-sf cell isn't an input — it's a computed read-only stat
// shown in brand blue. To keep it live as the broker types (without
// triggering full re-renders that would steal input focus), we tag
// the TIV and Sqft inputs by code and refresh just the derived cell's
// text content from a single delegated input listener attached to the
// row container. Recomputation is cheap and stays scoped to one DOM node.
function renderTivSqftCostRow(tivField, sqftField, rf) {
  const computeFromCurrent = () => {
    const readVal = (f) => {
      if (!f) return null;
      const dirty = state.submissionDirty[f.code];
      const val = dirty !== undefined ? dirty : unwrapForInput(f.value);
      const n = Number(val);
      return Number.isFinite(n) ? n : null;
    };
    const t = readVal(tivField);
    const s = readVal(sqftField);
    if (t == null || s == null || t <= 0 || s <= 0) return '\u2014';
    return `$${(t / s).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
  };
  const initialDisplay = computeFromCurrent();

  const valueEl = el('div', { className: 'derived-stat-value' }, initialDisplay);
  const derivedCell = el('div', { className: 'derived-stat' },
    el('label', { className: 'derived-stat-label' }, 'Cost per sq ft'),
    valueEl);

  const row = el('div', { className: 'form-grid-trio tiv-sqft-row' },
    rf(tivField),
    rf(sqftField),
    derivedCell);

  // Delegated input listener — recompute on every keystroke in the row.
  // Reads the live input values directly so we don't have to wait for
  // the auto-save debounce to land. Keeps focus on the active input
  // (no full re-render) by mutating only the derived cell's text.
  row.addEventListener('input', () => {
    const inputs = row.querySelectorAll('input[type="number"], input[type="text"]');
    let tivLive = null, sqftLive = null;
    inputs.forEach(inp => {
      const fieldDiv = inp.closest('.form-field');
      const labelText = fieldDiv?.querySelector('label')?.textContent || '';
      const n = Number(inp.value.replace(/[^\d.-]/g, ''));
      if (!Number.isFinite(n)) return;
      if (/tiv|building value/i.test(labelText)) tivLive = n;
      else if (/square footage|sq.?ft/i.test(labelText)) sqftLive = n;
    });
    if (tivLive != null && sqftLive != null && tivLive > 0 && sqftLive > 0) {
      valueEl.textContent = `$${(tivLive / sqftLive).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    } else {
      valueEl.textContent = '\u2014';
    }
  });

  return row;
}

// ──────────────────────────────────────────────────────────────
// Property-listing-style read body for non-asset sections
// (Insured, Application, Application 2, etc.)
//
// Mirrors renderAssetReadBody's approach but is fully generic — categories
// are inferred from field codes/labels rather than hardcoded by domain.
// ──────────────────────────────────────────────────────────────
function renderSectionReadBody(section, fields) {
  const visible = fields.filter(f => f.visible !== false);

  // ── Special-case: Insured-anchored merged section ────────────────
  // When the section contains `insured.name`, render the named insured
  // as the visual anchor with the mailing address as a clean address
  // block underneath. The rest of the fields (effective date, etc.)
  // follow as compact category rows.
  const insuredName = fields.find(f => f.code === 'insured.name');
  if (insuredName && hasValue(insuredName)) {
    return renderInsuredAnchoredBody(section, fields);
  }

  // ── Special-case: Limits and Coverages section ───────────────────
  // Render as 5+ coverage lines (Property, GL = standard always-on;
  // Equipment Breakdown, Cyber, TRIA, EPLI, Excess, Commercial Auto =
  // optional add-ons that broker chooses). This mirrors how the
  // Altruis quote document organizes the same data.
  if (section.label === 'Limits and Coverages') {
    return renderCoverageLinesBody(section, fields, false);
  }

  return renderGenericReadBody(section, visible);
}

// Insured-anchored body — used for the merged "Application" section that
// owns insured details + the small Application 1 field set.
function renderInsuredAnchoredBody(section, fields) {
  const visible = fields.filter(f => f.visible !== false);

  // ── 1. Identity block: named insured + entity + address ───────────
  const nameF      = fields.find(f => f.code === 'insured.name');
  const structureF = fields.find(f => f.code === 'app.named_insured_structure');

  // Address — there are two possible shapes from Joshu:
  //   (a) Single `insured.location` field — a Location object containing
  //       address_components and formatted_address. THIS IS THE COMMON CASE.
  //   (b) Split sub-fields like insured.location.street1, .city, .state, etc.
  //   (c) Fallback: insured.address as a single formatted string.
  // We try (a) first since that's what /submission-status returns.
  const locationF      = fields.find(f => f.code === 'insured.location');
  const fallbackAddrF  = fields.find(f => f.code === 'insured.address');
  const subFieldStreet = fields.find(f => /^insured\.(location|split_address)\.street1$/.test(f.code || ''));
  const subFieldCity   = fields.find(f => /^insured\.(location|split_address)\.city$/.test(f.code || ''));

  let addrLines = [];

  // (a) Location object with address_components
  if (locationF && locationF.value) {
    addrLines = extractAddressLinesFromLocation(locationF.value);
  }

  // (b) Sub-fields fallback
  if (!addrLines.length && (subFieldStreet || subFieldCity)) {
    const get = (codePart) => {
      const f = fields.find(ff => new RegExp(`^insured\\.(location|split_address)\\.${codePart}$`).test(ff.code || ''));
      return f ? unwrapForInput(f.value) : '';
    };
    const s1 = get('street1');
    const s2 = get('street2');
    const c  = get('city');
    const st = get('state');
    const z  = get('zipcode');
    const co = get('country');
    if (s1) addrLines.push(s1);
    if (s2) addrLines.push(s2);
    if (c || st || z) {
      const cityLine = [c, [st, z].filter(Boolean).join(' ')].filter(Boolean).join(', ');
      if (cityLine) addrLines.push(cityLine);
    }
    if (co && co !== 'US' && co !== 'USA') addrLines.push(co);
  }

  // (c) String fallback
  if (!addrLines.length && fallbackAddrF && hasValue(fallbackAddrF)) {
    addrLines.push(unwrapForInput(fallbackAddrF.value));
  }

  const identityBlock = el('div', { className: 'insured-identity' },
    el('div', { className: 'insured-name' }, unwrapForInput(nameF.value)),
    structureF && hasValue(structureF)
      ? el('div', { className: 'insured-entity' }, unwrapForInput(structureF.value))
      : null,
    addrLines.length
      ? el('div', { className: 'insured-address' },
          ...addrLines.map(line => el('div', { className: 'insured-address-line' }, line)))
      : null);

  // Mark the insured fields as claimed so they don't re-render below
  const claimed = new Set();
  if (nameF) claimed.add(nameF.code);
  if (structureF) claimed.add(structureF.code);
  if (locationF) claimed.add(locationF.code);
  if (fallbackAddrF) claimed.add(fallbackAddrF.code);
  // Sub-address fields and internal IDs — never display
  for (const f of fields) {
    const c = f.code || '';
    if (/^insured\.(location|split_address)\./.test(c)) claimed.add(c);
    if (c === 'insured.id') claimed.add(c);
  }

  // ── 2. Remaining fields, categorized — Effective Date, etc. ───────
  const remaining = visible.filter(f => !claimed.has(f.code));
  const populated = remaining.filter(f => hasValue(f));
  const requiredEmpty = remaining.filter(f => !hasValue(f) && f.required);
  const { bools, main: nonBoolPopulated } = partitionPopulatedFromBools(populated);

  // For the insured section we don't need a hero stat block — the named
  // insured IS the hero. Just render simple category rows.
  const categorized = categorizeFlatFields(nonBoolPopulated);
  const visibleCategories = categorized.filter(c => c.fields.length > 0);

  const categoryRows = visibleCategories.map(cat =>
    el('div', { className: 'asset-cat-row' },
      el('div', { className: 'asset-cat-label' }, cat.label),
      cat.style === 'list'
        ? el('div', { className: 'asset-cat-list' },
            ...cat.fields.map(f =>
              el('div', { className: 'asset-cat-list-row' },
                el('div', { className: 'asset-cat-list-label' }, f.label),
                el('div', { className: 'asset-cat-list-value' },
                  formatByType(f, unwrapForInput(f.value))))))
        : el('div', { className: 'asset-cat-values' },
            ...cat.fields.flatMap((f, i) => {
              const text = `${f.label}: ${formatByType(f, unwrapForInput(f.value))}`;
              const els = [el('span', { className: 'asset-cat-value' }, text)];
              if (i < cat.fields.length - 1) {
                els.push(el('span', { className: 'asset-cat-sep' }, '·'));
              }
              return els;
            }))));

  const boolStrip = bools.length > 0
    ? el('div', { className: 'asset-bool-strip' },
        ...bools.map(f => renderBoolChip(f)))
    : null;

  const missing = requiredEmpty.length > 0
    ? el('div', { className: 'asset-missing' },
        el('div', { className: 'asset-missing-label' },
          `${requiredEmpty.length} required field${requiredEmpty.length === 1 ? '' : 's'} not yet filled`),
        el('div', { className: 'asset-missing-list' },
          ...requiredEmpty.map(f => el('span', { className: 'asset-missing-item' }, f.label))))
    : null;

  return el('div', { className: 'flat-section-body insured-section' },
    identityBlock, ...categoryRows, boolStrip, missing);
}

// Extract clean address lines from a Joshu Location-typed value.
// Joshu Location values look like:
//   { Plain: { Location: { address_components: [...], formatted_address: "...", geometry: {...} } } }
// or already unwrapped to:
//   { address_components: [...], formatted_address: "..." }
// We pull the address_components and rebuild structured lines:
//   "383 North Front Street"
//   "Columbus, OH 43215"
function extractAddressLinesFromLocation(value) {
  if (!value || typeof value !== 'object') return [];
  // Walk through Plain/V1/Location wrappers if present
  let loc = value;
  if (loc.Plain) loc = loc.Plain;
  if (loc.V1) loc = loc.V1;
  if (loc.Location) loc = loc.Location;
  if (!loc || typeof loc !== 'object') return [];

  const components = loc.address_components;
  if (!Array.isArray(components) || !components.length) {
    // Fall back to formatted_address as a single line
    if (loc.formatted_address) return [String(loc.formatted_address)];
    return [];
  }

  // Helper to find an address component by type
  const find = (type) => {
    const c = components.find(c => Array.isArray(c.types) && c.types.includes(type));
    return c ? (c.long_name || c.short_name || '') : '';
  };

  const streetNumber = find('street_number');
  const route        = find('route');
  const subpremise   = find('subpremise');  // unit/apt #
  const city         = find('locality') || find('postal_town') || find('sublocality');
  const state        = components.find(c => Array.isArray(c.types) && c.types.includes('administrative_area_level_1'));
  const stateShort   = state ? (state.short_name || state.long_name || '') : '';
  const zipcode      = find('postal_code');
  const country      = components.find(c => Array.isArray(c.types) && c.types.includes('country'));
  const countryShort = country ? (country.short_name || '') : '';

  const lines = [];
  // Line 1: "383 North Front Street" (with optional unit suffix)
  let street = [streetNumber, route].filter(Boolean).join(' ');
  if (subpremise && street) street = `${street} #${subpremise}`;
  if (street) lines.push(street);

  // Line 2: "Columbus, OH 43215"
  const cityLine = [city, [stateShort, zipcode].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  if (cityLine) lines.push(cityLine);

  // Line 3: country (only if not US)
  if (countryShort && countryShort !== 'US' && countryShort !== 'USA') lines.push(countryShort);

  return lines;
}


// Generic property-listing body — used for sections that aren't insured-anchored.
function renderGenericReadBody(section, visible) {

  // Drop fully-empty fields entirely. The schema may report 30 fields for
  // a section but only 7 are populated — we don't want 23 dashes filling
  // the screen. Required-but-empty fields stay so the broker sees what's
  // missing.
  const populated = visible.filter(f => hasValue(f));
  const requiredEmpty = visible.filter(f => !hasValue(f) && f.required);

  // Partition booleans out
  const { bools, main: nonBoolPopulated } = partitionPopulatedFromBools(populated);

  // Categorize the populated non-bool fields by inferring their "kind"
  const categorized = categorizeFlatFields(nonBoolPopulated);

  // Hero stats: pick up to 4 strong numerics — money / count / percentage
  const heroPicks = pickHeroStats(nonBoolPopulated, 4);
  const heroCodes = new Set(heroPicks.map(f => f.code));

  // Filter heroPicks out of categorized rows so they don't double-display
  for (const cat of categorized) {
    cat.fields = cat.fields.filter(f => !heroCodes.has(f.code));
  }
  // Drop empty categories after the hero filter
  const visibleCategories = categorized.filter(c => c.fields.length > 0);

  // ── Render hero ────────────────────────────────────
  const hero = heroPicks.length > 0
    ? el('div', { className: 'asset-hero' },
        el('div', { className: 'asset-hero-stats' },
          ...heroPicks.map(f => el('div', { className: 'asset-hero-stat' },
            el('div', { className: 'asset-hero-stat-value' }, formatByType(f, unwrapForInput(f.value))),
            el('div', { className: 'asset-hero-stat-label' }, f.label)))))
    : null;

  // ── Render category rows ───────────────────────────
  const categoryRows = visibleCategories.map(cat =>
    el('div', { className: 'asset-cat-row' },
      el('div', { className: 'asset-cat-label' }, cat.label),
      cat.style === 'list'
        ? el('div', { className: 'asset-cat-list' },
            ...cat.fields.map(f =>
              el('div', { className: 'asset-cat-list-row' },
                el('div', { className: 'asset-cat-list-label' }, f.label),
                el('div', { className: 'asset-cat-list-value' },
                  formatByType(f, unwrapForInput(f.value))))))
        : el('div', { className: 'asset-cat-values' },
            ...cat.fields.flatMap((f, i) => {
              const text = `${f.label}: ${formatByType(f, unwrapForInput(f.value))}`;
              const els = [el('span', { className: 'asset-cat-value' }, text)];
              if (i < cat.fields.length - 1) {
                els.push(el('span', { className: 'asset-cat-sep' }, '·'));
              }
              return els;
            }))));

  // ── Render bool strip ──────────────────────────────
  const boolStrip = bools.length > 0
    ? el('div', { className: 'asset-bool-strip' },
        ...bools.map(f => renderBoolChip(f)))
    : null;

  // ── Required-but-empty callout ─────────────────────
  // Don't show empty fields as huge gray boxes — instead, list the field
  // labels in a compact "needs attention" callout at the bottom.
  const missing = requiredEmpty.length > 0
    ? el('div', { className: 'asset-missing' },
        el('div', { className: 'asset-missing-label' },
          `${requiredEmpty.length} required field${requiredEmpty.length === 1 ? '' : 's'} not yet filled`),
        el('div', { className: 'asset-missing-list' },
          ...requiredEmpty.map(f => el('span', { className: 'asset-missing-item' }, f.label))))
    : null;

  return el('div', { className: 'flat-section-body' }, hero, ...categoryRows, boolStrip, missing);
}
