  .variation-row-label { display: flex; flex-direction: column; gap: 4px; }
  .variation-row-name { font-weight: 500; font-size: 0.95rem; color: var(--ink); }
  .variation-row-help { font-size: 0.78rem; color: var(--ink-mute); line-height: 1.4; }
  .variation-row-badge {
    display: inline-block; align-self: flex-start;
    font-size: 0.68rem; font-weight: 500; letter-spacing: 0.04em;
    padding: 2px 8px; border-radius: var(--radius-pill);
    background: var(--blue); color: #fff;
  }
  .variation-row-control { display: flex; align-items: flex-start; }
  .variation-row-control select {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--line); border-radius: var(--radius-md);
    background: var(--white); font-size: 0.92rem; color: var(--ink);
  }
  .variation-row-control select:focus {
    outline: none; border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(103, 151, 238, 0.15);
  }
  .variation-multi {
    display: flex; flex-direction: column; gap: 8px; width: 100%;
  }
  .variation-checkbox {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0; cursor: pointer;
    font-size: 0.92rem; color: var(--ink);
  }
  .variation-checkbox input { margin: 0; }

  .kv-list dt {
    font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-mute); margin-top: 16px; font-weight: 600;
  }
  .kv-list dt:first-child { margin-top: 0; }
  .kv-list dd { font-size: 0.95rem; color: var(--ink); margin-top: 4px; font-weight: 500; }
  .kv-list dd.mono { font-family: inherit; font-size: 0.88rem; word-break: break-all; font-weight: 400; font-variant-numeric: tabular-nums; }

  /* Status banner at top of detail */
  .status-banner {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px; border-radius: var(--radius-md);
    margin-bottom: 24px; font-size: 0.92rem;
  }
  .status-banner-icon {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 1rem;
  }
  .status-banner-icon svg {
    width: 18px; height: 18px;
    display: block;
  }
  .status-banner.locked {
    background: var(--info-soft); color: var(--info);
    border-left: 3px solid var(--info);
  }
  .status-banner.locked .status-banner-icon { background: var(--info); color: #fff; }
  .status-banner.editable {
    background: var(--warn-soft); color: var(--warn);
    border-left: 3px solid var(--warn);
  }
  .status-banner.editable .status-banner-icon { background: var(--warn); color: #fff; }
  .status-banner.declined {
    background: var(--err-soft); color: var(--err);
    border-left: 3px solid var(--err);
  }
  .status-banner.declined .status-banner-icon { background: var(--err); color: #fff; }

  /* Two-line date+time render in the overview bar */
  .overview-datetime { line-height: 1.25; }
  .overview-datetime-date {
    font-size: 0.95rem; font-weight: 500;
    color: var(--navy);
  }
  .overview-datetime-time {
    font-size: 0.78rem; color: var(--mute);
    margin-top: 2px; font-weight: 400;
  }

  /* Horizontal overview bar — sits above the form instead of a right sidebar */
  .overview-bar {
    display: flex; flex-wrap: wrap; gap: 0;
    background: var(--white); border: 1px solid var(--line);
    border-radius: var(--radius-md);
    padding: 4px 0;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .overview-item {
    flex: 1 1 0;
    min-width: 140px;
    padding: 14px 22px;
    border-right: 1px solid var(--line-2);
  }
  .overview-item:last-child { border-right: none; }
  .overview-item-label {
    font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--mute); font-weight: 500; margin-bottom: 6px;
  }
  .overview-item-value {
    font-size: 0.95rem; color: var(--navy);
    font-weight: 500; letter-spacing: -0.01em;
  }
  .overview-item-value .mono {
    font-size: 0.78rem; font-weight: 400; color: var(--graphite);
  }
  @media (max-width: 900px) {
    .overview-bar { flex-direction: column; }
    .overview-item { border-right: none; border-bottom: 1px solid var(--line-2); }
    .overview-item:last-child { border-bottom: none; }
  }
  .status-banner.bound {
    background: var(--ok-soft); color: var(--ok);
    border-left: 3px solid var(--ok);
  }
  .status-banner.bound .status-banner-icon { background: var(--ok); color: #fff; }
  .status-banner-title { font-weight: 600; margin-bottom: 2px; }
  .status-banner-desc { color: inherit; opacity: 0.85; font-size: 0.85rem; }

  /* Empty state */
  .empty {
    padding: 72px 20px; text-align: center; color: var(--ink-mute);
    border: 1px dashed var(--line); border-radius: var(--radius-md);
    background: var(--paper);
  }
  .empty h3 { color: var(--ink); margin-bottom: 8px; font-size: 1.05rem; }
  .empty p { font-size: 0.9rem; }

  /* Empty-asset-shell — rendered when a multi-asset section (like Structures)
     has zero populated assets. Cleaner than 188 blank schema rows. */
  .empty-asset-shell {
    margin-top: 24px;
    padding: 56px 24px;
    text-align: center;
    border: 1px dashed var(--line-2);
    border-radius: var(--radius-md);
    background: var(--cream);
    color: var(--slate);
  }
  .empty-asset-icon {
    width: 48px; height: 48px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--white); border: 1px solid var(--line);
    color: var(--blue); font-size: 1.4rem; font-weight: 300;
    margin-bottom: 14px;
  }
  .empty-asset-title {
    font-size: 1rem; color: var(--navy); font-weight: 500;
    letter-spacing: -0.01em; margin-bottom: 6px;
  }
  .empty-asset-desc {
    font-size: 0.85rem; color: var(--mute);
    max-width: 420px; margin: 0 auto; line-height: 1.5;
  }

  /* Rail item for empty asset shells — muted, no "progress" styling */
  .section-nav-item.is-empty .section-nav-indicator {
    background: var(--white); color: var(--mute); border: 1px dashed var(--line);
  }
  .section-nav-item.is-empty .section-nav-count { color: var(--mute); font-style: italic; }

  /* Toast */
  #toast-host {
    position: fixed; top: 16px; right: 16px; z-index: 1000;
    display: flex; flex-direction: column; gap: 10px; max-width: 420px;
  }
  .toast {
    padding: 14px 18px; border-radius: var(--radius-md); font-size: 0.88rem;
    background: var(--navy); color: #fff; box-shadow: var(--shadow-lg);
    animation: slidein 200ms ease;
    border-left: 3px solid var(--blue);
    display: flex; gap: 12px; align-items: flex-start;
    /* Preserve newlines in the message — used by the submit-blocked
       toast that lists multiple incomplete sections. */
    white-space: pre-wrap;
    line-height: 1.5;
  }
  .toast.ok { border-left-color: var(--ok); }
  .toast.err { border-left-color: var(--err); }
  .toast::before {
    content: 'i'; font-weight: 700; font-size: 0.75rem;
    width: 18px; height: 18px; border-radius: 50%; background: var(--blue); color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .toast.ok::before { content: '✓'; background: var(--ok); }
  .toast.err::before { content: '!'; background: var(--err); }
  @keyframes slidein { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(15,37,66,0.5); z-index: 100;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 80px; backdrop-filter: blur(3px);
  }
  .modal {
    background: var(--white); padding: 36px; border-radius: var(--radius-lg);
    max-width: 560px; width: 90%; max-height: 85vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal h2 { font-size: 1.35rem; margin-bottom: 10px; }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 60px 20px; color: var(--ink-mute); font-size: 0.9rem; width: 100%;
  }
  .loading::before {
    content: ''; width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid var(--line); border-top-color: var(--blue);
    animation: spin 700ms linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  hr { border: none; border-top: 1px solid var(--line-soft); margin: 24px 0; }

  .saving-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.78rem; color: var(--ink-mute);
    padding: 4px 10px; background: var(--paper-warm);
    border-radius: var(--radius-pill);
  }
  .saving-chip.saved { color: var(--ok); background: var(--ok-soft); }
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-host"></div>

<script type="module">

// ═════════════════════════════════════════════════════════════════
// CORE UTILITIES
// ═════════════════════════════════════════════════════════════════
const $ = (s) => document.querySelector(s);
const el = (tag, props = {}, ...children) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props || {})) {
    if (v == null || v === false) continue;
    if (k === 'className') n.className = v;
    else if (k === 'style') Object.assign(n.style, v);
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') n.innerHTML = v;
    else if (k === 'checked') { if (v) n.setAttribute('checked', ''); }
    else if (v === true) n.setAttribute(k, '');
    else n.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    n.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return n;
};

function brandMark(color = 'white', size = 32) {
  // Small mountain-glyph mark — for sidebar and compact headers
  const file = color === 'navy' ? 'altruis-mark-navy.svg' : 'altruis-mark-white.svg';
  const img = document.createElement('img');
  img.src = `/assets/${file}`;
  img.alt = 'Altruis';
  img.style.width = `${size}px`;
  img.style.height = `${size}px`;
  img.style.display = 'block';
  return img;
}

// Environment indicator badge for the sidebar.
//
// Three distinct styles so a broker can verify at a glance which Joshu
// container the portal is talking to:
//   • test       → lime green "TEST" pill (reassuring — what we want)
//   • mock       → gray "MOCK" pill (no Joshu calls happening at all)
//   • production → red "PRODUCTION" pill (loud — should never see this
//     in normal broker use; if it shows, something is wrong with the
//     deployment configuration)
//
// The value comes from /api/config which the backend derives from the
// JOSHU_ENVIRONMENT env var at startup. The container is locked in on
// the backend at process boot — this badge is the visible proof of
// what container outbound API calls are routed to.
function renderEnvBadge() {
  const env = state.env;
  if (!env) {
    // Config not yet loaded — show a neutral placeholder rather than
    // implying something one way or the other.
    return el('span', { className: 'env-badge env-badge-unknown', title: 'Environment not yet loaded' }, '\u2026');
  }
  const config = {
    test:       { label: 'TEST',       cls: 'env-badge-test',       title: 'Connected to Joshu TEST container' },
    mock:       { label: 'MOCK',       cls: 'env-badge-mock',       title: 'Mock data — no Joshu calls' },
    production: { label: 'PRODUCTION', cls: 'env-badge-production', title: 'WARNING: Connected to Joshu PRODUCTION container' },
  }[env] || { label: env.toUpperCase(), cls: 'env-badge-unknown', title: `Unknown environment: ${env}` };
  return el('span', {
    className: `env-badge ${config.cls}`,
    title: config.title,
  }, config.label);
}

function brandWordmark(color = 'white', height = 42) {
  // Full "altruis group" wordmark — for login hero
  const file = color === 'navy' ? 'altruis-logo-navy.svg'
    : color === 'blue' ? 'altruis-logo-blue.svg'
    : 'altruis-logo-white.svg';
  const img = document.createElement('img');
  img.src = `/assets/${file}`;
  img.alt = 'Altruis Group';
  img.style.height = `${height}px`;
  img.style.width = 'auto';
  img.style.display = 'block';
  return img;
}

const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '—';
const fmtDateTime = (d) => d ? new Date(d).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';

// Cleaner two-line date+time render for the overview bar — the date sits
// above the time. Returns a virtual element rather than a string so the
// caller can inject it directly into a cell.
function fmtSubmittedDateTime(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return '—';
  const datePart = dt.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  const timePart = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  return el('div', { className: 'overview-datetime' },
    el('div', { className: 'overview-datetime-date' }, datePart),
    el('div', { className: 'overview-datetime-time' }, timePart));
}

// Map Joshu's flow value to a friendlier label. Joshu emits short codes
// like "New", "Renewal", etc. — we render with the word "Policy" appended
// where it reads more clearly.
function friendlyFlow(raw) {
  if (!raw) return '—';
  const s = String(raw).trim();
  const map = {
    'New':           'New Policy',
    'Renewal':       'Renewal Policy',
    'Endorsement':   'Endorsement',
    'Cancellation':  'Cancellation',
    'Reinstatement': 'Reinstatement',
  };
  // Case-insensitive lookup, but preserve original capitalization on miss
  for (const [key, val] of Object.entries(map)) {
    if (s.toLowerCase() === key.toLowerCase()) return val;
  }
  return s;
}

// Minimal padlock icon — single-stroke outline, no gradient or shading.
// Sized to inherit from .status-banner-icon's font-size; uses currentColor
// so banner-state styles tint it (blue when locked, etc.).
function lockIconSvg() {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 24 24');
  svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor');
  svg.setAttribute('stroke-width', '1.6');
  svg.setAttribute('stroke-linecap', 'round');
  svg.setAttribute('stroke-linejoin', 'round');
  svg.setAttribute('aria-hidden', 'true');
  // Shackle (the curve at the top)
  const shackle = document.createElementNS(ns, 'path');
  shackle.setAttribute('d', 'M8 10V7a4 4 0 0 1 8 0v3');
  // Body (rounded rectangle)
  const body = document.createElementNS(ns, 'rect');
  body.setAttribute('x', '5');
  body.setAttribute('y', '10');
  body.setAttribute('width', '14');
  body.setAttribute('height', '10');
  body.setAttribute('rx', '2');
  // Keyhole (small circle)
  const hole = document.createElementNS(ns, 'circle');
  hole.setAttribute('cx', '12');
  hole.setAttribute('cy', '15');
  hole.setAttribute('r', '1.2');
  svg.appendChild(shackle);
  svg.appendChild(body);
  svg.appendChild(hole);
  return svg;
}
const money = (n) => {
  if (n == null) return '—';
  return Math.abs(n).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
};

function userInitials(user) {
  if (!user) return '?';
  const name = user.name || user.email || '';
  const parts = name.split(/[\s@.]+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return '?';
}

function toast(msg, kind = '') {
  const t = el('div', { className: `toast ${kind}` }, el('div', {}, msg));
  $('#toast-host').appendChild(t);
  // Long messages need more reading time. Multi-line incomplete-fields
  // toasts can list 3-4 sections — at 4.2s that's barely scannable.
  // Scale dismissal: ~50ms per character, 4s minimum, 12s maximum.
  const ms = Math.max(4200, Math.min(12000, msg.length * 50));
  setTimeout(() => {
    t.style.opacity = '0'; t.style.transition = 'opacity 200ms';
    setTimeout(() => t.remove(), 200);
  }, ms);
}

async function api(path, opts = {}) {
  const { method = 'GET', body, silent = false } = opts;
  const init = { method, credentials: 'include', headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) init.body = JSON.stringify(body);
  const res = await fetch(path, init);
  if (res.status === 401) {
    state.user = null;
    render();
    throw new Error('Not authenticated');
  }
  if (!res.ok) {
    const errBody = await res.json().catch(() => ({ detail: res.statusText }));
    const msg = errBody.detail || errBody.message || res.statusText;
    if (!silent) toast(msg, 'err');
    throw new Error(msg);
  }
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : res.blob();
}

function statusBadge(s) {
  if (!s) return el('span', { className: 'badge badge-incomplete' }, '—');
  return el('span', { className: `badge badge-${s.toLowerCase()}` }, s);
}

function showModal(title, content) {
  const backdrop = el('div', {
    className: 'modal-backdrop',
    onClick: (e) => { if (e.target === backdrop) closeModal(); }
  }, el('div', { className: 'modal' },
    el('h2', {}, title), content));
  backdrop.id = 'modal';
  document.body.appendChild(backdrop);
}
function closeModal() { document.getElementById('modal')?.remove(); }

// Format a datapoint value for display (handles Joshu's Location and Monetary objects)
function formatDatapointValue(v) {
  if (v == null || v === '') return '—';
  if (typeof v === 'boolean') return v ? 'Yes' : 'No';
  if (typeof v === 'number') return v.toLocaleString();
  if (typeof v === 'string') return v;
  if (Array.isArray(v)) return v.map(formatDatapointValue).join(', ');
  if (typeof v === 'object') {
    // Defensive unwrap — if a Plain/V1/V0 wrapper leaks through the backend
    // unwrap chain, handle it client-side.
    for (const wrapper of ['Plain', 'V1', 'V0']) {
      if (v[wrapper] && typeof v[wrapper] === 'object') {
        const inner = v[wrapper];
        for (const typeKey of ['Text', 'Number', 'Date', 'DateTime', 'Boolean']) {
          if (typeKey in inner) return formatDatapointValue(inner[typeKey]);
        }
        if ('Null' in inner) return '—';
        if ('Monetary' in inner) return formatDatapointValue(inner.Monetary);
        if ('Location' in inner) return formatDatapointValue(inner.Location);
        if ('Array' in inner) return formatDatapointValue(inner.Array);
      }
    }
    // Monetary: { currency, amount }
    if (v.currency && v.amount != null) {
      const n = parseFloat(v.amount);
      if (!isNaN(n)) return n.toLocaleString('en-US', { style: 'currency', currency: v.currency });
      return `${v.amount} ${v.currency}`;
    }
    if (v.formatted_address) return v.formatted_address;
    if (v.name && typeof v.name === 'string') return v.name;
    if (v.NamedParsedAddress) return formatDatapointValue(v.NamedParsedAddress);
    if (v.ParsedGoogleAddress) return formatDatapointValue(v.ParsedGoogleAddress);
    return JSON.stringify(v);
  }
  return String(v);
}

// Unwrap for editable inputs — returns a plain value suitable for an HTML input
function unwrapForInput(v) {
  if (v == null) return '';
  if (typeof v === 'boolean' || typeof v === 'number' || typeof v === 'string') return v;
  // Arrays: already unwrapped list of simple values (like ["Self Storage"]).
  // Pass through so formatByType can join them for display.
  if (Array.isArray(v)) return v;
  if (typeof v === 'object') {
    for (const wrapper of ['Plain', 'V1', 'V0']) {
      if (v[wrapper] && typeof v[wrapper] === 'object') {
        const inner = v[wrapper];
        for (const typeKey of ['Text', 'Number', 'Date', 'DateTime', 'Boolean']) {
          if (typeKey in inner) return inner[typeKey];
        }
        if ('Null' in inner) return '';
        if ('Monetary' in inner) return unwrapForInput(inner.Monetary);
        if ('Location' in inner) return unwrapForInput(inner.Location);
        if ('Array' in inner) return Array.isArray(inner.Array) ? inner.Array : [];
      }
    }
    // Location — Joshu returns these as {NamedParsedAddress: {name}} or
    // {ParsedGoogleAddress: {formatted_address, ...}}. Unwrap to a plain string.
    if (v.NamedParsedAddress) return unwrapForInput(v.NamedParsedAddress);
    if (v.ParsedGoogleAddress) return unwrapForInput(v.ParsedGoogleAddress);
    if (v.formatted_address) return v.formatted_address;
    if (typeof v.name === 'string') return v.name;
    // Monetary — return amount as a string for number input
    if (v.currency && v.amount != null) return v.amount;
  }
  return '';
}

// ═════════════════════════════════════════════════════════════════
// APP STATE
// ═════════════════════════════════════════════════════════════════
const state = {
  user: null,
  env: 'mock',
  view: 'dashboard',
  subView: null,
  // Lists
  submissions: { loading: false, items: [], total: 0 },
  quotes: { loading: false, items: [], total: 0 },
  policies: { loading: false, items: [], total: 0 },
  documents: { loading: false, items: [], total: 0 },
  // Detail
  selectedSubmission: null,
  submissionForm: null,        // normalized schema + values for the current submission
  submissionFormState: 'view', // 'view' | 'edit'
  submissionDirty: {},         // pending edits
  submissionSaving: 'idle',    // 'idle' | 'saving' | 'saved'
  activeSection: null,         // currently selected section code in detail view
  expandedAssets: {},          // { [sectionCode]: Set<assetIdx> }  which asset cards are expanded
  activeAsset: null,           // { section, idx }  for right-sidebar scroll-link highlighting
  selectedQuote: null,
  selectedPolicy: null,
  // Set<string> of submission data point keys that were auto-filled by
  // document extraction, so the submission detail can render them with a
  // visual highlight. Populated by createSubmissionAndContinue() after
  // a successful extraction. The submission_id pairing prevents stale
  // highlights from showing on unrelated submissions; loadSubmission()
  // clears these when navigating to a different submission. The
  // highlight on a given field also clears when the broker manually
  // edits it (touching submissionDirty drops the highlight) — the edit
  // signals "I've reviewed this."
  extractedFields: new Set(),
  extractedFieldsForSubmissionId: null,
  // Variation form state — for the "Create variation" inline panel on
  // a quote detail page. Closed by default. When opened, `values` is
  // seeded from the parent quote via variationDefaultsFromQuote().
  variationForm: {
    open: false,
    parentQuoteId: null,
    values: {},
    submitting: false,
    error: null,
  },
  // Dashboard filter
  filter: { tab: 'all', search: '' },
  // Dashboard local UI state
  dashboard: {
    search: '',                  // search query in the page header
    scope: 'mine',               // 'mine' | 'agency' — pipeline panel toggle
    activityTab: 'attention',    // 'attention' | 'awaiting' | 'recent' | 'declined' | 'all'
    recentStatus: 'all',         // [legacy — retained for compatibility] 'all' | 'incomplete' | 'submitted' | 'declined' | 'bound'
    recentFlow: 'all',           // [legacy — retained for compatibility] 'all' | 'New' | 'Renewal' | 'Endorsement' | 'Cancellation'
  },
};

function render() {
  const root = $('#root');
  root.innerHTML = '';
  if (!state.user) {
    root.appendChild(loginView());
  } else {
    root.appendChild(appShell());
  }
}

// ═════════════════════════════════════════════════════════════════
// ENV BANNER
// ═════════════════════════════════════════════════════════════════
function envBanner() {
  const labels = {
    mock: 'Mock environment · No data is sent to Joshu · All records are in-memory',
    test: 'Test environment · Joshu test container · Not production',
    production: 'Production environment · Live data',
  };
  return el('div', { className: `env-banner ${state.env}` }, labels[state.env] || state.env);
}

// ═════════════════════════════════════════════════════════════════
// LOGIN
// ═════════════════════════════════════════════════════════════════
function loginView() {
  return el('div', { className: 'login-wrap' },
    el('div', { className: 'login-shell' }, loginLeft(), loginRight()));
}

// ─── Login canvas backdrop ───────────────────────────────────────────
// Animated node-network on the navy left panel, in the spirit of the
// website hero. Quiet field of muted points drifting on slow vectors,
// connecting via thin lines when within range, with a small set of
// accent nodes pulsing in brand blue as visual punctuation. Sized to
// the parent panel (not the viewport) so it cooperates with the 1.1fr
// grid column. DPR-aware. Respects prefers-reduced-motion.
function mountLoginCanvas(host) {
  const canvas = document.createElement('canvas');
  canvas.className = 'login-canvas';
  canvas.setAttribute('aria-hidden', 'true');
  host.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Tunables — kept here so they're easy to nudge.
  const NODE_DENSITY = 0.00018;     // doubled vs old version because nodes
                                     // outside the chevron are clipped away,
                                     // so we need more of them to keep the
                                     // visible chevron area populated.
  const ACCENT_RATIO = 0.12;
  const LINK_DIST = 150;
  const LINK_DIST_SQ = LINK_DIST * LINK_DIST;
  const SPEED = 0.12;
  const PULSE_PERIOD = 4200;

  // Colors. Chevron polygons render in brand blue (#6797EE) and deeper
  // blue (#2F5FB8). White at low alpha reads on both — same logic as
  // when the whole panel was brand-blue. Default nodes stay muted
  // blue-gray; on the cream paper around the chevron these would also
  // read fine but they're clipped away by the chevron mask anyway.
  const LINE_RGB = '255, 255, 255';
  const NODE_RGB = '184, 196, 217';
  const ACCENT_RGB = '255, 255, 255';

  // Chevron polygon coordinates in viewBox space (matches loginLeft()).
  // Used both to build the canvas clip path and to bias node spawning.
  const CHEVRON_VBOX = { w: 1100, h: 911 };
  const CHEVRON_POLYS = [
    [[1100,911],[559.2,0],[559.2,213.4],[908.6,802.1]],
    [[0,911],[191.4,802.1],[540.8,213.5],[540.8,0]],
    [[271.7,756.3],[540.8,603.2],[540.8,319.6]],
    [[828.3,756.3],[559.2,319.6],[559.2,603.2]],
  ];

  let nodes = [];
  let width = 0, height = 0, dpr = 1;
  let chevronScale = 0;             // scale factor: viewBox-units → canvas-px
  let chevronWidth = 0;             // width of chevron in canvas px (for spawn)
  let rafId = null;
  let startTs = performance.now();

  function rebuildNodes() {
    // Spawn within the chevron's pixel bbox rather than the whole canvas.
    // Anything outside gets clipped, so spawning there is wasted work.
    // Density is computed against the chevron area to keep visible
    // populations consistent regardless of viewport width.
    const chevronArea = chevronWidth * height;
    const target = Math.max(20, Math.round(chevronArea * NODE_DENSITY));
    nodes = [];
    for (let i = 0; i < target; i++) {
      const angle = Math.random() * Math.PI * 2;
      nodes.push({
        x: Math.random() * chevronWidth,
        y: Math.random() * height,
        vx: Math.cos(angle) * SPEED * (0.5 + Math.random()),
        vy: Math.sin(angle) * SPEED * (0.5 + Math.random()),
        accent: Math.random() < ACCENT_RATIO,
        phase: Math.random() * PULSE_PERIOD,
      });
    }
  }

  function resize() {
    const rect = host.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = rect.width;
    height = rect.height;
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // Chevron is height-100% with preserved aspect, anchored top-left.
    // So scale = canvas height / viewBox height; chevron pixel width
    // follows from viewBox aspect.
    chevronScale = height / CHEVRON_VBOX.h;
    chevronWidth = CHEVRON_VBOX.w * chevronScale;
    rebuildNodes();
  }

  // Build a Path2D matching the chevron polygons in current canvas pixel
  // space. Rebuilt each frame because it's cheap and avoids stale state
  // after resize. Used as a clip region so the network only renders
  // inside the chevron silhouette.
  function buildChevronClip() {
    const path = new Path2D();
    for (const poly of CHEVRON_POLYS) {
      for (let i = 0; i < poly.length; i++) {
        const [vx, vy] = poly[i];
        const px = vx * chevronScale;
        const py = vy * chevronScale;
        if (i === 0) path.moveTo(px, py);
        else path.lineTo(px, py);
      }
      path.closePath();
    }
    return path;
  }

  function draw(ts) {
    const elapsed = ts - startTs;
    ctx.clearRect(0, 0, width, height);

    // Step 1: advance positions, wrap at edges of the chevron bbox.
    // Wrapping at the chevron bbox (not the full canvas) keeps node
    // population concentrated where the clip will let it render.
    for (const n of nodes) {
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < -10) n.x = chevronWidth + 10;
      else if (n.x > chevronWidth + 10) n.x = -10;
      if (n.y < -10) n.y = height + 10;
      else if (n.y > height + 10) n.y = -10;
    }

    // Step 2: clip to chevron silhouette, then draw network. save/restore
    // so the clip doesn't persist into the next frame.
    ctx.save();
    ctx.clip(buildChevronClip());

    // Lines first so node dots sit on top.
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const distSq = dx * dx + dy * dy;
        if (distSq > LINK_DIST_SQ) continue;
        const dist = Math.sqrt(distSq);
        const alpha = (1 - dist / LINK_DIST) * 0.22;
        ctx.strokeStyle = `rgba(${LINE_RGB}, ${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    for (const n of nodes) {
      if (n.accent) {
        const t = ((elapsed + n.phase) % PULSE_PERIOD) / PULSE_PERIOD;
        const pulse = 0.45 + 0.55 * (0.5 - 0.5 * Math.cos(t * Math.PI * 2));
        ctx.fillStyle = `rgba(${ACCENT_RGB}, ${0.55 * pulse + 0.25})`;
        ctx.beginPath();
        ctx.arc(n.x, n.y, 1.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = `rgba(${ACCENT_RGB}, ${0.18 * pulse})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(n.x, n.y, 5 + pulse * 3, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        ctx.fillStyle = `rgba(${NODE_RGB}, 0.5)`;
        ctx.beginPath();
        ctx.arc(n.x, n.y, 1.3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
    rafId = requestAnimationFrame(draw);
  }

  function start() {
    resize();
    if (reduceMotion) {
      // Single static frame, no loop
      draw(performance.now());
      cancelAnimationFrame(rafId);
      rafId = null;
      return;
    }
    rafId = requestAnimationFrame(draw);
  }

  // ResizeObserver tracks the panel itself (not just the viewport),
  // which matters because the login-left column responds to the grid
  // breakpoint at 900px and any sidebar width changes.
  const ro = new ResizeObserver(() => {
    resize();
    if (reduceMotion) draw(performance.now());
  });
  ro.observe(host);

  // Pause when the tab is hidden — saves a meaningful chunk of CPU
  // for a page that often sits open in a background tab.
  const visHandler = () => {
    if (document.hidden) {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
    } else if (!reduceMotion && rafId === null) {
      rafId = requestAnimationFrame(draw);
    }
  };
  document.addEventListener('visibilitychange', visHandler);

  start();

  // Return a cleanup handle in case we ever route away from login
  // without a full page reload (currently we don't — login uses
  // location.reload — but better to be tidy than leak a RAF loop).
  return () => {
    if (rafId) cancelAnimationFrame(rafId);
    ro.disconnect();
    document.removeEventListener('visibilitychange', visHandler);
    canvas.remove();
  };
}

function loginLeft() {
  // Full Altruis chevron icon, rendered as inline SVG so its proper
  // aspect ratio (1.21:1, slightly wider than tall) is preserved by
  // the viewBox regardless of viewport dimensions. Four polygons:
  //   - Two outer strokes in brand blue (the chevron's wings)
  //   - Two inner triangles in deeper brand blue (the duo-tone depth
  //     pieces inside each wing)
  // Coordinates lifted directly from the icon SVG, with the bounding
  // box translated to origin (was x∈[200,1300] y∈[294.5,1205.5]).
  // SVG anchored top-left of the shell, height 100% of viewport, width
  // auto — preserves the icon's geometry crisp at any aspect ratio.
  // <svg> requires the XML namespace, hence createElementNS.
  //
  // Network animation canvas mounts onto the shell as a sibling, sized
  // to the full shell. The canvas's draw loop clips to the chevron
  // polygons each frame so the network only renders inside the icon
  // silhouette — see mountLoginCanvas.
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('class', 'login-chevron');
  svg.setAttribute('viewBox', '0 0 1100 911');
  svg.setAttribute('preserveAspectRatio', 'xMinYMid meet');
  svg.setAttribute('aria-hidden', 'true');

  const polys = [
    { points: '1100,911 559.2,0 559.2,213.4 908.6,802.1',  fill: '#6797EE' },
    { points: '0,911 191.4,802.1 540.8,213.5 540.8,0',     fill: '#6797EE' },
    { points: '271.7,756.3 540.8,603.2 540.8,319.6',       fill: '#2F5FB8' },
    { points: '828.3,756.3 559.2,319.6 559.2,603.2',       fill: '#2F5FB8' },
  ];
  for (const p of polys) {
    const poly = document.createElementNS(NS, 'polygon');
    poly.setAttribute('points', p.points);
    poly.setAttribute('fill', p.fill);
    svg.appendChild(poly);
  }

  // Defer canvas mount so the SVG (and its parent shell) are in the
  // DOM with a measurable bounding rect before the canvas tries to
  // size itself. parentElement at this point is the login-shell.
  queueMicrotask(() => {
    const shell = svg.parentElement;
    if (shell) mountLoginCanvas(shell);
  });

  return svg;
}

function loginRight() {
  const form = { email: '', password: '', loading: false, error: null };
  const card = el('div', { className: 'login-card' });

  const rerender = () => {
    card.innerHTML = '';
    card.appendChild(el('h2', {}, 'Sign in to your portal'));
    card.appendChild(el('p', { className: 'lead' }, 'Access your agency’s submissions, quotes, and policies.'));

    const fEl = el('form', {
      onSubmit: async (e) => {
        e.preventDefault();
        form.loading = true; form.error = null; rerender();
        try {
          const res = await api('/api/auth/login', {
            method: 'POST',
            body: { email: form.email, password: form.password },
            silent: true,
          });
          state.user = res.user;
          state.env = res.environment;
          render();
          setTimeout(loadView, 0);
        } catch (e) {
          form.loading = false;
          form.error = e.message;
          rerender();
        }
      }
    },
      el('div', { className: 'field' },
        el('label', {}, 'Email'),
        el('input', { type: 'email', required: true, autofocus: true,
          placeholder: 'you@agency.com',
          value: form.email, onInput: (e) => { form.email = e.target.value; } })),
      el('div', { className: 'field' },
        el('label', {}, 'Password'),
        el('input', { type: 'password', required: true, placeholder: '••••••••',
          value: form.password, onInput: (e) => { form.password = e.target.value; } })),
      form.error ? el('div', { className: 'login-err' }, form.error) : null,
      el('button', { type: 'submit', disabled: form.loading },
        form.loading ? 'Signing in' : 'Sign in'));
    card.appendChild(fEl);

    if (state.env === 'mock') {
      card.appendChild(el('div', { className: 'login-hint' },
        el('strong', { style: { color: 'var(--ink)' } }, 'Demo accounts'),
        el('div', { style: { marginTop: '8px' } },
          'Try ', el('code', {}, 'jane.broker@acmesurplus.com'),
          '. Any password works in mock mode.')));
    }

    setTimeout(() => {
      const first = card.querySelector('input');
      if (first && !form.loading) first.focus();
    }, 0);
  };

  rerender();
  return el('div', { className: 'login-right' }, card);

// ═════════════════════════════════════════════════════════════════
// VIEW ROUTER
// ═════════════════════════════════════════════════════════════════
function viewRouter() {
  switch (state.view) {
    case 'dashboard': return dashboardView();
    case 'submissions': return state.subView ? submissionDetailView() : submissionsListView();
    case 'quotes': return state.subView ? quoteDetailView() : quotesListView();
    case 'policies': return state.subView ? policyDetailView() : policiesListView();
    case 'documents': return documentsView();
    case 'new-submission': return newSubmissionView();
    default: return dashboardView();
  }
}

async function loadView() {
  try {
    if (state.view === 'submissions' && !state.subView) {
      state.submissions.loading = true; render();
      const res = await api('/api/submissions?per_page=50');
      state.submissions = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'quotes' && !state.subView) {
      state.quotes.loading = true; render();
      const res = await api('/api/quotes?per_page=50');
      state.quotes = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'policies' && !state.subView) {
      state.policies.loading = true; render();
      const res = await api('/api/policies?per_page=50');
      state.policies = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'documents') {
      state.documents.loading = true; render();
      const res = await api('/api/documents?per_page=50');
      state.documents = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'dashboard') {
      const [subs, quotes, pols, docs] = await Promise.all([
        api('/api/submissions?per_page=50').catch(() => ({ items: [], total_items: 0 })),
        api('/api/quotes?per_page=50').catch(() => ({ items: [], total_items: 0 })),
        api('/api/policies?per_page=50').catch(() => ({ items: [], total_items: 0 })),
        api('/api/documents?per_page=50').catch(() => ({ items: [], total_items: 0 })),
      ]);
      state.submissions = { loading: false, items: subs.items || [], total: subs.total_items || 0 };
      state.quotes = { loading: false, items: quotes.items || [], total: quotes.total_items || 0 };
      state.policies = { loading: false, items: pols.items || [], total: pols.total_items || 0 };
      state.documents = { loading: false, items: docs.items || [], total: docs.total_items || 0 };
      render();
    }
  } catch (e) { /* toast shown */ }
}

// ═════════════════════════════════════════════════════════════════
// DASHBOARD
// ═════════════════════════════════════════════════════════════════
function dashboardView() {
  const subs = state.submissions.items || [];
  const quotes = state.quotes.items || [];
  const policies = state.policies.items || [];

  // ── Pipeline counts (always over the full set, not filtered) ───────
  const total = subs.length;
  const drafts = subs.filter(s => s.status === 'Incomplete').length;
  const inUw = subs.filter(s => s.status === 'Submitted' || s.status === 'Pending').length;
  const declined = subs.filter(s => s.status === 'Declined').length;

  // ── Greeting (compact: no subgreeting; the page itself shows what
  //    the pipeline looks like) ───────────────────────────────────────
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const firstName = (state.user.name || state.user.email || 'Broker').split(' ')[0]
    .replace(/\d+$/, '');  // strip trailing digits ("Jasonbeneducci2" → "Jasonbeneducci")

  return el('div', { className: 'dashboard' },
    // Compact header — greeting on left, search on right. The "New
    // submission" button has moved to the persistent sidebar CTA, so
    // it doesn't need to appear here too.
    el('div', { className: 'dashboard-header' },
      el('div', { className: 'dashboard-header-left' },
        el('h1', { className: 'dashboard-greeting' }, `${greeting}, ${firstName}.`)),
      el('div', { className: 'dashboard-header-actions' },
        renderHeaderSearch(subs))),

    // Thin pipeline strip — total + segmented bar + scope toggle.
    // Replaces the heavier pipeline-panel which dominated the page.
    renderPipelineStrip(total, { drafts, inUw, declined }),

    // Unified activity list — replaces both the "Needs your attention"
    // panel and the separate "Recent activity" list. The broker
    // toggles between cohorts via filter chips.
    renderActivitySection(subs, quotes, policies)
  );
}

// ─── Pipeline strip ──────────────────────────────────────────────────
function renderPipelineStrip(total, { drafts, inUw, declined }) {
  if (total === 0) {
    // Special case — empty book. Don't render the strip; the
    // activity section will show a useful empty state instead.
    return null;
  }
  const draftPct = (drafts / total) * 100;
  const uwPct = (inUw / total) * 100;
  const declinedPct = (declined / total) * 100;
  const otherPct = Math.max(0, 100 - draftPct - uwPct - declinedPct);

  return el('div', { className: 'pipeline-strip' },
    el('div', { className: 'pipeline-strip-total' },
      el('span', { className: 'pipeline-strip-total-num' }, String(total)),
      el('span', { className: 'pipeline-strip-total-label' },
        total === 1 ? 'submission' : 'submissions')),
    el('div', { className: 'pipeline-strip-bar', title: 'Pipeline composition' },
      drafts ? el('span', { className: 'pipeline-strip-bar-draft', style: { flex: String(draftPct) } }) : null,
      inUw ? el('span', { className: 'pipeline-strip-bar-uw', style: { flex: String(uwPct) } }) : null,
      declined ? el('span', { className: 'pipeline-strip-bar-declined', style: { flex: String(declinedPct) } }) : null,
      otherPct > 0 ? el('span', { style: { flex: String(otherPct), background: 'var(--line-2, var(--line))' } }) : null),
    el('div', { className: 'pipeline-strip-legend' },
      drafts ? el('span', { className: 'pipeline-strip-legend-item' },
        el('span', { className: 'pipeline-strip-legend-dot draft' }),
        `${drafts} draft${drafts === 1 ? '' : 's'}`) : null,
      inUw ? el('span', { className: 'pipeline-strip-legend-item' },
        el('span', { className: 'pipeline-strip-legend-dot uw' }),
        `${inUw} awaiting quote`) : null,
      declined ? el('span', { className: 'pipeline-strip-legend-item' },
        el('span', { className: 'pipeline-strip-legend-dot declined' }),
        `${declined} declined`) : null),
    el('div', { className: 'pipeline-strip-scope' }, renderScopeToggle())
  );
}

// ─── Activity section (chip filters + unified list) ──────────────────
function renderActivitySection(subs, quotes, policies) {
  // The lane logic from computeAttentionLanes still drives "what needs
  // attention" — but instead of rendering as a separate panel, we use
  // the lane categorization to filter the unified activity list.
  const lanes = computeAttentionLanes(subs, quotes, policies);

  // Identify the IDs of submissions whose quotes are ready for review.
  const readyQuoteSubIds = new Set(
    (quotes || [])
      .filter(q =>
        q.status === 'QuotePublished' ||
        q.status === 'BinderPublished' ||
        q.status === 'QuoteIndication'
      )
      .map(q => q.submission_id)
  );

  // Cohorts:
  //   attention = drafts + submissions with ready quotes (the union of
  //               "you owe us something" and "we've returned a quote")
  //   awaiting  = submissions sitting with the underwriter
  //   recent    = recently bound (last 60 days) — the "good news" tab
  //   declined  = recently declined
  //   all       = everything, sorted by recency
  const subsAttention = subs.filter(s =>
    s.status === 'Incomplete' || readyQuoteSubIds.has(s.id) || readyQuoteSubIds.has(s.unique_id)
  );
  const subsAwaiting = subs.filter(s =>
    (s.status === 'Submitted' || s.status === 'Pending')
    && !readyQuoteSubIds.has(s.id) && !readyQuoteSubIds.has(s.unique_id)
  );
  const sixtyDaysAgo = Date.now() - 60 * 24 * 60 * 60 * 1000;
  const subsRecent = subs.filter(s =>
    s.bound_at && new Date(s.bound_at).getTime() >= sixtyDaysAgo
  );
  const subsDeclined = subs.filter(s => s.status === 'Declined');

  const cohorts = {
    attention: subsAttention,
    awaiting:  subsAwaiting,
    recent:    subsRecent,
    declined:  subsDeclined,
    all:       subs,
  };

  // Default tab — if "attention" is empty but other things exist,
  // fall through to "all" so the broker isn't staring at an empty list.
  let tab = state.dashboard.activityTab;
  if (tab === 'attention' && cohorts.attention.length === 0 && subs.length > 0) {
    tab = 'all';
  }

  const items = [...cohorts[tab]]
    .sort((a, b) => new Date(b.modified_at || b.created_at || 0) - new Date(a.modified_at || a.created_at || 0))
    .slice(0, 12);

  const chips = [
    { value: 'attention', label: 'Needs action',     count: cohorts.attention.length },
    { value: 'awaiting',  label: 'Awaiting quote',   count: cohorts.awaiting.length },
    { value: 'recent',    label: 'Recently bound',   count: cohorts.recent.length },
    { value: 'declined',  label: 'Declined',         count: cohorts.declined.length },
    { value: 'all',       label: 'All',              count: cohorts.all.length },
  ];

  return el('div', { className: 'activity-section' },
    el('div', { className: 'activity-section-head' },
      el('div', { className: 'activity-chips' },
        ...chips.map(c => el('button', {
          className: 'activity-chip' + (c.value === tab ? ' active' : ''),
          onClick: () => { state.dashboard.activityTab = c.value; render(); },
        },
          c.label,
          el('span', { className: 'activity-chip-count' }, String(c.count))
        ))),
      el('div', { className: 'activity-section-aux' },
        el('button', {
          className: 'btn btn-ghost btn-sm',
          onClick: () => { state.view = 'submissions'; render(); loadView(); },
        }, 'View all \u2192'))),

    items.length === 0
      ? el('div', { className: 'activity-empty' },
          el('div', { className: 'activity-empty-title' },
            tab === 'attention' ? 'You\u2019re all caught up.' : 'Nothing to show in this view.'),
          el('div', { className: 'activity-empty-body' },
            tab === 'attention'
              ? 'No drafts in progress and no quotes waiting on your review.'
              : 'Try a different filter, or start a new submission.'))
      : el('div', { className: 'activity-list' },
          ...items.map(s => recentSubmissionRow(s))));
}

// ─── Header search bar ───────────────────────────────────────────────
// Free-text filter on insured name OR submission #. Inline result list
// appears beneath when there's input. Click result → jumps to that
// submission's detail view.
function renderHeaderSearch(subs) {
  const query = state.dashboard.search.trim().toLowerCase();
  const showResults = query.length >= 2;

  let matches = [];
  if (showResults) {
    matches = subs.filter(s => {
      const name = (extractInsuredName(s) || '').toLowerCase();
      const id = String(s.id || '');
      return name.includes(query) || id.includes(query);
    }).slice(0, 6);
  }

  return el('div', { className: 'header-search' },
    el('div', { className: 'header-search-input-wrap' },
      el('span', { className: 'header-search-icon' }, searchIconSvg()),
      el('input', {
        type: 'search',
        className: 'header-search-input',
        placeholder: 'Search insured or submission #',
        value: state.dashboard.search,
        onInput: (e) => {
          state.dashboard.search = e.target.value;
          // Re-render only the search dropdown — full re-render is cheap
          // here because the dashboard is light, so just call render().
          render();
        },
      })),
    showResults && matches.length > 0
      ? el('div', { className: 'header-search-results' },
          ...matches.map(s => el('button', {
            className: 'header-search-result',
            onClick: () => {
              state.view = 'submissions';
              state.subView = s.id;
              state.dashboard.search = '';
              loadSubmission(s.id);
            }
          },
            el('div', { className: 'header-search-result-name' },
              extractInsuredName(s) || `Submission #${s.id}`),
            el('div', { className: 'header-search-result-meta' },
              `#${s.id} \u00b7 ${friendlyFlow(s.flow)} \u00b7 ${s.status}`))))
      : showResults
      ? el('div', { className: 'header-search-results' },
          el('div', { className: 'header-search-empty' }, 'No matches'))
      : null);

function searchIconSvg() {

// ─── Compute the 4 attention lanes ───────────────────────────────────
// Returns an object describing what's actionable in each lane.
function computeAttentionLanes(subs, quotes, policies) {
  // Lane 1: Quotes ready for review
  // A "ready quote" = a quote whose status indicates the underwriter
  // has finished and the broker needs to act. QuotePublished and
  // BinderPublished are the two main "broker-actionable" states.
  const readyQuotes = (quotes || []).filter(q =>
    q.status === 'QuotePublished' ||
    q.status === 'BinderPublished' ||
    q.status === 'QuoteIndication'
  );
  // Break down ready quotes by the flow of the underlying submission
  // (so we can say "1 new policy, 1 endorsement, 1 renewal").
  // We need to look up each quote's submission_id in the subs list.
  const flowsForReady = readyQuotes.reduce((acc, q) => {
    const sub = subs.find(s => s.id === q.submission_id || s.unique_id === q.submission_id);
    const flow = sub?.flow || 'New';
    acc[flow] = (acc[flow] || 0) + 1;
    return acc;
  }, {});
  const earliestReadyQuote = readyQuotes
    .map(q => ({ q, sub: subs.find(s => s.id === q.submission_id) }))
    .filter(x => x.sub)
    .sort((a, b) => new Date(a.q.created_at || 0) - new Date(b.q.created_at || 0))[0];

  // Lane 2: Drafts in progress
  const draftSubs = subs
    .filter(s => s.status === 'Incomplete')
    .sort((a, b) => new Date(b.modified_at || b.created_at) - new Date(a.modified_at || a.created_at));
  const oldestDraft = draftSubs[draftSubs.length - 1];

  // Lane 3: Renewals coming up (next 60 days)
  // We need policies with renews_at within the window.
  const now = new Date();
  const sixtyDaysOut = new Date(now.getTime() + 60 * 24 * 60 * 60 * 1000);
  const renewals = (policies || []).filter(p => {
    if (!p.renews_at) return false;
    const r = new Date(p.renews_at);
    return r >= now && r <= sixtyDaysOut;
  }).sort((a, b) => new Date(a.renews_at) - new Date(b.renews_at));
  const earliestRenewal = renewals[0];

  // Lane 4: Recently declined
  const declinedSubs = subs
    .filter(s => s.status === 'Declined')
    .sort((a, b) => new Date(b.declined_at || b.modified_at || 0) - new Date(a.declined_at || a.modified_at || 0));

  return {
    readyQuotes: {
      count: readyQuotes.length,
      flows: flowsForReady,
      earliestQuote: earliestReadyQuote?.q,
      earliestSub: earliestReadyQuote?.sub,
    },
    drafts: {
      count: draftSubs.length,
      latest: draftSubs[0],
      oldest: oldestDraft,
    },
    renewals: {
      count: renewals.length,
      earliest: earliestRenewal,
    },
    declined: {
      count: declinedSubs.length,
      mostRecent: declinedSubs[0],
    },
  };
}

// ─── Attention panel (4 lanes) ──────────────────────────────────────
function renderAttentionPanel(lanes) {
  // Suppress the panel entirely if there's nothing actionable.
  const anyLane = lanes.readyQuotes.count + lanes.drafts.count
    + lanes.renewals.count + lanes.declined.count;
  if (anyLane === 0) {
    return el('div', { className: 'attention-panel attention-panel-empty' },
      el('div', { className: 'attention-panel-empty-title' }, 'You\u2019re all caught up.'),
      el('div', { className: 'attention-panel-empty-body' },
        'No quotes to review, drafts to finish, or renewals coming up.'));
  }

  const items = [];

  // Lane 1: Quotes ready for review
  if (lanes.readyQuotes.count > 0) {
    const q = lanes.readyQuotes;
    const flowParts = Object.entries(q.flows).map(([flow, n]) => {
      const label = flow === 'Endorsement' ? 'endorsement'
        : flow === 'Renewal' ? 'renewal'
        : flow === 'Cancellation' ? 'cancellation'
        : 'new policy';
      return n === 1 ? `1 ${label}` : `${n} ${label}s`;
    });
    let detail = flowParts.join(' \u00b7 ');
    if (q.earliestSub) {
      const earliestName = extractInsuredName(q.earliestSub) || `Submission #${q.earliestSub.id}`;
      const ago = formatRelativeTime(q.earliestQuote?.created_at);
      detail += detail ? ` \u00b7 Earliest: ${earliestName}` : `Earliest: ${earliestName}`;
      if (ago) detail += ` (${ago})`;
    }
    items.push(attentionLaneRow({
      kind: 'priority',
      title: q.count === 1 ? '1 quote ready for review' : `${q.count} quotes ready for review`,
      detail,
      ctaLabel: 'Review',
      onClick: () => { state.view = 'quotes'; render(); loadView(); },
    }));
  }

  // Lane 2: Drafts in progress
  if (lanes.drafts.count > 0) {
    const d = lanes.drafts;
    let detail = '';
    if (d.latest) {
      const name = extractInsuredName(d.latest) || `Submission #${d.latest.id}`;
      const ago = formatRelativeTime(d.latest.modified_at || d.latest.created_at);
      detail = name + (ago ? ` \u00b7 last touched ${ago}` : '');
    }
    items.push(attentionLaneRow({
      kind: 'normal',
      title: d.count === 1 ? '1 draft in progress' : `${d.count} drafts in progress`,
      detail,
      ctaLabel: 'Finish',
      onClick: () => {
        state.view = 'submissions';
        state.filter.tab = 'drafts';
        render();
        loadView();
      },
    }));
  }

  // Lane 3: Renewals
  if (lanes.renewals.count > 0) {
    const r = lanes.renewals;
    let detail = '';
    if (r.earliest) {
      const name = r.earliest.insured_name || 'Policy';
      detail = `Earliest: ${name} \u00b7 renews ${fmtDate(r.earliest.renews_at)}`;
    }
    items.push(attentionLaneRow({
      kind: 'normal',
      title: r.count === 1
        ? '1 renewal in the next 60 days'
        : `${r.count} renewals in the next 60 days`,
      detail,
      ctaLabel: 'View',
      onClick: () => { state.view = 'policies'; render(); loadView(); },
    }));
  }

  // Lane 4: Recently declined
  if (lanes.declined.count > 0) {
    const dc = lanes.declined;
    let detail = '';
    if (dc.mostRecent) {
      const name = extractInsuredName(dc.mostRecent) || `Submission #${dc.mostRecent.id}`;
      const ago = formatRelativeTime(dc.mostRecent.declined_at || dc.mostRecent.modified_at);
      detail = `Most recent: ${name}` + (ago ? ` (${ago})` : '');
    }
    items.push(attentionLaneRow({
      kind: 'normal',
      title: dc.count === 1 ? '1 recently declined' : `${dc.count} recently declined`,
      detail,
      ctaLabel: 'Review',
      onClick: () => {
        state.view = 'submissions';
        state.filter.tab = 'declined';
        render();
        loadView();
      },
    }));
  }

  return el('div', { className: 'attention-panel' },
    el('div', { className: 'attention-panel-head' },
      el('div', { className: 'attention-panel-title' }, 'Needs your attention')),
    el('div', { className: 'attention-panel-body' }, ...items));
}

function attentionLaneRow({ kind, title, detail, ctaLabel, onClick }) {
  return el('button', { className: `attention-lane attention-lane-${kind}`, onClick },
    el('div', { className: 'attention-lane-bullet' }),
    el('div', { className: 'attention-lane-text' },
      el('div', { className: 'attention-lane-title' }, title),
      detail ? el('div', { className: 'attention-lane-detail' }, detail) : null),
    el('div', { className: 'attention-lane-cta' }, `${ctaLabel} \u2192`));

// Format a timestamp as relative time: "12 min ago", "2 hr ago", "3 days ago"
function formatRelativeTime(ts) {
  if (!ts) return '';
  const then = new Date(ts);
  if (isNaN(then.getTime())) return '';
  const seconds = Math.floor((Date.now() - then.getTime()) / 1000);
  if (seconds < 60) return 'just now';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes} min ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours} hr ago`;
  const days = Math.floor(hours / 24);
  if (days < 30) return `${days} day${days === 1 ? '' : 's'} ago`;
  const months = Math.floor(days / 30);
  if (months < 12) return `${months} mo ago`;
  const years = Math.floor(days / 365);
  return `${years} yr ago`;
}

// Renders a colored segmented bar showing draft/uw/declined breakdown.
function renderPipelineSegments(total, { drafts, inUw, declined }) {
  const draftPct = (drafts / total) * 100;
  const uwPct = (inUw / total) * 100;
  const declinedPct = (declined / total) * 100;
  // Anything left = "Other" (bound, etc.)
  const otherPct = Math.max(0, 100 - draftPct - uwPct - declinedPct);

  return el('div', { className: 'pipeline-segments' },
    el('div', { className: 'pipeline-segments-bar' },
      drafts > 0 ? el('div', { className: 'segment segment-draft', style: { width: `${draftPct}%` }, title: `${drafts} drafts` }) : null,
      inUw > 0 ? el('div', { className: 'segment segment-uw', style: { width: `${uwPct}%` }, title: `${inUw} in underwriting` }) : null,
      declined > 0 ? el('div', { className: 'segment segment-declined', style: { width: `${declinedPct}%` }, title: `${declined} declined` }) : null,
      otherPct > 0 ? el('div', { className: 'segment segment-other', style: { width: `${otherPct}%` } }) : null),
    el('div', { className: 'pipeline-segments-legend' },
      drafts > 0 ? legendDot('draft', `${drafts} draft${drafts === 1 ? '' : 's'}`) : null,
      inUw > 0 ? legendDot('uw', `${inUw} awaiting quote`) : null,
      declined > 0 ? legendDot('declined', `${declined} declined`) : null,
      otherPct > 0 ? legendDot('other', `${Math.round(otherPct * total / 100)} other`) : null));
}

// QUOTE VARIATION SCHEMA
// ═════════════════════════════════════════════════════════════════
// Defines the whitelist of parameters a broker can change to spawn a
// new quote variation without voiding existing versions. Anything NOT
// in this schema falls under the "out-of-scope edit" path (the existing
// "Edit & Resubmit" flow on the submission), which voids prior quotes.
//
// This schema drives the variation form UI directly. To change which
// fields are variation-eligible, edit this schema — no UI changes
// needed. Each field has:
//   key      — Joshu reference tag (sent as the data point key in the API payload)
//   label    — Broker-facing label
//   type     — 'select' | 'multi'
//   options  — for select/multi, array of { value, label }
//   help     — optional broker-facing helper text
//
// Reference tags and allowed-value lists below are lifted from Joshu's
// Line Item Parameter configs (Property building_ded, GL limits, SDLL,
// CGLL — see Apr 2026 screenshots). When Joshu's allowed values change,
// update them here.
//
// NOTE: GL limits is stored as the formatted display string in Joshu
// ("$1,000,000 / $2,000,000 / $2,000,000"), not as a structured object.
// We preserve that exact format so payloads to Joshu round-trip cleanly.
//
// Optional coverages catalog is still placeholder — pending a list of

// Helper: extract the current variation-relevant values from a quote,
// to seed the variation form when the broker clicks "Create variation."
// Falls back to schema defaults (first option) where the quote doesn't
// carry the field — should rarely happen in practice but keeps the form
// from rendering empty selects.
function variationDefaultsFromQuote(quote) {
  const data = (quote && quote.data) || {};
  const out = {};
  for (const field of VARIATION_SCHEMA) {
    const v = data[field.key];
    if (v != null) {
      out[field.key] = v;
    } else if (field.type === 'multi') {
      out[field.key] = [];
    } else if (field.options && field.options.length > 0) {
      out[field.key] = field.options[0].value;
    } else {
      out[field.key] = null;
    }
  }
  return out;
}

      el('col', { className: 'col-updated' })),
    el('thead', {}, el('tr', {},
      el('th', {}, 'Insured'),
      el('th', {}, 'Submission'),
      el('th', {}, 'Flow'),
      el('th', {}, 'Effective'),
      el('th', {}, 'Status'),
      el('th', {}, 'Updated'))),
    el('tbody', {}, ...items.map(s => el('tr', {
      className: 'clickable',
      onClick: () => { state.subView = s.id; loadSubmission(s.id); }
    },
      el('td', { className: 'cell-insured' },
        el('div', { className: 'insured-cell-name' },
          extractInsuredName(s) || `Submission ${s.id}`)),
      el('td', { className: 'tabular-id cell-nowrap' }, `#${s.id}`),
      el('td', { className: 'cell-nowrap' }, friendlyFlow(s.flow)),
      el('td', { className: 'cell-nowrap' }, fmtDate(s.effective_at)),
      el('td', { className: 'cell-nowrap' }, statusBadge(s.status)),
      el('td', { className: 'cell-updated cell-nowrap' },
        fmtDateTime(s.modified_at || s.created_at))))));
}

// Pull the named insured out of a submission row from the list endpoint.
// Joshu doesn't return a flat `insured_name` field — the named insured
// lives nested in `data` under various paths depending on whether
// /submissions returned datapoint values or a structured snapshot.
// Try the most likely paths in order.
function extractInsuredName(s) {
  if (!s) return null;

  // Top-level shortcut some routes set
  if (s.insured_name) return String(s.insured_name);

  // Try data.insured (object form: {name: "..."})
  const data = s.data;
  if (data && typeof data === 'object') {
    if (data.insured && typeof data.insured === 'object' && data.insured.name) {
      return String(data.insured.name);
    }
    // Try flat key "insured.name" (datapoint flatten form)
    if (data['insured.name']) {
      const v = data['insured.name'];
      // Handle wrapped values from datapoint flatten
      if (typeof v === 'string') return v;
      if (typeof v === 'object') {
        // {Plain:{Text:"..."}} or already-unwrapped
        const unwrapped = unwrapForInput(v);
        if (typeof unwrapped === 'string' && unwrapped) return unwrapped;
      }
    }
    // Try data.named_insured / data.business_name as last-ditch fallbacks
    if (data.named_insured) return String(data.named_insured);
    if (data.business_name) return String(data.business_name);
  }

  return null;
}

function lifecycleIndicator(status) {
  // Progress: Draft → Submitted → Quoted → Bound
  const stages = ['Incomplete', 'Submitted', 'Quoted', 'Bound'];
  const isDone = (i) => {
    if (!status) return false;
    if (status === 'Declined') return i === 0;
    if (status === 'Incomplete') return i === 0;
    if (status === 'Submitted' || status === 'Pending') return i <= 1;
    if (status === 'Active' || status === 'Future') return i <= 3;
    return i === 0;
  };
  const isCurrent = (i) => {
    if (status === 'Incomplete' && i === 0) return true;
    if ((status === 'Submitted' || status === 'Pending') && i === 1) return true;
    if ((status === 'Active' || status === 'Future') && i === 3) return true;
    return false;
  };
  return el('div', { className: 'lifecycle' },
    ...stages.map((_, i) => [
      el('div', { className: `lifecycle-step ${isDone(i) ? 'done' : ''} ${isCurrent(i) ? 'current' : ''}` },
        el('div', { className: 'lifecycle-dot' })),
      i < stages.length - 1 ? el('div', { className: `lifecycle-connector ${isDone(i + 1) ? 'done' : ''}` }) : null,
    ].filter(Boolean)).flat());
}

// ═════════════════════════════════════════════════════════════════
// SUBMISSION DETAIL — status-aware, dynamic form
// ═════════════════════════════════════════════════════════════════
async function loadSubmission(id) {
  state.selectedSubmission = null;
  state.submissionForm = null;
  state.submissionFormState = 'view';
  state.submissionDirty = {};
  state.submissionSaving = 'idle';
  state.activeSection = null;
  // Clear extracted-field highlights unless they were stashed for THIS
  // submission. Coercing to string because submission ids may arrive as
  // numbers from the API and as strings from state.subView routing.
  if (String(state.extractedFieldsForSubmissionId) !== String(id)) {
    state.extractedFields = new Set();
    state.extractedFieldsForSubmissionId = null;
  }
  render();
  try {
    const [sub, form, quotes] = await Promise.all([
      api(`/api/submissions/${id}`),
      api(`/api/submissions/${id}/form`).catch(() => ({ fields: [], sections: [] })),
      api(`/api/quotes?submission_id=${id}`).catch(() => ({ items: [] })),
    ]);
    state.selectedSubmission = { ...sub, quotes: quotes.items || [] };
    state.submissionForm = form;
    // Auto-enter edit mode if the submission is Incomplete
    state.submissionFormState = sub.status === 'Incomplete' ? 'edit' : 'view';
    // Default the active section to the first one with any visible fields
    if (form?.sections?.length) {
      const firstWithFields = form.sections.find(s => s.visible_count > 0) || form.sections[0];
      state.activeSection = firstWithFields?.code || null;
    }
    render();
  } catch (e) { /* toast shown */ }
}

function submissionDetailView() {
  const s = state.selectedSubmission;
  if (!s) return el('div', { className: 'loading' }, 'Loading');

  const insuredName = (s.data?.['insured.name'] && formatDatapointValue(s.data['insured.name']))
    || s.insured_name || `Submission ${s.id}`;

  return el('div', {},
    el('div', { className: 'page-header' },
      el('div', {},
        el('div', { className: 'eyebrow' }, `Submission · #${s.id} · ${s.flow || 'New'}`),
        el('h1', {}, insuredName)),
      el('div', { style: { display: 'flex', gap: '10px', alignItems: 'center' } },
        state.submissionSaving !== 'idle' ?
          el('div', { className: `saving-chip ${state.submissionSaving === 'saved' ? 'saved' : ''}` },
            state.submissionSaving === 'saving' ? 'Saving…' : '✓ Saved') : null,
        el('button', { className: 'btn btn-secondary',
          onClick: () => { state.subView = null; render(); loadView(); } }, '← Back'))),

    statusBanner(s),

    submissionOverviewBar(s),

    submissionMainCard(s),

    submissionQuotesCard(s));
}

function statusBanner(s) {
  const status = s.status;
  if (status === 'Incomplete') {
    return el('div', { className: 'status-banner editable' },
      el('div', { className: 'status-banner-icon' }, '✎'),
      el('div', {},
        el('div', { className: 'status-banner-title' }, 'Draft — in progress'),
        el('div', { className: 'status-banner-desc' },
          'Fill in the fields below, then submit for a quote.')));
  }
  if (status === 'Submitted' || status === 'Pending') {
    return el('div', { className: 'status-banner locked' },
      el('div', { className: 'status-banner-icon' }, lockIconSvg()),
      el('div', { style: { flex: 1 } },
        el('div', { className: 'status-banner-title' },
          `Submitted${s.submitted_at ? ' ' + fmtDate(s.submitted_at) : ''}`),
        el('div', { className: 'status-banner-desc' },
          state.submissionFormState === 'edit'
            ? 'You are editing a submitted record. Save your changes to resubmit for rating.'
            : 'Awaiting quote from the underwriter. You can reopen this submission to edit and resubmit.')),
      state.submissionFormState === 'view'
        ? el('button', { className: 'btn btn-primary btn-sm no-arrow',
            onClick: () => reopenForEdit(s.id) }, 'Edit & Resubmit')
        : null);
  }
  if (status === 'Declined') {
    return el('div', { className: 'status-banner declined' },
      el('div', { className: 'status-banner-icon' }, '✕'),
      el('div', {},
        el('div', { className: 'status-banner-title' }, 'Declined'),
        el('div', { className: 'status-banner-desc' },
          s.decline_reason || 'This submission was declined by the underwriter.')));
  }
  if (s.bound_at) {
    return el('div', { className: 'status-banner bound' },
      el('div', { className: 'status-banner-icon' }, '✓'),
      el('div', {},
        el('div', { className: 'status-banner-title' }, 'Bound'),
        el('div', { className: 'status-banner-desc' },
          `Policy is in force as of ${fmtDate(s.bound_at)}.`)));
  }
  return null;
}

function submissionMainCard(s) {
  const form = state.submissionForm;
  const isEditing = state.submissionFormState === 'edit';

  if (!form || !form.fields || form.fields.length === 0) {
    return el('div', { className: 'card' },
      el('div', { className: 'eyebrow' }, 'Data'),
      el('h2', {}, 'Submission data'),
      el('div', { className: 'empty', style: { marginTop: '20px' } },
        el('h3', {}, 'No form schema available'),
        el('p', {}, 'This submission doesn’t have a dynamic schema from the product version, or the schema endpoint returned empty.')));
  }

  // Use the sections array from the normalizer — it's already in display order
  // and has completion counts. Filter out sections with no visible fields.
  const sections = (form.sections || []).filter(sec =>
    sec.visible_count > 0 || (sec.field_count > 0 && sec.condition_met !== false));

  // Pick active section (fall back to first if current isn't valid)
  const activeSection = sections.find(s => s.code === state.activeSection) || sections[0];
  if (!activeSection) {
    return el('div', { className: 'card' },
      el('div', { className: 'empty' }, 'No sections found'));
  }

  const activeFields = form.fields.filter(f =>
    f.section === activeSection.code && f.visible !== false);

  // Determine if this is an asset section with 2+ populated assets.
  //
  // Joshu's schema reports `is_asset: true` for sections like `structures`
  // and reports one datapoint per asset_idx the product schema can support —
  // which may be MANY indices even when the actual data only has zero or
  // one entry. If we relied solely on the count of asset_idx groups, a
  // brand-new submission would render as "7 empty Asset cards" which is
  // confusing and wrong.
  //
  // Two distinct flags govern the layout:
  //   • hasAssetCards — render as asset cards (any count >= 1). This
  //     ensures a single-structure submission gets the same card layout
  //     as a multi-structure one — no flat-row fallback that loses the
  //     hero, chips, and grouping logic.
  //   • isMultiAsset — show "multi-asset chrome" like the right-rail
  //     jump column and Expand/Collapse-all controls (count >= 2). For
  //     a one-structure submission those would be UI noise.
  const isAssetSection = activeSection.is_asset;
  const assetGroups = isAssetSection ? groupFieldsByAsset(activeFields) : null;
  const populatedGroups = assetGroups
    ? assetGroups.filter(g => g.fields.some(f => f.value != null && f.value !== ''))
    : null;
  const hasAssetCards = !!(populatedGroups && populatedGroups.length >= 1);
  const isMultiAsset = !!(populatedGroups && populatedGroups.length >= 2);
  // When we treat as having asset cards, render only the populated groups.
  // (Empty asset slots are hidden until there's a proper "Add" workflow.)
  const displayedGroups = hasAssetCards ? populatedGroups : null;

  // Overall completion for the progress bar
  const totals = sections.reduce(
    (acc, sec) => ({ completed: acc.completed + sec.completed, total: acc.total + sec.visible_count }),
    { completed: 0, total: 0 });
  const pct = totals.total > 0 ? Math.round((totals.completed / totals.total) * 100) : 0;

  return el('div', { className: 'form-wrap' },
    // Progress bar across the top — only shown while editing. Locked
    // submissions don't need it: completion is binary (the broker has
    // submitted), and the form's field-count percentage can be
    // misleading because some fields are populated by underwriting
    // after submission. The status banner above already conveys the
    // submission's lifecycle state.
    isEditing
      ? el('div', { className: 'form-progress' },
          el('div', { className: 'form-progress-labels' },
            el('div', { className: 'form-progress-title' }, 'Complete the submission'),
            el('div', { className: 'form-progress-count' },
              pct === 100
                ? el('span', { className: 'form-progress-pct done' }, 'Ready to submit')
                : el('span', { className: 'form-progress-pct' }, `${pct}%`))),
          el('div', { className: 'form-progress-bar' },
            el('div', { className: 'form-progress-fill', style: { width: `${pct}%` } })))
      : null,

    // Layout: 2-column normally, 3-column when active section has multiple assets
    el('div', { className: `form-layout ${isMultiAsset ? 'three-col' : ''}` },
      // LEFT rail — section navigation
      el('div', { className: 'form-rail' },
        ...sections.map(sec => sectionNavItem(sec, sec.code === activeSection.code))),

      // CENTER pane — fields for the active section
      el('div', { className: `form-pane ${state.showRequiredHighlight ? 'show-required' : ''}` },
        el('div', { className: 'form-pane-head' },
          el('div', { className: 'eyebrow' }, isEditing ? 'Edit' : 'Review'),
          el('h2', {}, activeSection.label),
          activeSection.section_error
            ? el('div', { className: 'form-pane-error' }, activeSection.section_error)
            : el('div', { className: 'form-pane-sub' },
                activeSection.is_empty_asset_shell
                  ? `0 ${inferAssetNoun(activeSection, 2).toLowerCase()}`
                  : hasAssetCards
                    ? (isEditing
                        ? `${displayedGroups.length} ${inferAssetNoun(activeSection, displayedGroups.length)} \u00b7 ${activeSection.completed} of ${activeSection.visible_count} fields complete`
                        : `${displayedGroups.length} ${inferAssetNoun(activeSection, displayedGroups.length)}`)
                    : (isEditing
                        ? `${activeSection.completed} of ${activeSection.visible_count} fields complete`
                        : '')),
          // Expand/Collapse-all row for asset sections
          isMultiAsset
            ? el('div', { className: 'asset-controls' },
                el('button', { className: 'btn-sm-ghost',
                  onClick: () => { expandAllAssets(activeSection.code, displayedGroups); render(); }
                }, 'Expand all'),
                el('button', { className: 'btn-sm-ghost',
                  onClick: () => { collapseAllAssets(activeSection.code); render(); }
                }, 'Collapse all'))
            : null),

        // Body: asset cards, empty-state card, or flat form grid
        activeSection.is_empty_asset_shell
          ? el('div', { className: 'empty-asset-shell' },
              el('div', { className: 'empty-asset-icon' }, '+'),
              el('div', { className: 'empty-asset-title' },
                `No ${inferAssetNoun(activeSection, 2).toLowerCase()} added yet`),
              el('div', { className: 'empty-asset-desc' },
                `${inferAssetNoun(activeSection, 2)} will appear here once you add them to this submission.`))
          : activeFields.length === 0
            ? el('div', { className: 'empty', style: { marginTop: '20px' } },
              el('p', {}, 'No fields in this section are currently visible.'))
            : hasAssetCards
              ? el('div', { className: 'asset-list' },
                  ...renderLocationGroups(activeSection, displayedGroups, isEditing))
              : isEditing
                ? (activeSection.label === 'Limits and Coverages'
                    ? renderCoverageLinesBody(activeSection, activeFields, true)
                    : el('div', { className: 'form-grid' },
                        ...activeFields.map(f => renderFormField(f, isEditing))))
                : renderSectionReadBody(activeSection, activeFields),

        // Section navigation footer (prev/next)
        sections.length > 1
          ? el('div', { className: 'form-pane-nav' },
            sectionPrevButton(sections, activeSection),
            sectionNextButton(sections, activeSection))
          : null,

        // Global action footer appears only on the last section in edit mode
        isEditing && (sections.indexOf(activeSection) === sections.length - 1 || sections.length === 1)
          ? el('div', { className: 'form-pane-actions' },
            el('button', { className: 'btn btn-secondary',
              onClick: () => cancelEdit(s.id) }, 'Cancel'),
            el('button', { className: 'btn btn-primary',
              onClick: () => submitForQuote(s.id) },
              s.status === 'Incomplete' ? 'Submit for quote' : 'Save & resubmit'))
          : null),

      // RIGHT rail — asset jump-list (only for multi-asset sections).
      // Walks location groups so multi-building locations get
      // hierarchical numbering (1.1, 1.2) matching the cards.
      isMultiAsset
        ? el('div', { className: 'form-rail form-rail-right' },
            ...renderLocationRailItems(activeSection, displayedGroups))
        : null));
}

// Render right-rail jump items respecting the location grouping.
// For a single-building location, one rail item with the location
// number. For multi-building, one rail item per building using the
// hierarchical "1.1", "1.2" notation.
function renderLocationRailItems(section, assetGroups) {
  const locationGroups = groupAssetsByLocation(assetGroups);
  const items = [];
  for (const loc of locationGroups) {
    loc.assets.forEach((asset, i) => {
      const displayLabel = buildingDisplayIndex(loc, asset, i);
      items.push(assetRailItem(section, asset, displayLabel));
    });
  }
  return items;
}

function sectionNavItem(section, isActive) {
  const pct = section.visible_count > 0
    ? Math.round((section.completed / section.visible_count) * 100)
    : 0;
  const isComplete = section.visible_count > 0 && section.completed === section.visible_count;
  const isEmptyShell = !!section.is_empty_asset_shell;
  const hasErrors = section.has_errors;
  const isEditing = state.submissionFormState === 'edit';

  // Empty asset shells (e.g. Structures with no data yet) don't have a
  // sensible fields-complete ratio. Show a simple "empty" indicator so the
  // rail doesn't imply progress that isn't there.
  // When the submission is LOCKED (not editing), drop the count line
  // entirely — locked submissions are by definition complete or in
