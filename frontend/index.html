// ─── Compute the 4 attention lanes ───────────────────────────────────
// Returns an object describing what's actionable in each lane.
function computeAttentionLanes(subs, quotes, policies) {
  // Lane 1: Quotes ready for review
  // A "ready quote" = a quote whose status indicates the underwriter
  // has finished and the broker needs to act. QuotePublished and
  // BinderPublished are the two main "broker-actionable" states.
  const readyQuotes = (quotes || []).filter(q =>
    q.status === 'QuotePublished' ||
    q.status === 'BinderPublished' ||
    q.status === 'QuoteIndication'
  );
  // Break down ready quotes by the flow of the underlying submission
  // (so we can say "1 new policy, 1 endorsement, 1 renewal").
  // We need to look up each quote's submission_id in the subs list.
  const flowsForReady = readyQuotes.reduce((acc, q) => {
    const sub = subs.find(s => s.id === q.submission_id || s.unique_id === q.submission_id);
    const flow = sub?.flow || 'New';
    acc[flow] = (acc[flow] || 0) + 1;
    return acc;
  }, {});
  const earliestReadyQuote = readyQuotes
    .map(q => ({ q, sub: subs.find(s => s.id === q.submission_id) }))
    .filter(x => x.sub)
    .sort((a, b) => new Date(a.q.created_at || 0) - new Date(b.q.created_at || 0))[0];

  // Lane 2: Drafts in progress
  const draftSubs = subs
    .filter(s => s.status === 'Incomplete')
    .sort((a, b) => new Date(b.modified_at || b.created_at) - new Date(a.modified_at || a.created_at));
  const oldestDraft = draftSubs[draftSubs.length - 1];

  // Lane 3: Renewals coming up (next 60 days)
  // We need policies with renews_at within the window.
  const now = new Date();
  const sixtyDaysOut = new Date(now.getTime() + 60 * 24 * 60 * 60 * 1000);
  const renewals = (policies || []).filter(p => {
    if (!p.renews_at) return false;
    const r = new Date(p.renews_at);
    return r >= now && r <= sixtyDaysOut;
  }).sort((a, b) => new Date(a.renews_at) - new Date(b.renews_at));
  const earliestRenewal = renewals[0];

  // Lane 4: Recently declined
  const declinedSubs = subs
    .filter(s => s.status === 'Declined')
    .sort((a, b) => new Date(b.declined_at || b.modified_at || 0) - new Date(a.declined_at || a.modified_at || 0));

  return {
    readyQuotes: {
      count: readyQuotes.length,
      flows: flowsForReady,
      earliestQuote: earliestReadyQuote?.q,
      earliestSub: earliestReadyQuote?.sub,
    },
    drafts: {
      count: draftSubs.length,
      latest: draftSubs[0],
      oldest: oldestDraft,
    },
    renewals: {
      count: renewals.length,
      earliest: earliestRenewal,
    },
    declined: {
      count: declinedSubs.length,
      mostRecent: declinedSubs[0],
    },
  };
}

// ─── Attention panel (4 lanes) ──────────────────────────────────────
function renderAttentionPanel(lanes) {
  // Suppress the panel entirely if there's nothing actionable.
  const anyLane = lanes.readyQuotes.count + lanes.drafts.count
    + lanes.renewals.count + lanes.declined.count;
  if (anyLane === 0) {
    return el('div', { className: 'attention-panel attention-panel-empty' },
      el('div', { className: 'attention-panel-empty-title' }, 'You\u2019re all caught up.'),
      el('div', { className: 'attention-panel-empty-body' },
        'No quotes to review, drafts to finish, or renewals coming up.'));
  }

  const items = [];

  // Lane 1: Quotes ready for review
  if (lanes.readyQuotes.count > 0) {
    const q = lanes.readyQuotes;
    const flowParts = Object.entries(q.flows).map(([flow, n]) => {
      const label = flow === 'Endorsement' ? 'endorsement'
        : flow === 'Renewal' ? 'renewal'
        : flow === 'Cancellation' ? 'cancellation'
        : 'new policy';
      return n === 1 ? `1 ${label}` : `${n} ${label}s`;
    });
    let detail = flowParts.join(' \u00b7 ');
    if (q.earliestSub) {
      const earliestName = extractInsuredName(q.earliestSub) || `Submission #${q.earliestSub.id}`;
      const ago = formatRelativeTime(q.earliestQuote?.created_at);
      detail += detail ? ` \u00b7 Earliest: ${earliestName}` : `Earliest: ${earliestName}`;
      if (ago) detail += ` (${ago})`;
    }
    items.push(attentionLaneRow({
      kind: 'priority',
      title: q.count === 1 ? '1 quote ready for review' : `${q.count} quotes ready for review`,
      detail,
      ctaLabel: 'Review',
      onClick: () => { state.view = 'quotes'; render(); loadView(); },
    }));
  }

  // Lane 2: Drafts in progress
  if (lanes.drafts.count > 0) {
    const d = lanes.drafts;
    let detail = '';
    if (d.latest) {
      const name = extractInsuredName(d.latest) || `Submission #${d.latest.id}`;
      const ago = formatRelativeTime(d.latest.modified_at || d.latest.created_at);
      detail = name + (ago ? ` \u00b7 last touched ${ago}` : '');
    }
    items.push(attentionLaneRow({
      kind: 'normal',
      title: d.count === 1 ? '1 draft in progress' : `${d.count} drafts in progress`,
      detail,
      ctaLabel: 'Finish',
      onClick: () => {
        state.view = 'submissions';
        state.filter.tab = 'drafts';
        render();
        loadView();
      },
    }));
  }

  // Lane 3: Renewals
  if (lanes.renewals.count > 0) {
    const r = lanes.renewals;
    let detail = '';
    if (r.earliest) {
      const name = r.earliest.insured_name || 'Policy';
      detail = `Earliest: ${name} \u00b7 renews ${fmtDate(r.earliest.renews_at)}`;
    }
    items.push(attentionLaneRow({
      kind: 'normal',
      title: r.count === 1
        ? '1 renewal in the next 60 days'
        : `${r.count} renewals in the next 60 days`,
      detail,
      ctaLabel: 'View',
      onClick: () => { state.view = 'policies'; render(); loadView(); },
    }));
  }

  // Lane 4: Recently declined
  if (lanes.declined.count > 0) {
    const dc = lanes.declined;
    let detail = '';
    if (dc.mostRecent) {
      const name = extractInsuredName(dc.mostRecent) || `Submission #${dc.mostRecent.id}`;
      const ago = formatRelativeTime(dc.mostRecent.declined_at || dc.mostRecent.modified_at);
      detail = `Most recent: ${name}` + (ago ? ` (${ago})` : '');
    }
    items.push(attentionLaneRow({
      kind: 'normal',
      title: dc.count === 1 ? '1 recently declined' : `${dc.count} recently declined`,
      detail,
      ctaLabel: 'Review',
      onClick: () => {
        state.view = 'submissions';
        state.filter.tab = 'declined';
        render();
        loadView();
      },
    }));
  }

  return el('div', { className: 'attention-panel' },
    el('div', { className: 'attention-panel-head' },
      el('div', { className: 'attention-panel-title' }, 'Needs your attention')),
    el('div', { className: 'attention-panel-body' }, ...items));
}

function attentionLaneRow({ kind, title, detail, ctaLabel, onClick }) {
  return el('button', { className: `attention-lane attention-lane-${kind}`, onClick },
    el('div', { className: 'attention-lane-bullet' }),
    el('div', { className: 'attention-lane-text' },
      el('div', { className: 'attention-lane-title' }, title),
      detail ? el('div', { className: 'attention-lane-detail' }, detail) : null),
    el('div', { className: 'attention-lane-cta' }, `${ctaLabel} \u2192`));
}

// ─── Recent activity with filters ────────────────────────────────────
function renderRecentActivity(allSubs) {
  // Apply dashboard filters
  let recent = [...allSubs];
  const sf = state.dashboard.recentStatus;
  if (sf !== 'all') {
    if (sf === 'incomplete') recent = recent.filter(s => s.status === 'Incomplete');

    else if (sf === 'declined') recent = recent.filter(s => s.status === 'Declined');
    else if (sf === 'bound') recent = recent.filter(s => s.bound_at);
  }
  const ff = state.dashboard.recentFlow;
  if (ff !== 'all') {
    recent = recent.filter(s => s.flow === ff);
  }

  recent = recent
    .sort((a, b) => new Date(b.modified_at || b.created_at) - new Date(a.modified_at || a.created_at))
    .slice(0, 8);

  return el('div', { className: 'recent-section' },
    el('div', { className: 'recent-section-head' },
      el('h2', { className: 'recent-section-title' }, 'Recent activity'),
      el('div', { className: 'recent-section-actions' },
        renderRecentFilter('recentStatus', [
          { value: 'all',         label: 'All statuses' },
          { value: 'incomplete',  label: 'Incomplete' },
          { value: 'submitted',   label: 'Pending Decision' },
          { value: 'declined',    label: 'Declined' },
          { value: 'bound',       label: 'Bound' },
        ]),
        renderRecentFilter('recentFlow', [
          { value: 'all',          label: 'All types' },
          { value: 'New',          label: 'New' },
          { value: 'Renewal',      label: 'Renewal' },
          { value: 'Endorsement',  label: 'Endorsement' },
          { value: 'Cancellation', label: 'Cancellation' },
        ]),
        el('button', { className: 'btn btn-ghost btn-sm',
          onClick: () => { state.view = 'submissions'; render(); loadView(); } },
          'View all \u2192'))),

    recent.length === 0
      ? el('div', { className: 'recent-empty' },
          el('div', { className: 'recent-empty-title' }, 'No matching activity.'),
          el('div', { className: 'recent-empty-body' },
            'Try a different filter or start a new submission.'))
      : el('div', { className: 'recent-list' },
          ...recent.map(s => recentSubmissionRow(s))));
}

function renderRecentFilter(stateKey, options) {
  const current = state.dashboard[stateKey];
  const currentLabel = options.find(o => o.value === current)?.label || options[0].label;
  return el('select', {
    className: 'recent-filter-select',
    value: current,
    onChange: (e) => {
      state.dashboard[stateKey] = e.target.value;
      render();
    },
  }, ...options.map(o => {
    const opt = el('option', { value: o.value }, o.label);
    if (o.value === current) opt.setAttribute('selected', '');
    return opt;
  }));
}

// Format a timestamp as relative time: "12 min ago", "2 hr ago", "3 days ago"
function formatRelativeTime(ts) {
  if (!ts) return '';
  const then = new Date(ts);
  if (isNaN(then.getTime())) return '';
  const seconds = Math.floor((Date.now() - then.getTime()) / 1000);
  if (seconds < 60) return 'just now';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes} min ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours} hr ago`;
  const days = Math.floor(hours / 24);
  if (days < 30) return `${days} day${days === 1 ? '' : 's'} ago`;
  const months = Math.floor(days / 30);
  if (months < 12) return `${months} mo ago`;
  const years = Math.floor(days / 365);
  return `${years} yr ago`;
}

// Renders a colored segmented bar showing draft/uw/declined breakdown.
function renderPipelineSegments(total, { drafts, inUw, declined }) {
  const draftPct = (drafts / total) * 100;
  const uwPct = (inUw / total) * 100;
  const declinedPct = (declined / total) * 100;
  // Anything left = "Other" (bound, etc.)
  const otherPct = Math.max(0, 100 - draftPct - uwPct - declinedPct);

  return el('div', { className: 'pipeline-segments' },
    el('div', { className: 'pipeline-segments-bar' },
      drafts > 0 ? el('div', { className: 'segment segment-draft', style: { width: `${draftPct}%` }, title: `${drafts} drafts` }) : null,

// Helper: extract the current variation-relevant values from a quote,
// to seed the variation form when the broker clicks "Create variation."
// Falls back to schema defaults (first option) where the quote doesn't
// carry the field — should rarely happen in practice but keeps the form
// from rendering empty selects.
function variationDefaultsFromQuote(quote) {
  const data = (quote && quote.data) || {};
  const out = {};
  for (const field of VARIATION_SCHEMA) {
    const v = data[field.key];
    if (v != null) {
      out[field.key] = v;
    } else if (field.type === 'multi') {
      out[field.key] = [];
    } else if (field.options && field.options.length > 0) {
      out[field.key] = field.options[0].value;
    } else {
      out[field.key] = null;
    }
  }
  return out;
}

// Pull the named insured out of a submission row from the list endpoint.
// Joshu doesn't return a flat `insured_name` field — the named insured
// lives nested in `data` under various paths depending on whether
// /submissions returned datapoint values or a structured snapshot.
// Try the most likely paths in order.
function extractInsuredName(s) {
  if (!s) return null;

  // Top-level shortcut some routes set
  if (s.insured_name) return String(s.insured_name);

  // Try data.insured (object form: {name: "..."})
  const data = s.data;
  if (data && typeof data === 'object') {
    if (data.insured && typeof data.insured === 'object' && data.insured.name) {
      return String(data.insured.name);
    }
    // Try flat key "insured.name" (datapoint flatten form)
    if (data['insured.name']) {
      const v = data['insured.name'];
      // Handle wrapped values from datapoint flatten
      if (typeof v === 'string') return v;
      if (typeof v === 'object') {
        // {Plain:{Text:"..."}} or already-unwrapped
        const unwrapped = unwrapForInput(v);
        if (typeof unwrapped === 'string' && unwrapped) return unwrapped;
      }
    }
    // Try data.named_insured / data.business_name as last-ditch fallbacks
    if (data.named_insured) return String(data.named_insured);
    if (data.business_name) return String(data.business_name);
  }

  return null;
}

function lifecycleIndicator(status) {
  // Progress: Draft → Submitted → Quoted → Bound
  const stages = ['Incomplete', 'Submitted', 'Quoted', 'Bound'];
  const isDone = (i) => {
    if (!status) return false;
    if (status === 'Declined') return i === 0;
    if (status === 'Incomplete') return i === 0;
    if (status === 'Submitted' || status === 'Pending') return i <= 1;
    if (status === 'Active' || status === 'Future') return i <= 3;
    return i === 0;
  };
  const isCurrent = (i) => {
    if (status === 'Incomplete' && i === 0) return true;
    if ((status === 'Submitted' || status === 'Pending') && i === 1) return true;
    if ((status === 'Active' || status === 'Future') && i === 3) return true;
    return false;
  };
  return el('div', { className: 'lifecycle' },
    ...stages.map((_, i) => [
      el('div', { className: `lifecycle-step ${isDone(i) ? 'done' : ''} ${isCurrent(i) ? 'current' : ''}` },
        el('div', { className: 'lifecycle-dot' })),
      i < stages.length - 1 ? el('div', { className: `lifecycle-connector ${isDone(i + 1) ? 'done' : ''}` }) : null,
    ].filter(Boolean)).flat());
}

// ═════════════════════════════════════════════════════════════════
// SUBMISSION DETAIL — status-aware, dynamic form
// ═════════════════════════════════════════════════════════════════
async function loadSubmission(id) {
  state.selectedSubmission = null;
  state.submissionForm = null;
  state.submissionFormState = 'view';
  state.submissionDirty = {};
  state.submissionSaving = 'idle';
  state.activeSection = null;
  // Clear extracted-field highlights unless they were stashed for THIS
  // submission. Coercing to string because submission ids may arrive as
  // numbers from the API and as strings from state.subView routing.
  if (String(state.extractedFieldsForSubmissionId) !== String(id)) {
    state.extractedFields = new Set();
    state.extractedFieldsForSubmissionId = null;
  }
  render();

  // Demo submission special case — fully in-memory, never touches the
  // (intercepted) API. The form schema is generated from a synthetic
  // submission record so the broker can fill it out exactly like a
  // real one. Submit becomes a no-op success.
  if (id === 'demo' && state.demoSubmission) {
    const sub = state.demoSubmission;
    const formSchema = seedFormSchemaForSubmission(sub);
    state.selectedSubmission = { ...sub, quotes: [] };
    state.submissionForm = formSchema;
    state.submissionFormState = 'edit';
    if (formSchema?.sections?.length) {
      const firstWithFields = formSchema.sections.find(s => s.visible_count > 0) || formSchema.sections[0];
      state.activeSection = firstWithFields?.code || null;
    }
    render();
    return;
  }

  try {
    const [sub, form, quotes] = await Promise.all([
      api(`/api/submissions/${id}`),
      api(`/api/submissions/${id}/form`).catch(() => ({ fields: [], sections: [] })),
      api(`/api/quotes?submission_id=${id}`).catch(() => ({ items: [] })),
    ]);
    state.selectedSubmission = { ...sub, quotes: quotes.items || [] };
    state.submissionForm = form;
    // Auto-enter edit mode if the submission is Incomplete
    state.submissionFormState = sub.status === 'Incomplete' ? 'edit' : 'view';
    // Default the active section to the first one with any visible fields
    if (form?.sections?.length) {
      const firstWithFields = form.sections.find(s => s.visible_count > 0) || form.sections[0];
      state.activeSection = firstWithFields?.code || null;
    }
    render();
  } catch (e) { /* toast shown */ }
}
