<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Altruis Group · Broker Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Altruis Group brand */
    --blue: #6797EE;
    --blue-hover: #527fdb;
    --blue-soft: #e8f0fc;
    --blue-tint: #f3f7fe;

    --navy: #0F2542;
    --navy-soft: #1a3358;
    --navy-deep: #091a31;

    --ink: #0F2542;
    --ink-soft: #3d4c63;
    --ink-mute: #6b7689;
    --ink-quiet: #9aa3b3;

    --paper: #F7F5F0;          /* warm off-white page */
    --paper-warm: #efece5;
    --paper-dim: #e6e3dc;
    --white: #ffffff;

    --line: #e2e0d8;
    --line-soft: #edebe3;
    --line-blue: #d8e4f7;

    --ok: #2f7d53;
    --ok-soft: #e0f0e7;
    --warn: #b06a00;
    --warn-soft: #fdf1dc;
    --err: #b03838;
    --err-soft: #f8e3e3;

    --shadow-xs: 0 1px 2px rgba(15, 37, 66, 0.04);
    --shadow-sm: 0 1px 3px rgba(15, 37, 66, 0.05), 0 1px 2px rgba(15, 37, 66, 0.03);
    --shadow-md: 0 4px 14px rgba(15, 37, 66, 0.06), 0 2px 4px rgba(15, 37, 66, 0.04);
    --shadow-lg: 0 16px 48px rgba(15, 37, 66, 0.12), 0 4px 12px rgba(15, 37, 66, 0.05);

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --radius-pill: 999px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px; line-height: 1.55; color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "cv02", "cv03", "cv04", "cv11";
  }
  h1, h2, h3 { font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; color: var(--ink); }
  h1 { font-size: 2.25rem; letter-spacing: -0.03em; }
  h2 { font-size: 1.65rem; }
  h3 { font-size: 1.125rem; font-weight: 600; }
  .display {
    font-size: 2.75rem; font-weight: 600; letter-spacing: -0.035em; line-height: 1.05;
  }
  .display .accent { color: var(--blue); font-weight: 600; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.85em; }
  button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  a { color: var(--blue); text-decoration: none; transition: color 120ms; }
  a:hover { color: var(--blue-hover); }

  /* ─────────── Eyebrow label (blue dash + tiny caps) ─────────── */
  .eyebrow {
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-mute); margin-bottom: 12px;
  }
  .eyebrow::before {
    content: ''; display: inline-block; width: 28px; height: 2px;
    background: var(--blue);
  }
  .eyebrow.on-dark { color: #b8cdf3; }
  .eyebrow.on-dark::before { background: var(--blue); }

  /* ─────────── Environment banner (slim, dismissible-looking) ─────────── */
  .env-banner {
    padding: 8px 20px; font-size: 0.76rem; font-weight: 500;
    text-align: center; letter-spacing: 0.02em;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .env-banner::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor;
    opacity: 0.8;
  }
  .env-banner.mock { background: #eaf5ef; color: #1a5b36; }
  .env-banner.test { background: #fdf2d9; color: #8a5a00; }
  .env-banner.production { background: #fde3e3; color: #a01f1f; }

  /* ═════════════════════════════════════════════════════════════════
     LOGIN SCREEN — hero split: left blue dark panel, right form
     ═════════════════════════════════════════════════════════════════ */
  .login-wrap { min-height: 100vh; display: flex; flex-direction: column; }
  .login-shell {
    flex: 1; display: grid; grid-template-columns: 1.1fr 1fr;
    background: var(--paper);
  }
  .login-left {
    background: var(--navy);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(103,151,238,0.15), transparent 55%),
      radial-gradient(circle at 85% 85%, rgba(103,151,238,0.10), transparent 55%);
    color: #fff;
    padding: 64px 72px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative;
  }
  .login-brand-mark {
    display: flex; align-items: center; gap: 10px;
  }
  .login-brand-mark-icon {
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  }
  .login-brand-mark-icon svg { width: 100%; height: 100%; }
  .login-brand-name {
    font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em;
  }
  .login-brand-name .sub {
    font-size: 0.65rem; font-weight: 500; letter-spacing: 0.2em;
    text-transform: uppercase; color: #7a90b8; display: block; margin-top: 2px;
  }
  .login-hero {
    max-width: 460px; margin-top: auto;
  }
  .login-hero h1 {
    color: #fff; font-size: 2.6rem; font-weight: 600; letter-spacing: -0.035em;
    line-height: 1.1; margin-bottom: 20px;
  }
  .login-hero h1 .accent { color: var(--blue); }
  .login-hero p {
    color: #b8c4d9; font-size: 1rem; line-height: 1.6;
  }
  .login-footnote {
    font-size: 0.75rem; color: #7a90b8; margin-top: 36px;
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .login-footnote span {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .login-footnote span::before {
    content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--blue);
  }

  .login-right {
    display: flex; align-items: center; justify-content: center;
    padding: 48px; background: var(--paper);
  }
  .login-card {
    max-width: 400px; width: 100%;
  }
  .login-card h2 {
    font-size: 1.75rem; margin-bottom: 6px;
  }
  .login-card p.lead { color: var(--ink-mute); margin-bottom: 32px; font-size: 0.95rem; }

  .login-card form { display: flex; flex-direction: column; gap: 18px; }
  .login-card .field { display: flex; flex-direction: column; gap: 6px; }
  .login-card label {
    font-size: 0.78rem; font-weight: 500; color: var(--ink-soft);
  }
  .login-card input {
    padding: 13px 16px; border: 1px solid var(--line);
    background: var(--white); border-radius: var(--radius-md); font-size: 0.95rem;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .login-card input:focus {
    outline: none; border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(103, 151, 238, 0.15);
  }
  .login-card button[type="submit"] {
    padding: 13px 24px; background: var(--blue); color: #fff;
    font-weight: 500; border-radius: var(--radius-pill); font-size: 0.95rem;
    transition: background 120ms, transform 120ms; margin-top: 10px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .login-card button[type="submit"]::after {
    content: '→'; transition: transform 150ms;
  }
  .login-card button[type="submit"]:hover:not(:disabled) { background: var(--blue-hover); }
  .login-card button[type="submit"]:hover:not(:disabled)::after { transform: translateX(3px); }
  .login-card button[type="submit"]:disabled { opacity: 0.55; cursor: wait; }
  .login-err {
    background: var(--err-soft); color: var(--err);
    padding: 12px 14px; font-size: 0.88rem; border-radius: var(--radius-md);
    border: 1px solid rgba(176, 56, 56, 0.15);
  }
  .login-hint {
    margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--line-soft);
    font-size: 0.8rem; color: var(--ink-mute); line-height: 1.6;
  }
  .login-hint code {
    font-family: 'JetBrains Mono', monospace; background: var(--paper-warm);
    padding: 2px 7px; border-radius: 4px; font-size: 0.85em; color: var(--ink);
  }

  @media (max-width: 900px) {
    .login-shell { grid-template-columns: 1fr; }
    .login-left { padding: 40px; min-height: 200px; }
    .login-hero h1 { font-size: 2rem; }
  }

  /* ═════════════════════════════════════════════════════════════════
     MAIN APP
     ═════════════════════════════════════════════════════════════════ */
  .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

  .sidebar {
    background: var(--navy);
    color: #d9e2f1;
    padding: 28px 20px; position: sticky; top: 0; height: 100vh;
    overflow-y: auto; display: flex; flex-direction: column;
  }
  .brand-mark {
    display: flex; align-items: center; gap: 10px; padding: 0 10px; margin-bottom: 36px;
  }
  .brand-mark-icon {
    width: 32px; height: 32px; flex-shrink: 0;
  }
  .brand-mark-icon svg { width: 100%; height: 100%; }
  .brand-mark-name {
    font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; color: #fff;
  }
  .brand-mark-name .sub {
    font-size: 0.62rem; font-weight: 500; letter-spacing: 0.18em;
    text-transform: uppercase; color: #7a90b8; display: block; margin-top: 1px;
  }

  .nav-section {
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: #5a6e90; padding: 20px 14px 8px; font-weight: 600;
  }
  .nav-item {
    padding: 10px 14px; border-radius: var(--radius-sm); color: #b8c4d9;
    font-weight: 500; font-size: 0.9rem; cursor: pointer;
    transition: all 120ms; text-align: left; display: flex;
    align-items: center; gap: 10px; width: 100%;
    position: relative;
  }
  .nav-item:hover { background: var(--navy-soft); color: #fff; }
  .nav-item.active {
    background: var(--blue);
    color: #fff;
  }
  .nav-item.active::before {
    content: ''; position: absolute; left: -20px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 20px; background: var(--blue); border-radius: 0 2px 2px 0;
  }
  .nav-dot {
    width: 4px; height: 4px; background: currentColor; border-radius: 50%;
    opacity: 0.5; flex-shrink: 0;
  }
  .nav-item.active .nav-dot { opacity: 1; background: #fff; }

  .user-box {
    margin-top: auto; padding: 16px 14px 4px;
    border-top: 1px solid var(--navy-soft); font-size: 0.85rem;
  }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 50%; background: var(--blue);
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 600; font-size: 0.82rem; margin-right: 10px;
  }
  .user-box .u-row {
    display: flex; align-items: center; padding: 8px 0;
  }
  .user-box .u-info { flex: 1; min-width: 0; }
  .user-box .u-name {
    color: #fff; font-weight: 500; font-size: 0.88rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .user-box .u-meta {
    color: #7a90b8; font-size: 0.72rem; margin-top: 1px;
  }
  .user-box button {
    margin-top: 10px; color: #7a90b8; font-size: 0.75rem;
    letter-spacing: 0.03em; padding: 6px 10px;
    border-radius: var(--radius-sm); width: 100%; text-align: left;
    transition: all 120ms;
  }
  .user-box button:hover { background: var(--navy-soft); color: #fff; }

  .main {
    padding: 40px 56px 80px; max-width: 1440px;
  }
  .page-header {
    display: flex; justify-content: space-between; align-items: flex-end;
    padding-bottom: 24px; margin-bottom: 32px;
    border-bottom: 1px solid var(--line);
    gap: 24px; flex-wrap: wrap;
  }
  .page-header h1 { font-size: 2.1rem; letter-spacing: -0.03em; font-weight: 600; }

  /* ─────────── Buttons ─────────── */
  .btn {
    padding: 10px 22px; border-radius: var(--radius-pill); font-weight: 500;
    font-size: 0.9rem; transition: all 150ms;
    border: 1px solid transparent; display: inline-flex;
    align-items: center; gap: 8px; white-space: nowrap; cursor: pointer;
  }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--blue-hover); box-shadow: 0 4px 12px rgba(103,151,238,0.3); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary::after { content: '→'; transition: transform 150ms; font-weight: 400; }
  .btn-primary:hover:not(:disabled)::after { transform: translateX(3px); }

  .btn-secondary {
    background: transparent; color: var(--ink);
    border-color: var(--line); background: var(--white);
  }
  .btn-secondary:hover { background: var(--paper-warm); border-color: var(--ink-mute); }
  .btn-ghost { color: var(--blue); padding: 6px 12px; font-size: 0.85rem; }
  .btn-ghost:hover { background: var(--blue-soft); }
  .btn-danger {
    background: transparent; color: var(--err); border: 1px solid var(--err);
  }
  .btn-danger:hover { background: var(--err-soft); }
  .btn-sm { padding: 6px 14px; font-size: 0.8rem; }

  /* ─────────── Stats block (matches brand's "by the numbers" treatment) ─────────── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    background: var(--white); border: 1px solid var(--line-soft);
    border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 32px;
  }
  .stat {
    padding: 28px 32px; border-right: 1px solid var(--line-soft);
    position: relative;
  }
  .stat:last-child { border-right: none; }
  .stat::before {
    content: ''; position: absolute; top: 28px; left: 32px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--blue);
  }
  .stat-label {
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-mute);
    margin-left: 16px; margin-bottom: 14px; margin-top: -3px;
    display: block;
  }
  .stat-value {
    font-size: 2.5rem; font-weight: 600; color: var(--ink);
    letter-spacing: -0.03em; line-height: 1; display: flex;
    align-items: baseline; gap: 6px;
  }
  .stat-value .unit {
    font-size: 0.95rem; font-weight: 500; color: var(--ink-mute);
  }
  .stat-sub {
    font-size: 0.8rem; color: var(--ink-mute); margin-top: 10px;
  }

  /* ─────────── Cards / tables ─────────── */
  .card {
    background: var(--white); border: 1px solid var(--line-soft);
    border-radius: var(--radius-lg); padding: 28px 32px; margin-bottom: 20px;
    box-shadow: var(--shadow-xs);
  }
  .card h2 { font-size: 1.35rem; margin-bottom: 4px; font-weight: 600; }
  .card h3 { font-size: 1.05rem; font-weight: 600; }
  .card .subtle { color: var(--ink-mute); font-size: 0.9rem; margin-bottom: 20px; }
  .card-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 20px; gap: 16px;
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
  th {
    text-align: left; font-weight: 600; color: var(--ink-mute);
    font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 14px 16px; border-bottom: 1px solid var(--line);
  }
  td {
    padding: 16px; border-bottom: 1px solid var(--line-soft);
    vertical-align: middle;
  }
  tbody tr { transition: background 120ms; }
  tbody tr:hover td { background: var(--blue-tint); }
  tbody tr:last-child td { border-bottom: none; }
  tr.clickable { cursor: pointer; }
  .num {
    text-align: right; font-variant-numeric: tabular-nums;
    font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
  }

  /* ─────────── Badges ─────────── */
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: var(--radius-pill);
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.01em;
  }
  .badge::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  }
  .badge-incomplete { background: #eceee8; color: #5a6258; }
  .badge-pending, .badge-quotepending, .badge-binderpending, .badge-coveragepending {
    background: var(--warn-soft); color: var(--warn);
  }
  .badge-submitted, .badge-quotepublished, .badge-binderpublished {
    background: var(--blue-soft); color: #2c5fb8;
  }
  .badge-future, .badge-coverageactive, .badge-active, .badge-ready {
    background: var(--ok-soft); color: var(--ok);
  }
  .badge-issued {
    background: var(--ok); color: #fff;
  }
  .badge-declined, .badge-quotedeclined, .badge-binderdeclined, .badge-canceled, .badge-error {
    background: var(--err-soft); color: var(--err);
  }
  .badge-expired, .badge-quoteclosed, .badge-blocked, .badge-closed {
    background: #ededeb; color: #6b6b6b;
  }
  .badge-quoteindication, .badge-quotestoreedit {
    background: #efeafc; color: #4a3a91;
  }
  .badge-processing {
    background: var(--warn-soft); color: var(--warn);
  }

  /* ─────────── Forms ─────────── */
  .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px 24px; }
  .form-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .form-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 0.78rem; font-weight: 500; color: var(--ink-soft);
  }
  .field input, .field select, .field textarea {
    padding: 10px 14px; border: 1px solid var(--line);
    background: var(--white); border-radius: var(--radius-md); font-size: 0.92rem;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(103, 151, 238, 0.12);
  }
  .field.full { grid-column: 1 / -1; }
  .field-inline { display: flex; align-items: center; gap: 8px; }
  .field-inline input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--blue); }
  .field-inline label { font-size: 0.88rem; color: var(--ink); cursor: pointer; }

  /* ─────────── Detail layout ─────────── */
  .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
  .kv-list dt {
    font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-mute); margin-top: 16px; font-weight: 600;
  }
  .kv-list dt:first-child { margin-top: 0; }
  .kv-list dd { font-size: 0.95rem; color: var(--ink); margin-top: 4px; font-weight: 500; }
  .kv-list dd.mono { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; word-break: break-all; font-weight: 400; }

  /* ─────────── Empty state ─────────── */
  .empty {
    padding: 72px 20px; text-align: center; color: var(--ink-mute);
    border: 1px dashed var(--line); border-radius: var(--radius-md);
    background: var(--paper);
  }
  .empty h3 { color: var(--ink); margin-bottom: 8px; font-size: 1.05rem; }
  .empty p { font-size: 0.9rem; }

  /* ─────────── Toast ─────────── */
  #toast-host {
    position: fixed; top: 16px; right: 16px; z-index: 1000;
    display: flex; flex-direction: column; gap: 10px; max-width: 420px;
  }
  .toast {
    padding: 14px 18px; border-radius: var(--radius-md); font-size: 0.88rem;
    background: var(--navy); color: #fff; box-shadow: var(--shadow-lg);
    animation: slidein 200ms ease;
    border-left: 3px solid var(--blue);
    display: flex; gap: 12px; align-items: flex-start;
  }
  .toast.ok { border-left-color: var(--ok); }
  .toast.err { border-left-color: var(--err); }
  .toast::before {
    content: 'i'; font-weight: 700; font-size: 0.75rem;
    width: 18px; height: 18px; border-radius: 50%; background: var(--blue); color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .toast.ok::before { content: '✓'; background: var(--ok); }
  .toast.err::before { content: '!'; background: var(--err); }
  @keyframes slidein { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* ─────────── Modal ─────────── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(15,37,66,0.5); z-index: 100;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 80px; animation: fadein 150ms ease;
    backdrop-filter: blur(3px);
  }
  .modal {
    background: var(--white); padding: 36px; border-radius: var(--radius-lg);
    max-width: 640px; width: 90%; max-height: 85vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal h2 { font-size: 1.35rem; font-weight: 600; margin-bottom: 8px; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  /* ─────────── Misc ─────────── */
  .loading {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 60px 20px; color: var(--ink-mute); font-size: 0.9rem; width: 100%;
  }
  .loading::before {

  }

  /* ─────────── Altruis logo SVG (simple wordmark-icon) ─────────── */
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-host"></div>

<!-- Altruis icon: a stylized A/peak shape -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <symbol id="altruis-icon" viewBox="0 0 32 32">
      <path d="M16 3 L29 27 L22 27 L16 15 L10 27 L3 27 Z" fill="#6797EE"/>
      <path d="M16 3 L22 15 L16 15 Z" fill="#0F2542"/>
    </symbol>
  </defs>
</svg>

<script type="module">
// ─────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────
const $ = (s) => document.querySelector(s);
const el = (tag, props = {}, ...children) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props || {})) {
    if (v == null || v === false) continue;
    if (k === 'className') n.className = v;
    else if (k === 'style') Object.assign(n.style, v);
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') n.innerHTML = v;
    else if (k === 'checked') { if (v) n.setAttribute('checked', ''); }
    else if (v === true) n.setAttribute(k, '');
    else n.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    n.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return n;
};

// Embedded SVG icon for the brand mark
function brandIcon(size = 32) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 32 32');
  svg.setAttribute('width', size); svg.setAttribute('height', size);
  svg.innerHTML = `
    <path d="M16 3 L29 27 L22 27 L16 15 L10 27 L3 27 Z" fill="#6797EE"/>
    <path d="M16 3 L22 15 L16 15 Z" fill="#0F2542"/>
  `;
  return svg;
}

const money = (n) => {
  if (n == null) return '—';
  const sign = n < 0 ? '(' : '';
  const endSign = n < 0 ? ')' : '';
  return sign + Math.abs(n).toLocaleString('en-US', { style: 'currency', currency: 'USD' }) + endSign;
};
const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '—';
const fmtDateTime = (d) => d ? new Date(d).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';

function toast(msg, kind = '') {
  const t = el('div', { className: `toast ${kind}` }, el('div', {}, msg));
  $('#toast-host').appendChild(t);
  setTimeout(() => {
    t.style.opacity = '0'; t.style.transition = 'opacity 200ms';
    setTimeout(() => t.remove(), 200);
  }, 4200);
}

async function api(path, opts = {}) {
  const { method = 'GET', body, silent = false } = opts;
  const init = { method, credentials: 'include', headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) init.body = JSON.stringify(body);
  const res = await fetch(path, init);
  if (res.status === 401) {
    state.user = null;
    render();
    throw new Error('Not authenticated');
  }
  if (!res.ok) {
    const errBody = await res.json().catch(() => ({ detail: res.statusText }));
    const msg = errBody.detail || errBody.message || res.statusText;
    if (!silent) toast(msg, 'err');
    throw new Error(msg);
  }
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : res.blob();
}

function statusBadge(s) {
  if (!s) return el('span', { className: 'badge badge-incomplete' }, '—');
  const normalized = s.toLowerCase();
  return el('span', { className: `badge badge-${normalized}` }, s);
}

function showModal(title, content, opts = {}) {
  const backdrop = el('div', {
    className: 'modal-backdrop',
    onClick: (e) => { if (e.target === backdrop) closeModal(); }
  }, el('div', { className: 'modal' },
    el('h2', {}, title),
    opts.subtitle ? el('p', { className: 'subtle', style: { marginBottom: '24px' } }, opts.subtitle) : null,
    content));
  backdrop.id = 'modal';
  document.body.appendChild(backdrop);
}
function closeModal() { document.getElementById('modal')?.remove(); }

function userInitials(user) {
  if (!user) return '?';
  const name = user.name || user.email || '';
  const parts = name.split(/[\s@.]+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return '?';
}

// ─────────────────────────────────────────────────────────────
// App state
// ─────────────────────────────────────────────────────────────
const state = {
  user: null,
  env: 'mock',
  view: 'dashboard',
  subView: null,
  submissions: { loading: false, items: [], total: 0 },
  quotes: { loading: false, items: [], total: 0 },
  policies: { loading: false, items: [], total: 0 },
  documents: { loading: false, items: [], total: 0 },
  selectedSubmission: null,
  selectedQuote: null,
  selectedPolicy: null,
  filter: { mine_only: false, status: null },
};

function render() {
  const root = $('#root');
  root.innerHTML = '';
  if (!state.user) {
    root.appendChild(loginView());
  } else {
    root.appendChild(appShell());
  }
}

// ─────────────────────────────────────────────────────────────
// Env banner
// ─────────────────────────────────────────────────────────────
function envBanner() {
  const labels = {
    mock: 'Mock environment · No data is sent to Joshu · All records are in-memory',
    test: 'Test environment · Joshu test container · Not production',
    production: 'Production environment · Live data',
  };
  return el('div', { className: `env-banner ${state.env}` }, labels[state.env] || state.env);
}

// ─────────────────────────────────────────────────────────────
// Login screen (hero split)
// ─────────────────────────────────────────────────────────────
function loginView() {
  return el('div', { className: 'login-wrap' },
    envBanner(),
    el('div', { className: 'login-shell' },
      loginLeft(),
      loginRight()));
}

function loginLeft() {
  return el('div', { className: 'login-left' },
    el('div', { className: 'login-brand-mark' },
      el('div', { className: 'login-brand-mark-icon' }, brandIcon(36)),
      el('div', { className: 'login-brand-name' },
        'Altruis',
        el('span', { className: 'sub' }, 'Broker Portal'))),
    el('div', { className: 'login-hero' },
      el('div', { className: 'eyebrow on-dark' }, 'Specialty Insurance MGA'),
      el('h1', {}, 'Insurance value, unlocked by ',
        el('span', { className: 'accent' }, 'technology'),
        ' and ', el('span', { className: 'accent' }, 'human'), ' expertise.'),
      el('p', {},
        'Altruis Group builds specialized insurance programs that treat policies as assets — not annual expenses. Submit, quote, and bind at the speed your book deserves.')),
    el('div', { className: 'login-footnote' },
      el('span', {}, 'A-rated carrier partners'),
      el('span', {}, '48-state footprint'),
      el('span', {}, '<48hr average turnaround')));
}

function loginRight() {
  const form = { email: '', password: '', loading: false, error: null };
  const card = el('div', { className: 'login-card' });

  const rerender = () => {
    card.innerHTML = '';
    card.appendChild(el('h2', {}, 'Sign in to your portal'));
    card.appendChild(el('p', { className: 'lead' }, 'Access your agency’s submissions, quotes, and policies.'));

    const fEl = el('form', {
      onSubmit: async (e) => {
        e.preventDefault();
        form.loading = true; form.error = null; rerender();
        try {
          const res = await api('/api/auth/login', {
            method: 'POST',
            body: { email: form.email, password: form.password },
            silent: true,
          });
          state.user = res.user;
          state.env = res.environment;
          render();
          setTimeout(loadView, 0);
        } catch (e) {
          form.loading = false;
          form.error = e.message;
          rerender();
        }
      }
    },
      el('div', { className: 'field' },
        el('label', {}, 'Email'),
        el('input', {
          type: 'email', required: true, autofocus: true,
          placeholder: 'you@agency.com',
          value: form.email, onInput: (e) => { form.email = e.target.value; },
        })),
      el('div', { className: 'field' },
        el('label', {}, 'Password'),
        el('input', {
          type: 'password', required: true, placeholder: '••••••••',
          value: form.password, onInput: (e) => { form.password = e.target.value; },
        })),
      form.error ? el('div', { className: 'login-err' }, form.error) : null,
      el('button', { type: 'submit', disabled: form.loading },
        form.loading ? 'Signing in' : 'Sign in')
    );
    card.appendChild(fEl);

    if (state.env === 'mock') {
      card.appendChild(el('div', { className: 'login-hint' },
        el('strong', { style: { color: 'var(--ink)' } }, 'Demo accounts'),
        el('div', { style: { marginTop: '8px' } },
          'Try ', el('code', {}, 'jane.broker@acmesurplus.com'),
          ' or ', el('code', {}, 'admin@acmesurplus.com'),
          '. Any password works in mock mode.')
      ));
    } else if (state.env === 'test') {
      card.appendChild(el('div', { className: 'login-hint' },
        el('strong', { style: { color: 'var(--ink)' } }, 'Test environment'),
        el('div', { style: { marginTop: '8px' } },
          'Any email works. The portal uses a shared API token for this container.')
      ));
    }

    setTimeout(() => {
      const first = card.querySelector('input');
      if (first && !form.loading) first.focus();
    }, 0);
  };

  rerender();
  return el('div', { className: 'login-right' }, card);
}

// ─────────────────────────────────────────────────────────────
// Main app shell
// ─────────────────────────────────────────────────────────────
function appShell() {
  return el('div', {},
    envBanner(),
    el('div', { className: 'app' },
      sidebar(),
      el('main', { className: 'main' }, viewRouter())
    ));
}

function navItem(key, label) {
  return el('button', {
    className: `nav-item ${state.view === key ? 'active' : ''}`,
    onClick: () => {
      state.view = key; state.subView = null; render();
      loadView();
    },
  }, el('span', { className: 'nav-dot' }), label);
}

function sidebar() {
  return el('aside', { className: 'sidebar' },
    el('div', { className: 'brand-mark' },
      el('div', { className: 'brand-mark-icon' }, brandIcon(32)),
      el('div', { className: 'brand-mark-name' },
        'Altruis',
        el('span', { className: 'sub' }, 'Broker Portal'))),

    el('div', { className: 'nav-section' }, 'Pipeline'),
    navItem('dashboard', 'Dashboard'),
    navItem('submissions', 'Submissions'),
    navItem('quotes', 'Quotes'),
    navItem('policies', 'Policies'),

    el('div', { className: 'nav-section' }, 'Library'),
    navItem('documents', 'Documents'),

    el('div', { className: 'nav-section' }, 'Actions'),
    navItem('new-submission', 'New Submission'),

    el('div', { className: 'user-box' },
      el('div', { className: 'u-row' },
        el('div', { className: 'user-avatar' }, userInitials(state.user)),
        el('div', { className: 'u-info' },
          el('div', { className: 'u-name' }, state.user.name || state.user.email),
          el('div', { className: 'u-meta' }, state.user.store_name || 'Independent'))),
      el('button', {
        onClick: async () => {
          await api('/api/auth/logout', { method: 'POST', silent: true });
          state.user = null; render();
        }
      }, 'Sign out')
    )
  );
}

// ─────────────────────────────────────────────────────────────
// View router
// ─────────────────────────────────────────────────────────────
function viewRouter() {
  switch (state.view) {
    case 'dashboard': return dashboardView();
    case 'submissions': return state.subView ? submissionDetailView() : submissionsListView();
    case 'quotes': return state.subView ? quoteDetailView() : quotesListView();
    case 'policies': return state.subView ? policyDetailView() : policiesListView();
    case 'documents': return documentsView();
    case 'new-submission': return newSubmissionView();
    default: return dashboardView();
  }
}

async function loadView() {
  try {
    if (state.view === 'submissions' && !state.subView) {
      state.submissions.loading = true; render();
      const res = await api(`/api/submissions?mine_only=${state.filter.mine_only}`);
      state.submissions = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'quotes' && !state.subView) {
      state.quotes.loading = true; render();
      const res = await api('/api/quotes');
      state.quotes = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'policies' && !state.subView) {
      state.policies.loading = true; render();
      const res = await api('/api/policies');
      state.policies = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'documents') {
      state.documents.loading = true; render();
      const res = await api('/api/documents');
      state.documents = { loading: false, items: res.items || [], total: res.total_items || 0 };
      render();
    } else if (state.view === 'dashboard') {
      const [subs, quotes, pols, docs] = await Promise.all([
        api('/api/submissions?per_page=8').catch(() => ({ items: [], total_items: 0 })),
        api('/api/quotes?per_page=5').catch(() => ({ items: [], total_items: 0 })),
        api('/api/policies?per_page=5').catch(() => ({ items: [], total_items: 0 })),
        api('/api/documents?per_page=5').catch(() => ({ items: [], total_items: 0 })),
      ]);
      state.submissions = { loading: false, items: subs.items || [], total: subs.total_items || 0 };
      state.quotes = { loading: false, items: quotes.items || [], total: quotes.total_items || 0 };
      state.policies = { loading: false, items: pols.items || [], total: pols.total_items || 0 };
      state.documents = { loading: false, items: docs.items || [], total: docs.total_items || 0 };
      render();
    }
  } catch (e) { /* toast already shown */ }
}

// ─────────────────────────────────────────────────────────────
// Dashboard — "The pipeline" treatment echoing the marketing site
// ─────────────────────────────────────────────────────────────
function dashboardView() {
  const recent = (state.submissions.items || []).slice(0, 8);

  return el('div', {},
    el('div', { className: 'page-header' },
      el('div', {},
        el('div', { className: 'eyebrow' }, 'Overview'),
        el('h1', {}, 'Your pipeline')),
      el('button', {
        className: 'btn btn-primary',
        onClick: () => { state.view = 'new-submission'; render(); }
      }, 'New submission')),

    el('div', { className: 'stats-grid' },
      statCard('Submissions', state.submissions.total, 'Across your agency'),
      statCard('Open quotes', state.quotes.total, 'Awaiting action'),
      statCard('Policies in force', state.policies.total, 'Currently bound'),
      statCard('Documents', state.documents.total, 'Available to download'),
    ),

    el('div', { className: 'card' },
      el('div', { className: 'card-head' },
        el('div', {},
          el('div', { className: 'eyebrow' }, 'Recent activity'),
          el('h2', {}, 'Latest submissions')),
        el('button', {
          className: 'btn btn-ghost',
          onClick: () => { state.view = 'submissions'; render(); loadView(); }
        }, 'View all →')),
      recent.length === 0
        ? el('div', { className: 'empty' },
          el('h3', {}, 'Nothing yet'),
          el('p', {}, 'Click New submission to begin.'))
        : submissionsTable(recent)
    )
  );
}

function statCard(label, value, sub) {
  const val = value != null ? value.toLocaleString() : '0';
  return el('div', { className: 'stat' },
    el('div', { className: 'stat-label' }, label),
    el('div', { className: 'stat-value' }, val),
    el('div', { className: 'stat-sub' }, sub));
}

// ─────────────────────────────────────────────────────────────
// Submissions
// ─────────────────────────────────────────────────────────────
function submissionsListView() {
  return el('div', {},
    el('div', { className: 'page-header' },
      el('div', {},
        el('div', { className: 'eyebrow' }, 'Pipeline'),
        el('h1', {}, 'Submissions')),
      el('div', { style: { display: 'flex', gap: '16px', alignItems: 'center' } },
        el('label', { className: 'field-inline' },
          el('input', {
            type: 'checkbox', checked: state.filter.mine_only,
            onChange: (e) => { state.filter.mine_only = e.target.checked; loadView(); }
          }),
          'My submissions only'),
        el('button', {
          className: 'btn btn-primary',
          onClick: () => { state.view = 'new-submission'; render(); }
        }, 'New submission'))),

    el('div', { className: 'card' },
      state.submissions.loading
        ? el('div', { className: 'loading' }, 'Loading submissions')
        : state.submissions.items.length === 0
          ? el('div', { className: 'empty' },
            el('h3', {}, 'No submissions yet'),
            el('p', {}, 'Click New submission to get started.'))
          : submissionsTable(state.submissions.items)));
}

function submissionsTable(items) {
  return el('table', {},
    el('thead', {}, el('tr', {},
      el('th', {}, 'Insured'),
      el('th', {}, 'Submission'),
      el('th', {}, 'Flow'),
      el('th', {}, 'Effective'),
      el('th', {}, 'Status'),
      el('th', {}, 'Updated'))),
    el('tbody', {}, ...items.map(s => el('tr', {
      className: 'clickable',
      onClick: () => {
        // Joshu paths use unique_id (UUID), not the numeric id
        const pathId = s.unique_id || s.id;
        state.subView = pathId;
        loadSubmission(pathId);
      }
    },
      el('td', {},
        el('div', { className: 'insured-name' },
          s.data?.['insured.name'] || s.insured_name ||
          (s.clearance_hash?.datapoints ? 'Insured data available on open' : '—')),
        el('div', { className: 'insured-loc' },
          s.flow === 'New' ? 'New business' : s.flow)),
      el('td', { className: 'mono' }, `#${s.id}`),
      el('td', {}, s.flow || 'New'),
      el('td', {}, fmtDate(s.effective_at)),
      el('td', {}, statusBadge(s.status)),
      el('td', { style: { fontSize: '0.85rem', color: 'var(--ink-mute)' } },
        fmtDateTime(s.modified_at || s.created_at)),
    ))));
}

async function loadSubmission(id) {
  state.selectedSubmission = null;
  render();
  try {
    // id here can be either the UUID or numeric id; the backend handles both.
    // The submission detail response will include the numeric id which we
    // then use to fetch related quotes.
    const sub = await api(`/api/submissions/${id}`);
    const numericId = sub.id;
    const quotes = await api(`/api/quotes?submission_id=${numericId}`)
      .catch(() => ({ items: [] }));
    state.selectedSubmission = { ...sub, quotes: quotes.items || [] };
    render();
  } catch (e) { /* toast shown */ }
}

function submissionDetailView() {
  const s = state.selectedSubmission;
  if (!s) return el('div', { className: 'loading' }, 'Loading');

  const data = s.data || {};
  const canEdit = s.status === 'Incomplete';
  const canSubmit = s.status === 'Incomplete';

  return el('div', {},
    el('div', { className: 'page-header' },
      el('div', {},
        el('div', { className: 'eyebrow' }, `Submission · #${s.id} · ${s.flow || 'New'}`),
        el('h1', {}, data['insured.name'] || 'Submission ' + s.id)),
      el('div', { style: { display: 'flex', gap: '10px' } },
        el('button', {
          className: 'btn btn-secondary',
          onClick: () => { state.subView = null; render(); loadView(); }
        }, '← Back'),
        canEdit ? el('button', {
          className: 'btn btn-secondary',
          onClick: () => openEditDataModal(s)
        }, 'Edit data') : null,
        canSubmit ? el('button', {
          className: 'btn btn-primary',
          onClick: () => submitSubmission(s.id)
        }, 'Submit for quote') : null)),

    el('div', { className: 'detail-grid' },
      el('div', {},
        el('div', { className: 'card' },
          el('div', { className: 'eyebrow' }, 'Data'),
          el('h2', {}, 'Submission data'),
          el('p', { className: 'subtle', style: { marginTop: '8px' } },
            'Key/value data points defined by the product schema.'),
          Object.keys(data).length === 0
            ? el('div', { className: 'empty' },
              el('p', {}, 'No data yet. Click Edit data to populate.'))
            : el('dl', { className: 'kv-list' },
              ...Object.entries(data).map(([k, v]) => [
                el('dt', {}, k),
                el('dd', {}, typeof v === 'object' ? JSON.stringify(v) : String(v))
              ]).flat())),

        s.quotes && s.quotes.length > 0 ? el('div', { className: 'card' },
          el('div', { className: 'eyebrow' }, 'Quotes'),
          el('h2', {}, `${s.quotes.length} quote version${s.quotes.length > 1 ? 's' : ''}`),
          el('table', { style: { marginTop: '16px' } },
            el('thead', {}, el('tr', {},
              el('th', {}, 'Quote'),
              el('th', {}, 'Status'),
              el('th', { className: 'num' }, 'Total premium'),
              el('th', { className: 'num' }, 'Total invoice'),
              el('th', {}, 'Created'))),
            el('tbody', {}, ...s.quotes.map(q => el('tr', {
              className: 'clickable',
              onClick: () => {
                const pathId = q.unique_id || q.id;
                state.view = 'quotes'; state.subView = pathId;
                loadQuote(pathId);
              }
            },
              el('td', { className: 'mono' }, `#${q.id}`),
              el('td', {}, statusBadge(q.status)),
              el('td', { className: 'num' }, money(q.data?.total_premium)),
              el('td', { className: 'num' }, money(q.data?.total_invoice)),
              el('td', { style: { fontSize: '0.85rem', color: 'var(--ink-mute)' } },
                fmtDateTime(q.created_at))))))) : null
      ),

      el('div', {},
        el('div', { className: 'card' },
          el('div', { className: 'eyebrow' }, 'Details'),
          el('h3', {}, 'Overview'),
          el('dl', { className: 'kv-list', style: { marginTop: '16px' } },
            el('dt', {}, 'Status'), el('dd', {}, statusBadge(s.status)),
            el('dt', {}, 'Flow'), el('dd', {}, s.flow),
            el('dt', {}, 'Effective date'), el('dd', {}, fmtDate(s.effective_at)),
            el('dt', {}, 'Created'), el('dd', {}, fmtDateTime(s.created_at)),

function openEditDataModal(sub) {
  const form = { data_raw: JSON.stringify(sub.data || {}, null, 2) };
  showModal('Edit submission data', el('div', {},
    el('textarea', {
      className: 'data-editor', rows: '16',
      value: form.data_raw,
      onInput: (e) => { form.data_raw = e.target.value; }
    }),
    el('div', { className: 'help', style: { marginBottom: '20px' } },
      'Keys follow the Joshu schema (insured.*, app.*, data.*).'),
    el('div', { style: { display: 'flex', gap: '10px', justifyContent: 'flex-end' } },
      el('button', { className: 'btn btn-secondary', onClick: closeModal }, 'Cancel'),
      el('button', {
        className: 'btn btn-primary',
        onClick: async () => {
          try {
            const parsed = JSON.parse(form.data_raw);
            const pathId = sub.unique_id || sub.id;
            await api(`/api/submissions/${pathId}/data`, { method: 'PUT', body: parsed });
            toast('Data saved', 'ok');
            closeModal();
            loadSubmission(pathId);
          } catch (e) {
            toast('Invalid JSON: ' + e.message, 'err');
          }
        }

}

async function submitSubmission(id) {
  try {
    // Use the currently-loaded submission's unique_id if available
    const pathId = state.selectedSubmission?.unique_id || id;
    await api(`/api/submissions/${pathId}/submit`, { method: 'POST' });
    toast('Submission submitted for rating', 'ok');
    loadSubmission(pathId);
  } catch (e) { /* toast shown */ }
}

async function loadQuote(id) {
  state.selectedQuote = null; render();
  try {
    // id may be UUID or numeric; fetch detail, then use numeric id for related filters

    const docs = await api(`/api/documents?quote_id=${q.id}`)
      .catch(() => ({ items: [] }));
    state.selectedQuote = { ...q, documents: docs.items || [] };
    render();
  } catch (e) { /* toast shown */ }
}

function premRow(label, val) {
  if (val == null || val === 0) return null;
  return el('tr', {},
    el('td', {}, label),

}

async function requestBinder(id) {
  if (!confirm('Request a binder for this quote? The underwriter will be notified.')) return;
  try {
    await api(`/api/quotes/${id}/bind`, { method: 'POST' });
    toast('Binder requested', 'ok');
    loadQuote(id);
  } catch (e) { /* toast shown */ }
}

          onClick: () => startLifecycleTxn(p, 'Renewal')

            el('dt', {}, 'Product'), el('dd', {}, p.product_name || '—'),

            el('dt', {}, 'Renews'), el('dd', {}, fmtDate(p.renews_at)),
            el('dt', {}, 'Status'), el('dd', {}, statusBadge(p.status)),

              el('dt', {}, 'Ongoing change'),
              el('dd', {}, `${p.ongoing_change} (${p.ongoing_change_user_role || 'Broker'})`)
            ] : null)),

        p.transactions && p.transactions.length > 0 ? el('div', { className: 'card' },
          el('div', { className: 'eyebrow' }, 'Ledger'),
          el('h3', {}, 'Transactions'),

              el('td', {}, fmtDate(t.effective_at)),

                fmtDateTime(t.created_at))))))) : null

            el('dt', {}, 'Insured ID'), el('dd', {}, p.insured_id || '—')))

async function startLifecycleTxn(policy, flow) {
  const names = {
    Endorsement: 'endorsement request',
    Renewal: 'renewal',
    ManualCancellation: 'cancellation request',
  };
  const label = names[flow] || flow;
  if (!confirm(`Start a new ${label}? A new submission will be created for you to fill in.`)) return;
  try {
    const res = await api(`/api/policies/${policy.id}/transactions`, {
      method: 'POST',
      body: { flow, effective_date: new Date().toISOString().split('T')[0] },
    });
    toast(`${label.charAt(0).toUpperCase() + label.slice(1)} started`, 'ok');
    state.view = 'submissions'; state.subView = res.submission_id;
    loadSubmission(res.submission_id);
  } catch (e) { /* toast shown */ }
}

// ─────────────────────────────────────────────────────────────
// New submission
// ─────────────────────────────────────────────────────────────
function newSubmissionView() {
  const form = {
    effective_date: new Date(Date.now() + 7 * 86400000).toISOString().split('T')[0],
    product_version_id: 301,
    creating: false,
  };

  const container = el('div', {});
  const rerender = () => {
    container.innerHTML = '';
    container.appendChild(
      el('div', { className: 'page-header' },
        el('div', {},
          el('div', { className: 'eyebrow' }, 'New submission'),
          el('h1', {}, 'Start a new risk')),
        el('button', {
          className: 'btn btn-secondary',
          onClick: () => { state.view = 'dashboard'; render(); loadView(); }
        }, '← Back')));

    container.appendChild(
      el('div', { className: 'card' },
        el('p', { className: 'subtle' },
          'Create a new submission record. Insured and coverage details are filled in on the next screen.'),

        el('div', { className: 'form-grid', style: { marginTop: '24px' } },
          el('div', { className: 'field' },
            el('label', {}, 'Requested effective date'),
            el('input', {
              type: 'date', value: form.effective_date,
              onInput: (e) => { form.effective_date = e.target.value; }
            })),
          el('div', { className: 'field' },
            el('label', {}, 'Product'),
            el('input', {
              type: 'text', disabled: true,
              value: 'Altruis Commercial Package Policy (v59)',
              style: { background: 'var(--paper-warm)', color: 'var(--ink-mute)' }
            }),
            el('div', { className: 'help' },
              'Product is selected automatically based on effective date'))),

        el('div', {
          style: { marginTop: '28px', display: 'flex', justifyContent: 'flex-end', gap: '12px' }
        },
          el('button', {
            className: 'btn btn-secondary',
            onClick: () => { state.view = 'dashboard'; render(); loadView(); }
          }, 'Cancel'),
          el('button', {
            className: 'btn btn-primary', disabled: form.creating,
            onClick: async () => {
              form.creating = true; rerender();
              try {
                const res = await api('/api/submissions/start', {
                  method: 'POST',
                  body: {
                    product_version_id: form.product_version_id,
                    effective_date: form.effective_date,
                  }
                });
                toast('Submission created', 'ok');
                state.view = 'submissions';
                state.subView = res.submission_id;
                loadSubmission(res.submission_id);
              } catch (e) {
                form.creating = false; rerender();
              }
            }
          }, form.creating ? 'Creating' : 'Create submission'))
      )
    );
  };
  rerender();
  return container;
}

// ─────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────
async function boot() {
  try {
    const [cfg, me] = await Promise.all([
      api('/api/config', { silent: true }),
      api('/api/auth/me', { silent: true }).catch(() => ({ authenticated: false })),
    ]);
    state.env = cfg.environment;
    if (me.authenticated) {
      state.user = me.user;
    }
  } catch (e) {
    console.error('Boot failed', e);
  }
  render();
  if (state.user) loadView();
}

boot();
